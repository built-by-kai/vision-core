<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Opxio — Task Gantt</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}html{height:100%;}
body{font-family:'Satoshi',-apple-system,sans-serif;padding:14px;background:#191919;color:#fff;overflow:hidden;height:100%;transition:background .3s,color .3s;}
body.light{background:#F5F5F5;color:#111;}
:root{--g:#AAFF00;--gm:rgba(170,255,0,.12);--gb:rgba(170,255,0,.18);--amber:#FBBF24;--blue:#60A5FA;--red:#FF6B6B;--row:38px;--dayW:48px;}
body.light{--g:#5C9900;--gm:rgba(92,153,0,.1);--gb:rgba(92,153,0,.2);}
::-webkit-scrollbar{width:6px;height:6px;}::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:999px;}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.2);}
body.light ::-webkit-scrollbar-thumb{background:rgba(0,0,0,.12);}

.btn{background:#252525;border:1px solid rgba(255,255,255,.09);color:rgba(255,255,255,.45);font-family:'Satoshi',sans-serif;font-size:11px;font-weight:700;padding:5px 11px;border-radius:7px;cursor:pointer;transition:all .2s;}
.btn:hover{border-color:var(--gb);color:var(--g);}
body.light .btn{background:#EFEFEF;border-color:rgba(0,0,0,.08);color:rgba(0,0,0,.4);}

.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px;}
.h-left{display:flex;align-items:center;gap:12px;}
.h-right{display:flex;align-items:center;gap:6px;}
.eyebrow{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.22);margin-bottom:2px;}
body.light .eyebrow{color:rgba(0,0,0,.28);}
.h-title{font-size:18px;font-weight:900;color:#fff;letter-spacing:-.03em;}
body.light .h-title{color:#111;}
.ts{font-size:9px;font-weight:500;color:rgba(255,255,255,.18);}
body.light .ts{color:rgba(0,0,0,.22);}

/* Project selector */
.proj-sel{display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap;}
.ps-btn{background:transparent;border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.3);font-family:'Satoshi',sans-serif;font-size:10px;font-weight:700;padding:5px 12px;border-radius:7px;cursor:pointer;transition:all .2s;white-space:nowrap;}
.ps-btn:hover{border-color:rgba(255,255,255,.15);color:rgba(255,255,255,.5);}
.ps-btn.active{background:var(--gm);border-color:var(--gb);color:var(--g);}
body.light .ps-btn{border-color:rgba(0,0,0,.08);color:rgba(0,0,0,.3);}
body.light .ps-btn.active{background:var(--gm);border-color:var(--gb);color:var(--g);}

/* Filter pills */
.filter-row{display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap;align-items:center;}
.f-label{font-size:9px;font-weight:700;color:rgba(255,255,255,.2);text-transform:uppercase;letter-spacing:.08em;margin-right:4px;}
body.light .f-label{color:rgba(0,0,0,.2);}
.f-pill{background:transparent;border:1px solid rgba(255,255,255,.06);color:rgba(255,255,255,.25);font-family:'Satoshi',sans-serif;font-size:9px;font-weight:700;padding:3px 10px;border-radius:5px;cursor:pointer;transition:all .2s;}
.f-pill:hover{border-color:rgba(255,255,255,.12);color:rgba(255,255,255,.4);}
.f-pill.active{background:var(--gm);border-color:var(--gb);color:var(--g);}

/* ── GANTT LAYOUT ── */
.gantt-outer{display:flex;flex-direction:column;height:calc(100vh - 120px);}
.gantt-wrap{display:flex;flex:1;overflow:hidden;border:1px solid rgba(255,255,255,.06);border-radius:12px;background:#1E1E1E;}
body.light .gantt-wrap{background:#fff;border-color:rgba(0,0,0,.06);}

/* LEFT: task panel */
.g-left{width:300px;flex-shrink:0;overflow-y:auto;overflow-x:hidden;border-right:1px solid rgba(255,255,255,.06);}
body.light .g-left{border-right-color:rgba(0,0,0,.06);}
.gl-hdr{height:44px;display:flex;align-items:center;padding:0 16px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.3);background:rgba(255,255,255,.02);border-bottom:1px solid rgba(255,255,255,.06);position:sticky;top:0;z-index:2;}
body.light .gl-hdr{color:rgba(0,0,0,.3);background:rgba(0,0,0,.02);border-bottom-color:rgba(0,0,0,.06);}

.gl-phase{height:var(--row);display:flex;align-items:center;padding:0 16px;font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--g);background:rgba(170,255,0,.03);border-bottom:1px solid rgba(255,255,255,.05);}
body.light .gl-phase{background:rgba(92,153,0,.04);}

.gl-task{height:var(--row);display:flex;align-items:center;gap:8px;padding:0 16px;border-bottom:1px solid rgba(255,255,255,.03);}
body.light .gl-task{border-bottom-color:rgba(0,0,0,.03);}
.gl-pri{width:3px;height:18px;border-radius:2px;flex-shrink:0;}
.p-High{background:var(--red);}
.p-Medium{background:var(--amber);}
.p-Low{background:var(--blue);}
.p-None{background:rgba(255,255,255,.06);}
body.light .p-None{background:rgba(0,0,0,.05);}
.gl-name{font-size:11.5px;font-weight:600;color:rgba(255,255,255,.65);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
body.light .gl-name{color:rgba(0,0,0,.55);}
.gl-name.s-Done{text-decoration:line-through;opacity:.35;}
.gl-assign{font-size:8px;font-weight:700;color:#111;background:rgba(255,255,255,.15);border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;text-transform:uppercase;letter-spacing:-.02em;}
body.light .gl-assign{background:rgba(0,0,0,.08);color:rgba(0,0,0,.5);}
.gl-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.d-Done{background:var(--g);}
.d-InProgress{background:var(--amber);}
.d-Blocked{background:var(--red);}
.d-NotStarted{background:rgba(255,255,255,.1);}
body.light .d-NotStarted{background:rgba(0,0,0,.08);}

/* RIGHT: timeline */
.g-right{flex:1;overflow:auto;position:relative;}

/* Header dates */
.gr-month-row{display:flex;height:20px;background:rgba(255,255,255,.02);border-bottom:1px solid rgba(255,255,255,.04);position:sticky;top:0;z-index:3;}
body.light .gr-month-row{background:rgba(0,0,0,.02);border-bottom-color:rgba(0,0,0,.04);}
.gr-month{font-size:8px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.25);display:flex;align-items:center;padding:0 8px;border-right:1px solid rgba(255,255,255,.04);}
body.light .gr-month{color:rgba(0,0,0,.22);border-right-color:rgba(0,0,0,.04);}

.gr-day-row{display:flex;height:24px;background:#1E1E1E;border-bottom:1px solid rgba(255,255,255,.06);position:sticky;top:20px;z-index:3;}
body.light .gr-day-row{background:#fff;border-bottom-color:rgba(0,0,0,.06);}
.gr-day{width:var(--dayW);flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:rgba(255,255,255,.2);border-right:1px solid rgba(255,255,255,.03);}
body.light .gr-day{color:rgba(0,0,0,.18);border-right-color:rgba(0,0,0,.03);}
.gr-day.today{color:var(--g);background:rgba(170,255,0,.06);}
.gr-day.wknd{opacity:.4;}
.gr-day .dn{font-size:11px;font-weight:800;line-height:1;}
.gr-day .dl{font-size:7px;text-transform:uppercase;letter-spacing:.04em;line-height:1;}

/* Grid rows */
.gr-phase{height:var(--row);border-bottom:1px solid rgba(255,255,255,.05);background:rgba(170,255,0,.015);}
.gr-row{height:var(--row);border-bottom:1px solid rgba(255,255,255,.03);position:relative;display:flex;}
body.light .gr-row{border-bottom-color:rgba(0,0,0,.03);}
.gr-cell{width:var(--dayW);flex-shrink:0;border-right:1px solid rgba(255,255,255,.02);}
body.light .gr-cell{border-right-color:rgba(0,0,0,.02);}
.gr-cell.today-col{background:rgba(170,255,0,.03);}
.gr-cell.wknd-col{background:rgba(255,255,255,.01);}
body.light .gr-cell.wknd-col{background:rgba(0,0,0,.012);}

/* Bars */
.g-bar{position:absolute;height:22px;top:8px;border-radius:6px;z-index:1;min-width:22px;display:flex;align-items:center;padding:0 8px;cursor:default;transition:opacity .2s;}
.g-bar:hover{opacity:.9 !important;}
.g-bar span{font-size:9px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.b-Done{background:var(--g);opacity:.65;}.b-Done span{color:#111;}
.b-InProgress{background:var(--amber);}.b-InProgress span{color:#111;}
.b-Blocked{background:var(--red);opacity:.8;}.b-Blocked span{color:#fff;}
.b-NotStarted{background:rgba(255,255,255,.06);}.b-NotStarted span{color:rgba(255,255,255,.35);}
body.light .b-NotStarted{background:rgba(0,0,0,.05);}
body.light .b-NotStarted span{color:rgba(0,0,0,.3);}

/* Today line */
.today-line{position:absolute;top:0;bottom:0;width:2px;background:var(--g);opacity:.4;z-index:2;pointer-events:none;}

.empty{display:flex;align-items:center;justify-content:center;height:100%;width:100%;font-size:12px;color:rgba(255,255,255,.18);}
body.light .empty{color:rgba(0,0,0,.18);}

/* Legend */
.legend{display:flex;gap:12px;margin-bottom:10px;flex-wrap:wrap;}
.leg-item{display:flex;align-items:center;gap:4px;}
.leg-bar{width:14px;height:8px;border-radius:3px;}
.leg-lbl{font-size:8.5px;font-weight:700;color:rgba(255,255,255,.25);text-transform:uppercase;letter-spacing:.06em;}
body.light .leg-lbl{color:rgba(0,0,0,.2);}
</style></head><body>

<div class="header">
  <div><p class="eyebrow">Opxio · Operations OS</p><h1 class="h-title">Task Gantt</h1></div>
  <div class="h-right">
    <span class="ts" id="ts"></span>
    <button class="btn" onclick="doRefresh()" id="rb">↻ Refresh</button>
    <button class="btn" onclick="toggleMode()" id="mb">☀ Light</button>
  </div>
</div>

<div class="proj-sel" id="proj-sel"></div>

<div class="filter-row" id="filter-row" style="display:none;">
  <span class="f-label">Phase</span>
  <button class="f-pill active" onclick="filterPhase('all')">All</button>
</div>

<div class="legend">
  <div class="leg-item"><div class="leg-bar b-Done"></div><span class="leg-lbl">Done</span></div>
  <div class="leg-item"><div class="leg-bar b-InProgress"></div><span class="leg-lbl">In Progress</span></div>
  <div class="leg-item"><div class="leg-bar b-Blocked"></div><span class="leg-lbl">Blocked</span></div>
  <div class="leg-item"><div class="leg-bar b-NotStarted"></div><span class="leg-lbl">Not Started</span></div>
</div>

<div class="gantt-outer">
  <div class="gantt-wrap" id="gantt-wrap">
    <div class="empty">Loading…</div>
  </div>
</div>

<script>
const _tok=new URLSearchParams(location.search).get('token')||'';
function apiUrl(p){const sep=p.includes('?')?'&':'?';return _tok?p+sep+'token='+encodeURIComponent(_tok):p;}
let light=false;
function toggleMode(){light=!light;document.body.classList.toggle('light',light);document.getElementById('mb').textContent=light?'🌙 Dark':'☀ Light';}
function setTs(){document.getElementById('ts').textContent='Updated '+new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

let allProjects=[], activeIdx=0, activePhaseFilter='all';
const DAY_W=48;
const DAY_NAMES=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MON_NAMES=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function selectProject(idx){
  activeIdx=idx;
  activePhaseFilter='all';
  document.querySelectorAll('.ps-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));
  buildFilters(allProjects[idx]);
  renderGantt(allProjects[idx]);
}

function filterPhase(ph){
  activePhaseFilter=ph;
  document.querySelectorAll('.f-pill').forEach(b=>b.classList.toggle('active',b.dataset.ph===ph));
  renderGantt(allProjects[activeIdx]);
}

function buildFilters(proj){
  const row=document.getElementById('filter-row');
  if(!proj||!proj.phases||proj.phases.length<2){row.style.display='none';return;}
  row.style.display='flex';
  const phaseNames=proj.phases.map(p=>p.name);
  row.innerHTML=`<span class="f-label">Phase</span>
    <button class="f-pill active" data-ph="all" onclick="filterPhase('all')">All</button>
    ${phaseNames.map(n=>`<button class="f-pill" data-ph="${esc(n)}" onclick="filterPhase('${esc(n)}')">${esc(n)}</button>`).join('')}`;
}

function todayISO(){return new Date().toISOString().split('T')[0];}
function addDays(iso,n){const d=new Date(iso+'T00:00:00');d.setDate(d.getDate()+n);return d.toISOString().split('T')[0];}

function statusBarCls(s){
  if(s==='Done')return'b-Done';
  if(s==='In Progress')return'b-InProgress';
  if(s==='Blocked')return'b-Blocked';
  return'b-NotStarted';
}
function statusDotCls(s){
  if(s==='Done')return'd-Done';
  if(s==='In Progress')return'd-InProgress';
  if(s==='Blocked')return'd-Blocked';
  return'd-NotStarted';
}

function renderGantt(proj){
  const wrap=document.getElementById('gantt-wrap');
  if(!proj){wrap.innerHTML='<div class="empty">Select a project</div>';return;}

  let tasks=proj.tasks||[];
  if(!tasks.length){wrap.innerHTML='<div class="empty">No tasks for this project</div>';return;}

  // Filter by phase
  if(activePhaseFilter!=='all'){
    tasks=tasks.filter(t=>t.phase===activePhaseFilter);
  }
  if(!tasks.length){wrap.innerHTML='<div class="empty">No tasks in this phase</div>';return;}

  const today=todayISO();

  // Assign estimated start/end dates for tasks without them
  // Strategy: spread tasks within each phase across a reasonable timeline
  const projStart=proj.startDate||today;
  const projTarget=proj.targetDate||addDays(projStart, 60);

  // Group by phase
  const phases=[];
  let curPh=null;
  for(const t of tasks){
    const ph=t.phase||'Unassigned';
    if(ph!==curPh){curPh=ph;phases.push({name:ph,tasks:[]});}
    phases[phases.length-1].tasks.push(t);
  }

  // Estimate dates: distribute phases evenly across project timeline
  const totalPhases=phases.length||1;
  const projStartD=new Date(projStart+'T00:00:00');
  const projTargetD=new Date(projTarget+'T00:00:00');
  const totalDays=Math.max(Math.round((projTargetD-projStartD)/(86400000)),totalPhases*7);
  const daysPerPhase=Math.max(Math.floor(totalDays/totalPhases),5);

  phases.forEach((ph,pi)=>{
    const phStart=addDays(projStart, pi*daysPerPhase);
    const phEnd=addDays(projStart, (pi+1)*daysPerPhase-1);
    const tasksInPhase=ph.tasks.length;
    // Spread tasks within phase window
    ph.tasks.forEach((t,ti)=>{
      if(!t._start){
        if(t.due){
          // Has due date: bar ends at due, starts 2 days before
          t._end=t.due;
          t._start=t.created||addDays(t.due,-2);
        } else if(t.created){
          // Has created only: show 3-day bar starting from created
          t._start=t.created;
          t._end=addDays(t.created,2);
        } else {
          // No dates: estimate based on position within phase
          const offset=Math.floor((ti/Math.max(tasksInPhase,1))*daysPerPhase);
          t._start=addDays(phStart,offset);
          t._end=addDays(t._start,2);
        }
      }
    });
  });

  // Calculate full date range
  let minDate=projStart, maxDate=projTarget;
  for(const ph of phases) for(const t of ph.tasks){
    if(t._start<minDate) minDate=t._start;
    if(t._end>maxDate) maxDate=t._end;
  }
  // Add padding
  minDate=addDays(minDate,-3);
  maxDate=addDays(maxDate,5);

  // Generate days array
  const days=[];
  for(let d=new Date(minDate+'T00:00:00');d<=new Date(maxDate+'T00:00:00');d.setDate(d.getDate()+1)){
    days.push(d.toISOString().split('T')[0]);
  }
  const dayIndex={};
  days.forEach((d,i)=>dayIndex[d]=i);

  // Build month spans for header
  const months=[];
  let cmKey='';
  for(let i=0;i<days.length;i++){
    const d=new Date(days[i]+'T00:00:00');
    const mk=MON_NAMES[d.getMonth()]+' '+d.getFullYear();
    if(mk!==cmKey){cmKey=mk;months.push({label:mk,start:i,span:1});}
    else{months[months.length-1].span++;}
  }

  // ── LEFT PANEL ──
  let leftHTML=`<div class="gl-hdr">Tasks · ${tasks.length}</div>`;
  for(const ph of phases){
    leftHTML+=`<div class="gl-phase">${esc(ph.name)} · ${ph.tasks.length}</div>`;
    for(const t of ph.tasks){
      const isDone=t.status==='Done';
      const initials=(t.assignees||[]).length>0?t.assignees[0].split(' ').map(w=>w[0]).join('').slice(0,2):'';
      leftHTML+=`<div class="gl-task">
        <div class="gl-pri p-${t.priority||'None'}"></div>
        <div class="gl-name${isDone?' s-Done':''}" title="${esc(t.name)}">${esc(t.name)}</div>
        ${initials?`<div class="gl-assign" title="${esc(t.assignees.join(', '))}">${esc(initials)}</div>`:''}
        <div class="gl-dot ${statusDotCls(t.status)}"></div>
      </div>`;
    }
  }

  // ── RIGHT PANEL ──
  const totalW=days.length*DAY_W;

  // Month header
  let monthHTML=months.map(m=>`<div class="gr-month" style="width:${m.span*DAY_W}px">${m.label}</div>`).join('');

  // Day header
  let dayHTML=days.map(iso=>{
    const d=new Date(iso+'T00:00:00');
    const isToday=iso===today;
    const isWknd=d.getDay()===0||d.getDay()===6;
    return`<div class="gr-day${isToday?' today':''}${isWknd?' wknd':''}"><span class="dn">${d.getDate()}</span><span class="dl">${DAY_NAMES[d.getDay()]}</span></div>`;
  }).join('');

  // Grid rows
  let rowsHTML='';
  for(const ph of phases){
    // Phase separator
    rowsHTML+=`<div class="gr-phase" style="width:${totalW}px"></div>`;
    for(const t of ph.tasks){
      // Cell backgrounds
      let cells=days.map(iso=>{
        const d=new Date(iso+'T00:00:00');
        const isToday=iso===today;
        const isWknd=d.getDay()===0||d.getDay()===6;
        return`<div class="gr-cell${isToday?' today-col':''}${isWknd?' wknd-col':''}"></div>`;
      }).join('');

      // Bar position
      let si=dayIndex[t._start]??0;
      let ei=dayIndex[t._end]??(si+1);
      if(ei<si)ei=si;
      const barLeft=si*DAY_W+3;
      const barWidth=Math.max((ei-si+1)*DAY_W-6, 22);
      const barCls=statusBarCls(t.status);
      const dur=ei-si+1;
      const durLbl=dur>=2?dur+'d':'';

      rowsHTML+=`<div class="gr-row">${cells}
        <div class="g-bar ${barCls}" style="left:${barLeft}px;width:${barWidth}px;" title="${esc(t.name)}">
          <span>${durLbl}</span>
        </div>
      </div>`;
    }
  }

  // Today line
  const todayIdx=dayIndex[today];
  const todayLineHTML=todayIdx!==undefined?`<div class="today-line" style="left:${todayIdx*DAY_W+DAY_W/2}px;"></div>`:'';

  wrap.innerHTML=`
    <div class="g-left" id="gl">${leftHTML}</div>
    <div class="g-right" id="gr">
      <div style="min-width:${totalW}px;">
        <div class="gr-month-row">${monthHTML}</div>
        <div class="gr-day-row">${dayHTML}</div>
        <div style="position:relative;">
          ${rowsHTML}
          ${todayLineHTML}
        </div>
      </div>
    </div>`;

  // Sync vertical scroll
  const gl=document.getElementById('gl');
  const gr=document.getElementById('gr');
  let syncing=false;
  gr.addEventListener('scroll',()=>{if(!syncing){syncing=true;gl.scrollTop=gr.scrollTop;syncing=false;}});
  gl.addEventListener('scroll',()=>{if(!syncing){syncing=true;gr.scrollTop=gl.scrollTop;syncing=false;}});

  // Scroll to today
  if(todayIdx!==undefined){
    gr.scrollLeft=Math.max(0,todayIdx*DAY_W-gr.clientWidth/3);
  }
}

function render(data){
  allProjects=data.gantt||[];
  const sel=document.getElementById('proj-sel');
  if(!allProjects.length){
    sel.innerHTML='';
    document.getElementById('gantt-wrap').innerHTML='<div class="empty">No projects found</div>';
    return;
  }
  sel.innerHTML=allProjects.map((p,i)=>`<button class="ps-btn${i===0?' active':''}" onclick="selectProject(${i})">${esc(p.name)} <span style="opacity:.4;margin-left:4px;">${p.tasks.length}</span></button>`).join('');
  buildFilters(allProjects[0]);
  renderGantt(allProjects[0]);
}

async function loadData(){
  try{
    const r=await fetch(apiUrl('/api/data/projects?view=gantt'));
    const j=await r.json();
    if(j.error){console.error('API:',j.error);return;}
    render(j);
    setTs();
  }catch(e){console.error('gantt:',e);}
}

function doRefresh(){const b=document.getElementById('rb');b.textContent='↻';b.style.opacity='.4';loadData().then(()=>{b.textContent='↻ Refresh';b.style.opacity='1';});}
setTs();loadData();setInterval(loadData,5*60*1000);
</script></body></html>
