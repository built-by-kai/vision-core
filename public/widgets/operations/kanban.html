<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Opxio — Project Board</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}html,body{height:100%;}
body{font-family:'Satoshi',-apple-system,sans-serif;padding:16px;background:#191919;color:#fff;overflow:hidden;transition:background .3s,color .3s;}
body.light{background:#F5F5F5;color:#111;}
:root{--g:#AAFF00;--gm:rgba(170,255,0,.12);--gb:rgba(170,255,0,.18);--amber:#FBBF24;--red:#FF6B6B;--blue:#60A5FA;--purple:#A78BFA;}
body.light{--g:#5C9900;--gm:rgba(92,153,0,.1);--gb:rgba(92,153,0,.2);}
::-webkit-scrollbar{width:4px;height:4px;}::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:999px;}
body.light ::-webkit-scrollbar-thumb{background:rgba(0,0,0,.08);}

.btn{background:#252525;border:1px solid rgba(255,255,255,.09);color:rgba(255,255,255,.45);font-family:'Satoshi',sans-serif;font-size:12px;font-weight:700;padding:6px 14px;border-radius:8px;cursor:pointer;transition:all .2s;}
.btn:hover{border-color:var(--gb);color:var(--g);}
body.light .btn{background:#EFEFEF;border-color:rgba(0,0,0,.08);color:rgba(0,0,0,.4);}

.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.h-right{display:flex;align-items:center;gap:6px;}
.eyebrow{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.22);margin-bottom:2px;}
body.light .eyebrow{color:rgba(0,0,0,.28);}
.h-title{font-size:20px;font-weight:900;color:#fff;letter-spacing:-.03em;}
body.light .h-title{color:#111;}
.ts{font-size:10px;font-weight:500;color:rgba(255,255,255,.18);}
body.light .ts{color:rgba(0,0,0,.22);}

/* ── BOARD ── */
.board{display:flex;gap:10px;height:calc(100vh - 72px);overflow-x:auto;overflow-y:hidden;padding-bottom:8px;}

/* ── COLUMN ── */
.col{min-width:280px;width:280px;flex-shrink:0;display:flex;flex-direction:column;max-height:100%;}

.col-hdr{padding:10px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0;border-radius:10px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.04);margin-bottom:10px;}
body.light .col-hdr{background:rgba(0,0,0,.02);border-color:rgba(0,0,0,.04);}
.col-stripe{width:3px;height:18px;border-radius:999px;flex-shrink:0;}
.col-title{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.45);flex:1;}
body.light .col-title{color:rgba(0,0,0,.4);}
.col-count{font-size:11px;font-weight:800;color:rgba(255,255,255,.18);}
body.light .col-count{color:rgba(0,0,0,.16);}

.col-body{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:8px;padding:0 2px 12px;}

/* ── CARD ── */
.card{background:#1E1E1E;border:1px solid rgba(255,255,255,.05);border-radius:12px;padding:14px 16px;cursor:default;transition:border-color .2s;}
.card:hover{border-color:rgba(170,255,0,.12);}
body.light .card{background:#fff;border-color:rgba(0,0,0,.05);box-shadow:0 1px 3px rgba(0,0,0,.03);}
body.light .card:hover{border-color:rgba(92,153,0,.18);}

/* Top row: type + client */
.c-top{display:flex;align-items:center;gap:6px;margin-bottom:8px;}
.c-type{font-size:10px;font-weight:700;padding:2px 8px;border-radius:999px;letter-spacing:.02em;white-space:nowrap;}
.c-client{font-size:10px;font-weight:600;color:rgba(255,255,255,.3);margin-left:auto;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:110px;}
body.light .c-client{color:rgba(0,0,0,.25);}

/* Name */
.c-name{font-size:14px;font-weight:700;color:#fff;line-height:1.35;display:block;text-decoration:none;margin-bottom:10px;}
.c-name:hover{text-decoration:underline;text-decoration-color:var(--g);text-underline-offset:2px;}
body.light .c-name{color:#111;}

/* Progress bar */
.c-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.c-track{flex:1;height:4px;border-radius:999px;background:rgba(255,255,255,.06);}
body.light .c-track{background:rgba(0,0,0,.06);}
.c-fill{height:4px;border-radius:999px;transition:width .5s cubic-bezier(.4,0,.2,1);}
.c-pct{font-size:11px;font-weight:800;width:32px;text-align:right;flex-shrink:0;}

/* Task summary — single line */
.c-tasks{font-size:10px;font-weight:600;color:rgba(255,255,255,.3);display:flex;align-items:center;gap:7px;}
body.light .c-tasks{color:rgba(0,0,0,.25);}
.c-tasks .dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.c-tasks .sep{width:1px;height:10px;background:rgba(255,255,255,.06);flex-shrink:0;}
body.light .c-tasks .sep{background:rgba(0,0,0,.06);}

/* Bottom meta */
.c-meta{display:flex;align-items:center;gap:8px;margin-top:8px;flex-wrap:wrap;}
.c-date{font-size:10px;font-weight:600;color:rgba(255,255,255,.22);}
body.light .c-date{color:rgba(0,0,0,.2);}
.c-phase{font-size:10px;font-weight:700;color:rgba(255,255,255,.22);display:flex;align-items:center;gap:4px;margin-left:auto;}
body.light .c-phase{color:rgba(0,0,0,.2);}
.c-phase-dot{width:5px;height:5px;border-radius:50%;background:var(--g);flex-shrink:0;}

/* Empty */
.col-empty{padding:16px;text-align:center;font-size:10px;color:rgba(255,255,255,.08);}
body.light .col-empty{color:rgba(0,0,0,.07);}
.loading{display:flex;align-items:center;justify-content:center;height:100%;font-size:13px;color:rgba(255,255,255,.15);}
body.light .loading{color:rgba(0,0,0,.12);}
</style></head><body>

<div class="header">
  <div><p class="eyebrow" id="_eyebrow" data-os="Operations OS">OPXIO · Operations OS</p><h1 class="h-title">Project Board</h1></div>
  <div class="h-right">
    <span class="ts" id="ts"></span>
    <button class="btn" onclick="doRefresh()" id="rb">↻ Refresh</button>
    <button class="btn" onclick="toggleMode()" id="mb">☀ Light</button>
  </div>
</div>

<div class="board" id="board"><div class="loading">Loading…</div></div>

<script>
const _tok=new URLSearchParams(location.search).get('token')||'';
function apiUrl(p){return _tok?p+'?token='+encodeURIComponent(_tok):p;}
let light=false;
function toggleMode(){light=!light;document.body.classList.toggle('light',light);document.getElementById('mb').textContent=light?'🌙 Dark':'☀ Light';}
function setTs(){document.getElementById('ts').textContent='Updated '+new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtDate(iso){if(!iso)return'';const d=new Date(iso+'T00:00:00');return d.getDate()+' '+['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()];}

const COLUMNS=[
  {key:'awaiting',label:'Awaiting',hex:'#60A5FA'},
  {key:'active',label:'Active',hex:'#AAFF00'},
  {key:'review',label:'In Review',hex:'#FBBF24'},
  {key:'hold',label:'On Hold',hex:'#666'},
  {key:'done',label:'Completed',hex:'#A78BFA'},
];

const TYPE_COLORS={};
const PALETTE=['#AAFF00','#FBBF24','#60A5FA','#A78BFA','#22D3EE','#FF6B6B'];
let _ti=0;
function tc(t){if(!t)return null;if(!TYPE_COLORS[t])TYPE_COLORS[t]=PALETTE[_ti++%PALETTE.length];return TYPE_COLORS[t];}

function renderCard(proj,colHex){
  const pct=proj.overallPct||0;
  const ts=proj.taskSummary||{};
  const color=tc(proj.type);

  // Type pill
  let typeHTML='';
  if(proj.type&&color){
    typeHTML=`<span class="c-type" style="background:${color}15;color:${color}">${esc(proj.type)}</span>`;
  }

  // Task summary — minimal inline: "6✓ · 1● · 199○"
  let taskParts=[];
  if(ts.done)    taskParts.push(`<span class="dot" style="background:var(--g)"></span>${ts.done} done`);
  if(ts.inProgress) taskParts.push(`<span class="dot" style="background:var(--amber)"></span>${ts.inProgress} active`);
  if(ts.blocked) taskParts.push(`<span class="dot" style="background:var(--red)"></span>${ts.blocked} blocked`);
  if(ts.notStarted) taskParts.push(`<span class="dot" style="background:rgba(255,255,255,.1)"></span>${ts.notStarted} pending`);
  const taskHTML=taskParts.length?`<div class="c-tasks">${taskParts.join('<span class="sep"></span>')}</div>`:'';

  // Dates
  let metaParts=[];
  if(proj.startDate) metaParts.push(`<span class="c-date">${fmtDate(proj.startDate)}</span>`);
  if(proj.completedDate) metaParts.push(`<span class="c-date">→ ${fmtDate(proj.completedDate)}</span>`);
  else if(proj.targetDate) metaParts.push(`<span class="c-date">→ ${fmtDate(proj.targetDate)}</span>`);

  let phaseHTML='';
  if(proj.phase&&proj.phase!=='—') phaseHTML=`<span class="c-phase"><span class="c-phase-dot"></span>${esc(proj.phase)}</span>`;

  const metaHTML=(metaParts.length||phaseHTML)?`<div class="c-meta">${metaParts.join('')}${phaseHTML}</div>`:'';

  const nameTag=proj.notionUrl
    ?`<a class="c-name" href="${proj.notionUrl}" target="_blank" rel="noopener">${esc(proj.name)}</a>`
    :`<div class="c-name">${esc(proj.name)}</div>`;

  const pctColor=pct===0?'rgba(255,255,255,.12)':'var(--g)';

  return`<div class="card">
  <div class="c-top">${typeHTML}<span class="c-client">${proj.client?esc(proj.client):''}</span></div>
  ${nameTag}
  <div class="c-bar-row">
    <div class="c-track"><div class="c-fill" style="width:${pct}%;background:var(--g)"></div></div>
    <span class="c-pct" style="color:${pctColor}">${pct}%</span>
  </div>
  ${taskHTML}
  ${metaHTML}
</div>`;
}

function render(data){
  const all=[...(data.builds||[]),...(data.completed||[])];
  const buckets={};
  COLUMNS.forEach(c=>buckets[c.key]=[]);
  for(const p of all){if(buckets[p.status])buckets[p.status].push(p);}

  document.getElementById('board').innerHTML=COLUMNS.map(col=>{
    const items=buckets[col.key]||[];
    const body=items.length
      ?items.map(p=>renderCard(p,col.hex)).join('')
      :`<div class="col-empty">No projects</div>`;
    return`<div class="col">
      <div class="col-hdr">
        <div class="col-stripe" style="background:${col.hex}"></div>
        <span class="col-title">${col.label}</span>
        <span class="col-count">${items.length}</span>
      </div>
      <div class="col-body">${body}</div>
    </div>`;
  }).join('');
}

async function loadData(){
  try{const r=await fetch(apiUrl('/api/data/projects'));const j=await r.json();if(j.error)return;render(j);setTs();}catch(e){console.error('kanban:',e);}
}
function doRefresh(){const b=document.getElementById('rb');b.textContent='↻';b.style.opacity='.4';loadData().then(()=>{b.textContent='↻ Refresh';b.style.opacity='1';});}
setTs();loadData();setInterval(loadData,5*60*1000);
</script>
<div style="text-align:center;padding:20px 0 4px;font-size:9px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.1);">Widgets by Opxio.io</div>
<script>
(function(){
  const _c = new URLSearchParams(location.search).get('client');
  if(_c){
    const el = document.getElementById('_eyebrow');
    if(el) el.textContent = 'OPXIO · ' + _c.toUpperCase() + ' · ' + el.dataset.os;
  }
})();
</script>
</body></html>
