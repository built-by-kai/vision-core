<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Opxio — Operations Overview</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}html{height:100%;}
body{font-family:'Satoshi',-apple-system,sans-serif;padding:14px;background:#191919;color:#fff;overflow-y:auto;overflow-x:hidden;height:100%;transition:background .3s,color .3s;}
body.light{background:#F5F5F5;color:#111;}
:root{--g:#AAFF00;--gm:rgba(170,255,0,.12);--gb:rgba(170,255,0,.18);--amber:#FBBF24;--amberm:rgba(251,191,36,.1);--amberb:rgba(251,191,36,.2);--blue:#60A5FA;--bluem:rgba(96,165,250,.1);--blueb:rgba(96,165,250,.18);--red:#FF6B6B;--redm:rgba(255,107,107,.1);--redb:rgba(255,107,107,.18);--cyan:#22D3EE;--purple:#A78BFA;}
body.light{--g:#5C9900;--gm:rgba(92,153,0,.1);--gb:rgba(92,153,0,.2);}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:999px;}
body.light ::-webkit-scrollbar-thumb{background:rgba(0,0,0,.1);}

.card{background:#1E1E1E;border:1px solid rgba(255,255,255,.06);border-radius:14px;transition:border-color .2s;}
.card:hover{border-color:rgba(170,255,0,.1);}
body.light .card{background:#fff;border-color:rgba(0,0,0,.06);}
.btn{background:#252525;border:1px solid rgba(255,255,255,.09);color:rgba(255,255,255,.45);font-family:'Satoshi',sans-serif;font-size:11px;font-weight:700;padding:5px 11px;border-radius:7px;cursor:pointer;transition:all .2s;}
.btn:hover{border-color:var(--gb);color:var(--g);}
body.light .btn{background:#EFEFEF;border-color:rgba(0,0,0,.08);color:rgba(0,0,0,.4);}

.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px;}
.h-right{display:flex;align-items:center;gap:6px;}
.eyebrow{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.22);margin-bottom:2px;}
body.light .eyebrow{color:rgba(0,0,0,.28);}
.h-title{font-size:18px;font-weight:900;color:#fff;letter-spacing:-.03em;}
body.light .h-title{color:#111;}
.ts{font-size:9px;font-weight:500;color:rgba(255,255,255,.18);}
body.light .ts{color:rgba(0,0,0,.22);}
.sec-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.22);margin:16px 0 8px;}
body.light .sec-lbl{color:rgba(0,0,0,.28);}

/* ── STAT CARDS ── */
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
@media(max-width:600px){.g4{grid-template-columns:repeat(2,1fr);}}
.stat{padding:16px 18px;position:relative;overflow:hidden;}
.s-dot{position:absolute;top:13px;right:13px;width:6px;height:6px;border-radius:50%;opacity:.6;}
.s-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.5);margin-bottom:10px;display:block;}
body.light .s-lbl{color:rgba(0,0,0,.4);}
.s-val{font-size:30px;font-weight:900;letter-spacing:-1.5px;line-height:1;color:var(--g);}
.s-sub{font-size:9.5px;font-weight:500;color:rgba(255,255,255,.22);margin-top:6px;}
body.light .s-sub{color:rgba(0,0,0,.28);}
/* Mini sparkline in stat card */
.s-spark{position:absolute;bottom:0;left:0;right:0;height:28px;opacity:.15;}

/* ── MID ROW ── */
.mid-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;}
@media(max-width:700px){.mid-row{grid-template-columns:1fr;}}
.panel{padding:20px 22px;}
.panel-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px;}
.panel-title{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#fff;opacity:.85;}
body.light .panel-title{color:#111;opacity:1;}
.panel-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px;background:var(--gm);color:var(--g);border:1px solid var(--gb);}

/* ── DONUT CHART (Project Types) ── */
.donut-wrap{display:flex;align-items:center;gap:24px;}
@media(max-width:500px){.donut-wrap{flex-direction:column;align-items:flex-start;gap:14px;}}
.donut-svg{flex-shrink:0;overflow:visible;}
.donut-center{font-size:22px;font-weight:900;fill:var(--g);letter-spacing:-1px;}
.donut-center-sub{font-size:8px;font-weight:700;fill:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.1em;}
body.light .donut-center-sub{fill:rgba(0,0,0,.3);}
.donut-legend{display:flex;flex-direction:column;gap:10px;flex:1;}
.dl-item{display:flex;align-items:center;gap:10px;}
.dl-swatch{width:10px;height:10px;border-radius:3px;flex-shrink:0;}
.dl-info{flex:1;min-width:0;}
.dl-name{font-size:12px;font-weight:700;color:#fff;}
body.light .dl-name{color:#111;}
.dl-bar-track{width:100%;height:4px;border-radius:999px;background:rgba(255,255,255,.06);margin-top:4px;}
body.light .dl-bar-track{background:rgba(0,0,0,.06);}
.dl-bar-fill{height:4px;border-radius:999px;transition:width .8s cubic-bezier(.4,0,.2,1);}
.dl-meta{font-size:10px;font-weight:700;color:rgba(255,255,255,.4);flex-shrink:0;text-align:right;min-width:50px;}
body.light .dl-meta{color:rgba(0,0,0,.35);}

/* ── TASK COMPLETION RING + BREAKDOWN ── */
.task-wrap{display:flex;align-items:center;gap:20px;}
@media(max-width:500px){.task-wrap{flex-direction:column;}}
.ring-svg{flex-shrink:0;overflow:visible;}
.ring-center{font-size:20px;font-weight:900;fill:var(--g);}
.ring-center-sub{font-size:7.5px;font-weight:700;fill:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.1em;}
body.light .ring-center-sub{fill:rgba(0,0,0,.3);}
.task-bars{flex:1;display:flex;flex-direction:column;gap:10px;min-width:0;}
.tb-row{display:flex;align-items:center;gap:8px;}
.tb-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.tb-label{font-size:10px;font-weight:700;color:rgba(255,255,255,.5);width:70px;flex-shrink:0;}
body.light .tb-label{color:rgba(0,0,0,.4);}
.tb-track{flex:1;height:8px;border-radius:999px;background:rgba(255,255,255,.05);overflow:hidden;}
body.light .tb-track{background:rgba(0,0,0,.05);}
.tb-fill{height:8px;border-radius:999px;transition:width .8s cubic-bezier(.4,0,.2,1);}
.tb-val{font-size:11px;font-weight:800;color:#fff;width:36px;text-align:right;flex-shrink:0;}
body.light .tb-val{color:#111;}
.tb-pct{font-size:9px;font-weight:600;color:rgba(255,255,255,.25);width:32px;text-align:right;flex-shrink:0;}
body.light .tb-pct{color:rgba(0,0,0,.2);}

/* ── BOTTOM ROW ── */
.bot-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;}
@media(max-width:700px){.bot-row{grid-template-columns:1fr;}}

/* ── PRIORITY RADIAL ── */
.pri-visual{display:flex;align-items:center;gap:20px;}
@media(max-width:500px){.pri-visual{flex-direction:column;}}
.pri-bars{flex:1;display:flex;flex-direction:column;gap:10px;min-width:0;}
.pri-row{display:flex;align-items:center;gap:10px;}
.pri-icon{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;flex-shrink:0;}
.pri-label{font-size:10px;font-weight:700;width:52px;flex-shrink:0;color:rgba(255,255,255,.5);}
body.light .pri-label{color:rgba(0,0,0,.4);}
.pri-track{flex:1;height:8px;border-radius:999px;background:rgba(255,255,255,.05);overflow:hidden;position:relative;}
body.light .pri-track{background:rgba(0,0,0,.05);}
.pri-fill{height:8px;border-radius:999px;transition:width .8s cubic-bezier(.4,0,.2,1);}
.pri-high{background:var(--red);}
.pri-medium{background:var(--amber);}
.pri-low{background:var(--blue);}
.pri-none{background:rgba(255,255,255,.12);}
body.light .pri-none{background:rgba(0,0,0,.1);}
.pri-count{font-size:11px;font-weight:800;color:#fff;width:36px;text-align:right;flex-shrink:0;}
body.light .pri-count{color:#111;}
.pri-pct{font-size:9px;font-weight:600;color:rgba(255,255,255,.25);width:28px;text-align:right;flex-shrink:0;}
body.light .pri-pct{color:rgba(0,0,0,.2);}

/* ── STATUS VISUAL ── */
.status-visual{display:flex;flex-direction:column;gap:12px;}
.sv-bar-wrap{position:relative;height:28px;border-radius:8px;overflow:hidden;background:rgba(255,255,255,.03);display:flex;}
body.light .sv-bar-wrap{background:rgba(0,0,0,.03);}
.sv-seg{height:100%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;transition:width .8s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden;}
.sv-seg span{position:relative;z-index:1;white-space:nowrap;}
.sv-legend{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;}
.sv-leg{display:flex;align-items:center;gap:6px;}
.sv-dot{width:8px;height:8px;border-radius:3px;flex-shrink:0;}
.sv-lbl{font-size:10px;font-weight:600;color:rgba(255,255,255,.4);}
body.light .sv-lbl{color:rgba(0,0,0,.35);}
.sv-val{font-size:10px;font-weight:800;color:#fff;}
body.light .sv-val{color:#111;}

/* Status detail cards */
.status-cards{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-top:8px;}
@media(max-width:600px){.status-cards{grid-template-columns:repeat(3,1fr);}}
.sc-item{text-align:center;padding:10px 6px;border-radius:8px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);}
body.light .sc-item{background:rgba(0,0,0,.02);border-color:rgba(0,0,0,.04);}
.sc-val{font-size:20px;font-weight:900;line-height:1;margin-bottom:3px;}
.sc-lbl{font-size:7.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:rgba(255,255,255,.3);}
body.light .sc-lbl{color:rgba(0,0,0,.3);}

.empty{padding:40px;text-align:center;font-size:12px;color:rgba(255,255,255,.18);}
body.light .empty{color:rgba(0,0,0,.18);}
</style></head><body>

<div class="header">
  <div><p class="eyebrow">Opxio · Operations OS</p><h1 class="h-title">Overview</h1></div>
  <div class="h-right">
    <span class="ts" id="ts"></span>
    <button class="btn" onclick="doRefresh()" id="rb">↻ Refresh</button>
    <button class="btn" onclick="toggleMode()" id="mb">☀ Light</button>
  </div>
</div>

<!-- STAT CARDS -->
<div class="g4">
  <div class="card stat"><div class="s-dot" style="background:var(--g);"></div><span class="s-lbl">Total Projects</span><div class="s-val" id="s-total">0</div><div class="s-sub" id="s-total-sub">Across all statuses</div></div>
  <div class="card stat"><div class="s-dot" style="background:var(--g);"></div><span class="s-lbl">Active Builds</span><div class="s-val" id="s-active">0</div><div class="s-sub" id="s-active-sub">Currently in progress</div></div>
  <div class="card stat"><div class="s-dot" style="background:var(--amber);"></div><span class="s-lbl">Total Tasks</span><div class="s-val" id="s-tasks">0</div><div class="s-sub" id="s-tasks-sub">Across all projects</div></div>
  <div class="card stat"><div class="s-dot" style="background:var(--g);"></div><span class="s-lbl">Avg Completion</span><div class="s-val" id="s-avg">0%</div><div class="s-sub" id="s-avg-sub">Active project average</div></div>
</div>

<!-- MID ROW -->
<div class="sec-lbl">Breakdown</div>
<div class="mid-row">
  <!-- LEFT: Project Types Donut -->
  <div class="card panel">
    <div class="panel-hdr">
      <span class="panel-title">Project Types</span>
      <span class="panel-badge" id="type-badge">0 projects</span>
    </div>
    <div class="donut-wrap">
      <svg class="donut-svg" width="120" height="120" viewBox="0 0 120 120" id="donut-svg">
        <circle cx="60" cy="60" r="48" fill="none" stroke="rgba(255,255,255,.04)" stroke-width="14"/>
        <text x="60" y="56" text-anchor="middle" class="donut-center" id="donut-val">0</text>
        <text x="60" y="70" text-anchor="middle" class="donut-center-sub">Projects</text>
      </svg>
      <div class="donut-legend" id="donut-legend"></div>
    </div>
  </div>
  <!-- RIGHT: Task Completion Ring + Bars -->
  <div class="card panel">
    <div class="panel-hdr">
      <span class="panel-title">Task Status</span>
    </div>
    <div class="task-wrap">
      <svg class="ring-svg" width="110" height="110" viewBox="0 0 110 110" id="task-ring-svg">
        <circle cx="55" cy="55" r="42" fill="none" stroke="rgba(255,255,255,.04)" stroke-width="12"/>
        <!-- Arcs drawn by JS -->
        <text x="55" y="51" text-anchor="middle" class="ring-center" id="ring-pct">0%</text>
        <text x="55" y="64" text-anchor="middle" class="ring-center-sub">Complete</text>
      </svg>
      <div class="task-bars" id="task-bars"></div>
    </div>
  </div>
</div>

<!-- BOTTOM ROW -->
<div class="sec-lbl">Details</div>
<div class="bot-row">
  <!-- LEFT: Priority Distribution -->
  <div class="card panel">
    <div class="panel-hdr">
      <span class="panel-title">Task Priority</span>
    </div>
    <div class="pri-bars" id="pri-bars"></div>
  </div>
  <!-- RIGHT: Project Status -->
  <div class="card panel">
    <div class="panel-hdr">
      <span class="panel-title">Project Status</span>
    </div>
    <div class="status-visual" id="status-visual"></div>
  </div>
</div>

<script>
const _tok=new URLSearchParams(location.search).get('token')||'';
function apiUrl(p){return _tok?p+'?token='+encodeURIComponent(_tok):p;}
let light=false;
function toggleMode(){light=!light;document.body.classList.toggle('light',light);document.getElementById('mb').textContent=light?'🌙 Dark':'☀ Light';}
function setTs(){document.getElementById('ts').textContent='Updated '+new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

const CIRC=2*Math.PI*42; // ~263.9 for task ring
const DONUT_R=48;
const DONUT_CIRC=2*Math.PI*DONUT_R;

const TYPE_COLORS=['var(--g)','var(--blue)','var(--amber)','var(--purple)','var(--cyan)','var(--red)'];

function renderStats(counts, ov){
  document.getElementById('s-total').textContent=ov.totalProjects||0;
  document.getElementById('s-total-sub').textContent=`${counts.active||0} active · ${counts.done||0} completed`;
  document.getElementById('s-active').textContent=counts.active||0;
  document.getElementById('s-active-sub').textContent=`${counts.awaiting||0} awaiting · ${counts.hold||0} on hold`;
  document.getElementById('s-tasks').textContent=ov.taskStats?.total||0;
  const ts=ov.taskStats||{};
  document.getElementById('s-tasks-sub').textContent=`${ts.done||0} done · ${ts.inProgress||0} in progress`;
  document.getElementById('s-avg').textContent=(ov.avgCompletion||0)+'%';
  document.getElementById('s-avg-sub').textContent=`Across ${counts.active||0} active builds`;
}

function renderDonut(types, total){
  document.getElementById('type-badge').textContent=total+' project'+(total!==1?'s':'');
  document.getElementById('donut-val').textContent=total;

  const svg=document.getElementById('donut-svg');
  // Remove old arcs
  svg.querySelectorAll('.donut-arc').forEach(e=>e.remove());

  if(!types||!types.length){
    document.getElementById('donut-legend').innerHTML='<div style="font-size:11px;color:rgba(255,255,255,.2);">No data</div>';
    return;
  }

  // Draw donut arcs
  let offset=0;
  types.forEach((t,i)=>{
    const frac=total>0?t.count/total:0;
    const len=frac*DONUT_CIRC;
    const gap=types.length>1?3:0;
    const arc=document.createElementNS('http://www.w3.org/2000/svg','circle');
    arc.setAttribute('class','donut-arc');
    arc.setAttribute('cx','60');
    arc.setAttribute('cy','60');
    arc.setAttribute('r',String(DONUT_R));
    arc.setAttribute('fill','none');
    arc.setAttribute('stroke',TYPE_COLORS[i%TYPE_COLORS.length]);
    arc.setAttribute('stroke-width','14');
    arc.setAttribute('stroke-linecap','round');
    arc.setAttribute('stroke-dasharray',`${Math.max(len-gap,1)} ${DONUT_CIRC}`);
    arc.setAttribute('transform',`rotate(${-90+offset*360} 60 60)`);
    arc.style.transition='all .8s cubic-bezier(.4,0,.2,1)';
    svg.insertBefore(arc,svg.querySelector('text'));
    offset+=frac;
  });

  // Legend with mini bars
  const maxCount=types[0]?.count||1;
  document.getElementById('donut-legend').innerHTML=types.map((t,i)=>{
    const color=TYPE_COLORS[i%TYPE_COLORS.length];
    const barW=Math.round((t.count/maxCount)*100);
    return`<div class="dl-item">
      <div class="dl-swatch" style="background:${color}"></div>
      <div class="dl-info">
        <div class="dl-name">${esc(t.name)}</div>
        <div class="dl-bar-track"><div class="dl-bar-fill" style="width:${barW}%;background:${color}"></div></div>
      </div>
      <div class="dl-meta">${t.count} · ${t.pct}%</div>
    </div>`;
  }).join('');
}

function renderTaskRing(ts){
  const total=ts.total||0;
  const done=ts.done||0;
  const ip=ts.inProgress||0;
  const blocked=ts.blocked||0;
  const ns=ts.notStarted||0;
  const pct=ts.completionPct||0;

  document.getElementById('ring-pct').textContent=pct+'%';

  const svg=document.getElementById('task-ring-svg');
  svg.querySelectorAll('.task-arc').forEach(e=>e.remove());

  const items=[
    {val:done,color:'var(--g)'},
    {val:ip,color:'var(--amber)'},
    {val:blocked,color:'var(--red)'},
  ];

  let offset=0;
  items.forEach(item=>{
    if(item.val<=0)return;
    const frac=total>0?item.val/total:0;
    const len=frac*CIRC;
    const arc=document.createElementNS('http://www.w3.org/2000/svg','circle');
    arc.setAttribute('class','task-arc');
    arc.setAttribute('cx','55');
    arc.setAttribute('cy','55');
    arc.setAttribute('r','42');
    arc.setAttribute('fill','none');
    arc.setAttribute('stroke',item.color);
    arc.setAttribute('stroke-width','12');
    arc.setAttribute('stroke-linecap','round');
    arc.setAttribute('stroke-dasharray',`${Math.max(len-2,1)} ${CIRC}`);
    arc.setAttribute('transform',`rotate(${-90+offset*360} 55 55)`);
    arc.style.transition='all .8s cubic-bezier(.4,0,.2,1)';
    svg.insertBefore(arc,svg.querySelector('text'));
    offset+=frac;
  });

  // Status bars
  const statusItems=[
    {label:'Done',val:done,color:'var(--g)',dot:'var(--g)'},
    {label:'In Progress',val:ip,color:'var(--amber)',dot:'var(--amber)'},
    {label:'Blocked',val:blocked,color:'var(--red)',dot:'var(--red)'},
    {label:'Not Started',val:ns,color:'rgba(255,255,255,.12)',dot:'rgba(255,255,255,.12)'},
  ];
  const barMax=Math.max(...statusItems.map(s=>s.val),1);

  document.getElementById('task-bars').innerHTML=statusItems.map(s=>{
    const w=Math.round((s.val/barMax)*100);
    const taskPct=total>0?Math.round((s.val/total)*100):0;
    return`<div class="tb-row">
      <div class="tb-dot" style="background:${s.dot}"></div>
      <span class="tb-label">${s.label}</span>
      <div class="tb-track"><div class="tb-fill" style="width:${w}%;background:${s.color}"></div></div>
      <span class="tb-val">${s.val}</span>
      <span class="tb-pct">${taskPct}%</span>
    </div>`;
  }).join('');
}

function renderPriorities(pri){
  const total=(pri.High||0)+(pri.Medium||0)+(pri.Low||0)+(pri.None||0)||1;
  const items=[
    {label:'High',count:pri.High||0,cls:'pri-high',color:'var(--red)',icon:'!'},
    {label:'Medium',count:pri.Medium||0,cls:'pri-medium',color:'var(--amber)',icon:'‼'},
    {label:'Low',count:pri.Low||0,cls:'pri-low',color:'var(--blue)',icon:'↓'},
    {label:'None',count:pri.None||0,cls:'pri-none',color:'rgba(255,255,255,.12)',icon:'—'},
  ];
  document.getElementById('pri-bars').innerHTML=items.map(i=>{
    const w=Math.round((i.count/total)*100);
    const pct=Math.round((i.count/total)*100);
    return`<div class="pri-row">
      <div class="pri-icon" style="background:${i.color};color:#111;">${i.icon}</div>
      <span class="pri-label">${i.label}</span>
      <div class="pri-track"><div class="pri-fill ${i.cls}" style="width:${w}%"></div></div>
      <span class="pri-count">${i.count}</span>
      <span class="pri-pct">${pct}%</span>
    </div>`;
  }).join('');
}

function renderStatusVisual(counts){
  const items=[
    {val:counts.active||0,lbl:'Active',color:'var(--g)'},
    {val:counts.awaiting||0,lbl:'Awaiting',color:'var(--blue)'},
    {val:counts.review||0,lbl:'In Review',color:'var(--amber)'},
    {val:counts.hold||0,lbl:'On Hold',color:'rgba(255,255,255,.25)'},
    {val:counts.done||0,lbl:'Completed',color:'var(--g)'},
  ];
  const total=items.reduce((s,i)=>s+i.val,0)||1;

  // Stacked horizontal bar
  let barHTML='<div class="sv-bar-wrap">';
  items.forEach(i=>{
    const w=Math.max((i.val/total)*100,0);
    if(i.val>0){
      barHTML+=`<div class="sv-seg" style="width:${w}%;background:${i.color};"><span style="color:#111;font-size:10px;">${i.val}</span></div>`;
    }
  });
  barHTML+='</div>';

  // Legend row
  barHTML+='<div class="sv-legend">';
  items.forEach(i=>{
    barHTML+=`<div class="sv-leg">
      <div class="sv-dot" style="background:${i.color}"></div>
      <span class="sv-val">${i.val}</span>
      <span class="sv-lbl">${i.lbl}</span>
    </div>`;
  });
  barHTML+='</div>';

  // Status cards
  barHTML+='<div class="status-cards">';
  items.forEach(i=>{
    barHTML+=`<div class="sc-item">
      <div class="sc-val" style="color:${i.color}">${i.val}</div>
      <div class="sc-lbl">${i.lbl}</div>
    </div>`;
  });
  barHTML+='</div>';

  document.getElementById('status-visual').innerHTML=barHTML;
}

function render(data){
  const counts=data.counts||{};
  const ov=data.overview||{};
  renderStats(counts, ov);
  renderDonut(ov.projectTypes||[], ov.totalProjects||0);
  renderTaskRing(ov.taskStats||{});
  renderPriorities(ov.priorities||{});
  renderStatusVisual(counts);
}

async function loadData(){
  try{
    const r=await fetch(apiUrl('/api/data/projects'));
    const j=await r.json();
    if(j.error){console.error('API:',j.error);return;}
    render(j);
    setTs();
  }catch(e){console.error('overview:',e);}
}

function doRefresh(){const b=document.getElementById('rb');b.textContent='↻';b.style.opacity='.4';loadData().then(()=>{b.textContent='↻ Refresh';b.style.opacity='1';});}
setTs();loadData();setInterval(loadData,5*60*1000);
</script></body></html>
