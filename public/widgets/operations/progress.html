<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Opxio — Project Progress</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}html{height:100%;}
body{font-family:'Satoshi',-apple-system,sans-serif;padding:16px;background:#191919;color:#fff;overflow-y:auto;height:100%;transition:background .3s,color .3s;overflow-x:hidden;}
body.light{background:#F5F5F5;color:#111;}
:root{--g:#AAFF00;--gm:rgba(170,255,0,.12);--gb:rgba(170,255,0,.18);--amber:#FBBF24;--amberm:rgba(251,191,36,.1);--amberb:rgba(251,191,36,.2);--red:#FF6B6B;--muted:rgba(255,255,255,.4);}
body.light{--g:#5C9900;--gm:rgba(92,153,0,.1);--gb:rgba(92,153,0,.2);--muted:rgba(0,0,0,.4);}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:999px;}
body.light ::-webkit-scrollbar-thumb{background:rgba(0,0,0,.1);}

.card{background:#1E1E1E;border:1px solid rgba(255,255,255,.06);border-radius:12px;}
body.light .card{background:#fff;border-color:rgba(0,0,0,.06);}

/* ── Header ── */
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:8px;}
.h-title{font-size:17px;font-weight:900;color:#fff;letter-spacing:-.03em;}
body.light .h-title{color:#111;}
.h-right{display:flex;align-items:center;gap:6px;}
.pill{font-size:10px;font-weight:700;padding:4px 10px;border-radius:999px;letter-spacing:.03em;white-space:nowrap;}
.pill-green{background:var(--gm);color:var(--g);border:1px solid var(--gb);}
.pill-muted{background:rgba(255,255,255,.04);color:var(--muted);border:1px solid rgba(255,255,255,.07);}
body.light .pill-muted{background:rgba(0,0,0,.03);border-color:rgba(0,0,0,.07);}

/* ── Summary Row ── */
.summary{display:flex;align-items:center;gap:16px;padding:16px 20px;margin-bottom:10px;}
.ring-wrap{position:relative;flex-shrink:0;}
.ring-svg{transform:rotate(-90deg);overflow:visible;}
.ring-bg{fill:none;stroke:rgba(255,255,255,.06);stroke-width:7;}
body.light .ring-bg{stroke:rgba(0,0,0,.06);}
.ring-fill{fill:none;stroke:var(--g);stroke-width:7;stroke-linecap:round;transition:stroke-dashoffset 1s cubic-bezier(.4,0,.2,1);}
.ring-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
.ring-pct{font-size:22px;font-weight:900;color:var(--g);letter-spacing:-1px;line-height:1;}
.ring-sub{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.2);margin-top:2px;}
body.light .ring-sub{color:rgba(0,0,0,.2);}
.stats{display:flex;flex:1;gap:12px;flex-wrap:wrap;align-items:center;}
.stat{display:flex;flex-direction:column;align-items:center;gap:1px;min-width:48px;}
.stat-val{font-size:18px;font-weight:900;color:#fff;}
body.light .stat-val{color:#111;}
.stat-val.green{color:var(--g);}
.stat-val.amber{color:var(--amber);}
.stat-lbl{font-size:10px;font-weight:600;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.06em;}
body.light .stat-lbl{color:rgba(0,0,0,.3);}
.stat-sep{width:1px;height:28px;background:rgba(255,255,255,.06);flex-shrink:0;}
body.light .stat-sep{background:rgba(0,0,0,.06);}
.dates{display:flex;gap:14px;margin-left:auto;flex-shrink:0;}
.date-tag{font-size:11px;font-weight:600;color:rgba(255,255,255,.25);}
body.light .date-tag{color:rgba(0,0,0,.3);}
.date-tag strong{color:rgba(255,255,255,.45);margin-right:3px;}
body.light .date-tag strong{color:rgba(0,0,0,.4);}

/* ── Active Tasks (compact) ── */
.active-section{margin-bottom:10px;}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;padding:0 4px;margin-bottom:6px;}
.sec-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.22);}
body.light .sec-lbl{color:rgba(0,0,0,.25);}
.sec-badge{font-size:10px;font-weight:800;padding:2px 8px;border-radius:5px;background:var(--amberm);color:var(--amber);border:1px solid var(--amberb);}
.task-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);border-radius:10px;margin-bottom:4px;}
body.light .task-row{background:rgba(0,0,0,.015);border-color:rgba(0,0,0,.04);}
.t-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.t-name{font-size:13px;font-weight:700;color:#fff;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
body.light .t-name{color:#111;}
.t-due{font-size:11px;font-weight:600;color:rgba(255,255,255,.25);white-space:nowrap;flex-shrink:0;}
body.light .t-due{color:rgba(0,0,0,.25);}
.t-due.overdue{color:var(--red);}
.avatar{width:22px;height:22px;border-radius:50%;border:2px solid rgba(255,255,255,.08);object-fit:cover;flex-shrink:0;}
body.light .avatar{border-color:rgba(0,0,0,.08);}
.avatar-placeholder{width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:rgba(255,255,255,.3);border:2px solid rgba(255,255,255,.04);flex-shrink:0;}
body.light .avatar-placeholder{background:rgba(0,0,0,.05);color:rgba(0,0,0,.3);}
.empty-msg{font-size:12px;color:rgba(255,255,255,.2);text-align:center;padding:12px;}
body.light .empty-msg{color:rgba(0,0,0,.2);}

/* ── Phase Rows (compact) ── */
.phases{display:flex;flex-direction:column;gap:4px;}
.ph{padding:10px 14px;display:flex;align-items:center;gap:12px;}
.ph-no{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;flex-shrink:0;border:2px solid rgba(255,255,255,.08);color:rgba(255,255,255,.3);}
body.light .ph-no{border-color:rgba(0,0,0,.08);color:rgba(0,0,0,.3);}
.ph-no.done{border-color:var(--g);color:var(--g);background:var(--gm);}
.ph-no.active{border-color:var(--amber);color:var(--amber);background:var(--amberm);}
.ph-info{flex:1;min-width:0;}
.ph-name{font-size:13px;font-weight:700;color:#fff;margin-bottom:4px;}
body.light .ph-name{color:#111;}
.ph-bar-track{width:100%;height:4px;border-radius:999px;background:rgba(255,255,255,.05);overflow:hidden;}
body.light .ph-bar-track{background:rgba(0,0,0,.05);}
.ph-bar-fill{height:4px;border-radius:999px;transition:width .8s cubic-bezier(.4,0,.2,1);}
.bar-done{background:var(--g);}
.bar-active{background:var(--amber);}
.bar-ns{background:rgba(255,255,255,.08);}
body.light .bar-ns{background:rgba(0,0,0,.08);}
.ph-count{font-size:12px;font-weight:800;color:var(--muted);flex-shrink:0;min-width:44px;text-align:right;}
.ph-count .dn{color:var(--g);}

.ts{font-size:9px;font-weight:500;color:rgba(255,255,255,.12);text-align:right;margin-top:8px;}
body.light .ts{color:rgba(0,0,0,.12);}
.loading{text-align:center;padding:40px;color:rgba(255,255,255,.25);font-size:13px;font-weight:600;}
body.light .loading{color:rgba(0,0,0,.25);}
.error{text-align:center;padding:40px;color:var(--red);font-size:13px;font-weight:600;}
</style></head>
<body>
<div id="app"><div class="loading">Loading progress…</div></div>

<script>
const params = new URLSearchParams(location.search);
const projectId = params.get('project') || '';

if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
  document.body.classList.add('light');
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function fmtDate(iso) {
  if (!iso) return '';
  try { return new Date(iso).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }); }
  catch { return iso; }
}
function fmtDateFull(iso) {
  if (!iso) return '';
  try { return new Date(iso).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }); }
  catch { return iso; }
}
function isOverdue(d) { return d && new Date(d) < new Date(new Date().toISOString().split('T')[0]); }

function renderAvatar(a) {
  if (a.avatar) return `<img class="avatar" src="${esc(a.avatar)}" alt="${esc(a.name)}" title="${esc(a.name)}"/>`;
  return `<div class="avatar-placeholder" title="${esc(a.name)}">${(a.name||'?')[0]}</div>`;
}

function render(data) {
  const { project: p, phases, activeTasks, overall: o } = data;

  const r = 38, circ = 2 * Math.PI * r;
  const offset = circ - (circ * o.pct / 100);

  // Active tasks (max 3)
  const activeSlice = activeTasks.slice(0, 3);
  const activeHTML = activeSlice.length ? activeSlice.map(t => {
    const ov = isOverdue(t.dueDate) && t.status !== 'Done';
    const avatars = (t.assignees || []).slice(0,2).map(renderAvatar).join('');
    return `<div class="task-row">
      <div class="t-dot" style="background:var(--amber)"></div>
      <div class="t-name">${esc(t.name)}</div>
      <span class="t-due${ov ? ' overdue' : ''}">${t.dueDate ? fmtDate(t.dueDate) : ''}</span>
      ${avatars || ''}
    </div>`;
  }).join('') : '';

  // Phase rows
  const phaseHTML = phases.map(ph => {
    const t = ph.tasks || {};
    const isDone = ph.status === 'Done';
    const isActive = ph.status === 'In Progress';
    const noCls = isDone ? 'done' : isActive ? 'active' : '';
    const barCls = isDone ? 'bar-done' : isActive ? 'bar-active' : 'bar-ns';
    const barW = t.total > 0 ? Math.round((t.done / t.total) * 100) : 0;
    const shortName = (ph.name || '').replace(/^Phase\s*\d+\s*[—–\-]\s*/, '');

    return `<div class="card ph">
      <div class="ph-no ${noCls}">${ph.no ?? '?'}</div>
      <div class="ph-info">
        <div class="ph-name">${esc(shortName || ph.name)}</div>
        <div class="ph-bar-track"><div class="ph-bar-fill ${barCls}" style="width:${barW}%"></div></div>
      </div>
      <span class="ph-count"><span class="dn">${t.done || 0}</span> / ${t.total || 0}</span>
    </div>`;
  }).join('');

  document.getElementById('app').innerHTML = `
    <div class="header">
      <div class="h-title">${esc(p.name || 'Project')}</div>
      <div class="h-right">
        ${p.package ? `<span class="pill pill-muted">${esc(p.package)}</span>` : ''}
        <span class="pill pill-green">${esc(p.currentPhase || p.status || 'Active')}</span>
      </div>
    </div>

    <div class="card summary">
      <div class="ring-wrap">
        <svg class="ring-svg" width="86" height="86" viewBox="0 0 86 86">
          <circle class="ring-bg" cx="43" cy="43" r="${r}"/>
          <circle class="ring-fill" cx="43" cy="43" r="${r}"
            stroke-dasharray="${circ}" stroke-dashoffset="${offset}"/>
        </svg>
        <div class="ring-center">
          <div class="ring-pct">${o.pct}%</div>
          <div class="ring-sub">Done</div>
        </div>
      </div>
      <div class="stats">
        <div class="stat"><span class="stat-val green">${o.done}</span><span class="stat-lbl">Done</span></div>
        <div class="stat-sep"></div>
        <div class="stat"><span class="stat-val amber">${o.inProgress}</span><span class="stat-lbl">Active</span></div>
        <div class="stat-sep"></div>
        <div class="stat"><span class="stat-val">${o.total}</span><span class="stat-lbl">Total</span></div>
      </div>
      <div class="dates">
        ${p.startDate ? `<span class="date-tag"><strong>Start</strong>${fmtDateFull(p.startDate)}</span>` : ''}
        ${p.targetDate ? `<span class="date-tag"><strong>Target</strong>${fmtDateFull(p.targetDate)}</span>` : ''}
      </div>
    </div>

    ${activeHTML ? `
    <div class="active-section">
      <div class="sec-hdr">
        <span class="sec-lbl">Active Tasks</span>
        <span class="sec-badge">${activeTasks.length}</span>
      </div>
      ${activeHTML}
    </div>` : ''}

    <div class="sec-hdr" style="margin-bottom:6px"><span class="sec-lbl">Phases</span></div>
    <div class="phases">${phaseHTML || '<div class="loading">No phases yet</div>'}</div>
    <div class="ts">Updated ${new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' })}</div>
  `;
}

async function loadData() {
  if (!projectId) {
    document.getElementById('app').innerHTML = '<div class="error">No project ID — use ?project=&lt;id&gt;</div>';
    return;
  }
  try {
    const r = await fetch('/api/data/progress?project=' + encodeURIComponent(projectId));
    const j = await r.json();
    if (j.error) { document.getElementById('app').innerHTML = `<div class="error">${esc(j.error)}</div>`; return; }
    render(j);
  } catch (e) {
    document.getElementById('app').innerHTML = `<div class="error">Failed to load: ${esc(e.message)}</div>`;
  }
}

loadData();
setInterval(loadData, 2 * 60 * 1000);
</script></body></html>
