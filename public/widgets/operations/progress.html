<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Opxio — Project Progress</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}html{height:100%;}
body{font-family:'Satoshi',-apple-system,sans-serif;padding:20px;background:#191919;color:#fff;overflow-y:auto;height:100%;transition:background .3s,color .3s;overflow-x:hidden;}
body.light{background:#F5F5F5;color:#111;}
:root{--g:#AAFF00;--gm:rgba(170,255,0,.12);--gb:rgba(170,255,0,.18);--amber:#FBBF24;--amberm:rgba(251,191,36,.1);--amberb:rgba(251,191,36,.2);--blue:#60A5FA;--red:#FF6B6B;--muted:rgba(255,255,255,.4);}
body.light{--g:#5C9900;--gm:rgba(92,153,0,.1);--gb:rgba(92,153,0,.2);--muted:rgba(0,0,0,.4);}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:999px;}
body.light ::-webkit-scrollbar-thumb{background:rgba(0,0,0,.1);}

.card{background:#1E1E1E;border:1px solid rgba(255,255,255,.06);border-radius:16px;transition:border-color .2s;}
.card:hover{border-color:rgba(170,255,0,.08);}
body.light .card{background:#fff;border-color:rgba(0,0,0,.06);}

/* ── Header ── */
.header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:8px;}
.h-left{display:flex;flex-direction:column;gap:2px;}
.eyebrow{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.25);}
body.light .eyebrow{color:rgba(0,0,0,.3);}
.h-title{font-size:22px;font-weight:900;color:#fff;letter-spacing:-.03em;}
body.light .h-title{color:#111;}
.h-right{display:flex;align-items:center;gap:8px;}
.pill{font-size:11px;font-weight:700;padding:5px 14px;border-radius:999px;letter-spacing:.03em;white-space:nowrap;}
.pill-green{background:var(--gm);color:var(--g);border:1px solid var(--gb);}
.pill-muted{background:rgba(255,255,255,.04);color:var(--muted);border:1px solid rgba(255,255,255,.07);}
body.light .pill-muted{background:rgba(0,0,0,.03);border-color:rgba(0,0,0,.07);}

/* ── Current Phase Banner ── */
.phase-banner{padding:18px 24px;margin-bottom:16px;display:flex;align-items:center;gap:16px;background:linear-gradient(135deg, rgba(170,255,0,.06) 0%, rgba(170,255,0,.02) 100%);border:1px solid rgba(170,255,0,.12);}
body.light .phase-banner{background:linear-gradient(135deg, rgba(92,153,0,.06) 0%, rgba(92,153,0,.02) 100%);border-color:rgba(92,153,0,.15);}
.pb-icon{width:44px;height:44px;border-radius:12px;background:var(--gm);border:2px solid var(--gb);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:var(--g);flex-shrink:0;}
.pb-text{flex:1;}
.pb-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.3);margin-bottom:2px;}
body.light .pb-label{color:rgba(0,0,0,.3);}
.pb-name{font-size:20px;font-weight:900;color:var(--g);letter-spacing:-.02em;}
.pb-meta{font-size:12px;font-weight:600;color:rgba(255,255,255,.3);margin-top:2px;}
body.light .pb-meta{color:rgba(0,0,0,.3);}

/* ── Top Row: Ring + Active Tasks ── */
.top-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
@media(max-width:600px){.top-row{grid-template-columns:1fr;}}

/* Ring Card */
.ring-card{padding:28px;display:flex;align-items:center;gap:24px;}
.ring-wrap{position:relative;flex-shrink:0;}
.ring-svg{transform:rotate(-90deg);overflow:visible;}
.ring-bg{fill:none;stroke:rgba(255,255,255,.06);stroke-width:8;}
body.light .ring-bg{stroke:rgba(0,0,0,.06);}
.ring-fill{fill:none;stroke:var(--g);stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset 1s cubic-bezier(.4,0,.2,1);}
.ring-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
.ring-pct{font-size:32px;font-weight:900;color:var(--g);letter-spacing:-1.5px;line-height:1;}
.ring-sub{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.25);margin-top:3px;}
body.light .ring-sub{color:rgba(0,0,0,.25);}
.ring-stats{display:flex;flex-direction:column;gap:12px;flex:1;}
.rs-row{display:flex;align-items:center;gap:10px;}
.rs-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.rs-lbl{font-size:14px;font-weight:600;color:var(--muted);flex:1;}
.rs-val{font-size:18px;font-weight:900;color:#fff;}
body.light .rs-val{color:#111;}
.dates-row{display:flex;gap:18px;flex-wrap:wrap;margin-top:4px;padding-top:10px;border-top:1px solid rgba(255,255,255,.05);}
body.light .dates-row{border-color:rgba(0,0,0,.06);}
.date-tag{font-size:12px;font-weight:600;color:rgba(255,255,255,.3);}
body.light .date-tag{color:rgba(0,0,0,.3);}
.date-tag strong{color:rgba(255,255,255,.55);margin-right:4px;}
body.light .date-tag strong{color:rgba(0,0,0,.45);}

/* ── Active Tasks Card ── */
.tasks-card{padding:22px 24px;}
.tc-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.tc-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.3);}
body.light .tc-title{color:rgba(0,0,0,.3);}
.tc-badge{font-size:11px;font-weight:800;padding:3px 10px;border-radius:6px;}

/* ── Task Rows ── */
.task-list{display:flex;flex-direction:column;gap:8px;}
.task-row{display:flex;align-items:center;gap:12px;padding:14px 16px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);border-radius:12px;transition:border-color .2s;}
.task-row:hover{border-color:rgba(170,255,0,.1);}
body.light .task-row{background:rgba(0,0,0,.015);border-color:rgba(0,0,0,.04);}
.t-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.t-info{flex:1;min-width:0;}
.t-name{font-size:14px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3;}
body.light .t-name{color:#111;}
.t-meta{font-size:12px;font-weight:600;color:rgba(255,255,255,.3);margin-top:3px;display:flex;align-items:center;gap:8px;}
body.light .t-meta{color:rgba(0,0,0,.3);}
.t-right{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.t-assignee{display:flex;align-items:center;gap:6px;}
.avatar{width:24px;height:24px;border-radius:50%;border:2px solid rgba(255,255,255,.08);object-fit:cover;}
body.light .avatar{border-color:rgba(0,0,0,.08);}
.avatar-placeholder{width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:rgba(255,255,255,.3);border:2px solid rgba(255,255,255,.04);}
body.light .avatar-placeholder{background:rgba(0,0,0,.05);color:rgba(0,0,0,.3);border-color:rgba(0,0,0,.04);}
.t-assignee-name{font-size:12px;font-weight:700;color:rgba(255,255,255,.45);max-width:80px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
body.light .t-assignee-name{color:rgba(0,0,0,.4);}
.t-due-box{text-align:right;}
.t-due-rel{font-size:12px;font-weight:600;white-space:nowrap;}
.t-due-rel.soon{color:var(--amber);}
.t-due-rel.overdue{color:var(--red);}
.t-due-rel.ok{color:rgba(255,255,255,.25);}
body.light .t-due-rel.ok{color:rgba(0,0,0,.2);}
.empty-msg{font-size:13px;color:rgba(255,255,255,.2);text-align:center;padding:20px 12px;}
body.light .empty-msg{color:rgba(0,0,0,.2);}

/* ── Section Labels ── */
.sec-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:rgba(255,255,255,.22);margin:18px 0 10px;padding:0 4px;}
body.light .sec-lbl{color:rgba(0,0,0,.25);}

/* ── Timeline Phases ── */
.timeline{position:relative;padding-left:32px;margin-left:12px;}
.timeline::before{content:'';position:absolute;left:9px;top:24px;bottom:24px;width:2px;background:rgba(255,255,255,.06);border-radius:1px;}
body.light .timeline::before{background:rgba(0,0,0,.08);}

.tl-item{position:relative;padding:14px 20px;margin-bottom:6px;display:flex;align-items:center;gap:14px;border-radius:14px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);transition:all .2s;}
.tl-item:hover{border-color:rgba(255,255,255,.08);}
body.light .tl-item{background:rgba(0,0,0,.015);border-color:rgba(0,0,0,.04);}
.tl-item.active{background:rgba(251,191,36,.04);border-color:rgba(251,191,36,.15);}
.tl-item.done{background:rgba(170,255,0,.03);border-color:rgba(170,255,0,.1);}

/* Timeline dot — properly centered */
.tl-dot{position:absolute;left:-23px;top:50%;width:20px;height:20px;border-radius:50%;border:2.5px solid rgba(255,255,255,.1);background:#191919;z-index:1;transform:translateY(-50%);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
body.light .tl-dot{background:#F5F5F5;border-color:rgba(0,0,0,.1);}
.tl-dot.done{border-color:var(--g);background:var(--g);}
.tl-dot.done::after{content:'';display:block;width:6px;height:3px;border-left:2px solid #191919;border-bottom:2px solid #191919;transform:rotate(-45deg) translateY(-1px);}
body.light .tl-dot.done::after{border-color:#F5F5F5;}
.tl-dot.active{border-color:var(--amber);background:var(--amberm);box-shadow:0 0 10px rgba(251,191,36,.3);}
.tl-dot.active::after{content:'';width:8px;height:8px;border-radius:50%;background:var(--amber);}

/* Phase number */
.tl-no{font-size:13px;font-weight:900;color:rgba(255,255,255,.15);min-width:20px;text-align:center;flex-shrink:0;}
body.light .tl-no{color:rgba(0,0,0,.15);}
.tl-item.active .tl-no{color:var(--amber);}
.tl-item.done .tl-no{color:var(--g);}

/* Phase info */
.tl-info{flex:1;min-width:0;}
.tl-name{font-size:15px;font-weight:700;color:#fff;margin-bottom:6px;}
body.light .tl-name{color:#111;}
.tl-item.done .tl-name{color:var(--g);}
.tl-item.active .tl-name{color:var(--amber);}
.tl-bar-track{width:100%;height:6px;border-radius:999px;background:rgba(255,255,255,.05);overflow:hidden;}
body.light .tl-bar-track{background:rgba(0,0,0,.06);}
.tl-bar-fill{height:6px;border-radius:999px;transition:width .8s cubic-bezier(.4,0,.2,1);}
.bar-done{background:var(--g);}
.bar-active{background:var(--amber);}
.bar-ns{background:rgba(255,255,255,.06);}
body.light .bar-ns{background:rgba(0,0,0,.06);}

/* Phase right stats */
.tl-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0;min-width:90px;}
.tl-count{font-size:13px;font-weight:700;color:rgba(255,255,255,.35);}
body.light .tl-count{color:rgba(0,0,0,.3);}
.tl-count .dn{font-weight:900;color:var(--g);}
.tl-item.active .tl-count .dn{color:var(--amber);}
.tl-pct{font-size:16px;font-weight:900;color:var(--g);letter-spacing:-.5px;}
.tl-item.active .tl-pct{color:var(--amber);}
.tl-pct.zero{font-size:12px;font-weight:700;color:rgba(255,255,255,.12);}
body.light .tl-pct.zero{color:rgba(0,0,0,.1);}

/* ── Footer ── */
.ts{font-size:10px;font-weight:500;color:rgba(255,255,255,.15);text-align:right;margin-top:12px;}
body.light .ts{color:rgba(0,0,0,.15);}
.loading{text-align:center;padding:48px;color:rgba(255,255,255,.25);font-size:14px;font-weight:600;}
body.light .loading{color:rgba(0,0,0,.25);}
.error{text-align:center;padding:48px;color:var(--red);font-size:14px;font-weight:600;}
</style></head>
<body>
<div id="app"><div class="loading">Loading progress…</div></div>

<script>
const params = new URLSearchParams(location.search);
const projectId = params.get('project') || '';
const viewMode = params.get('view') || 'main'; // 'main' or 'phases'

if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
  document.body.classList.add('light');
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function fmtDate(iso) {
  if (!iso) return '';
  try { return new Date(iso).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }); }
  catch { return iso; }
}
function fmtDateShort(iso) {
  if (!iso) return '';
  try { return new Date(iso).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }); }
  catch { return iso; }
}

function relativeDate(iso) {
  if (!iso) return { text: '', cls: 'ok' };
  const now = new Date(); now.setHours(0,0,0,0);
  const due = new Date(iso); due.setHours(0,0,0,0);
  const diff = Math.round((due - now) / 86400000);
  if (diff < 0) return { text: `${Math.abs(diff)}d overdue`, cls: 'overdue' };
  if (diff === 0) return { text: 'Due today', cls: 'soon' };
  if (diff === 1) return { text: 'Due tomorrow', cls: 'soon' };
  if (diff <= 3) return { text: `${diff} days left`, cls: 'soon' };
  if (diff <= 7) return { text: `${diff} days left`, cls: 'ok' };
  return { text: `${diff} days left`, cls: 'ok' };
}

function renderAvatar(a) {
  if (a.avatar) return `<img class="avatar" src="${esc(a.avatar)}" alt="${esc(a.name)}" title="${esc(a.name)}"/>`;
  return `<div class="avatar-placeholder" title="${esc(a.name)}">${(a.name||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)}</div>`;
}

function renderTaskRow(t) {
  const dotColor = t.status === 'In Progress' ? 'var(--amber)' : t.status === 'Done' ? 'var(--g)' : 'rgba(255,255,255,.12)';
  const rel = relativeDate(t.dueDate);
  const assignee = (t.assignees || [])[0];

  return `<div class="task-row">
    <div class="t-dot" style="background:${dotColor}"></div>
    <div class="t-info">
      <div class="t-name">${esc(t.name)}</div>
      <div class="t-meta">
        ${t.startDate ? `<span>Started ${fmtDateShort(t.startDate)}</span>` : ''}
        ${t.startDate && t.dueDate ? '<span>·</span>' : ''}
        ${t.dueDate ? `<span>${fmtDateShort(t.dueDate)}</span>` : ''}
      </div>
    </div>
    <div class="t-right">
      ${t.dueDate ? `<div class="t-due-box">
        <div class="t-due-rel ${rel.cls}">${rel.text}</div>
      </div>` : ''}
      ${assignee ? `<div class="t-assignee">
        ${renderAvatar(assignee)}
        <span class="t-assignee-name">${esc(assignee.name)}</span>
      </div>` : '<div class="avatar-placeholder">—</div>'}
    </div>
  </div>`;
}

function renderTimeline(phases) {
  return phases.map(ph => {
    const t = ph.tasks || {};
    const isDone = ph.status === 'Done';
    const isActive = ph.status === 'In Progress';
    const itemCls = isDone ? 'done' : isActive ? 'active' : '';
    const dotCls = isDone ? 'done' : isActive ? 'active' : '';
    const barCls = isDone ? 'bar-done' : isActive ? 'bar-active' : 'bar-ns';
    const barW = t.total > 0 ? Math.round((t.done / t.total) * 100) : 0;
    const shortName = (ph.name || '').replace(/^Phase\s*\d+\s*[—–\-]\s*/, '');
    const rel = relativeDate(ph.dueDate);

    return `<div class="tl-item ${itemCls}">
      <div class="tl-dot ${dotCls}"></div>
      <span class="tl-no">${ph.no ?? '?'}</span>
      <div class="tl-info">
        <div class="tl-name">${esc(shortName || ph.name)}</div>
        <div class="tl-bar-track"><div class="tl-bar-fill ${barCls}" style="width:${barW}%"></div></div>
      </div>
      <div class="tl-right">
        <span class="tl-pct ${barW === 0 ? 'zero' : ''}">${barW}%</span>
        <span class="tl-count"><span class="dn">${t.done || 0}</span> / ${t.total || 0} tasks</span>
      </div>
    </div>`;
  }).join('');
}

// ── PHASES-ONLY VIEW ────────────────────────────────────────────────────────
function renderPhasesView(data) {
  const { project: p, phases, overall: o } = data;

  const activePhase = phases.find(ph => ph.status === 'In Progress') || phases.find(ph => ph.status !== 'Done') || phases[0];
  const activePhaseShort = activePhase ? (activePhase.name || '').replace(/^Phase\s*\d+\s*[—–\-]\s*/, '') : '';
  const activePhaseTasks = activePhase?.tasks || {};
  const activePhaseRel = activePhase?.dueDate ? relativeDate(activePhase.dueDate) : null;

  document.getElementById('app').innerHTML = `
    <div class="card phase-banner" style="margin-bottom:14px;">
      <div class="pb-icon">${activePhase?.no ?? '?'}</div>
      <div class="pb-text">
        <div class="pb-label">Current Phase</div>
        <div class="pb-name">${esc(activePhaseShort || 'Not started')}</div>
        <div class="pb-meta">${activePhaseTasks.done || 0} of ${activePhaseTasks.total || 0} tasks complete${activePhaseRel ? ` · <span style="color:${activePhaseRel.cls === 'overdue' ? 'var(--red)' : activePhaseRel.cls === 'soon' ? 'var(--amber)' : 'inherit'}">${activePhaseRel.text}</span>` : ''}</div>
      </div>
    </div>

    <div class="timeline">${renderTimeline(phases)}</div>
    <div class="ts">Updated ${new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' })}</div>
  `;
}

// ── MAIN VIEW ───────────────────────────────────────────────────────────────
function renderMainView(data) {
  const { project: p, phases, activeTasks, upcomingTasks, overall: o } = data;

  const r = 50, circ = 2 * Math.PI * r;
  const offset = circ - (circ * o.pct / 100);

  const activePhase = phases.find(ph => ph.status === 'In Progress') || phases.find(ph => ph.status !== 'Done') || phases[0];
  const activePhaseShort = activePhase ? (activePhase.name || '').replace(/^Phase\s*\d+\s*[—–\-]\s*/, '') : '';
  const activePhaseRel = activePhase?.dueDate ? relativeDate(activePhase.dueDate) : null;
  const activePhaseTasks = activePhase?.tasks || {};

  let datesHTML = '';
  if (p.startDate || p.targetDate) {
    datesHTML = '<div class="dates-row">';
    if (p.startDate) datesHTML += `<span class="date-tag"><strong>Started</strong>${fmtDate(p.startDate)}</span>`;
    if (p.targetDate) datesHTML += `<span class="date-tag"><strong>Target</strong>${fmtDate(p.targetDate)}</span>`;
    datesHTML += '</div>';
  }

  const activeHTML = activeTasks.length
    ? activeTasks.map(t => renderTaskRow(t)).join('')
    : '<div class="empty-msg">No tasks in progress yet</div>';

  const upcomingHTML = upcomingTasks.length
    ? upcomingTasks.map(t => renderTaskRow(t)).join('')
    : '';

  document.getElementById('app').innerHTML = `
    <div class="header">
      <div class="h-left">
        <div class="eyebrow">Implementation Tracker</div>
        <div class="h-title">${esc(p.name || 'Project')}</div>
      </div>
      <div class="h-right">
        ${p.package ? `<span class="pill pill-green">${esc(p.package)}</span>` : ''}
      </div>
    </div>

    <div class="card phase-banner">
      <div class="pb-icon">${activePhase?.no ?? '?'}</div>
      <div class="pb-text">
        <div class="pb-label">Current Phase</div>
        <div class="pb-name">${esc(activePhaseShort || 'Not started')}</div>
        <div class="pb-meta">${activePhaseTasks.done || 0} of ${activePhaseTasks.total || 0} tasks complete${activePhaseRel ? ` · <span style="color:${activePhaseRel.cls === 'overdue' ? 'var(--red)' : activePhaseRel.cls === 'soon' ? 'var(--amber)' : 'inherit'}">${activePhaseRel.text}</span>` : ''}</div>
      </div>
    </div>

    <div class="top-row">
      <div class="card ring-card">
        <div class="ring-wrap">
          <svg class="ring-svg" width="120" height="120" viewBox="0 0 120 120">
            <circle class="ring-bg" cx="60" cy="60" r="${r}"/>
            <circle class="ring-fill" cx="60" cy="60" r="${r}"
              stroke-dasharray="${circ}" stroke-dashoffset="${offset}"/>
          </svg>
          <div class="ring-center">
            <div class="ring-pct">${o.pct}%</div>
            <div class="ring-sub">Complete</div>
          </div>
        </div>
        <div class="ring-stats">
          <div class="rs-row"><div class="rs-dot" style="background:var(--g)"></div><span class="rs-lbl">Done</span><span class="rs-val">${o.done}</span></div>
          <div class="rs-row"><div class="rs-dot" style="background:var(--amber)"></div><span class="rs-lbl">In Progress</span><span class="rs-val">${o.inProgress}</span></div>
          <div class="rs-row"><div class="rs-dot" style="background:rgba(255,255,255,.1)"></div><span class="rs-lbl">Total</span><span class="rs-val">${o.total}</span></div>
          ${datesHTML}
        </div>
      </div>

      <div class="card tasks-card">
        <div class="tc-hdr">
          <span class="tc-title">Active Tasks</span>
          <span class="tc-badge pill-green">${activeTasks.length}</span>
        </div>
        <div class="task-list">${activeHTML}</div>
      </div>
    </div>

    ${upcomingHTML ? `
    <div class="sec-lbl">Up Next</div>
    <div class="card tasks-card">
      <div class="task-list">${upcomingHTML}</div>
    </div>` : ''}

    <div class="ts">Updated ${new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' })}</div>
  `;
}

async function loadData() {
  if (!projectId) {
    document.getElementById('app').innerHTML = '<div class="error">No project ID — use ?project=&lt;id&gt;</div>';
    return;
  }
  try {
    const r = await fetch('/api/data/progress?project=' + encodeURIComponent(projectId));
    const j = await r.json();
    if (j.error) { document.getElementById('app').innerHTML = `<div class="error">${esc(j.error)}</div>`; return; }

    if (viewMode === 'phases') {
      renderPhasesView(j);
    } else {
      renderMainView(j);
    }
  } catch (e) {
    document.getElementById('app').innerHTML = `<div class="error">Failed to load: ${esc(e.message)}</div>`;
  }
}

loadData();
setInterval(loadData, 2 * 60 * 1000);
</script></body></html>
