<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Opxio — Project Tracker</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}html{height:100%;}
body{font-family:'Satoshi',-apple-system,sans-serif;padding:14px;background:#191919;color:#fff;overflow-y:auto;height:100%;transition:background .3s,color .3s;}
body.light{background:#F5F5F5;color:#111;}
:root{--g:#AAFF00;--gm:rgba(170,255,0,.12);--gb:rgba(170,255,0,.18);--amber:#FBBF24;--amberm:rgba(251,191,36,.1);--amberb:rgba(251,191,36,.2);--blue:#60A5FA;--bluem:rgba(96,165,250,.1);--blueb:rgba(96,165,250,.18);--red:#FF6B6B;}
body.light{--g:#5C9900;--gm:rgba(92,153,0,.1);--gb:rgba(92,153,0,.2);}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:999px;}
body.light ::-webkit-scrollbar-thumb{background:rgba(0,0,0,.1);}

.card{background:#1E1E1E;border:1px solid rgba(255,255,255,.06);border-radius:14px;transition:border-color .2s;}
.card:hover{border-color:rgba(170,255,0,.1);}
body.light .card{background:#fff;border-color:rgba(0,0,0,.06);}
.btn{background:#252525;border:1px solid rgba(255,255,255,.09);color:rgba(255,255,255,.45);font-family:'Satoshi',sans-serif;font-size:11px;font-weight:700;padding:5px 11px;border-radius:7px;cursor:pointer;transition:all .2s;}
.btn:hover{border-color:var(--gb);color:var(--g);}
body.light .btn{background:#EFEFEF;border-color:rgba(0,0,0,.08);color:rgba(0,0,0,.4);}

.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px;}
.h-right{display:flex;align-items:center;gap:6px;}
.eyebrow{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.22);margin-bottom:2px;}
body.light .eyebrow{color:rgba(0,0,0,.28);}
.h-title{font-size:18px;font-weight:900;color:#fff;letter-spacing:-.03em;}
body.light .h-title{color:#111;}
.ts{font-size:9px;font-weight:500;color:rgba(255,255,255,.18);}
body.light .ts{color:rgba(0,0,0,.22);}
.sec-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.22);margin:16px 0 8px;}
body.light .sec-lbl{color:rgba(0,0,0,.28);}

/* ── STAT CARDS ── */
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;}
@media(max-width:700px){.g5{grid-template-columns:repeat(3,1fr);}}
@media(max-width:440px){.g5{grid-template-columns:repeat(2,1fr);}}
.stat{padding:14px 16px;position:relative;}
.s-dot{position:absolute;top:12px;right:12px;width:6px;height:6px;border-radius:50%;}
.s-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.5);margin-bottom:8px;display:block;}
body.light .s-lbl{color:rgba(0,0,0,.4);}
.s-val{font-size:28px;font-weight:900;letter-spacing:-1.5px;line-height:1;color:var(--g);}
.s-sub{font-size:9px;font-weight:500;color:rgba(255,255,255,.22);margin-top:5px;}
body.light .s-sub{color:rgba(0,0,0,.28);}

/* ── PROJECT ROWS ── */
.proj-list{display:flex;flex-direction:column;gap:10px;}
.proj-card{padding:20px 22px;}

/* Top row: pill + name + client/pkg + progress */
.pc-top{display:flex;align-items:center;gap:14px;margin-bottom:14px;}
@media(max-width:600px){.pc-top{flex-wrap:wrap;gap:8px;}}
.pc-pill{font-size:8.5px;font-weight:700;padding:3px 9px;border-radius:999px;letter-spacing:.04em;flex-shrink:0;white-space:nowrap;}
.pill-active{background:var(--gm);color:var(--g);border:1px solid var(--gb);}
.pill-review{background:var(--amberm);color:var(--amber);border:1px solid var(--amberb);}
.pill-awaiting{background:var(--bluem);color:var(--blue);border:1px solid var(--blueb);}
.pill-hold{background:rgba(255,255,255,.05);color:rgba(255,255,255,.35);border:1px solid rgba(255,255,255,.1);}
body.light .pill-hold{background:rgba(0,0,0,.04);color:rgba(0,0,0,.35);border-color:rgba(0,0,0,.1);}

.pc-info{flex:1;min-width:0;}
.pc-name{font-size:14px;font-weight:800;color:#fff;letter-spacing:-.02em;}
body.light .pc-name{color:#111;}
.pc-sub{font-size:10px;font-weight:600;color:rgba(255,255,255,.3);margin-top:1px;}
body.light .pc-sub{color:rgba(0,0,0,.3);}

.pc-progress{flex-shrink:0;width:200px;display:flex;align-items:center;gap:8px;}
@media(max-width:600px){.pc-progress{width:100%;}}
.pc-track{flex:1;height:5px;border-radius:999px;background:rgba(255,255,255,.07);}
body.light .pc-track{background:rgba(0,0,0,.08);}
.pc-fill{height:5px;border-radius:999px;background:var(--g);transition:width .8s cubic-bezier(.4,0,.2,1);}
.pc-pct{font-size:13px;font-weight:900;color:var(--g);width:36px;text-align:right;flex-shrink:0;}

/* ── MID: TASK SUMMARY ── */
.pc-tasks{display:flex;gap:16px;padding-bottom:14px;border-bottom:1px solid rgba(255,255,255,.05);margin-bottom:12px;flex-wrap:wrap;}
body.light .pc-tasks{border-bottom-color:rgba(0,0,0,.06);}
.tk{display:flex;align-items:center;gap:5px;}
.tk-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.tk-d{background:var(--g);}
.tk-ip{background:var(--amber);}
.tk-b{background:var(--red);}
.tk-ns{background:rgba(255,255,255,.12);}body.light .tk-ns{background:rgba(0,0,0,.1);}
.tk-val{font-size:12px;font-weight:800;color:#fff;}body.light .tk-val{color:#111;}
.tk-lbl{font-size:9.5px;font-weight:600;color:rgba(255,255,255,.3);}body.light .tk-lbl{color:rgba(0,0,0,.3);}
.tk-total{margin-left:auto;font-size:10px;font-weight:700;color:rgba(255,255,255,.2);}body.light .tk-total{color:rgba(0,0,0,.2);}

/* ── PHASE TIMELINE ── */
.ph-timeline{display:flex;align-items:stretch;gap:0;position:relative;}
.ph-step{flex:1;display:flex;flex-direction:column;align-items:center;position:relative;min-width:0;padding:0 4px;}

/* Connector line between steps */
.ph-step:not(:last-child)::after{content:'';position:absolute;top:11px;left:calc(50% + 14px);right:calc(-50% + 14px);height:2px;background:rgba(255,255,255,.06);}
body.light .ph-step:not(:last-child)::after{background:rgba(0,0,0,.07);}
.ph-step.done:not(:last-child)::after{background:var(--g);}
.ph-step.active:not(:last-child)::after{background:linear-gradient(90deg, var(--g) 40%, rgba(255,255,255,.06) 100%);}

.ph-dot{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;z-index:1;flex-shrink:0;margin-bottom:6px;}
.phd-done{background:var(--g);color:#111;}
.phd-active{background:#191919;color:var(--g);border:2px solid var(--g);box-shadow:0 0 8px rgba(170,255,0,.35);}
body.light .phd-active{background:#fff;}
.phd-review{background:#191919;color:var(--amber);border:2px solid var(--amber);}
body.light .phd-review{background:#fff;}
.phd-ns{background:rgba(255,255,255,.04);color:rgba(255,255,255,.18);border:2px solid rgba(255,255,255,.08);}
body.light .phd-ns{background:rgba(0,0,0,.02);color:rgba(0,0,0,.18);border-color:rgba(0,0,0,.08);}
.phd-hold{background:rgba(255,255,255,.04);color:rgba(255,255,255,.18);border:2px dashed rgba(255,255,255,.12);}

.ph-label{font-size:9.5px;font-weight:700;color:rgba(255,255,255,.5);text-align:center;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;}
body.light .ph-label{color:rgba(0,0,0,.45);}
.ph-step.active .ph-label{color:var(--g);}
.ph-step.done .ph-label{color:rgba(255,255,255,.3);}
body.light .ph-step.done .ph-label{color:rgba(0,0,0,.25);}

.ph-count{font-size:8.5px;font-weight:700;color:rgba(255,255,255,.25);margin-top:2px;}
body.light .ph-count{color:rgba(0,0,0,.2);}
.ph-step.active .ph-count{color:var(--g);}

.ph-due{font-size:8px;font-weight:600;color:rgba(255,255,255,.18);margin-top:1px;}
body.light .ph-due{color:rgba(0,0,0,.15);}
.ph-due.overdue{color:var(--red);}

/* No phases fallback */
.no-phases{padding:8px 0;text-align:center;font-size:10px;color:rgba(255,255,255,.15);}
body.light .no-phases{color:rgba(0,0,0,.12);}

.empty{padding:40px;text-align:center;font-size:12px;color:rgba(255,255,255,.18);}
body.light .empty{color:rgba(0,0,0,.18);}
</style></head><body>

<div class="header">
  <div><p class="eyebrow">Opxio · Operations OS</p><h1 class="h-title">Project Tracker</h1></div>
  <div class="h-right">
    <span class="ts" id="ts"></span>
    <button class="btn" onclick="doRefresh()" id="rb">↻ Refresh</button>
    <button class="btn" onclick="toggleMode()" id="mb">☀ Light</button>
  </div>
</div>

<!-- STAT CARDS -->
<div class="sec-lbl">Overview</div>
<div class="g5">
  <div class="card stat"><div class="s-dot" style="background:var(--blue);"></div><span class="s-lbl">Awaiting</span><div class="s-val" id="s-awaiting">0</div><div class="s-sub">Deposit or kickoff</div></div>
  <div class="card stat"><div class="s-dot" style="background:var(--g);"></div><span class="s-lbl">Active Builds</span><div class="s-val" id="s-active">0</div><div class="s-sub">Currently building</div></div>
  <div class="card stat"><div class="s-dot" style="background:var(--amber);"></div><span class="s-lbl">In Review</span><div class="s-val" id="s-review">0</div><div class="s-sub">Client sign-off</div></div>
  <div class="card stat"><div class="s-dot" style="background:var(--g);opacity:.4;"></div><span class="s-lbl">Completed</span><div class="s-val" id="s-done">0</div><div class="s-sub">Delivered</div></div>
  <div class="card stat"><div class="s-dot" style="background:rgba(255,255,255,.2);"></div><span class="s-lbl">On Hold</span><div class="s-val" id="s-hold">0</div><div class="s-sub">Paused</div></div>
</div>

<!-- PROJECT ROWS -->
<div class="sec-lbl">Active Projects</div>
<div class="proj-list" id="proj-list"><div class="card empty">Loading…</div></div>

<script>
const _tok=new URLSearchParams(location.search).get('token')||'';
function apiUrl(p){return _tok?p+'?token='+encodeURIComponent(_tok):p;}
let light=false;
function toggleMode(){light=!light;document.body.classList.toggle('light',light);document.getElementById('mb').textContent=light?'🌙 Dark':'☀ Light';}
function setTs(){document.getElementById('ts').textContent='Updated '+new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtDate(iso){if(!iso)return'';const d=new Date(iso+'T00:00:00');return d.toLocaleDateString('en-GB',{day:'numeric',month:'short'});}
function isOverdue(iso){if(!iso)return false;return new Date(iso+'T23:59:59')<new Date();}

function pillCfg(s){
  if(s==='active')  return{cls:'pill-active',  label:'Building'};
  if(s==='review')  return{cls:'pill-review',  label:'In Review'};
  if(s==='awaiting')return{cls:'pill-awaiting', label:'Awaiting'};
  if(s==='hold')    return{cls:'pill-hold',     label:'On Hold'};
  return{cls:'pill-hold',label:s};
}

function phDotClass(status){
  if(status==='Done')       return 'phd-done';
  if(status==='In Progress')return 'phd-active';
  if(status==='Review')     return 'phd-review';
  if(status==='On Hold')    return 'phd-hold';
  return 'phd-ns';
}
function phStepClass(status){
  if(status==='Done')       return 'done';
  if(status==='In Progress')return 'active';
  if(status==='Review')     return 'review';
  return '';
}

function renderCard(b){
  const sp=pillCfg(b.status);
  const pct=b.overallPct||0;
  const ts=b.taskSummary||{};

  let subParts=[];
  if(b.client) subParts.push(esc(b.client));
  if(b.type) subParts.push(esc(b.type));

  // Phase timeline
  let phHTML='';
  if(b.phases&&b.phases.length>0){
    phHTML='<div class="ph-timeline">'+b.phases.map(ph=>{
      const tc=ph.tasks||{};
      const cls=phStepClass(ph.status);
      const dotCls=phDotClass(ph.status);
      const ov=isOverdue(ph.due)&&ph.status!=='Done';
      const dueStr=ph.due?(ov?'Overdue':'Due '+fmtDate(ph.due)):'';
      // Short label: strip "Phase N — " prefix for cleaner display
      const shortName=(ph.name||'').replace(/^Phase\s*\d+\s*[—–-]\s*/,'');
      return`<div class="ph-step ${cls}">
        <div class="ph-dot ${dotCls}">${ph.no??'?'}</div>
        <div class="ph-label">${esc(shortName||ph.name)}</div>
        <div class="ph-count">${tc.done||0}/${tc.total||0}</div>
        ${dueStr?`<div class="ph-due${ov?' overdue':''}">${dueStr}</div>`:''}
      </div>`;
    }).join('')+'</div>';
  } else {
    phHTML='<div class="no-phases">No phases configured yet</div>';
  }

  return`<div class="card proj-card">
    <div class="pc-top">
      <span class="pc-pill ${sp.cls}">${sp.label}</span>
      <div class="pc-info">
        <div class="pc-name">${esc(b.name)}</div>
        ${subParts.length?`<div class="pc-sub">${subParts.join(' · ')}</div>`:''}
      </div>
      <div class="pc-progress">
        <div class="pc-track"><div class="pc-fill" style="width:${pct}%"></div></div>
        <span class="pc-pct">${pct}%</span>
      </div>
    </div>
    <div class="pc-tasks">
      <div class="tk"><div class="tk-dot tk-d"></div><span class="tk-val">${ts.done||0}</span><span class="tk-lbl">Done</span></div>
      <div class="tk"><div class="tk-dot tk-ip"></div><span class="tk-val">${ts.inProgress||0}</span><span class="tk-lbl">In Progress</span></div>
      <div class="tk"><div class="tk-dot tk-b"></div><span class="tk-val">${ts.blocked||0}</span><span class="tk-lbl">Blocked</span></div>
      <div class="tk"><div class="tk-dot tk-ns"></div><span class="tk-val">${ts.notStarted||0}</span><span class="tk-lbl">Not Started</span></div>
      <span class="tk-total">${ts.total||0} tasks</span>
    </div>
    ${phHTML}
  </div>`;
}

function render(counts,builds){
  document.getElementById('s-awaiting').textContent=counts.awaiting||0;
  document.getElementById('s-active').textContent=counts.active||0;
  document.getElementById('s-review').textContent=counts.review||0;
  document.getElementById('s-done').textContent=counts.done||0;
  document.getElementById('s-hold').textContent=counts.hold||0;

  const el=document.getElementById('proj-list');
  if(!builds.length){el.innerHTML='<div class="card empty">No active projects</div>';return;}
  el.innerHTML=builds.map(renderCard).join('');
}

async function loadData(){
  try{
    const r=await fetch(apiUrl('/api/data/projects'));
    const j=await r.json();
    if(j.error){console.error('API:',j.error);return;}
    render(j.counts||{},j.builds||[]);
    setTs();
  }catch(e){console.error('tracker:',e);}
}

function doRefresh(){const b=document.getElementById('rb');b.textContent='↻';b.style.opacity='.4';loadData().then(()=>{b.textContent='↻ Refresh';b.style.opacity='1';});}
setTs();loadData();setInterval(loadData,5*60*1000);
</script></body></html>
