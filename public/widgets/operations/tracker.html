<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Opxio — Project Tracker</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}html{height:100%;}
body{font-family:'Satoshi',-apple-system,sans-serif;padding:14px;background:#191919;color:#fff;overflow-y:auto;height:100%;transition:background .3s,color .3s;}
body.light{background:#F5F5F5;color:#111;}
:root{--g:#AAFF00;--gm:rgba(170,255,0,.12);--gb:rgba(170,255,0,.18);--amber:#FBBF24;--amberm:rgba(251,191,36,.1);--amberb:rgba(251,191,36,.2);--red:#FF6B6B;--redm:rgba(255,107,107,.1);--redb:rgba(255,107,107,.18);--blue:#60A5FA;--bluem:rgba(96,165,250,.1);--blueb:rgba(96,165,250,.18);--dim:rgba(255,255,255,.35);}
body.light{--g:#5C9900;--gm:rgba(92,153,0,.1);--gb:rgba(92,153,0,.2);--dim:rgba(0,0,0,.35);}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:999px;}
body.light ::-webkit-scrollbar-thumb{background:rgba(0,0,0,.1);}

.card{background:#1E1E1E;border:1px solid rgba(255,255,255,.06);border-radius:14px;transition:border-color .2s;}
.card:hover{border-color:rgba(170,255,0,.1);}
body.light .card{background:#fff;border-color:rgba(0,0,0,.06);}
.btn{background:#252525;border:1px solid rgba(255,255,255,.09);color:rgba(255,255,255,.45);font-family:'Satoshi',sans-serif;font-size:11px;font-weight:700;padding:5px 11px;border-radius:7px;cursor:pointer;transition:all .2s;}
.btn:hover{border-color:var(--gb);color:var(--g);}
body.light .btn{background:#EFEFEF;border-color:rgba(0,0,0,.08);color:rgba(0,0,0,.4);}

.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px;}
.h-right{display:flex;align-items:center;gap:6px;}
.eyebrow{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.22);margin-bottom:2px;}
body.light .eyebrow{color:rgba(0,0,0,.28);}
.h-title{font-size:18px;font-weight:900;color:#fff;letter-spacing:-.03em;}
body.light .h-title{color:#111;}
.ts{font-size:9px;font-weight:500;color:rgba(255,255,255,.18);}
body.light .ts{color:rgba(0,0,0,.22);}
.sec-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.22);margin:16px 0 8px;}
body.light .sec-lbl{color:rgba(0,0,0,.28);}

/* ── STAT CARDS ── */
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;}
@media(max-width:700px){.g5{grid-template-columns:repeat(3,1fr);}}
@media(max-width:440px){.g5{grid-template-columns:repeat(2,1fr);}}
.stat{padding:14px 16px;position:relative;}
.s-dot{position:absolute;top:12px;right:12px;width:6px;height:6px;border-radius:50%;}
.s-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.5);margin-bottom:8px;display:block;}
body.light .s-lbl{color:rgba(0,0,0,.4);}
.s-val{font-size:28px;font-weight:900;letter-spacing:-1.5px;line-height:1;color:var(--g);}
.s-sub{font-size:9px;font-weight:500;color:rgba(255,255,255,.22);margin-top:5px;}
body.light .s-sub{color:rgba(0,0,0,.28);}

/* ── 3-COL PROJECT GRID ── */
.proj-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
@media(max-width:900px){.proj-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:520px){.proj-grid{grid-template-columns:1fr;}}

.proj-card{padding:18px 20px;display:flex;flex-direction:column;gap:14px;}

/* Card header */
.pc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.pc-name{font-size:13.5px;font-weight:900;color:#fff;letter-spacing:-.02em;line-height:1.25;}
body.light .pc-name{color:#111;}
.pc-meta{display:flex;align-items:center;gap:6px;margin-top:5px;flex-wrap:wrap;}
.pc-client{font-size:10px;font-weight:600;color:rgba(255,255,255,.35);}
body.light .pc-client{color:rgba(0,0,0,.35);}
.pc-pkg{font-size:8.5px;font-weight:700;padding:2px 6px;border-radius:4px;background:var(--gm);color:var(--g);border:1px solid var(--gb);}
.pc-pill{font-size:8.5px;font-weight:700;padding:3px 9px;border-radius:999px;letter-spacing:.04em;flex-shrink:0;white-space:nowrap;}
.pill-active{background:var(--gm);color:var(--g);border:1px solid var(--gb);}
.pill-review{background:var(--amberm);color:var(--amber);border:1px solid var(--amberb);}
.pill-awaiting{background:var(--bluem);color:var(--blue);border:1px solid var(--blueb);}
.pill-hold{background:rgba(255,255,255,.05);color:rgba(255,255,255,.35);border:1px solid rgba(255,255,255,.1);}
body.light .pill-hold{background:rgba(0,0,0,.04);color:rgba(0,0,0,.35);border-color:rgba(0,0,0,.1);}

/* ── RING PROGRESS ── */
.pc-ring-row{display:flex;align-items:center;gap:14px;}
.ring-box{position:relative;width:56px;height:56px;flex-shrink:0;}
.ring-box svg{display:block;}
.ring-track{fill:none;stroke:rgba(255,255,255,.06);} body.light .ring-track{stroke:rgba(0,0,0,.07);}
.ring-fill{fill:none;stroke:var(--g);stroke-linecap:round;transition:stroke-dashoffset .9s cubic-bezier(.4,0,.2,1);}
.ring-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#fff;letter-spacing:-.5px;}
body.light .ring-pct{color:#111;}
.ring-stats{flex:1;display:flex;flex-direction:column;gap:3px;}
.rs-row{display:flex;align-items:center;gap:5px;}
.rs-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.rs-dot-done{background:var(--g);}
.rs-dot-ip{background:var(--amber);}
.rs-dot-blocked{background:var(--red);}
.rs-dot-ns{background:rgba(255,255,255,.12);} body.light .rs-dot-ns{background:rgba(0,0,0,.1);}
.rs-val{font-size:12px;font-weight:800;color:#fff;min-width:14px;}
body.light .rs-val{color:#111;}
.rs-lbl{font-size:9.5px;font-weight:600;color:rgba(255,255,255,.3);}
body.light .rs-lbl{color:rgba(0,0,0,.3);}

/* ── PHASE LIST ── */
.pc-phases{display:flex;flex-direction:column;gap:0;}
.ph-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-top:1px solid rgba(255,255,255,.05);}
.ph-row:first-child{border-top:none;}
body.light .ph-row{border-top-color:rgba(0,0,0,.06);}
.ph-dot{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:900;flex-shrink:0;}
.phd-done{background:var(--g);color:#111;}
.phd-ip{background:var(--gm);color:var(--g);border:2px solid var(--g);box-shadow:0 0 6px rgba(170,255,0,.3);}
.phd-review{background:var(--amberm);color:var(--amber);border:2px solid var(--amber);}
.phd-ns{background:rgba(255,255,255,.04);color:rgba(255,255,255,.18);border:2px solid rgba(255,255,255,.08);}
body.light .phd-ns{background:rgba(0,0,0,.03);color:rgba(0,0,0,.18);border-color:rgba(0,0,0,.08);}
.phd-hold{background:rgba(255,255,255,.04);color:rgba(255,255,255,.18);border:2px dashed rgba(255,255,255,.12);}

.ph-info{flex:1;min-width:0;}
.ph-name{font-size:11px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
body.light .ph-name{color:#111;}
.ph-due{font-size:9px;font-weight:600;color:rgba(255,255,255,.25);}
body.light .ph-due{color:rgba(0,0,0,.25);}
.ph-due.overdue{color:var(--red);}
.ph-right{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.ph-bar{width:48px;height:3px;border-radius:999px;background:rgba(255,255,255,.06);overflow:hidden;display:flex;}
body.light .ph-bar{background:rgba(0,0,0,.07);}
.phb-done{height:3px;background:var(--g);}
.phb-ip{height:3px;background:var(--amber);}
.phb-blocked{height:3px;background:var(--red);}
.ph-count{font-size:9px;font-weight:700;color:rgba(255,255,255,.35);white-space:nowrap;}
body.light .ph-count{color:rgba(0,0,0,.35);}

/* Dates */
.pc-dates{display:flex;gap:14px;padding-top:8px;border-top:1px solid rgba(255,255,255,.05);}
body.light .pc-dates{border-top-color:rgba(0,0,0,.06);}
.dt-item{display:flex;align-items:center;gap:4px;}
.dt-lbl{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:rgba(255,255,255,.2);}
body.light .dt-lbl{color:rgba(0,0,0,.2);}
.dt-val{font-size:10px;font-weight:700;color:rgba(255,255,255,.5);}
body.light .dt-val{color:rgba(0,0,0,.45);}
.dt-val.overdue{color:var(--red);}

.empty{padding:40px;text-align:center;font-size:12px;color:rgba(255,255,255,.18);grid-column:1/-1;}
body.light .empty{color:rgba(0,0,0,.18);}
</style></head><body>

<div class="header">
  <div><p class="eyebrow">Opxio · Operations OS</p><h1 class="h-title">Project Tracker</h1></div>
  <div class="h-right">
    <span class="ts" id="ts"></span>
    <button class="btn" onclick="doRefresh()" id="rb">↻ Refresh</button>
    <button class="btn" onclick="toggleMode()" id="mb">☀ Light</button>
  </div>
</div>

<!-- STAT CARDS — Awaiting → Active → Review → Completed → On Hold -->
<div class="sec-lbl">Overview</div>
<div class="g5">
  <div class="card stat"><div class="s-dot" style="background:var(--blue);"></div><span class="s-lbl">Awaiting</span><div class="s-val" id="s-awaiting">0</div><div class="s-sub">Deposit or kickoff</div></div>
  <div class="card stat"><div class="s-dot" style="background:var(--g);"></div><span class="s-lbl">Active Builds</span><div class="s-val" id="s-active">0</div><div class="s-sub">Currently building</div></div>
  <div class="card stat"><div class="s-dot" style="background:var(--amber);"></div><span class="s-lbl">In Review</span><div class="s-val" id="s-review">0</div><div class="s-sub">Client sign-off</div></div>
  <div class="card stat"><div class="s-dot" style="background:var(--g);opacity:.4;"></div><span class="s-lbl">Completed</span><div class="s-val" id="s-done">0</div><div class="s-sub">Delivered</div></div>
  <div class="card stat"><div class="s-dot" style="background:rgba(255,255,255,.2);"></div><span class="s-lbl">On Hold</span><div class="s-val" id="s-hold">0</div><div class="s-sub">Paused</div></div>
</div>

<!-- PROJECT CARDS -->
<div class="sec-lbl">Active Projects</div>
<div class="proj-grid" id="projects-list"><div class="card empty">Loading…</div></div>

<script>
const _tok=new URLSearchParams(location.search).get('token')||'';
function apiUrl(p){return _tok?p+'?token='+encodeURIComponent(_tok):p;}
let light=false;
function toggleMode(){light=!light;document.body.classList.toggle('light',light);document.getElementById('mb').textContent=light?'🌙 Dark':'☀ Light';}
function setTs(){document.getElementById('ts').textContent='Updated '+new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtDate(iso){if(!iso)return'—';const d=new Date(iso+'T00:00:00');return d.toLocaleDateString('en-GB',{day:'numeric',month:'short'});}
function isOverdue(iso){if(!iso)return false;return new Date(iso+'T23:59:59')<new Date();}

function pillCfg(s){
  if(s==='active')  return{cls:'pill-active',  label:'Building'};
  if(s==='review')  return{cls:'pill-review',  label:'In Review'};
  if(s==='awaiting')return{cls:'pill-awaiting', label:'Awaiting'};
  if(s==='hold')    return{cls:'pill-hold',     label:'On Hold'};
  return{cls:'pill-hold',label:s};
}
function phDot(status,no){
  const n=no??'?';
  if(status==='Done')       return`<div class="ph-dot phd-done">${n}</div>`;
  if(status==='In Progress')return`<div class="ph-dot phd-ip">${n}</div>`;
  if(status==='Review')     return`<div class="ph-dot phd-review">${n}</div>`;
  if(status==='On Hold')    return`<div class="ph-dot phd-hold">${n}</div>`;
  return`<div class="ph-dot phd-ns">${n}</div>`;
}
function phBar(tc){
  if(!tc||tc.total===0)return'<div class="ph-bar"></div>';
  const w=n=>(n/tc.total*100).toFixed(1);
  return`<div class="ph-bar"><div class="phb-done" style="width:${w(tc.done)}%"></div><div class="phb-ip" style="width:${w(tc.inProgress)}%"></div><div class="phb-blocked" style="width:${w(tc.blocked)}%"></div></div>`;
}

// SVG ring
function ringSVG(pct){
  const r=23,circ=2*Math.PI*r,off=circ-(pct/100)*circ;
  return`<svg width="56" height="56" viewBox="0 0 56 56"><circle class="ring-track" cx="28" cy="28" r="${r}" stroke-width="5"/><circle class="ring-fill" cx="28" cy="28" r="${r}" stroke-width="5" stroke-dasharray="${circ.toFixed(2)}" stroke-dashoffset="${off.toFixed(2)}" transform="rotate(-90 28 28)"/></svg>`;
}

function renderCard(b){
  const sp=pillCfg(b.status);
  const ts=b.taskSummary||{};
  const pct=b.overallPct||0;

  // Phases
  let phHTML='';
  if(b.phases&&b.phases.length>0){
    phHTML=b.phases.map(ph=>{
      const tc=ph.tasks||{};
      const ov=isOverdue(ph.due)&&ph.status!=='Done';
      return`<div class="ph-row">
        ${phDot(ph.status,ph.no)}
        <div class="ph-info">
          <div class="ph-name">${esc(ph.name)}</div>
          <div class="ph-due${ov?' overdue':''}">${ph.due?(ov?'Overdue · ':'')+fmtDate(ph.due):'No due date'}</div>
        </div>
        <div class="ph-right">
          ${phBar(tc)}
          <span class="ph-count">${tc.done||0}/${tc.total||0}</span>
        </div>
      </div>`;
    }).join('');
  } else {
    phHTML='<div style="padding:8px 0;text-align:center;font-size:10px;color:rgba(255,255,255,.15);">No phases yet</div>';
  }

  return`<div class="card proj-card">
    <div class="pc-top">
      <div>
        <div class="pc-name">${esc(b.name)}</div>
        <div class="pc-meta">
          ${b.client?`<span class="pc-client">${esc(b.client)}</span>`:''}
          ${b.type?`<span class="pc-pkg">${esc(b.type)}</span>`:''}
        </div>
      </div>
      <span class="pc-pill ${sp.cls}">${sp.label}</span>
    </div>

    <div class="pc-ring-row">
      <div class="ring-box">
        ${ringSVG(pct)}
        <div class="ring-pct">${pct}%</div>
      </div>
      <div class="ring-stats">
        <div class="rs-row"><div class="rs-dot rs-dot-done"></div><span class="rs-val">${ts.done||0}</span><span class="rs-lbl">Done</span></div>
        <div class="rs-row"><div class="rs-dot rs-dot-ip"></div><span class="rs-val">${ts.inProgress||0}</span><span class="rs-lbl">In Progress</span></div>
        <div class="rs-row"><div class="rs-dot rs-dot-blocked"></div><span class="rs-val">${ts.blocked||0}</span><span class="rs-lbl">Blocked</span></div>
        <div class="rs-row"><div class="rs-dot rs-dot-ns"></div><span class="rs-val">${ts.notStarted||0}</span><span class="rs-lbl">Not Started</span></div>
      </div>
    </div>

    <div class="pc-phases">${phHTML}</div>

    ${(b.startDate||b.targetDate)?`<div class="pc-dates">
      ${b.startDate?`<div class="dt-item"><span class="dt-lbl">Start</span><span class="dt-val">${fmtDate(b.startDate)}</span></div>`:''}
      ${b.targetDate?`<div class="dt-item"><span class="dt-lbl">Target</span><span class="dt-val${isOverdue(b.targetDate)?' overdue':''}">${fmtDate(b.targetDate)}</span></div>`:''}
    </div>`:''}
  </div>`;
}

function render(counts,builds){
  document.getElementById('s-awaiting').textContent=counts.awaiting||0;
  document.getElementById('s-active').textContent=counts.active||0;
  document.getElementById('s-review').textContent=counts.review||0;
  document.getElementById('s-done').textContent=counts.done||0;
  document.getElementById('s-hold').textContent=counts.hold||0;

  const el=document.getElementById('projects-list');
  if(!builds.length){el.innerHTML='<div class="card empty">No active projects</div>';return;}
  el.innerHTML=builds.map(renderCard).join('');
}

async function loadData(){
  try{
    const r=await fetch(apiUrl('/api/data/projects'));
    const j=await r.json();
    if(j.error){console.error('API:',j.error);return;}
    render(j.counts||{},j.builds||[]);
    setTs();
  }catch(e){console.error('tracker:',e);}
}

function doRefresh(){const b=document.getElementById('rb');b.textContent='↻';b.style.opacity='.4';loadData().then(()=>{b.textContent='↻ Refresh';b.style.opacity='1';});}
setTs();loadData();setInterval(loadData,5*60*1000);
</script></body></html>
