<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Opxio — Project Tracker</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}html,body{height:100%;}
body{font-family:'Satoshi',-apple-system,sans-serif;padding:14px;background:#191919;color:#fff;overflow-x:hidden;overflow-y:hidden;display:flex;flex-direction:column;}
body.light{background:#F5F5F5;color:#111;}
:root{--g:#AAFF00;--gm:rgba(170,255,0,.12);--gb:rgba(170,255,0,.18);--amber:#FBBF24;--amberm:rgba(251,191,36,.1);--amberb:rgba(251,191,36,.2);--blue:#60A5FA;--bluem:rgba(96,165,250,.1);--blueb:rgba(96,165,250,.18);--red:#FF6B6B;}
body.light{--g:#5C9900;--gm:rgba(92,153,0,.1);--gb:rgba(92,153,0,.2);}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:999px;}
body.light ::-webkit-scrollbar-thumb{background:rgba(0,0,0,.1);}

.card{background:#1E1E1E;border:1px solid rgba(255,255,255,.06);border-radius:14px;transition:border-color .2s;}
.card:hover{border-color:rgba(170,255,0,.1);}
body.light .card{background:#fff;border-color:rgba(0,0,0,.06);}
.btn{background:#252525;border:1px solid rgba(255,255,255,.09);color:rgba(255,255,255,.45);font-family:'Satoshi',sans-serif;font-size:12px;font-weight:700;padding:6px 14px;border-radius:8px;cursor:pointer;transition:all .2s;}
.btn:hover{border-color:var(--gb);color:var(--g);}
body.light .btn{background:#EFEFEF;border-color:rgba(0,0,0,.08);color:rgba(0,0,0,.4);}

.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px;flex-shrink:0;}
.g5{flex-shrink:0;}
.tab-row{flex-shrink:0;}
.sec-lbl{flex-shrink:0;}
.h-right{display:flex;align-items:center;gap:6px;}
.eyebrow{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.22);margin-bottom:2px;}
body.light .eyebrow{color:rgba(0,0,0,.28);}
.h-title{font-size:20px;font-weight:900;color:#fff;letter-spacing:-.03em;}
body.light .h-title{color:#111;}
.ts{font-size:10px;font-weight:500;color:rgba(255,255,255,.18);}
body.light .ts{color:rgba(0,0,0,.22);}
.sec-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.22);margin:16px 0 8px;}
body.light .sec-lbl{color:rgba(0,0,0,.28);}

/* ── STAT CARDS ── */
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;}
@media(max-width:700px){.g5{grid-template-columns:repeat(3,1fr);}}
@media(max-width:440px){.g5{grid-template-columns:repeat(2,1fr);}}
.stat{padding:14px 16px;position:relative;}
.s-dot{position:absolute;top:12px;right:12px;width:6px;height:6px;border-radius:50%;}
.s-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.5);margin-bottom:8px;display:block;}
body.light .s-lbl{color:rgba(0,0,0,.4);}
.s-val{font-size:30px;font-weight:900;letter-spacing:-1.5px;line-height:1;color:var(--g);}
.s-sub{font-size:10px;font-weight:500;color:rgba(255,255,255,.22);margin-top:5px;}
body.light .s-sub{color:rgba(0,0,0,.28);}

/* ── PROJECT ROWS ── */
.proj-list{display:flex;flex-direction:column;gap:10px;overflow-y:auto;padding-right:2px;padding-bottom:8px;flex:1;min-height:0;}
.proj-card{padding:18px 20px;position:relative;overflow:hidden;flex-shrink:0;}
.proj-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;opacity:0;transition:opacity .2s;}
.proj-card:hover::before{opacity:1;}
.proj-card.st-active::before,.proj-card.st-awaiting::before{background:linear-gradient(90deg,var(--g),transparent);}
.proj-card.st-review::before{background:linear-gradient(90deg,var(--amber),transparent);}
.proj-card.st-hold::before{background:linear-gradient(90deg,rgba(255,255,255,.2),transparent);}

/* Top row: pill + name + client/pkg + progress */
.pc-top{display:flex;align-items:center;gap:14px;margin-bottom:14px;}
@media(max-width:600px){.pc-top{flex-wrap:wrap;gap:8px;}}
.pc-pill{font-size:10px;font-weight:700;padding:4px 11px;border-radius:999px;letter-spacing:.04em;flex-shrink:0;white-space:nowrap;}
.pill-active{background:var(--gm);color:var(--g);border:1px solid var(--gb);}
.pill-review{background:var(--amberm);color:var(--amber);border:1px solid var(--amberb);}
.pill-awaiting{background:var(--gm);color:var(--g);border:1px solid var(--gb);opacity:.6;}
.pill-hold{background:rgba(255,255,255,.05);color:rgba(255,255,255,.35);border:1px solid rgba(255,255,255,.1);}
body.light .pill-hold{background:rgba(0,0,0,.04);color:rgba(0,0,0,.35);border-color:rgba(0,0,0,.1);}

.pc-info{flex:1;min-width:0;}
.pc-name{font-size:14px;font-weight:800;color:#fff;letter-spacing:-.02em;text-decoration:none;display:inline-block;}
.pc-name:hover{text-decoration:underline;text-decoration-color:var(--g);text-underline-offset:2px;}
body.light .pc-name{color:#111;}
.pc-sub{font-size:11px;font-weight:600;color:rgba(255,255,255,.3);margin-top:1px;}
body.light .pc-sub{color:rgba(0,0,0,.3);}
.pc-dates{display:flex;gap:16px;margin-top:4px;flex-wrap:wrap;}
.pc-date{font-size:10px;font-weight:500;color:rgba(255,255,255,.25);}
body.light .pc-date{color:rgba(0,0,0,.22);}
.pc-date strong{font-weight:700;color:rgba(255,255,255,.45);}
body.light .pc-date strong{color:rgba(0,0,0,.38);}

/* ── TAB TOGGLE ── */
.tab-row{display:flex;gap:4px;margin-bottom:10px;}
.tab{background:transparent;border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.3);font-family:'Satoshi',sans-serif;font-size:12px;font-weight:700;padding:6px 16px;border-radius:8px;cursor:pointer;transition:all .2s;}
.tab:hover{border-color:rgba(255,255,255,.15);color:rgba(255,255,255,.5);}
.tab.active{background:var(--gm);border-color:var(--gb);color:var(--g);}
body.light .tab{border-color:rgba(0,0,0,.08);color:rgba(0,0,0,.3);}
body.light .tab:hover{border-color:rgba(0,0,0,.15);color:rgba(0,0,0,.5);}
body.light .tab.active{background:var(--gm);border-color:var(--gb);color:var(--g);}

.pc-right{flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:5px;width:180px;}
@media(max-width:600px){.pc-right{width:100%;align-items:stretch;}}
.pc-progress{display:flex;align-items:center;gap:8px;width:100%;}
.pc-track{flex:1;height:5px;border-radius:999px;background:rgba(255,255,255,.07);}
body.light .pc-track{background:rgba(0,0,0,.08);}
.pc-fill{height:5px;border-radius:999px;background:var(--g);transition:width .8s cubic-bezier(.4,0,.2,1);}
.pc-pct{font-size:15px;font-weight:900;color:var(--g);width:40px;text-align:right;flex-shrink:0;letter-spacing:-.5px;}
.pc-pct.zero{color:rgba(255,255,255,.2);}
body.light .pc-pct.zero{color:rgba(0,0,0,.15);}
.pc-tasks-lbl{font-size:9px;font-weight:700;color:rgba(255,255,255,.2);text-align:right;text-transform:uppercase;letter-spacing:.07em;}
body.light .pc-tasks-lbl{color:rgba(0,0,0,.2);}

/* ── MID: TASK SUMMARY ── */
.pc-tasks{display:flex;align-items:center;gap:14px;padding:10px 0;border-top:1px solid rgba(255,255,255,.05);border-bottom:1px solid rgba(255,255,255,.05);margin-bottom:12px;flex-wrap:wrap;}
body.light .pc-tasks{border-color:rgba(0,0,0,.06);}
.tk{display:flex;align-items:center;gap:5px;}
.tk-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.tk-d{background:var(--g);}
.tk-ip{background:var(--amber);}
.tk-b{background:var(--red);}
.tk-ns{background:rgba(255,255,255,.15);}body.light .tk-ns{background:rgba(0,0,0,.12);}
.tk-val{font-size:13px;font-weight:900;color:#fff;letter-spacing:-.3px;}body.light .tk-val{color:#111;}
.tk-lbl{font-size:11px;font-weight:600;color:rgba(255,255,255,.3);}body.light .tk-lbl{color:rgba(0,0,0,.3);}
.tk-zero .tk-val{color:rgba(255,255,255,.2);}body.light .tk-zero .tk-val{color:rgba(0,0,0,.15);}
.tk-zero .tk-lbl{color:rgba(255,255,255,.15);}
.tk-total{margin-left:auto;font-size:10px;font-weight:700;color:rgba(255,255,255,.18);letter-spacing:.04em;text-transform:uppercase;}
body.light .tk-total{color:rgba(0,0,0,.2);}

/* ── PHASE TIMELINE ── */
.ph-timeline{display:flex;align-items:stretch;gap:0;position:relative;}
.ph-step{flex:1;display:flex;flex-direction:column;align-items:center;position:relative;min-width:0;padding:0 4px;}

/* Connector line between steps — color set via inline style by JS based on task completion */
.ph-step:not(:last-child)::after{content:'';position:absolute;top:11px;left:calc(50% + 14px);right:calc(-50% + 14px);height:2px;background:rgba(255,255,255,.06);}
body.light .ph-step:not(:last-child)::after{background:rgba(0,0,0,.07);}
.ph-step.conn-full:not(:last-child)::after{background:var(--g);}
.ph-step.conn-partial:not(:last-child)::after{background:linear-gradient(90deg, var(--g) var(--conn-pct), rgba(255,255,255,.06) var(--conn-pct));}

.ph-dot{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;z-index:1;flex-shrink:0;margin-bottom:6px;}
.phd-done{background:var(--g);color:#111;}
.phd-partial{background:#191919;border:2px solid var(--g);box-shadow:0 0 8px rgba(170,255,0,.35);color:var(--g);}
body.light .phd-partial{background:#fff;}
.phd-ns{background:rgba(255,255,255,.04);border:2px solid rgba(255,255,255,.08);color:rgba(255,255,255,.2);}
body.light .phd-ns{background:rgba(0,0,0,.02);border-color:rgba(0,0,0,.08);color:rgba(0,0,0,.2);}
.phd-hold{background:rgba(255,255,255,.04);border:2px dashed rgba(255,255,255,.12);}

.ph-label{font-size:11px;font-weight:700;color:rgba(255,255,255,.2);text-align:center;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;}
body.light .ph-label{color:rgba(0,0,0,.18);}
.ph-step.active .ph-label{color:var(--g);}
.ph-step.done .ph-label{color:rgba(255,255,255,.4);}
body.light .ph-step.done .ph-label{color:rgba(0,0,0,.3);}

.ph-count{font-size:10px;font-weight:700;color:rgba(255,255,255,.15);margin-top:2px;}
body.light .ph-count{color:rgba(0,0,0,.12);}
.ph-step.active .ph-count{color:var(--g);}
.ph-step.done .ph-count{color:rgba(255,255,255,.3);}
body.light .ph-step.done .ph-count{color:rgba(0,0,0,.25);}

.ph-due{font-size:9px;font-weight:600;color:rgba(255,255,255,.18);margin-top:1px;}
body.light .ph-due{color:rgba(0,0,0,.15);}
.ph-due.overdue{color:var(--red);}

/* No phases fallback */
.no-phases{padding:8px 0;text-align:center;font-size:10px;color:rgba(255,255,255,.15);}
body.light .no-phases{color:rgba(0,0,0,.12);}

.empty{padding:40px;text-align:center;font-size:12px;color:rgba(255,255,255,.18);}
body.light .empty{color:rgba(0,0,0,.18);}
</style></head><body>

<div class="header">
  <div><p class="eyebrow" id="_eyebrow" data-os="Operations OS">OPERATIONS OS</p><h1 class="h-title">Project Tracker</h1></div>
  <div class="h-right">
    <span class="ts" id="ts"></span>
    <button class="btn" onclick="doRefresh()" id="rb">↻ Refresh</button>
    <button class="btn" onclick="toggleMode()" id="mb">☀ Light</button>
  </div>
</div>

<!-- STAT CARDS -->
<div class="sec-lbl">Overview</div>
<div class="g5">
  <div class="card stat"><div class="s-dot" style="background:var(--blue);"></div><span class="s-lbl">Awaiting</span><div class="s-val" id="s-awaiting">0</div><div class="s-sub">Deposit or kickoff</div></div>
  <div class="card stat"><div class="s-dot" style="background:var(--g);"></div><span class="s-lbl">Active Builds</span><div class="s-val" id="s-active">0</div><div class="s-sub">Currently building</div></div>
  <div class="card stat"><div class="s-dot" style="background:var(--amber);"></div><span class="s-lbl">In Review</span><div class="s-val" id="s-review">0</div><div class="s-sub">Client sign-off</div></div>
  <div class="card stat"><div class="s-dot" style="background:var(--g);opacity:.4;"></div><span class="s-lbl">Completed</span><div class="s-val" id="s-done">0</div><div class="s-sub">Delivered</div></div>
  <div class="card stat"><div class="s-dot" style="background:rgba(255,255,255,.2);"></div><span class="s-lbl">On Hold</span><div class="s-val" id="s-hold">0</div><div class="s-sub">Paused</div></div>
</div>

<!-- PROJECT ROWS -->
<div class="sec-lbl">Projects</div>
<div class="tab-row">
  <button class="tab active" onclick="switchTab('active')" id="tab-active">Active</button>
  <button class="tab" onclick="switchTab('completed')" id="tab-completed">Completed</button>
</div>
<div class="proj-list" id="proj-list" style="padding-bottom:8px;"><div class="card empty">Loading…</div></div>

<script>
const _tok=new URLSearchParams(location.search).get('token')||'';
function apiUrl(p){return _tok?p+'?token='+encodeURIComponent(_tok):p;}
let light=false;
function toggleMode(){light=!light;document.body.classList.toggle('light',light);document.getElementById('mb').textContent=light?'🌙 Dark':'☀ Light';}
function setTs(){document.getElementById('ts').textContent='Updated '+new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtDate(iso){if(!iso)return'';const d=new Date(iso+'T00:00:00');return d.toLocaleDateString('en-GB',{day:'numeric',month:'short'});}
function fmtDateFull(iso){if(!iso)return'';const d=new Date(iso+'T00:00:00');return d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});}
function isOverdue(iso){if(!iso)return false;return new Date(iso+'T23:59:59')<new Date();}

function pillCfg(s){
  if(s==='active')  return{cls:'pill-active',  label:'Building'};
  if(s==='review')  return{cls:'pill-review',  label:'In Review'};
  if(s==='awaiting')return{cls:'pill-awaiting', label:'Awaiting'};
  if(s==='hold')    return{cls:'pill-hold',     label:'On Hold'};
  return{cls:'pill-hold',label:s};
}

// Assign sequential phase states: done → active (first incomplete) → not started
function assignPhaseStates(phases){
  let foundActive=false;
  for(const ph of phases){
    const tc=ph.tasks||{};
    const allDone=tc.total>0&&tc.done===tc.total;
    if(allDone&&!foundActive){ph._state='done';}
    else if(!foundActive){ph._state='active';foundActive=true;}
    else{ph._state='ns';}
  }
}
function phDotClass(state){
  if(state==='done') return 'phd-done';
  if(state==='active') return 'phd-partial';
  return 'phd-ns';
}
function phStepClass(state){
  if(state==='done') return 'done';
  if(state==='active') return 'active';
  return '';
}

function renderCard(b){
  const sp=pillCfg(b.status);
  const pct=b.overallPct||0;
  const ts=b.taskSummary||{};

  let subParts=[];
  if(b.client) subParts.push(esc(b.client));
  if(b.type) subParts.push(esc(b.type));

  // Dates row
  let datesHTML='';
  const hasStart=b.startDate, hasTarget=b.targetDate, hasCompleted=b.completedDate;
  if(hasStart||hasTarget||hasCompleted){
    datesHTML='<div class="pc-dates">';
    if(hasStart) datesHTML+=`<div class="pc-date"><strong>Started:</strong> ${fmtDateFull(b.startDate)}</div>`;
    if(hasCompleted) datesHTML+=`<div class="pc-date"><strong>Completed:</strong> ${fmtDateFull(b.completedDate)}</div>`;
    else if(hasTarget) datesHTML+=`<div class="pc-date"><strong>Targeted Completion:</strong> ${fmtDateFull(b.targetDate)}</div>`;
    datesHTML+='</div>';
  }

  // Phase timeline
  let phHTML='';
  if(b.phases&&b.phases.length>0){
    assignPhaseStates(b.phases);
    phHTML='<div class="ph-timeline">'+b.phases.map(ph=>{
      const tc=ph.tasks||{};
      const cls=phStepClass(ph._state);
      const dotCls=phDotClass(ph._state);
      const ov=isOverdue(ph.due)&&ph.status!=='Done';
      const dueStr=ph.due?(ov?'Overdue':'Due '+fmtDate(ph.due)):'';
      // Connector: only fill green based on actual task completion
      let connCls='';
      let connStyle='';
      if(ph._state==='done'){connCls='conn-full';}
      else if(tc.total>0&&tc.done>0){
        const pct=Math.round((tc.done/tc.total)*100);
        connCls='conn-partial';
        connStyle=`--conn-pct:${pct}%`;
      }
      // Short label: strip "Phase N — " prefix for cleaner display
      const shortName=(ph.name||'').replace(/^Phase\s*\d+\s*[—–-]\s*/,'');
      return`<div class="ph-step ${cls} ${connCls}" style="${connStyle}">
        <div class="ph-dot ${dotCls}">${ph.no??'?'}</div>
        <div class="ph-label">${esc(shortName||ph.name)}</div>
        <div class="ph-count">${tc.done||0}/${tc.total||0}</div>
        ${dueStr?`<div class="ph-due${ov?' overdue':''}">${dueStr}</div>`:''}
      </div>`;
    }).join('')+'</div>';
  } else {
    phHTML='<div class="no-phases">No phases configured yet</div>';
  }

  // Progress bar width: only fill from tasks done
  const tasksDone=ts.done||0;
  const tasksTotal=ts.total||0;
  const barPct=tasksTotal>0?Math.round((tasksDone/tasksTotal)*100):0;

  // Status class for top accent
  const stCls = b.status==='active'?'st-active':b.status==='review'?'st-review':b.status==='awaiting'?'st-awaiting':'st-hold';

  function tk(n,lbl,dotCls){const z=!n?' tk-zero':'';return`<div class="tk${z}"><div class="tk-dot ${dotCls}"></div><span class="tk-val">${n||0}</span><span class="tk-lbl">${lbl}</span></div>`;}

  return`<div class="card proj-card ${stCls}">
    <div class="pc-top">
      <span class="pc-pill ${sp.cls}">${sp.label}</span>
      <div class="pc-info">
        ${b.notionUrl?`<a class="pc-name" href="${b.notionUrl}" target="_blank" rel="noopener">${esc(b.name)}</a>`:`<div class="pc-name">${esc(b.name)}</div>`}
        ${subParts.length?`<div class="pc-sub">${subParts.join(' · ')}</div>`:''}
        ${datesHTML}
      </div>
      <div class="pc-right">
        <div class="pc-progress">
          <div class="pc-track"><div class="pc-fill" style="width:${barPct}%"></div></div>
          <span class="pc-pct${barPct===0?' zero':''}">${barPct}%</span>
        </div>
        <div class="pc-tasks-lbl">${tasksTotal} task${tasksTotal!==1?'s':''}</div>
      </div>
    </div>
    <div class="pc-tasks">
      ${tk(ts.done,'Done','tk-d')}
      ${tk(ts.inProgress,'In Progress','tk-ip')}
      ${tk(ts.blocked,'Blocked','tk-b')}
      ${tk(ts.notStarted,'Not Started','tk-ns')}
      <span class="tk-total">${tasksTotal} total</span>
    </div>
    ${phHTML}
  </div>`;
}

let allBuilds=[], completedBuilds=[], currentTab='active';

function switchTab(tab){
  currentTab=tab;
  document.getElementById('tab-active').classList.toggle('active',tab==='active');
  document.getElementById('tab-completed').classList.toggle('active',tab==='completed');
  renderList();
}

function renderList(){
  const el=document.getElementById('proj-list');
  const list=currentTab==='active'?allBuilds:completedBuilds;
  const emptyMsg=currentTab==='active'?'No active projects':'No completed projects';
  if(!list.length){el.innerHTML=`<div class="card empty">${emptyMsg}</div>`;return;}
  el.innerHTML=list.map(renderCard).join('');
}

function sortByTarget(arr){
  return arr.sort((a,b)=>{
    // Sort by targetDate ascending (soonest first), nulls last
    if(a.targetDate&&b.targetDate) return a.targetDate.localeCompare(b.targetDate);
    if(a.targetDate) return -1;
    if(b.targetDate) return 1;
    return 0;
  });
}

function render(counts,builds,done){
  document.getElementById('s-awaiting').textContent=counts.awaiting||0;
  document.getElementById('s-active').textContent=counts.active||0;
  document.getElementById('s-review').textContent=counts.review||0;
  document.getElementById('s-done').textContent=counts.done||0;
  document.getElementById('s-hold').textContent=counts.hold||0;

  allBuilds=sortByTarget(builds);
  completedBuilds=sortByTarget(done||[]);
  document.getElementById('tab-active').textContent=`Active (${builds.length})`;
  document.getElementById('tab-completed').textContent=`Completed (${completedBuilds.length})`;
  renderList();
}

async function loadData(){
  try{
    const r=await fetch(apiUrl('/api/data/projects'));
    const j=await r.json();
    if(j.error){console.error('API:',j.error);return;}
    render(j.counts||{},j.builds||[],j.completed||[]);
    setTs();
  }catch(e){console.error('tracker:',e);}
}

function doRefresh(){const b=document.getElementById('rb');b.textContent='↻';b.style.opacity='.4';loadData().then(()=>{b.textContent='↻ Refresh';b.style.opacity='1';});}
setTs();loadData();setInterval(loadData,5*60*1000);
</script>

<script>
(function(){

})();
