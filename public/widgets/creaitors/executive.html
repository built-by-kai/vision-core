<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Opxio — Executive Overview</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}html{height:100%;}
body{font-family:'Satoshi',-apple-system,sans-serif;padding:14px 14px 24px;background:#191919;color:#fff;overflow-y:auto;overflow-x:hidden;}
:root{--g:#AAFF00;--gm:rgba(170,255,0,.12);--gb:rgba(170,255,0,.18);--amber:#FBBF24;--red:#FF6B6B;--orange:#FB923C;--blue:#60A5FA;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:999px;}

.card{background:#1E1E1E;border:1px solid rgba(255,255,255,.06);border-radius:14px;transition:border-color .2s;}
.card:hover{border-color:rgba(170,255,0,.1);}
.btn{background:#252525;border:1px solid rgba(255,255,255,.09);color:rgba(255,255,255,.45);font-family:'Satoshi',sans-serif;font-size:11px;font-weight:700;padding:5px 11px;border-radius:7px;cursor:pointer;transition:all .2s;}
.btn:hover{border-color:var(--gb);color:var(--g);}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px;}
.eyebrow{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.22);margin-bottom:2px;}
.h-title{font-size:20px;font-weight:900;color:#fff;letter-spacing:-.03em;}
.ts{font-size:10px;font-weight:500;color:rgba(255,255,255,.18);}
.h-right{display:flex;align-items:center;gap:6px;}

/* Section label */
.sec-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.22);margin:16px 0 8px;}

/* Stat grid */
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:10px;}
@media(max-width:640px){.g4{grid-template-columns:repeat(2,1fr);}}
.stat{padding:16px 18px;position:relative;overflow:hidden;}
.s-dot{position:absolute;top:13px;right:13px;width:6px;height:6px;border-radius:50%;opacity:.6;}
.s-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.5);margin-bottom:10px;display:block;}
.s-val{font-size:30px;font-weight:900;letter-spacing:-1.5px;line-height:1;color:var(--g);}
.s-val.red{color:var(--red);}
.s-val.amber{color:var(--amber);}
.s-val.orange{color:var(--orange);}
.s-sub{font-size:9.5px;font-weight:500;color:rgba(255,255,255,.22);margin-top:6px;}

/* Panels */
.mid-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
@media(max-width:680px){.mid-row{grid-template-columns:1fr;}}
.full-row{margin-bottom:10px;}
.panel{padding:20px 22px;}
.panel-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.panel-title{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.85);}
.panel-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px;background:var(--gm);color:var(--g);border:1px solid var(--gb);}
.panel-badge.amber{background:rgba(251,191,36,.1);color:var(--amber);border-color:rgba(251,191,36,.18);}

/* Campaign list */
.scroll{max-height:240px;overflow-y:auto;padding-right:2px;}
.camp-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.04);}
.camp-item:last-child{border-bottom:none;}
.camp-info{flex:1;min-width:0;}
.camp-name{font-size:12px;font-weight:700;color:rgba(255,255,255,.8);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.camp-dates{font-size:10px;font-weight:600;color:rgba(255,255,255,.3);margin-top:2px;}
.camp-delivs{font-size:10px;font-weight:600;color:rgba(255,255,255,.35);margin-top:2px;}
.camp-type{font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;background:var(--gm);color:var(--g);border:1px solid rgba(170,255,0,.15);white-space:nowrap;text-transform:uppercase;letter-spacing:.05em;flex-shrink:0;}
.camp-bar-wrap{width:48px;flex-shrink:0;}
.camp-track{background:rgba(255,255,255,.05);border-radius:999px;height:5px;overflow:hidden;}
.camp-fill{height:5px;border-radius:999px;}
.camp-pct{font-size:12px;font-weight:900;min-width:32px;text-align:right;flex-shrink:0;letter-spacing:-.5px;}

/* Status bars */
.cs-row{display:flex;align-items:center;gap:8px;margin-bottom:9px;}
.cs-row:last-child{margin-bottom:0;}
.cs-lbl{font-size:11px;font-weight:700;color:rgba(255,255,255,.5);width:130px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cs-track{flex:1;height:6px;background:rgba(255,255,255,.05);border-radius:999px;overflow:hidden;}
.cs-fill{height:6px;border-radius:999px;transition:width .5s cubic-bezier(.4,0,.2,1);}
.cs-count{font-size:13px;font-weight:900;min-width:22px;text-align:right;flex-shrink:0;letter-spacing:-.3px;}

/* Pipeline funnel */
.f-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.f-row:last-child{margin-bottom:0;}
.f-lbl{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:rgba(255,255,255,.4);width:90px;flex-shrink:0;line-height:1.25;}
.f-bg{flex:1;height:24px;border-radius:6px;background:rgba(255,255,255,.04);overflow:hidden;}
.f-fill{height:100%;border-radius:6px;background:rgba(170,255,0,.4);}
.f-fill.lost{background:rgba(251,146,60,.4);}
.f-n{font-size:12px;font-weight:900;color:rgba(255,255,255,.5);width:22px;text-align:right;flex-shrink:0;}

/* Win/Loss log */
.wl-tabs{display:flex;gap:3px;background:rgba(255,255,255,.05);border-radius:8px;padding:3px;margin-bottom:14px;width:fit-content;}
.wl-tab{background:transparent;border:none;color:rgba(255,255,255,.35);font-family:'Satoshi',sans-serif;font-size:10px;font-weight:700;padding:4px 12px;border-radius:6px;cursor:pointer;transition:all .18s;}
.wl-tab.won{background:rgba(170,255,0,.14);color:#AAFF00;}
.wl-tab.lost{background:rgba(251,146,60,.14);color:#FB923C;}
.wl-item{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04);}
.wl-item:last-child{border-bottom:none;}
.wl-name{font-size:12px;font-weight:700;color:rgba(255,255,255,.75);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.wl-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap;flex-shrink:0;}
.wl-badge-won{background:rgba(170,255,0,.1);color:var(--g);border:1px solid rgba(170,255,0,.2);}
.wl-badge-lost{background:rgba(251,146,60,.1);color:#FB923C;border:1px solid rgba(251,146,60,.2);}
.wl-val{font-size:12px;font-weight:700;color:rgba(255,255,255,.35);flex-shrink:0;}

/* Section tabs */
.tab-bar{display:flex;gap:3px;background:rgba(255,255,255,.05);border-radius:10px;padding:4px;margin-bottom:16px;width:fit-content;}
.tab-btn{background:transparent;border:1px solid transparent;color:rgba(255,255,255,.35);font-family:'Satoshi',sans-serif;font-size:11px;font-weight:700;padding:6px 16px;border-radius:7px;cursor:pointer;transition:all .18s;letter-spacing:.02em;}
.tab-btn.active{background:#252525;color:#fff;border-color:rgba(255,255,255,.09);}
.tab-btn:hover:not(.active){color:rgba(255,255,255,.65);}
.tab-pane{display:none;}
.tab-pane.active{display:block;}

/* Misc */
.empty{padding:24px;text-align:center;font-size:12px;color:rgba(255,255,255,.2);font-weight:600;}
.loading{display:flex;align-items:center;justify-content:center;min-height:160px;flex-direction:column;gap:10px;}
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.06);border-top-color:var(--g);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:11px;color:rgba(255,255,255,.25);font-weight:500;}

/* ── EDIT DRAWER ─────────────────────────────────────────────────────────── */
.edit-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:flex-end;justify-content:center;}
.edit-drawer{background:#1A1A1A;border:1px solid rgba(255,255,255,.1);border-radius:20px 20px 0 0;width:100%;max-width:520px;padding:24px 24px 32px;max-height:90vh;overflow-y:auto;}
.drawer-handle{width:36px;height:4px;background:rgba(255,255,255,.15);border-radius:99px;margin:0 auto 20px;}
.drawer-title{font-size:16px;font-weight:900;color:#fff;letter-spacing:-.3px;margin-bottom:4px;}
.drawer-sub{font-size:11px;color:rgba(255,255,255,.35);margin-bottom:20px;}
.sect-list{display:flex;flex-direction:column;gap:6px;margin-bottom:24px;}
.sect-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:#242424;border:1px solid rgba(255,255,255,.07);border-radius:10px;cursor:grab;user-select:none;transition:border-color .2s,background .2s;}
.sect-item:active{cursor:grabbing;}
.sect-item.sortable-ghost{opacity:.4;}
.sect-item.sortable-chosen{background:#2A2A2A;border-color:var(--gb);}
.drag-handle{color:rgba(255,255,255,.2);font-size:14px;flex-shrink:0;cursor:grab;}
.sect-toggle{flex-shrink:0;}
.sect-toggle input[type=checkbox]{width:16px;height:16px;accent-color:var(--g);cursor:pointer;}
.sect-info{flex:1;min-width:0;}
.sect-name{font-size:13px;font-weight:700;color:rgba(255,255,255,.85);}
.sect-desc{font-size:10px;color:rgba(255,255,255,.3);margin-top:2px;}
.sect-os{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:2px 7px;border-radius:4px;background:rgba(170,255,0,.08);color:rgba(170,255,0,.6);border:1px solid rgba(170,255,0,.12);flex-shrink:0;}
.drawer-actions{display:flex;gap:8px;}
.btn-save{flex:1;background:var(--g);border:none;color:#000;font-family:'Satoshi',sans-serif;font-size:13px;font-weight:900;padding:12px;border-radius:10px;cursor:pointer;transition:opacity .2s;letter-spacing:-.2px;}
.btn-save:hover{opacity:.88;}
.btn-save:disabled{opacity:.4;cursor:default;}
.btn-cancel{background:#252525;border:1px solid rgba(255,255,255,.09);color:rgba(255,255,255,.5);font-family:'Satoshi',sans-serif;font-size:13px;font-weight:700;padding:12px 18px;border-radius:10px;cursor:pointer;transition:all .2s;}
.btn-cancel:hover{border-color:rgba(255,255,255,.18);color:#fff;}
.save-msg{font-size:11px;text-align:center;font-weight:700;padding:8px;border-radius:7px;margin-top:10px;display:none;}
.save-msg.ok{background:var(--gm);color:var(--g);border:1px solid var(--gb);}
.save-msg.err{background:rgba(241,113,113,.1);color:var(--red);border:1px solid rgba(241,113,113,.2);}
</style>
</head>
<body>

<div class="header">
  <div>
    <p class="eyebrow" id="eyebrow">OPXIO</p>
    <h1 class="h-title">Executive Overview</h1>
  </div>
  <div class="h-right">
    <span class="ts" id="ts"></span>
    <button class="btn" id="rb" onclick="load()">↻ Refresh</button>
  </div>
</div>

<div id="dash">
  <div class="loading"><div class="spinner"></div><div class="loading-text">Loading</div></div>
</div>

<!-- Edit drawer (shown when ?edit=1) -->
<div class="edit-overlay" id="edit-overlay" style="display:none;" onclick="closeEdit(event)">
  <div class="edit-drawer" onclick="event.stopPropagation()">
    <div class="drawer-handle"></div>
    <div class="drawer-title">Configure Dashboard</div>
    <div class="drawer-sub">Toggle sections on / off and drag to reorder</div>
    <div class="sect-list" id="sect-list"></div>
    <div class="drawer-actions">
      <button class="btn-cancel" onclick="closeEdit()">Cancel</button>
      <button class="btn-save" id="btn-save" onclick="saveConfig()">Save Changes</button>
    </div>
    <div class="save-msg" id="save-msg"></div>
  </div>
</div>

<script>
const _tok    = new URLSearchParams(location.search).get('token') || '';
const _client = new URLSearchParams(location.search).get('client') || 'Creaitors';
const _edit   = new URLSearchParams(location.search).get('edit') === '1';
const _role   = (new URLSearchParams(location.search).get('role') || '').toLowerCase();

// Role presets — bypass saved config when ?role= is set
const ROLE_PRESETS = {
  executive: ['campaign', 'content', 'crm', 'crm-log'],
  sales:     ['crm', 'crm-log'],
  pm:        ['campaign', 'content'],
};
const ROLE_LABELS = {
  executive: 'Executive',
  sales:     'Sales',
  pm:        'Project Manager',
};

// Eyebrow: client name + role label if role is set, else just client name
(function(){
  const el = document.getElementById('eyebrow');
  if(!el) return;
  const roleLabel = ROLE_LABELS[_role] ? ' · ' + ROLE_LABELS[_role].toUpperCase() : '';
  // Default label while client info loads
  el.textContent = _client.toUpperCase() + roleLabel;
  if(!_tok) return;
  fetch('/api/client/info?token=' + _tok)
    .then(r => r.ok ? r.json() : null)
    .then(d => { if(d?.client) el.textContent = d.client.toUpperCase() + roleLabel; })
    .catch(() => {});
})();

// ── Available sections catalog ────────────────────────────────────────────
const SECTIONS_CATALOG = [
  { id: 'campaign', label: 'Campaign Stats',     desc: 'Active campaigns, completion rate, deliverable progress', os: 'Marketing OS' },
  { id: 'content',  label: 'Content Production', desc: 'Content in motion, status breakdown, due this week',      os: 'Marketing OS' },
  { id: 'crm',      label: 'Revenue Pipeline',   desc: 'Lead & deal funnels, potential value, conv. rate',        os: 'Revenue OS'   },
  { id: 'crm-log',  label: 'Win / Loss Log',      desc: 'Won deals, lost leads/deals, win rate, top reason',      os: 'Revenue OS'   },
];

let _sections = ['campaign', 'content']; // overwritten by API

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function fmtDate(d){
  if(!d) return null;
  return new Date(d+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short'});
}
function pctColor(p){ return p >= 80 ? 'var(--g)' : p >= 50 ? 'var(--amber)' : 'var(--red)'; }
function fmtRM(n){
  if(!n) return '—';
  if(n >= 1000000) return 'RM '+(n/1000000).toFixed(1).replace(/\.0$/,'')+'M';
  if(n >= 1000)    return 'RM '+(n/1000).toFixed(1).replace(/\.0$/,'')+'K';
  return 'RM '+Math.round(n).toLocaleString();
}
function csColor(l){
  const lc = (l||'').toLowerCase();
  if(lc.includes('done') || lc.includes('published'))                              return 'var(--g)';
  if(lc.includes('ready for posting') || lc.includes('ready to work'))             return 'var(--orange)';
  if(lc.includes('pending qc') || lc.includes('qc review') || lc.includes('final qc')) return 'var(--amber)';
  if(lc.includes('revision'))                                                        return 'var(--red)';
  return 'rgba(170,255,0,.5)';
}
function tsColor(l){
  const lc = (l||'').toLowerCase();
  if(lc.includes('done'))       return 'var(--g)';
  if(lc.includes('pending qc')) return 'var(--amber)';
  if(lc.includes('review'))     return 'var(--red)';
  if(lc.includes('ready'))      return 'var(--orange)';
  return 'rgba(170,255,0,.5)';
}

// ── SECTION: CAMPAIGN ────────────────────────────────────────────────────────
function renderCampaign(d){
  const remaining = d.remainingDeliverables || 0;
  const attn      = d.needsAttention || 0;

  let h = `<div class="sec-lbl">Campaigns</div>
  <div class="g4">
    <div class="card stat">
      <div class="s-dot" style="background:var(--g);"></div>
      <span class="s-lbl">Active Campaigns</span>
      <div class="s-val">${d.activeCampaigns ?? '—'}</div>
      <div class="s-sub">${remaining > 0 ? remaining+' deliverables left' : 'All delivered'}</div>
    </div>
    <div class="card stat">
      <div class="s-dot" style="background:var(--g);"></div>
      <span class="s-lbl">Avg Completion</span>
      <div class="s-val">${d.avgCompletion != null ? d.avgCompletion+'%' : '—'}</div>
      <div class="s-sub">${d.completedDeliverables||0} of ${d.totalDeliverables||0} done</div>
    </div>
    <div class="card stat">
      <div class="s-dot" style="background:var(--g);"></div>
      <span class="s-lbl">Completed</span>
      <div class="s-val">${d.completedDeliverables ?? '—'}</div>
      <div class="s-sub">of ${d.totalDeliverables||0} total deliverables</div>
    </div>
    <div class="card stat">
      <div class="s-dot" style="background:${attn > 0 ? 'var(--red)' : 'var(--g)'};"></div>
      <span class="s-lbl">Needs Attention</span>
      <div class="s-val ${attn > 0 ? 'red' : ''}">${attn}</div>
      <div class="s-sub">${attn > 0 ? 'items flagged' : 'All clear'}</div>
    </div>
  </div>`;

  const camps = d.campaignDetails || [];
  h += `<div class="full-row card panel">
    <div class="panel-hdr">
      <span class="panel-title">Campaign Progress</span>
      <span class="panel-badge">${d.activeCampaigns||0} active</span>
    </div>`;
  if(camps.length){
    h += `<div class="scroll">`;
    for(const c of camps){
      const col = pctColor(c.pct);
      const start = fmtDate(c.startDate), end = fmtDate(c.endDate);
      const dateStr = start && end ? `${start} – ${end}` : start||end||'';
      const remC = (c.planned||0) - (c.done||0);
      const TYPE_LABELS = {videos:'Videos',posters:'Posters',live:'Live',kol:'KOL'};
      const cb2 = c.contentBreakdown || {};
      const typeParts = Object.entries(TYPE_LABELS)
        .filter(([k]) => (cb2[k]?.planned||0) > 0)
        .map(([k,lbl]) => `<span style="color:rgba(255,255,255,.55);font-weight:700;">${cb2[k].planned} ${lbl}</span>`);
      const statusStr = remC > 0
        ? `<span style="color:var(--red);">${remC} left</span>`
        : `<span style="color:var(--g);">All done</span>`;
      const delivStr = c.planned > 0
        ? (typeParts.length ? typeParts.join(' · ') + ' · ' + statusStr : statusStr) : '';
      h += `<div class="camp-item">
        <div class="camp-info">
          <div class="camp-name">${esc(c.name)}</div>
          ${dateStr ? `<div class="camp-dates">${esc(dateStr)}</div>` : ''}
          ${delivStr ? `<div class="camp-delivs">${delivStr}</div>` : ''}
        </div>
        ${c.type ? `<span class="camp-type">${esc(c.type)}</span>` : ''}
        <div class="camp-bar-wrap">
          <div class="camp-track"><div class="camp-fill" style="width:${Math.max(c.pct>0?4:0,c.pct)}%;background:${col};"></div></div>
        </div>
        <span class="camp-pct" style="color:${col};">${c.pct}%</span>
      </div>`;
    }
    h += `</div>`;
  } else {
    h += `<div class="empty">No active campaigns</div>`;
  }
  return h + `</div>`;
}

// ── SECTION: CONTENT PRODUCTION ──────────────────────────────────────────────
function renderContent(d){
  const attn = d.needsAttention || 0;
  const ab   = d.attentionBreakdown || {};

  let h = `<div class="sec-lbl">Content Production</div>
  <div class="g4">
    <div class="card stat">
      <div class="s-dot" style="background:var(--g);"></div>
      <span class="s-lbl">Content In Motion</span>
      <div class="s-val">${d.contentInMotion ?? '—'}</div>
      <div class="s-sub">${d.contentBreakdown?.revision||0} revision · ${d.contentBreakdown?.qc||0} QC</div>
    </div>
    <div class="card stat">
      <div class="s-dot" style="background:var(--amber);"></div>
      <span class="s-lbl">Active Tasks</span>
      <div class="s-val amber">${d.tasksTotal ?? '—'}</div>
      <div class="s-sub">${d.dueBreakdown?.tasks||0} due this week</div>
    </div>
    <div class="card stat">
      <div class="s-dot" style="background:var(--g);"></div>
      <span class="s-lbl">Due This Week</span>
      <div class="s-val">${d.dueThisWeek ?? '—'}</div>
      <div class="s-sub">${d.dueBreakdown?.content||0} content · ${d.dueBreakdown?.tasks||0} tasks</div>
    </div>
    <div class="card stat">
      <div class="s-dot" style="background:${attn > 0 ? 'var(--red)' : 'var(--g)'};"></div>
      <span class="s-lbl">Needs Attention</span>
      <div class="s-val ${attn > 0 ? 'red' : ''}">${attn}</div>
      <div class="s-sub">${attn > 0 ? [
        ab.overdue  > 0 ? ab.overdue+' overdue'   : '',
        ab.revision > 0 ? ab.revision+' revision'  : '',
        ab.qc       > 0 ? ab.qc+' QC'             : '',
      ].filter(Boolean).join(' · ') : 'All clear'}</div>
    </div>
  </div>`;

  const cStatuses = d.contentStatuses || [], cCounts = d.contentStatusCounts || {};
  const csMax = Math.max(...cStatuses.map(s => cCounts[s]||0), 1);
  const tStatuses = d.taskStatuses || [], tCounts = d.taskStatusCounts || {};
  const tsMax = Math.max(...tStatuses.map(s => tCounts[s]||0), 1);
  const activeTask = tStatuses.filter(s => (tCounts[s]||0) > 0);

  h += `<div class="mid-row">
    <div class="card panel">
      <div class="panel-hdr">
        <span class="panel-title">Content Status</span>
        <span class="panel-badge">${d.contentInMotion||0} active</span>
      </div>`;
  const activeCt = cStatuses.filter(s => (cCounts[s]||0) > 0);
  if(activeCt.length){
    for(const s of activeCt){
      const cnt = cCounts[s]||0, pct = Math.round((cnt/csMax)*100), col = csColor(s);
      h += `<div class="cs-row">
        <span class="cs-lbl">${esc(s)}</span>
        <div class="cs-track"><div class="cs-fill" style="width:${pct}%;background:${col};opacity:.85;"></div></div>
        <span class="cs-count" style="color:${col};">${cnt}</span>
      </div>`;
    }
  } else { h += `<div class="empty">No active content</div>`; }
  h += `</div>
    <div class="card panel">
      <div class="panel-hdr">
        <span class="panel-title">Task Status</span>
        <span class="panel-badge ${(d.tasksBreakdown?.revision||0)+(d.tasksBreakdown?.qc||0)>0?'amber':''}">${d.tasksTotal||0} active</span>
      </div>`;
  if(activeTask.length){
    for(const s of activeTask){
      const cnt = tCounts[s]||0, pct = Math.round((cnt/tsMax)*100), col = tsColor(s);
      h += `<div class="cs-row">
        <span class="cs-lbl">${esc(s)}</span>
        <div class="cs-track"><div class="cs-fill" style="width:${pct}%;background:${col};opacity:.85;"></div></div>
        <span class="cs-count" style="color:${col};">${cnt}</span>
      </div>`;
    }
  } else { h += `<div class="empty">No active tasks</div>`; }
  return h + `</div></div>`;
}

// ── SECTION: CRM ─────────────────────────────────────────────────────────────
function renderCRM(pipe, deals){
  const potVal = deals.potentialValue || pipe.leadsPotentialValue || deals.buildingValue || 0;
  function funnelHTML(stages, order, lostLabel){
    const maxN = Math.max(...order.map(k => stages[k]||0), 1);
    return order.map(key => {
      const n = stages[key]||0, pct = Math.max(Math.round((n/maxN)*100), n>0?5:0);
      return `<div class="f-row">
        <span class="f-lbl">${esc(key)}</span>
        <div class="f-bg"><div class="f-fill${lostLabel&&key===lostLabel?' lost':''}" style="width:${pct}%;"></div></div>
        <span class="f-n">${n||''}</span>
      </div>`;
    }).join('');
  }
  const lS = pipe.stages||{}, lO = pipe.stageOrder||Object.keys(lS);
  const dS = deals.stages||{}, dO = deals.stageOrder||Object.keys(dS);

  return `<div class="sec-lbl">Revenue</div>
  <div class="g4">
    <div class="card stat">
      <div class="s-dot" style="background:var(--g);"></div>
      <span class="s-lbl">Active Leads</span>
      <div class="s-val">${pipe.totalActive ?? '—'}</div>
      <div class="s-sub">In lead pipeline</div>
    </div>
    <div class="card stat">
      <div class="s-dot" style="background:var(--g);"></div>
      <span class="s-lbl">Active Deals</span>
      <div class="s-val">${deals.activeDealsCount ?? '—'}</div>
      <div class="s-sub">${deals.wonValue ? fmtRM(deals.wonValue) : 'In deal pipeline'}</div>
    </div>
    <div class="card stat">
      <div class="s-dot" style="background:var(--g);"></div>
      <span class="s-lbl">Potential Value</span>
      <div class="s-val" style="font-size:${potVal>=1000?'22px':'30px'};">${potVal?fmtRM(potVal):'—'}</div>
      <div class="s-sub">Pre-win deal value</div>
    </div>
    <div class="card stat">
      <div class="s-dot" style="background:var(--g);"></div>
      <span class="s-lbl">Conv. Rate</span>
      <div class="s-val">${pipe.convRate != null ? pipe.convRate+'%' : '—'}</div>
      <div class="s-sub">Leads this month</div>
    </div>
  </div>
  <div class="mid-row">
    <div class="card panel">
      <div class="panel-hdr">
        <span class="panel-title">Lead Pipeline</span>
        <span class="panel-badge">${pipe.totalActive||0} leads</span>
      </div>
      ${funnelHTML(lS, lO, pipe.lostLabel)}
    </div>
    <div class="card panel">
      <div class="panel-hdr">
        <span class="panel-title">Deal Pipeline</span>
        <span class="panel-badge">${deals.activeDealsCount||0} deals</span>
      </div>
      ${funnelHTML(dS, dO, deals.lostLabel)}
    </div>
  </div>`;
}

// ── SECTION: CRM-LOG ─────────────────────────────────────────────────────────
function renderCRMLog(pipe, deals){
  const wonDeals  = deals.wonDeals  || [], lostLeads = pipe.lostLeads  || [], lostDeals = deals.lostDeals || [];
  const lostTotal = lostLeads.length + lostDeals.length;
  const totalClosed = wonDeals.length + lostDeals.length;
  const winRate   = totalClosed > 0 ? Math.round((wonDeals.length/totalClosed)*100) : null;
  const wonValue  = wonDeals.reduce((s,d) => s+(d.value||0), 0);
  const rCounts   = {};
  for(const d of [...lostLeads, ...lostDeals]){
    if(!d.lostReason) continue;
    d.lostReason.split(',').map(s=>s.trim()).filter(Boolean).forEach(r => rCounts[r]=(rCounts[r]||0)+1);
  }
  const topReason = Object.entries(rCounts).sort((a,b)=>b[1]-a[1])[0];

  window._wlData = {
    won:  wonDeals.slice(0,8),
    lost: [...lostDeals.map(d=>({...d,_t:'deal'})), ...lostLeads.map(d=>({...d,_t:'lead'}))].slice(0,8),
  };

  // Skip "Revenue" label if crm already added it
  const secLabel = _sections.includes('crm') ? '' : `<div class="sec-lbl">Revenue</div>`;

  return `${secLabel}
  <div class="g4">
    <div class="card stat">
      <div class="s-dot" style="background:var(--g);"></div>
      <span class="s-lbl">Won Deals</span>
      <div class="s-val">${wonDeals.length}</div>
      <div class="s-sub">${wonValue ? fmtRM(wonValue) : 'All time'}</div>
    </div>
    <div class="card stat">
      <div class="s-dot" style="background:var(--orange);"></div>
      <span class="s-lbl">Lost</span>
      <div class="s-val orange">${lostTotal}</div>
      <div class="s-sub">${lostLeads.length} leads · ${lostDeals.length} deals</div>
    </div>
    <div class="card stat">
      <div class="s-dot" style="background:var(--g);"></div>
      <span class="s-lbl">Win Rate</span>
      <div class="s-val">${winRate != null ? winRate+'%' : '—'}</div>
      <div class="s-sub">Won vs total closed</div>
    </div>
    <div class="card stat">
      <div class="s-dot" style="background:${topReason?'var(--orange)':'var(--g)'};"></div>
      <span class="s-lbl">Top Lost Reason</span>
      <div style="font-size:14px;font-weight:900;color:var(--orange);line-height:1.3;margin-bottom:5px;">${topReason?esc(topReason[0]):'—'}</div>
      <div class="s-sub">${topReason?topReason[1]+' occurrence'+(topReason[1]>1?'s':''):'No data'}</div>
    </div>
  </div>
  <div class="full-row card panel">
    <div class="panel-hdr" style="margin-bottom:0;">
      <span class="panel-title">Win / Loss Log</span>
    </div>
    <div style="margin-top:14px;">
      <div class="wl-tabs">
        <button class="wl-tab won" id="wlt-won" onclick="wlTab('won')">Won (${window._wlData.won.length})</button>
        <button class="wl-tab"    id="wlt-lost" onclick="wlTab('lost')">Lost (${window._wlData.lost.length})</button>
      </div>
      <div id="wl-list"></div>
    </div>
  </div>`;
}

let _wlTab = 'won';
window.wlTab = function(t){
  _wlTab = t;
  document.getElementById('wlt-won').className  = 'wl-tab' + (t==='won'  ? ' won'  : '');
  document.getElementById('wlt-lost').className = 'wl-tab' + (t==='lost' ? ' lost' : '');
  renderWLList();
};
function renderWLList(){
  const el = document.getElementById('wl-list'); if(!el) return;
  const rows = (window._wlData||{})[_wlTab] || [];
  if(!rows.length){ el.innerHTML = `<div class="empty">No ${_wlTab} entries</div>`; return; }
  el.innerHTML = rows.map(d => {
    const click = d.url ? `style="cursor:pointer;" onclick="window.open('${d.url}','_blank')"` : '';
    const badge = _wlTab === 'won'
      ? `<span class="wl-badge wl-badge-won">${esc(d.stage||'Won')}</span>`
      : `<span class="wl-badge wl-badge-lost">${d._t==='lead'?'Lead':'Deal'}</span>`;
    return `<div class="wl-item" ${click}><span class="wl-name">${esc(d.name)}</span>${badge}<span class="wl-val">${d.value?fmtRM(d.value):''}</span></div>`;
  }).join('');
}

// ── EDIT DRAWER ───────────────────────────────────────────────────────────────
function openEdit(){
  const list = document.getElementById('sect-list');
  // Build items: active sections first (in order), then inactive ones
  const activeSecs = _sections.filter(id => SECTIONS_CATALOG.find(s => s.id === id));
  const inactiveSecs = SECTIONS_CATALOG.filter(s => !_sections.includes(s.id));
  const ordered = [
    ...activeSecs.map(id => SECTIONS_CATALOG.find(s => s.id === id)),
    ...inactiveSecs,
  ];
  list.innerHTML = ordered.map(s => `
    <div class="sect-item" data-id="${s.id}">
      <span class="drag-handle">⠿</span>
      <div class="sect-toggle">
        <input type="checkbox" id="chk-${s.id}" ${_sections.includes(s.id) ? 'checked' : ''}>
      </div>
      <div class="sect-info">
        <div class="sect-name">${s.label}</div>
        <div class="sect-desc">${s.desc}</div>
      </div>
      <span class="sect-os">${s.os}</span>
    </div>`).join('');

  // Init SortableJS
  if(window.Sortable){
    new Sortable(list, {
      animation: 150,
      handle: '.drag-handle',
      ghostClass: 'sortable-ghost',
      chosenClass: 'sortable-chosen',
    });
  }
  document.getElementById('save-msg').style.display = 'none';
  document.getElementById('edit-overlay').style.display = 'flex';
}

function closeEdit(e){
  if(e && e.target !== document.getElementById('edit-overlay')) return;
  document.getElementById('edit-overlay').style.display = 'none';
}

async function saveConfig(){
  const btn = document.getElementById('btn-save');
  const msg = document.getElementById('save-msg');
  btn.disabled = true; btn.textContent = 'Saving…';

  // Collect ordered + checked sections
  const items = document.querySelectorAll('#sect-list .sect-item');
  const sections = [];
  items.forEach(item => {
    const id  = item.dataset.id;
    const chk = item.querySelector('input[type=checkbox]');
    if(chk && chk.checked) sections.push(id);
  });

  if(!sections.length){
    msg.textContent = 'Select at least one section.';
    msg.className = 'save-msg err'; msg.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Save Changes';
    return;
  }

  try{
    const r = await fetch('/api/executive/config?token='+_tok, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ sections }),
    });
    const j = await r.json();
    if(!r.ok) throw new Error(j.error || 'Save failed');
    _sections = j.sections;
    msg.textContent = '✓ Saved! Reloading…';
    msg.className = 'save-msg ok'; msg.style.display = 'block';
    setTimeout(() => { document.getElementById('edit-overlay').style.display = 'none'; load(); }, 1200);
  } catch(e){
    msg.textContent = e.message;
    msg.className = 'save-msg err'; msg.style.display = 'block';
  } finally {
    btn.disabled = false; btn.textContent = 'Save Changes';
  }
}

// ── TAB SWITCHING ────────────────────────────────────────────────────────────
window.switchTab = function(id){
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === id));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.toggle('active', p.dataset.tab === id));
  // Ensure win/loss list renders when revenue tab is first opened
  if(id === 'revenue' && _sections.includes('crm-log')) renderWLList();
};

// ── LOAD ─────────────────────────────────────────────────────────────────────
async function load(){
  document.getElementById('rb').textContent = '↻ Refreshing…';

  try{
    // Step 1: resolve sections — role preset overrides saved config
    if(_role && ROLE_PRESETS[_role]){
      _sections = ROLE_PRESETS[_role];
    } else {
      // No role: fetch config from API (falls back to default on error)
      try{
        const cr = await fetch('/api/executive/config?token='+_tok);
        if(cr.ok){
          const cj = await cr.json();
          if(Array.isArray(cj.sections) && cj.sections.length) _sections = cj.sections;
        }
      } catch(e){ /* use default */ }
    }

    // Step 2: fetch data for active sections (parallel, deduplicated)
    const needCampaign = _sections.includes('campaign');
    const needContent  = _sections.includes('content');
    const needRevenue  = _sections.includes('crm') || _sections.includes('crm-log');

    const fetchMap = {};
    if(needCampaign) fetchMap.campaign = fetch('/api/creaitors/campaign-stats?token='+_tok).then(r=>r.json());
    if(needContent)  fetchMap.content  = fetch('/api/creaitors/content-stats?token='+_tok).then(r=>r.json());
    if(needRevenue){
      fetchMap.pipe  = fetch('/api/data/pipeline?token='+_tok).then(r=>r.json());
      fetchMap.deals = fetch('/api/data/deals?token='+_tok).then(r=>r.json());
    }

    const keys    = Object.keys(fetchMap);
    const results = await Promise.all(keys.map(k => fetchMap[k]));
    const data    = {};
    keys.forEach((k,i) => data[k] = results[i]);

    // Step 3: render sections into tab groups
    // crm + crm-log share one "Revenue" tab; campaign and content each get their own
    const sectionHTML = {};
    for(const sec of _sections){
      if(sec === 'campaign' && data.campaign)           sectionHTML.campaign  = renderCampaign(data.campaign);
      if(sec === 'content'  && data.content)            sectionHTML.content   = renderContent(data.content);
      if(sec === 'crm'      && data.pipe && data.deals) sectionHTML.crm       = renderCRM(data.pipe, data.deals);
      if(sec === 'crm-log'  && data.pipe && data.deals) sectionHTML['crm-log']= renderCRMLog(data.pipe, data.deals);
    }

    // Build tab groups (crm + crm-log collapse into one Revenue tab)
    const TAB_DEFS = [
      { id: 'campaign', label: 'Campaigns', secs: ['campaign'] },
      { id: 'content',  label: 'Content',   secs: ['content']  },
      { id: 'revenue',  label: 'Revenue',   secs: ['crm', 'crm-log'] },
    ];
    const tabs = TAB_DEFS.filter(t => t.secs.some(s => sectionHTML[s]));

    let html = '';
    if(tabs.length > 1){
      html += `<div class="tab-bar">` +
        tabs.map((t,i) => `<button class="tab-btn${i===0?' active':''}" data-tab="${t.id}" onclick="switchTab('${t.id}')">${t.label}</button>`).join('') +
        `</div>`;
      for(const [i,t] of tabs.entries()){
        html += `<div class="tab-pane${i===0?' active':''}" data-tab="${t.id}">`;
        for(const sec of t.secs){ if(sectionHTML[sec]) html += sectionHTML[sec]; }
        html += `</div>`;
      }
    } else {
      // Single section — no tabs needed, render flat
      for(const sec of _sections){ if(sectionHTML[sec]) html += sectionHTML[sec]; }
    }

    document.getElementById('dash').innerHTML = html || `<div class="empty" style="margin-top:20px;">No sections configured.<br><br>Open <strong>?edit=1</strong> to configure.</div>`;
    document.getElementById('ts').textContent = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});

    if(_sections.includes('crm-log')) renderWLList();

    // Open edit drawer if ?edit=1
    if(_edit) openEdit();

  } catch(e){
    document.getElementById('dash').innerHTML = `
      <div class="loading">
        <div style="font-size:12px;color:var(--red);font-weight:700;">Failed to load</div>
        <div style="font-size:10px;color:rgba(255,255,255,.25);margin-top:4px;">${esc(e.message)}</div>
      </div>`;
  } finally {
    document.getElementById('rb').textContent = '↻ Refresh';
  }
}

load();
setInterval(load, 600000);
</script>
