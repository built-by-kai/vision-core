<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Creaitors — Executive</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}html{height:100%;}
body{font-family:'Satoshi',-apple-system,sans-serif;padding:14px 14px 24px;background:#191919;color:#fff;overflow-y:auto;overflow-x:hidden;}
:root{--g:#AAFF00;--gm:rgba(170,255,0,.12);--gb:rgba(170,255,0,.18);--amber:#FBBF24;--red:#FF6B6B;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:999px;}

.card{background:#1E1E1E;border:1px solid rgba(255,255,255,.06);border-radius:14px;transition:border-color .2s;}
.card:hover{border-color:rgba(170,255,0,.1);}
.btn{background:#252525;border:1px solid rgba(255,255,255,.09);color:rgba(255,255,255,.45);font-family:'Satoshi',sans-serif;font-size:11px;font-weight:700;padding:5px 11px;border-radius:7px;cursor:pointer;transition:all .2s;}
.btn:hover{border-color:var(--gb);color:var(--g);}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px;}
.eyebrow{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.22);margin-bottom:2px;}
.h-title{font-size:20px;font-weight:900;color:#fff;letter-spacing:-.03em;}
.ts{font-size:10px;font-weight:500;color:rgba(255,255,255,.18);}
.h-right{display:flex;align-items:center;gap:6px;}

/* Stat row */
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
@media(max-width:640px){.g4{grid-template-columns:repeat(2,1fr);}}
.stat{padding:16px 18px;position:relative;overflow:hidden;}
.s-dot{position:absolute;top:13px;right:13px;width:6px;height:6px;border-radius:50%;opacity:.6;}
.s-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.5);margin-bottom:10px;display:block;}
.s-val{font-size:30px;font-weight:900;letter-spacing:-1.5px;line-height:1;color:var(--g);}
.s-val.red{color:var(--red);}
.s-val.amber{color:var(--amber);}
.s-sub{font-size:10px;font-weight:500;color:rgba(255,255,255,.35);margin-top:6px;}

/* Main layout */
.sec-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.22);margin:16px 0 8px;}
.mid-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
@media(max-width:680px){.mid-row{grid-template-columns:1fr;}}

/* Panel */
.panel{padding:20px 22px;}
.panel-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px;}
.panel-title{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.85);}
.panel-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px;background:var(--gm);color:var(--g);border:1px solid var(--gb);}
.panel-badge.red{background:rgba(255,107,107,.12);color:var(--red);border-color:rgba(255,107,107,.2);}
.panel-badge.amber{background:rgba(251,191,36,.12);color:var(--amber);border-color:rgba(251,191,36,.2);}

/* Campaign list */
.camp-scroll{max-height:260px;overflow-y:auto;padding-right:2px;}
.camp-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.04);}
.camp-item:last-child{border-bottom:none;}
.camp-info{flex:1;min-width:0;}
.camp-name{font-size:12px;font-weight:700;color:rgba(255,255,255,.8);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.camp-dates{font-size:10px;font-weight:600;color:rgba(255,255,255,.3);margin-top:2px;}
.camp-delivs{font-size:10px;font-weight:600;color:rgba(255,255,255,.35);margin-top:2px;}
.camp-delivs .dl{color:rgba(255,255,255,.55);font-weight:700;}
.camp-type{font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;background:var(--gm);color:var(--g);border:1px solid rgba(170,255,0,.15);white-space:nowrap;text-transform:uppercase;letter-spacing:.05em;flex-shrink:0;}
.camp-bar-wrap{width:52px;flex-shrink:0;}
.camp-track{background:rgba(255,255,255,.05);border-radius:999px;height:5px;overflow:hidden;}
.camp-fill{height:5px;border-radius:999px;}
.camp-pct{font-size:12px;font-weight:900;min-width:34px;text-align:right;flex-shrink:0;letter-spacing:-.5px;}
.empty{padding:24px;text-align:center;font-size:12px;color:rgba(255,255,255,.2);}

/* Task status list */
.task-status-list{display:flex;flex-direction:column;gap:12px;}
.ts-row{display:flex;align-items:center;gap:10px;}
.ts-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.ts-label{font-size:11px;font-weight:700;color:rgba(255,255,255,.45);flex:1;}
.ts-bar-wrap{width:80px;flex-shrink:0;}
.ts-track{background:rgba(255,255,255,.05);border-radius:999px;height:4px;overflow:hidden;}
.ts-fill{height:4px;border-radius:999px;transition:width .5s cubic-bezier(.4,0,.2,1);}
.ts-count{font-size:14px;font-weight:900;letter-spacing:-.5px;min-width:22px;text-align:right;color:#fff;flex-shrink:0;}

/* Divider in task panel */
.task-divider{height:1px;background:rgba(255,255,255,.05);margin:16px 0;}

/* Due week mini stat */
.due-mini{display:flex;align-items:baseline;gap:6px;margin-bottom:16px;}
.due-mini-val{font-size:32px;font-weight:900;letter-spacing:-1.5px;color:var(--amber);}
.due-mini-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.35);}

/* Loading */
.loading{display:flex;align-items:center;justify-content:center;min-height:160px;flex-direction:column;gap:10px;}
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.06);border-top-color:var(--g);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:11px;color:rgba(255,255,255,.25);font-weight:500;}
</style>
</head>
<body>

<div class="header">
  <div>
    <p class="eyebrow" id="eyebrow">OPXIO.IO · CREAITORS</p>
    <h1 class="h-title">Executive View</h1>
  </div>
  <div class="h-right">
    <span class="ts" id="ts"></span>
    <button class="btn" id="rb" onclick="load()">↻ Refresh</button>
  </div>
</div>

<div id="dash">
  <div class="loading"><div class="spinner"></div><div class="loading-text">Loading</div></div>
</div>

<script>
const _tok = new URLSearchParams(location.search).get('token') || '';

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function fmtDate(d){
  if(!d) return null;
  return new Date(d+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short'});
}

function pctColor(p){
  if(p >= 80) return '#AAFF00';
  if(p >= 50) return '#FBBF24';
  return '#FF6B6B';
}

function render(camp, content){
  const remaining = camp.remainingDeliverables || 0;
  const attn      = content.needsAttention || 0;
  const attnBreak = content.attentionBreakdown || {};

  // ── Stat row ──
  let html = `<div class="g4">
    <div class="card stat">
      <div class="s-dot" style="background:var(--g);"></div>
      <span class="s-lbl">Active Campaigns</span>
      <div class="s-val">${camp.activeCampaigns ?? '—'}</div>
      <div class="s-sub">${remaining > 0 ? remaining + ' deliverables left' : 'All delivered'}</div>
    </div>
    <div class="card stat">
      <div class="s-dot" style="background:var(--g);"></div>
      <span class="s-lbl">Avg Completion</span>
      <div class="s-val">${camp.avgCompletion != null ? camp.avgCompletion + '%' : '—'}</div>
      <div class="s-sub">${camp.completedDeliverables || 0} of ${camp.totalDeliverables || 0} done</div>
    </div>
    <div class="card stat">
      <div class="s-dot" style="background:var(--g);"></div>
      <span class="s-lbl">Active Tasks</span>
      <div class="s-val">${content.tasksTotal ?? '—'}</div>
      <div class="s-sub">${content.dueThisWeek || 0} due this week</div>
    </div>
    <div class="card stat">
      <div class="s-dot" style="background:${attn > 0 ? 'var(--red)' : 'var(--g)'};"></div>
      <span class="s-lbl">Needs Attention</span>
      <div class="s-val ${attn > 0 ? 'red' : ''}">${attn}</div>
      <div class="s-sub">${attn > 0 ? [
        attnBreak.overdue > 0 ? attnBreak.overdue + ' overdue' : '',
        attnBreak.revision > 0 ? attnBreak.revision + ' revision' : '',
        attnBreak.qc > 0 ? attnBreak.qc + ' QC' : '',
      ].filter(Boolean).join(' · ') : 'All clear'}</div>
    </div>
  </div>`;

  html += `<div class="sec-lbl">Breakdown</div>`;
  html += `<div class="mid-row">`;

  // ── Campaign list (LEFT) ──
  html += `<div class="card panel">
    <div class="panel-hdr">
      <span class="panel-title">Campaign Progress</span>
      <span class="panel-badge">${camp.activeCampaigns || 0} active</span>
    </div>`;

  if(camp.campaignDetails && camp.campaignDetails.length > 0){
    html += `<div class="camp-scroll">`;
    for(const c of camp.campaignDetails){
      const col    = pctColor(c.pct);
      const start  = fmtDate(c.startDate);
      const end    = fmtDate(c.endDate);
      const dateStr = start && end ? `${start} – ${end}` : start || end || '';
      const remC   = (c.planned || 0) - (c.done || 0);
      const TYPE_LABELS = {videos:'Videos',posters:'Posters',live:'Live',kol:'KOL'};
      const cb2 = c.contentBreakdown || {};
      const typeParts = Object.entries(TYPE_LABELS)
        .filter(([k]) => (cb2[k]?.planned || 0) > 0)
        .map(([k,lbl]) => `<span class="dl">${cb2[k].planned} ${lbl}</span>`);
      const statusStr = remC > 0
        ? `<span style="color:var(--red);">${remC} left</span>`
        : `<span style="color:var(--g);">All done</span>`;
      const delivStr = c.planned > 0
        ? (typeParts.length ? typeParts.join(' · ') + '  ·  ' + statusStr : statusStr)
        : '';
      html += `<div class="camp-item">
        <div class="camp-info">
          <div class="camp-name" title="${esc(c.name)}">${esc(c.name)}</div>
          ${dateStr ? `<div class="camp-dates">${esc(dateStr)}</div>` : ''}
          ${delivStr ? `<div class="camp-delivs">${delivStr}</div>` : ''}
        </div>
        <span class="camp-type">${esc(c.type||'')}</span>
        <div class="camp-bar-wrap">
          <div class="camp-track"><div class="camp-fill" style="width:${Math.max(c.pct>0?4:0,c.pct)}%;background:${col};"></div></div>
        </div>
        <span class="camp-pct" style="color:${col};">${c.pct}%</span>
      </div>`;
    }
    html += `</div>`;
  } else {
    html += `<div class="empty">No active campaigns</div>`;
  }
  html += `</div>`;

  // ── Task status (RIGHT) ──
  const tb = content.tasksBreakdown || {};
  const taskStatuses = [
    { label: 'In Progress', count: tb.inProgress || 0, color: '#AAFF00' },
    { label: 'Waiting',     count: tb.waiting    || 0, color: '#FBBF24' },
    { label: 'QC Review',   count: tb.qc         || 0, color: '#60A5FA' },
    { label: 'Revision',    count: tb.revision   || 0, color: '#FF6B6B' },
  ];
  const maxCount = Math.max(...taskStatuses.map(s => s.count), 1);
  const attnBadge = attn > 0
    ? `<span class="panel-badge red">${attn} flagged</span>`
    : `<span class="panel-badge">All clear</span>`;

  html += `<div class="card panel">
    <div class="panel-hdr">
      <span class="panel-title">Task Overview</span>
      ${attnBadge}
    </div>
    <div class="due-mini">
      <span class="due-mini-val">${content.dueThisWeek || 0}</span>
      <span class="due-mini-lbl">Due This Week</span>
    </div>
    <div class="task-divider"></div>
    <div class="task-status-list">`;

  for(const s of taskStatuses){
    const pct = Math.round((s.count / maxCount) * 100);
    html += `<div class="ts-row">
      <div class="ts-dot" style="background:${s.color};opacity:.7;"></div>
      <span class="ts-label">${s.label}</span>
      <div class="ts-bar-wrap">
        <div class="ts-track"><div class="ts-fill" style="width:${pct}%;background:${s.color};opacity:.5;"></div></div>
      </div>
      <span class="ts-count" style="color:${s.count > 0 ? s.color : 'rgba(255,255,255,.25)'};">${s.count}</span>
    </div>`;
  }

  html += `</div></div>`; // task-status-list + panel
  html += `</div>`; // mid-row

  document.getElementById('dash').innerHTML = html;
  document.getElementById('ts').textContent = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
}

async function load(){
  document.getElementById('rb').textContent = '↻ Refreshing…';
  try{
    const [r1, r2] = await Promise.all([
      fetch('/api/creaitors/campaign-stats?token='+_tok),
      fetch('/api/creaitors/content-stats?token='+_tok),
    ]);
    if(!r1.ok) throw new Error('campaign-stats '+r1.status);
    if(!r2.ok) throw new Error('content-stats '+r2.status);
    render(await r1.json(), await r2.json());
  } catch(e){
    document.getElementById('dash').innerHTML = `
      <div class="loading">
        <div style="font-size:12px;color:#FF6B6B;font-weight:700;">Failed to load</div>
        <div style="font-size:10px;color:rgba(255,255,255,.25);margin-top:4px;">${esc(e.message)}</div>
      </div>`;
  } finally{
    document.getElementById('rb').textContent = '↻ Refresh';
  }
}

// Set client name from ?client= param
const _client = new URLSearchParams(location.search).get('client') || 'Creaitors';
document.getElementById('eyebrow').textContent = 'OPXIO.IO · ' + _client.toUpperCase();

load();
setInterval(load, 600000);
</script>

<div style="text-align:center;padding:20px 0 4px;font-size:9px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.1);">
  Widgets by Opxio.io
</div>

</body>
</html>
