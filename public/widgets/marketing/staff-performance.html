<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Opxio — Staff Performance</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}html{height:100%;}
body{font-family:'Satoshi',-apple-system,sans-serif;padding:14px 14px 24px;background:#191919;color:#fff;overflow-y:auto;height:100%;}
:root{--g:#AAFF00;--gm:rgba(170,255,0,.12);--gb:rgba(170,255,0,.18);--amber:#FBBF24;--red:#FF6B6B;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:999px;}

.card{background:#1E1E1E;border:1px solid rgba(255,255,255,.06);border-radius:14px;transition:border-color .2s;}
.card:hover{border-color:rgba(170,255,0,.1);}
.btn{background:#252525;border:1px solid rgba(255,255,255,.09);color:rgba(255,255,255,.45);font-family:'Satoshi',sans-serif;font-size:11px;font-weight:700;padding:5px 11px;border-radius:7px;cursor:pointer;transition:all .2s;}
.btn:hover{border-color:var(--gb);color:var(--g);}
.btn.active{background:var(--gm);border-color:var(--gb);color:var(--g);}

.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px;}
.h-right{display:flex;align-items:center;gap:6px;}
.eyebrow{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.22);margin-bottom:2px;}
.h-title{font-size:20px;font-weight:900;color:#fff;letter-spacing:-.03em;}
.ts{font-size:10px;font-weight:500;color:rgba(255,255,255,.18);}

/* Tab strip */
.tabs{display:flex;gap:4px;background:rgba(255,255,255,.04);border-radius:10px;padding:4px;width:fit-content;margin-bottom:16px;}
.tab{font-family:'Satoshi',sans-serif;font-size:11px;font-weight:700;padding:6px 14px;border-radius:7px;border:none;background:transparent;color:rgba(255,255,255,.3);cursor:pointer;transition:all .2s;}
.tab:hover{color:rgba(255,255,255,.6);}
.tab.active{background:var(--gm);color:var(--g);border:1px solid var(--gb);}

.period-lbl{font-size:10px;font-weight:600;color:rgba(255,255,255,.2);margin-bottom:14px;}

/* Employee grid */
.emp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
@media(max-width:860px){.emp-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:520px){.emp-grid{grid-template-columns:1fr;}}

.emp-card{padding:20px;}
.emp-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;}
.emp-name{font-size:14px;font-weight:900;letter-spacing:-.02em;color:#fff;}
.emp-role{font-size:10px;font-weight:600;color:rgba(255,255,255,.3);margin-top:2px;}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.dot-active{background:#AAFF00;box-shadow:0 0 6px rgba(170,255,0,.4);}
.dot-inactive{background:#FF6B6B;}
.dot-leave{background:#FBBF24;box-shadow:0 0 6px rgba(251,191,36,.4);}

/* Stat mini grid */
.mini-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.mini-item{display:flex;flex-direction:column;gap:3px;}
.mini-val{font-size:26px;font-weight:900;letter-spacing:-1.5px;line-height:1;color:var(--g);}
.mini-val.amber{color:var(--amber);}
.mini-val.blue{color:#60A5FA;}
.mini-val.purple{color:#C084FC;}
.mini-val.muted{color:rgba(255,255,255,.3);}
.mini-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:rgba(255,255,255,.3);}

/* Alert badges */
.alert-row{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap;}
.badge{font-size:9px;font-weight:700;padding:3px 8px;border-radius:5px;}
.badge-overdue{background:rgba(255,107,107,.12);color:#FF6B6B;}
.badge-today{background:rgba(96,165,250,.12);color:#60A5FA;}

/* Progress bar inside card */
.perf-bar-wrap{margin-top:14px;}
.perf-bar-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:rgba(255,255,255,.25);margin-bottom:6px;}
.perf-track{background:rgba(255,255,255,.05);border-radius:999px;height:5px;overflow:hidden;}
.perf-fill{height:5px;border-radius:999px;background:var(--g);transition:width .5s cubic-bezier(.4,0,.2,1);}

.empty-card{padding:20px;color:rgba(255,255,255,.2);font-size:12px;font-weight:600;}

.loading{display:flex;align-items:center;justify-content:center;min-height:120px;flex-direction:column;gap:10px;}
.spinner{width:18px;height:18px;border:2px solid rgba(170,255,0,.15);border-top-color:var(--g);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:11px;color:rgba(255,255,255,.25);font-weight:600;}
</style>
</head>
<body>

<div class="header">
  <div>
    <p class="eyebrow">OPXIO · Marketing OS</p>
    <h1 class="h-title">Staff Performance</h1>
  </div>
  <div class="h-right">
    <span class="ts" id="ts"></span>
    <button class="btn" id="rb" onclick="loadData()">↻ Refresh</button>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('month')">This Month</button>
  <button class="tab" onclick="switchTab('week')">This Week</button>
  <button class="tab" onclick="switchTab('all')">All Time</button>
</div>
<div class="period-lbl" id="period-lbl"></div>

<div id="dash">
  <div class="loading"><div class="spinner"></div><div class="loading-text">Loading</div></div>
</div>

<script>
const _tok = new URLSearchParams(location.search).get('token') || '';
let _tab = 'month';
let _data = null;

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function dotClass(s){
  if(s==='Active')return'dot-active';
  if(s==='Inactive')return'dot-inactive';
  return'dot-leave';
}

function renderCard(emp){
  const role = [emp.role, emp.dept].filter(Boolean).join(' · ') || '';
  const hdr = `<div class="emp-hdr">
    <div>
      <div class="emp-name">${esc(emp.name)}</div>
      ${role ? `<div class="emp-role">${esc(role)}</div>` : ''}
    </div>
    <div class="status-dot ${dotClass(emp.status)}"></div>
  </div>`;

  if(_tab === 'month'){
    const m = emp.month || {};
    const done = m.done || 0;
    const started = m.started || 0;
    const due = m.due || 0;
    const hrs = m.hrs || 0;
    const hasActivity = done + started + due > 0;
    if(!hasActivity) return `<div class="card emp-card">${hdr}<div class="empty-card">No activity this month</div></div>`;

    // completion bar — how done vs due
    const total = done + started;
    const pct = total > 0 ? Math.min(Math.round((done / total) * 100), 100) : 0;

    return `<div class="card emp-card">${hdr}
      <div class="mini-grid">
        <div class="mini-item"><div class="mini-val">${done}</div><div class="mini-lbl">Done</div></div>
        <div class="mini-item"><div class="mini-val amber">${started}</div><div class="mini-lbl">In Progress</div></div>
        <div class="mini-item"><div class="mini-val blue">${due}</div><div class="mini-lbl">Due</div></div>
        <div class="mini-item"><div class="mini-val purple">${hrs}h</div><div class="mini-lbl">Hours</div></div>
      </div>
      <div class="perf-bar-wrap">
        <div class="perf-bar-lbl">Completion — ${pct}%</div>
        <div class="perf-track"><div class="perf-fill" style="width:${pct}%;"></div></div>
      </div>
    </div>`;
  }

  if(_tab === 'week'){
    const w = emp.week || {};
    const done = w.done || 0;
    const started = w.started || 0;
    const due = w.due || 0;
    const hrs = w.hrs || 0;
    const hasActivity = done + started + due > 0;
    if(!hasActivity) return `<div class="card emp-card">${hdr}<div class="empty-card">No activity this week</div></div>`;

    const total = done + started;
    const pct = total > 0 ? Math.min(Math.round((done/total)*100),100) : 0;

    return `<div class="card emp-card">${hdr}
      <div class="mini-grid">
        <div class="mini-item"><div class="mini-val">${done}</div><div class="mini-lbl">Done</div></div>
        <div class="mini-item"><div class="mini-val amber">${started}</div><div class="mini-lbl">In Progress</div></div>
        <div class="mini-item"><div class="mini-val blue">${due}</div><div class="mini-lbl">Due</div></div>
        <div class="mini-item"><div class="mini-val purple">${hrs}h</div><div class="mini-lbl">Hours</div></div>
      </div>
      <div class="perf-bar-wrap">
        <div class="perf-bar-lbl">Completion — ${pct}%</div>
        <div class="perf-track"><div class="perf-fill" style="width:${pct}%;"></div></div>
      </div>
    </div>`;
  }

  // All time
  const s = emp.stats || {};
  if(s.total === 0) return `<div class="card emp-card">${hdr}<div class="empty-card">No tasks assigned yet</div></div>`;

  const pct = s.total > 0 ? Math.min(Math.round((s.done/s.total)*100),100) : 0;
  let alerts = '';
  if(s.overdue > 0 || s.dueToday > 0){
    alerts = '<div class="alert-row">';
    if(s.overdue > 0) alerts += `<span class="badge badge-overdue">${s.overdue} overdue</span>`;
    if(s.dueToday > 0) alerts += `<span class="badge badge-today">${s.dueToday} due today</span>`;
    alerts += '</div>';
  }

  return `<div class="card emp-card">${hdr}
    <div class="mini-grid">
      <div class="mini-item"><div class="mini-val">${s.done}</div><div class="mini-lbl">Done</div></div>
      <div class="mini-item"><div class="mini-val amber">${s.inProgress}</div><div class="mini-lbl">In Progress</div></div>
      <div class="mini-item"><div class="mini-val blue">${s.pendingQC}</div><div class="mini-lbl">QC Pending</div></div>
      <div class="mini-item"><div class="mini-val purple">${s.totalHrs}h</div><div class="mini-lbl">Total Hours</div></div>
    </div>
    <div class="perf-bar-wrap">
      <div class="perf-bar-lbl">Completion — ${pct}%</div>
      <div class="perf-track"><div class="perf-fill" style="width:${pct}%;"></div></div>
    </div>
    ${alerts}
  </div>`;
}

function render(data){
  if(!data || !data.employees) return;

  // Period label
  const lbl = document.getElementById('period-lbl');
  if(_tab==='month' && data.monthLabel) lbl.textContent = data.monthLabel;
  else if(_tab==='week' && data.weekLabel) lbl.textContent = data.weekLabel;
  else lbl.textContent = '';

  if(!data.employees.length){
    document.getElementById('dash').innerHTML = '<div class="loading"><div style="font-size:12px;color:#FF6B6B;font-weight:700;">No staff data found</div></div>';
    return;
  }

  let html = '<div class="emp-grid">';
  for(const emp of data.employees) html += renderCard(emp);
  html += '</div>';
  document.getElementById('dash').innerHTML = html;

  const n = new Date();
  document.getElementById('ts').textContent = n.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
}

window.switchTab = function(tab){
  _tab = tab;
  document.querySelectorAll('.tab').forEach(el=>{
    el.classList.toggle('active', el.textContent.toLowerCase().includes(tab==='all'?'all':tab==='week'?'week':'month'));
  });
  if(_data) render(_data);
};

async function loadData(){
  document.getElementById('rb').textContent = '↻ Refreshing…';
  try{
    const r = await fetch('/api/marketing/employee-stats?token='+_tok);
    if(!r.ok) throw new Error('API '+r.status);
    _data = await r.json();
    render(_data);
  }catch(e){
    document.getElementById('dash').innerHTML = `<div class="loading">
      <div style="font-size:12px;color:#FF6B6B;font-weight:700;">Failed to load</div>
      <div style="font-size:10px;color:rgba(255,255,255,.25);margin-top:4px;">${esc(e.message)}</div>
    </div>`;
  }finally{
    document.getElementById('rb').textContent = '↻ Refresh';
  }
}

loadData();
setInterval(loadData, 600000);
</script>

<div style="text-align:center;padding:20px 0 4px;font-size:9px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.1);">Widgets by Opxio.io</div>
</body>
</html>
