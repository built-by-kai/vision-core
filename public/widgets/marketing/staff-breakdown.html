<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Opxio — Staff Breakdown</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}html{height:100%;}
body{font-family:'Satoshi',-apple-system,sans-serif;padding:14px 14px 20px;background:#191919;color:#fff;overflow-y:auto;}
:root{--g:#AAFF00;--gm:rgba(170,255,0,.12);--gb:rgba(170,255,0,.18);}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:999px;}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.eyebrow{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.2);margin-bottom:2px;}
.h-title{font-size:20px;font-weight:900;color:#fff;letter-spacing:-.03em;}
.h-right{display:flex;align-items:center;gap:6px;}
.ts{font-size:11px;color:rgba(255,255,255,.15);}
.btn{background:#252525;border:1px solid rgba(255,255,255,.09);color:rgba(255,255,255,.38);font-family:'Satoshi',sans-serif;font-size:11px;font-weight:700;padding:5px 12px;border-radius:6px;cursor:pointer;transition:all .18s;}
.btn:hover{border-color:var(--gb);color:var(--g);}

/* Main card */
.card{background:#1E1E1E;border:1px solid rgba(255,255,255,.06);border-radius:14px;overflow:hidden;}

/* Card header bar */
.card-hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 14px;border-bottom:1px solid rgba(255,255,255,.05);flex-wrap:wrap;gap:10px;}
.card-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.5);}
.card-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.period-lbl{font-size:12px;font-weight:600;color:rgba(255,255,255,.25);font-variant-numeric:tabular-nums;}

/* Tabs inside card */
.tabs{display:flex;gap:3px;background:rgba(255,255,255,.05);border-radius:8px;padding:3px;}
.tab{font-family:'Satoshi',sans-serif;font-size:12px;font-weight:700;padding:5px 13px;border-radius:6px;border:none;background:transparent;color:rgba(255,255,255,.28);cursor:pointer;transition:all .18s;}
.tab.active{background:var(--gm);color:var(--g);border:1px solid var(--gb);}

/* Column headers */
.col-hdr{display:grid;grid-template-columns:160px 1fr 1fr 1fr 1fr 72px 90px;align-items:center;padding:10px 20px;border-bottom:1px solid rgba(255,255,255,.05);gap:8px;}
.ch{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.25);text-align:center;}
.ch:first-child{text-align:left;}
.ch.accent{color:rgba(255,255,255,.35);}

/* Staff row */
.staff-row{display:grid;grid-template-columns:160px 1fr 1fr 1fr 1fr 72px 90px;align-items:center;padding:14px 20px;border-bottom:1px solid rgba(255,255,255,.04);gap:8px;transition:background .15s;}
.staff-row:last-child{border-bottom:none;}
.staff-row:hover{background:rgba(255,255,255,.02);}

/* Name cell */
.s-name{display:flex;align-items:center;gap:8px;min-width:0;}
.s-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.s-dot-on{background:#AAFF00;box-shadow:0 0 5px rgba(170,255,0,.5);}
.s-dot-off{background:#FF6B35;}
.s-dot-lv{background:#FBBF24;}
.s-label{font-size:14px;font-weight:800;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.s-role{font-size:11px;font-weight:600;color:rgba(255,255,255,.28);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* Type cell */
.type-cell{text-align:center;}
.type-num{font-size:20px;font-weight:900;letter-spacing:-.5px;line-height:1;}
.type-dur{font-size:11px;font-weight:600;color:rgba(255,255,255,.25);margin-top:3px;}

/* Total cell */
.total-cell{text-align:center;}
.total-num{font-size:24px;font-weight:900;letter-spacing:-1px;color:var(--g);line-height:1;}
.total-dur-val{font-size:13px;font-weight:700;line-height:1;}

/* Zero state */
.zero-num{color:rgba(255,255,255,.12);}

/* Empty */
.empty-row{padding:32px 20px;text-align:center;font-size:13px;color:rgba(255,255,255,.2);font-weight:600;}

/* Loading */
.loading{display:flex;align-items:center;justify-content:center;min-height:120px;flex-direction:column;gap:8px;}
.spinner{width:16px;height:16px;border:2px solid rgba(170,255,0,.1);border-top-color:var(--g);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:11px;color:rgba(255,255,255,.2);font-weight:600;}
</style>
</head>
<body>

<div class="header">
  <div>
    <p class="eyebrow">OPXIO · Marketing OS</p>
    <h1 class="h-title">Staff Task Breakdown</h1>
  </div>
  <div class="h-right">
    <span class="ts" id="ts"></span>
    <button class="btn" id="rb" onclick="loadData()">↻ Refresh</button>
  </div>
</div>

<div id="dash">
  <div class="loading"><div class="spinner"></div><div class="loading-text">Loading</div></div>
</div>

<script>
const _tok = new URLSearchParams(location.search).get('token') || '';
let _tab = 'week', _data = null;

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function fmtRange(label){
  if(!label) return '';
  return label.replace(/(\d{4})-(\d{2})-(\d{2})/g,(_,y,m,d)=>`${d}-${m}-${y}`);
}

const TYPES = [
  {key:'planning', label:'Planning', col:'var(--g)'},
  {key:'shooting', label:'Shooting', col:'var(--g)'},
  {key:'editing',  label:'Editing',  col:'var(--g)'},
  {key:'posting',  label:'Posting',  col:'var(--g)'},
];

function sdot(s){return s==='Active'?'s-dot-on':s==='Inactive'?'s-dot-off':'s-dot-lv';}

function render(data){
  if(!data?.employees) return;

  const periodText = _tab==='week' ? fmtRange(data.weekLabel||'') :
                     _tab==='month' ? (data.monthLabel||'') : '';

  // Sort: most done in this period first
  const emps = [...data.employees].sort((a,b)=>(b[_tab]?.total?.done||0)-(a[_tab]?.total?.done||0));

  const switchBtn = (tab, label) =>
    `<button class="tab${_tab===tab?' active':''}" data-tab="${tab}" onclick="switchTab('${tab}')">${label}</button>`;

  let html = `<div class="card">
    <div class="card-hdr">
      <span class="card-title">Task Completion by Staff</span>
      <div class="card-right">
        ${periodText ? `<span class="period-lbl">${esc(periodText)}</span>` : ''}
        <div class="tabs">
          ${switchBtn('week','This Week')}
          ${switchBtn('month','This Month')}
          ${switchBtn('all','All Time')}
        </div>
      </div>
    </div>
    <div class="col-hdr">
      <div class="ch">Staff</div>`;
  for(const t of TYPES) html += `<div class="ch" style="color:${t.col};opacity:.6;">${t.label}</div>`;
  html += `<div class="ch accent">Total</div><div class="ch accent">Time Spent</div></div>`;

  if(!emps.length){
    html += `<div class="empty-row">No staff data found</div>`;
  } else {
    for(const emp of emps){
      const d   = emp[_tab] || {};
      const tot = d.total  || {};
      const hasAny = tot.done > 0;

      html += `<div class="staff-row">
        <div class="s-name">
          <div class="s-dot ${sdot(emp.status)}"></div>
          <div style="min-width:0;">
            <div class="s-label">${esc(emp.name)}</div>
            ${emp.role?`<div class="s-role">${esc(emp.role)}</div>`:''}
          </div>
        </div>`;

      for(const t of TYPES){
        const td = d[t.key] || {};
        const z  = !td.done;
        html += `<div class="type-cell">
          <div class="type-num ${z?'zero-num':''}" style="${z?'':'color:'+t.col+';'}">${td.done||0}</div>
          ${td.duration&&!z ? `<div class="type-dur">${esc(td.duration)}</div>` : '<div class="type-dur">—</div>'}
        </div>`;
      }

      html += `<div class="total-cell">
        <div class="total-num" style="${hasAny?'':'color:rgba(255,255,255,.12);'}">${tot.done||0}</div>
      </div>
      <div class="total-cell">
        <div class="total-dur-val" style="color:${hasAny?'rgba(255,255,255,.55)':'rgba(255,255,255,.12)'};">
          ${tot.duration ? esc(tot.duration) : '—'}
        </div>
      </div>
      </div>`;
    }
  }

  html += `</div>`;
  document.getElementById('dash').innerHTML = html;
  document.getElementById('ts').textContent = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
}

window.switchTab = function(tab){
  _tab = tab;
  if(_data) render(_data);
};

async function loadData(){
  document.getElementById('rb').textContent = '↻ Refreshing…';
  try{
    const r = await fetch('/api/marketing/staff-breakdown?token='+_tok);
    if(!r.ok) throw new Error('API '+r.status);
    _data = await r.json();
    render(_data);
  }catch(e){
    document.getElementById('dash').innerHTML = `<div class="loading">
      <div style="font-size:11px;color:#FF6B35;font-weight:700;">Failed to load</div>
      <div style="font-size:9px;color:rgba(255,255,255,.2);margin-top:4px;">${esc(e.message)}</div>
    </div>`;
  }finally{
    document.getElementById('rb').textContent = '↻ Refresh';
  }
}

loadData();
setInterval(loadData,600000);
</script>

<div style="text-align:center;padding:20px 0 4px;font-size:9px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.1);">Widgets by Opxio.io</div>
</body>
</html>
