<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Opxio — Marketing Command</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}html{height:100%;}
body{font-family:'Satoshi',-apple-system,sans-serif;padding:14px 14px 24px;background:#191919;color:#fff;overflow-y:auto;overflow-x:hidden;}
:root{--g:#AAFF00;--gm:rgba(170,255,0,.12);--gb:rgba(170,255,0,.18);--amber:#FBBF24;--red:#FF6B6B;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:999px;}

.card{background:#1E1E1E;border:1px solid rgba(255,255,255,.06);border-radius:14px;transition:border-color .2s;}
.card:hover{border-color:rgba(170,255,0,.1);}
.btn{background:#252525;border:1px solid rgba(255,255,255,.09);color:rgba(255,255,255,.45);font-family:'Satoshi',sans-serif;font-size:11px;font-weight:700;padding:5px 11px;border-radius:7px;cursor:pointer;transition:all .2s;}
.btn:hover{border-color:var(--gb);color:var(--g);}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px;}
.h-right{display:flex;align-items:center;gap:6px;}
.eyebrow{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.22);margin-bottom:2px;}
.h-title{font-size:20px;font-weight:900;color:#fff;letter-spacing:-.03em;}
.ts{font-size:10px;font-weight:500;color:rgba(255,255,255,.18);}
.sec-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.22);margin:16px 0 8px;}

/* Stat cards */
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
@media(max-width:620px){.g4{grid-template-columns:repeat(2,1fr);}}
.stat{padding:16px 18px;position:relative;overflow:hidden;}
.s-dot{position:absolute;top:13px;right:13px;width:6px;height:6px;border-radius:50%;opacity:.6;}
.s-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.5);margin-bottom:10px;display:block;}
.s-val{font-size:30px;font-weight:900;letter-spacing:-1.5px;line-height:1;color:var(--g);}
.s-val.red{color:var(--red);}
.s-val.amber{color:var(--amber);}
.s-sub{font-size:9.5px;font-weight:500;color:rgba(255,255,255,.22);margin-top:6px;}
.s-sub.g{color:var(--g);}

/* Rows */
.mid-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;}
@media(max-width:680px){.mid-row{grid-template-columns:1fr;}}
.bot-row{display:grid;grid-template-columns:300px 1fr;gap:10px;margin-top:10px;}
@media(max-width:680px){.bot-row{grid-template-columns:1fr;}}

/* Panel */
.panel{padding:20px 22px;}
.panel-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px;}
.panel-title{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.85);}
.panel-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px;background:var(--gm);color:var(--g);border:1px solid var(--gb);}

/* Content breakdown bars */
.prog-row{margin-bottom:14px;}
.prog-row:last-child{margin-bottom:0;}
.prog-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;}
.prog-label{font-size:11px;font-weight:700;color:rgba(255,255,255,.6);}
.prog-count{font-size:11px;font-weight:800;color:#fff;}
.prog-track{background:rgba(255,255,255,.05);border-radius:999px;height:8px;overflow:hidden;}
.prog-fill{height:8px;border-radius:999px;transition:width .6s cubic-bezier(.4,0,.2,1);}
.prog-sub{font-size:9.5px;font-weight:500;color:rgba(255,255,255,.22);margin-top:4px;}
.prog-sub.done{color:var(--g);}

/* Campaign list */
.camp-scroll{max-height:260px;overflow-y:auto;padding-right:2px;}
.camp-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.04);}
.camp-item:last-child{border-bottom:none;}
.camp-info{flex:1;min-width:0;}
.camp-name{font-size:12px;font-weight:700;color:rgba(255,255,255,.8);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.camp-dates{font-size:9.5px;font-weight:600;color:rgba(255,255,255,.25);margin-top:2px;white-space:nowrap;}
.camp-type{font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;background:rgba(255,255,255,.07);color:rgba(255,255,255,.4);white-space:nowrap;text-transform:uppercase;letter-spacing:.05em;flex-shrink:0;}
.camp-bar-wrap{width:56px;flex-shrink:0;}
.camp-track{background:rgba(255,255,255,.05);border-radius:999px;height:5px;overflow:hidden;}
.camp-fill{height:5px;border-radius:999px;}
.camp-pct{font-size:12px;font-weight:900;min-width:34px;text-align:right;flex-shrink:0;letter-spacing:-.5px;}

/* Task card */
.task-big{font-size:44px;font-weight:900;letter-spacing:-2.5px;line-height:1;color:var(--g);}
.task-big-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:#fff;margin-top:5px;margin-bottom:16px;}
.task-mini-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px;}
.task-mini{background:#252525;border:1px solid rgba(255,255,255,.07);border-radius:9px;padding:11px 12px;text-align:center;}
.task-mini-val{font-size:22px;font-weight:900;letter-spacing:-1px;line-height:1;}
.task-mini-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:rgba(255,255,255,.35);margin-top:5px;}
.task-status-list{display:flex;flex-direction:column;gap:10px;}
.ts-row{display:flex;align-items:center;gap:9px;}
.ts-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.ts-label{font-size:11px;font-weight:700;color:rgba(255,255,255,.5);flex:1;}
.ts-dash{width:42px;height:3px;border-radius:2px;flex-shrink:0;}
.ts-count{font-size:14px;font-weight:900;letter-spacing:-.5px;min-width:22px;text-align:right;flex-shrink:0;}

/* Assignee bars */
.assign-list{display:flex;flex-direction:column;gap:11px;}
.assign-row{display:flex;align-items:center;gap:10px;}
.assign-name{font-size:11px;font-weight:700;color:rgba(255,255,255,.5);width:72px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.assign-track{flex:1;height:6px;border-radius:999px;background:rgba(255,255,255,.05);overflow:hidden;}
.assign-fill{height:6px;border-radius:999px;background:rgba(170,255,0,.28);transition:width .6s cubic-bezier(.4,0,.2,1);}
.assign-count{font-size:13px;font-weight:900;color:#fff;min-width:20px;text-align:right;flex-shrink:0;letter-spacing:-.4px;}

/* Loading / empty */
.loading{display:flex;align-items:center;justify-content:center;min-height:120px;flex-direction:column;gap:10px;}
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.06);border-top-color:var(--g);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:11px;color:rgba(255,255,255,.25);font-weight:500;}
.empty{padding:30px;text-align:center;font-size:12px;color:rgba(255,255,255,.2);}
</style>
</head>
<body>

<div class="header">
  <div>
    <p class="eyebrow" id="_eyebrow" data-os="Marketing OS">OPXIO · Marketing OS</p>
    <h1 class="h-title">Marketing Command</h1>
  </div>
  <div class="h-right">
    <span class="ts" id="ts"></span>
    <button class="btn" id="rb" onclick="loadData()">↻ Refresh</button>
  </div>
</div>

<div id="dash">
  <div class="loading"><div class="spinner"></div><div class="loading-text">Loading</div></div>
</div>

<script>
const _tok = new URLSearchParams(location.search).get('token') || '';

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function fmtDate(d){
  if(!d) return null;
  const dt = new Date(d+'T00:00:00');
  return dt.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
}

function pctColor(pct){
  if(pct >= 80) return '#AAFF00';
  if(pct >= 50) return '#FBBF24';
  return '#FF6B6B';
}

const CONTENT_COLORS = {
  videos:  '#AAFF00',
  posters: '#FBBF24',
  live:    '#60A5FA',
  kol:     '#C084FC',
};

function statusColor(label){
  const l = (label||'').toLowerCase();
  if(l.includes('done') || l.includes('published') || l.includes('posting') || l.includes('posted')) return 'var(--g)';
  if(l.includes('revision') || l.includes('review needed'))                                           return 'var(--red)';
  if(l.includes('qc') || l.includes('final') || l.includes('pending') || l.includes('approval'))     return 'var(--amber)';
  if(l.includes('progress') || l.includes('production') || l.includes('ready') || l.includes('scripting') || l.includes('editing') || l.includes('recording')) return '#60A5FA';
  return 'rgba(255,255,255,.35)';
}

function render(camp, content){
  const cb            = camp.contentBreakdown || {};
  const remaining     = camp.remainingDeliverables || 0;
  const overdue       = (content.attentionBreakdown || {}).overdue || 0;
  const dueWeek       = content.dueThisWeek || 0;
  const linked        = content.contentLinkedToCampaign || 0;
  const totalTasks    = content.tasksTotal || 0;
  const assignees     = content.byAssignee || [];
  const assigneeMax   = Math.max(...assignees.map(a => a.count), 1);
  const assigneeTotal = assignees.reduce((s,a) => s+a.count, 0);
  const taskStatuses     = content.taskStatuses   || ['Not Started','In Progress','Pending QC','Revision','Done'];
  const taskStatusCounts = content.taskStatusCounts || {};

  // ── Stat cards ──
  let html = `<div class="g4">
    <div class="card stat">
      <div class="s-dot" style="background:var(--g);"></div>
      <span class="s-lbl">Active Campaigns</span>
      <div class="s-val">${camp.activeCampaigns ?? '—'}</div>
      <div class="s-sub">${remaining > 0 ? remaining + ' deliverables left' : 'All delivered'}</div>
    </div>
    <div class="card stat">
      <div class="s-dot" style="background:var(--g);"></div>
      <span class="s-lbl">Avg Completion</span>
      <div class="s-val">${camp.avgCompletion != null ? camp.avgCompletion + '%' : '—'}</div>
      <div class="s-sub">Across active campaigns</div>
    </div>
    <div class="card stat">
      <div class="s-dot" style="background:var(--g);"></div>
      <span class="s-lbl">Content in Motion</span>
      <div class="s-val">${content.contentInMotion ?? '—'}</div>
      <div class="s-sub ${linked > 0 ? 'g' : ''}">${linked > 0 ? linked + ' linked to campaigns' : 'No campaign link'}</div>
    </div>
    <div class="card stat">
      <div class="s-dot" style="background:${overdue > 0 ? 'var(--red)' : 'var(--g)'};"></div>
      <span class="s-lbl">Overdue</span>
      <div class="s-val ${overdue > 0 ? 'red' : ''}">${overdue}</div>
      <div class="s-sub">${dueWeek} due this week</div>
    </div>
  </div>`;

  // ── Campaigns section ──
  html += `<div class="sec-lbl">Campaigns</div>`;
  html += `<div class="mid-row">`;

  // Content breakdown
  html += `<div class="card panel">
    <div class="panel-hdr">
      <span class="panel-title">Content Breakdown</span>
      <span class="panel-badge">${camp.completedDeliverables || 0} completed</span>
    </div>`;
  const types = [
    {key:'videos',  label:'Videos'},
    {key:'posters', label:'Posters'},
    {key:'live',    label:'Livestreams'},
    {key:'kol',     label:'KOL Posts'},
  ];
  for(const tp of types){
    const d = cb[tp.key] || {planned:0, completed:0};
    const pct = d.planned > 0 ? Math.round((d.completed/d.planned)*100) : 0;
    const rem = d.planned - d.completed;
    html += `<div class="prog-row">
      <div class="prog-header">
        <span class="prog-label">${tp.label}</span>
        <span class="prog-count">${d.completed} / ${d.planned}</span>
      </div>
      <div class="prog-track"><div class="prog-fill" style="width:${pct}%;background:${CONTENT_COLORS[tp.key]};"></div></div>
      ${rem > 0 ? `<div class="prog-sub">${rem} remaining</div>` : `<div class="prog-sub done">All done</div>`}
    </div>`;
  }
  html += `</div>`;

  // Campaign list
  html += `<div class="card panel">
    <div class="panel-hdr">
      <span class="panel-title">Campaign Progress</span>
      <span class="panel-badge">${camp.activeCampaigns || 0} active</span>
    </div>`;
  if(camp.campaignDetails && camp.campaignDetails.length > 0){
    html += `<div class="camp-scroll">`;
    for(const c of camp.campaignDetails){
      const col    = pctColor(c.pct);
      const start  = fmtDate(c.startDate);
      const end    = fmtDate(c.endDate);
      const dateStr = start && end ? `${start} – ${end}` : start || end || '';
      html += `<div class="camp-item">
        <div class="camp-info">
          <div class="camp-name" title="${esc(c.name)}">${esc(c.name)}</div>
          ${dateStr ? `<div class="camp-dates">${esc(dateStr)}</div>` : ''}
        </div>
        <span class="camp-type">${esc(c.type||'')}</span>
        <div class="camp-bar-wrap">
          <div class="camp-track"><div class="camp-fill" style="width:${Math.max(c.pct>0?4:0,c.pct)}%;background:${col};"></div></div>
        </div>
        <span class="camp-pct" style="color:${col};">${c.pct}%</span>
      </div>`;
    }
    html += `</div>`;
  } else {
    html += `<div class="empty">No active campaigns</div>`;
  }
  html += `</div></div>`; // end mid-row

  // ── Content & Tasks section ──
  html += `<div class="sec-lbl">Content &amp; Tasks</div>`;
  html += `<div class="bot-row">`;

  // Task status card
  html += `<div class="card panel">
    <div class="task-big">${totalTasks}</div>
    <div class="task-big-lbl">Active Tasks</div>
    <div class="task-mini-row">
      <div class="task-mini">
        <div class="task-mini-val" style="color:var(--g);">${dueWeek}</div>
        <div class="task-mini-lbl">Due This Week</div>
      </div>
      <div class="task-mini">
        <div class="task-mini-val" style="color:${overdue > 0 ? 'var(--red)' : 'rgba(255,255,255,.3)'};">${overdue}</div>
        <div class="task-mini-lbl">Overdue</div>
      </div>
    </div>
    <div class="task-status-list">`;
  for(const label of taskStatuses){
    const count = taskStatusCounts[label] || 0;
    const col   = statusColor(label);
    const active = count > 0;
    html += `<div class="ts-row">
      <div class="ts-dot" style="background:${col};${!active?'opacity:.35;':''}"></div>
      <span class="ts-label">${esc(label)}</span>
      <div class="ts-dash" style="background:${active?col:'rgba(255,255,255,.1)'};"></div>
      <span class="ts-count" style="color:${active?'#fff':'rgba(255,255,255,.25)'};">${count}</span>
    </div>`;
  }
  html += `</div></div>`;

  // Content by Assignee
  html += `<div class="card panel">
    <div class="panel-hdr">
      <span class="panel-title">Content by Assignee</span>
      <span class="panel-badge">${assigneeTotal} active</span>
    </div>`;
  if(assignees.length > 0){
    html += `<div class="assign-list">`;
    for(const a of assignees){
      const w = Math.round((a.count / assigneeMax) * 100);
      html += `<div class="assign-row">
        <span class="assign-name" title="${esc(a.name)}">${esc(a.name)}</span>
        <div class="assign-track"><div class="assign-fill" style="width:${Math.max(w, a.count > 0 ? 6 : 0)}%;"></div></div>
        <span class="assign-count">${a.count}</span>
      </div>`;
    }
    html += `</div>`;
  } else {
    html += `<div class="empty">No active content</div>`;
  }
  html += `</div>`;

  html += `</div>`; // bot-row

  document.getElementById('dash').innerHTML = html;
  document.getElementById('ts').textContent = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
}

async function loadData(){
  document.getElementById('rb').textContent = '↻ Refreshing…';
  try{
    const [r1, r2] = await Promise.all([
      fetch('/api/marketing/campaign-stats?token='+_tok),
      fetch('/api/marketing/content-stats?token='+_tok),
    ]);
    if(!r1.ok) throw new Error('campaign-stats ' + r1.status);
    if(!r2.ok) throw new Error('content-stats ' + r2.status);
    render(await r1.json(), await r2.json());
  } catch(e){
    document.getElementById('dash').innerHTML = `
      <div class="loading">
        <div style="font-size:12px;color:#FF6B6B;font-weight:700;">Failed to load</div>
        <div style="font-size:10px;color:rgba(255,255,255,.25);margin-top:4px;">${esc(e.message)}</div>
      </div>`;
  } finally {
    document.getElementById('rb').textContent = '↻ Refresh';
  }
}

loadData();
setInterval(loadData, 600000);
</script>

<div style="text-align:center;padding:20px 0 4px;font-size:9px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.1);">Widgets by Opxio.io</div>
<script>
(function(){
  const _c = new URLSearchParams(location.search).get('client');
  if(_c){
    const el = document.getElementById('_eyebrow');
    if(el) el.textContent = 'OPXIO · ' + _c.toUpperCase() + ' · ' + el.dataset.os;
  }
})();
</script>
</body>
</html>
