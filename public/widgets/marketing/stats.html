<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Content Stats</title>
<style>
  @import url('https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: 'Satoshi', -apple-system, sans-serif;
    background: #191919;
    padding: 14px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  @media(max-width:760px){ .grid{ grid-template-columns: repeat(2,1fr); } }
  @media(max-width:480px){ .grid{ grid-template-columns: 1fr; } }

  .card {
    background: #1E1E1E;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px;
    padding: 18px 20px 16px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .card:hover { border-color: rgba(255,255,255,0.12); }

  /* Lime green top-border accent */
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: #AAFF00;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .card:hover::before { opacity: 1; }

  /* Alert card (needs attention / overdue) */
  .card.alert { border-color: rgba(239,68,68,0.2); }
  .card.alert:hover::before { background: #EF4444; }
  .card.alert .val { color: #F87171; }
  .card.alert .dot { background: #EF4444; opacity: 0.7; }

  /* All-clear card */
  .card.ok .val { color: #AAFF00; }

  .label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: rgba(255,255,255,.5);
    margin-bottom: 14px;
  }

  .val {
    font-size: 40px;
    font-weight: 900;
    letter-spacing: -2px;
    line-height: 1;
    color: #AAFF00;
  }

  .sub {
    font-size: 11px;
    font-weight: 500;
    color: #3A3A3A;
    margin-top: 10px;
    line-height: 1.4;
  }

  /* Dot indicator */
  .dot {
    position: absolute;
    top: 16px; right: 16px;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #AAFF00;
    opacity: 0.5;
  }
  .card.alert .dot { background: #EF4444; opacity: 0.7; }

  /* Loading */
  .loading {
    display: flex; align-items: center; justify-content: center;
    height: 120px; flex-direction: column; gap: 10px;
  }
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid #1E1E1E;
    border-top-color: #AAFF00;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 11px; color: #333; font-weight: 500; }

  /* Header */
  .header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; flex-wrap:wrap; gap:8px; }
  .eyebrow { font-size:10px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:rgba(255,255,255,.22); margin-bottom:2px; }
  .h-title { font-size:20px; font-weight:900; color:#fff; letter-spacing:-.03em; }

  .refresh-btn {
    font-family: 'Satoshi', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    padding: 5px 12px;
    background: #252525;
    border: 1px solid rgba(255,255,255,0.09);
    border-radius: 7px;
    color: rgba(255,255,255,0.45);
    cursor: pointer;
    transition: all 0.2s;
  }
  .refresh-btn:hover { border-color: #AAFF00; color: #AAFF00; }
</style>
</head>
<body>
<div id="root">
  <div class="loading">
    <div class="spinner"></div>
    <div class="loading-text">Loading</div>
  </div>
</div>

<script>
const _tok = new URLSearchParams(location.search).get('token') || '';
let _content = null, _camp = null;

function fmt(n) { return n == null ? '—' : String(n); }

function render() {
  const d = _content || {};
  const c = _camp || {};

  const attnAlert = (d.needsAttention || 0) > 0;

  // Sub-texts
  const sub1 = (() => {
    const p = [];
    if (d.contentBreakdown?.revision > 0) p.push(d.contentBreakdown.revision + ' revision');
    if (d.contentBreakdown?.qc > 0) p.push(d.contentBreakdown.qc + ' QC');
    return p.length ? p.join(' · ') : 'All on track';
  })();

  const sub2 = (() => {
    const p = [];
    if (d.tasksBreakdown?.waiting > 0) p.push(d.tasksBreakdown.waiting + ' waiting');
    if (d.tasksBreakdown?.qc > 0) p.push(d.tasksBreakdown.qc + ' QC pending');
    if (d.tasksBreakdown?.revision > 0) p.push(d.tasksBreakdown.revision + ' revision');
    return p.length ? p.join(' · ') : 'All clear';
  })();

  const sub3 = (() => {
    const p = [];
    if (d.dueBreakdown?.content > 0) p.push(d.dueBreakdown.content + ' content');
    if (d.dueBreakdown?.tasks > 0) p.push(d.dueBreakdown.tasks + ' tasks');
    return p.length ? p.join(' · ') + ' due' : 'Nothing due';
  })();

  const sub4 = (() => {
    const p = [];
    if (d.attentionBreakdown?.overdue > 0) p.push(d.attentionBreakdown.overdue + ' overdue');
    if (d.attentionBreakdown?.revision > 0) p.push(d.attentionBreakdown.revision + ' revision');
    if (d.attentionBreakdown?.qc > 0) p.push(d.attentionBreakdown.qc + ' QC');
    return p.length ? p.join(' · ') : 'All clear';
  })();

  const campSub = c.remainingDeliverables > 0
    ? c.remainingDeliverables + ' deliverables left'
    : 'All delivered';

  const compSub = (() => {
    if (!c.contentBreakdown) return 'No data';
    const cb = c.contentBreakdown;
    const p = [];
    if (cb.videos?.planned > 0) p.push(cb.videos.completed + '/' + cb.videos.planned + ' video');
    if (cb.posters?.planned > 0) p.push(cb.posters.completed + '/' + cb.posters.planned + ' poster');
    if (cb.live?.planned > 0) p.push(cb.live.completed + '/' + cb.live.planned + ' live');
    if (cb.kol?.planned > 0) p.push(cb.kol.completed + '/' + cb.kol.planned + ' KOL');
    return p.length ? p.join(' · ') : 'No deliverables';
  })();

  document.getElementById('root').innerHTML = `
    <div class="header">
      <div><p class="eyebrow" id="_eyebrow" data-os="Marketing OS">OPXIO · Marketing OS</p><h1 class="h-title">Content Stats</h1></div>
      <button class="refresh-btn" onclick="load()">↺ Refresh</button>
    </div>
    <div class="grid">

      <div class="card">
        <div class="dot"></div>
        <div class="label">Active Campaigns</div>
        <div class="val">${fmt(c.activeCampaigns)}</div>
        <div class="sub">${campSub}</div>
      </div>

      <div class="card">
        <div class="dot"></div>
        <div class="label">Avg Completion</div>
        <div class="val">${c.avgCompletion != null ? c.avgCompletion + '%' : '—'}</div>
        <div class="sub">${compSub}</div>
      </div>

      <div class="card">
        <div class="dot"></div>
        <div class="label">Content in Motion</div>
        <div class="val">${fmt(d.contentInMotion)}</div>
        <div class="sub">${sub1}</div>
      </div>

      <div class="card">
        <div class="dot"></div>
        <div class="label">Active Tasks</div>
        <div class="val">${fmt(d.tasksTotal)}</div>
        <div class="sub">${sub2}</div>
      </div>

      <div class="card">
        <div class="dot"></div>
        <div class="label">Due This Week</div>
        <div class="val">${fmt(d.dueThisWeek)}</div>
        <div class="sub">${sub3}</div>
      </div>

      <div class="card ${attnAlert ? 'alert' : 'ok'}">
        <div class="dot"></div>
        <div class="label">Needs Attention</div>
        <div class="val">${fmt(d.needsAttention)}</div>
        <div class="sub">${sub4}</div>
      </div>

    </div>`;
}

async function load() {
  document.getElementById('root').innerHTML = `
    <div class="loading">
      <div class="spinner"></div>
      <div class="loading-text">Loading</div>
    </div>`;
  try {
    const [r1, r2] = await Promise.all([
      fetch('/api/marketing/content-stats?token=' + _tok),
      fetch('/api/marketing/campaign-stats?token=' + _tok)
    ]);
    if (!r1.ok) throw new Error('API ' + r1.status);
    _content = await r1.json();
    if (r2.ok) _camp = await r2.json();
    render();
  } catch(e) {
    document.getElementById('root').innerHTML = `
      <div class="loading">
        <div style="font-size:12px;color:#EF4444;font-weight:700;">Failed to load</div>
        <div style="font-size:10px;color:#333;margin-top:4px;">${e.message}</div>
      </div>`;
  }
}

load();
setInterval(load, 600000);
</script>

<div style="text-align:center;padding:20px 0 4px;font-size:9px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.1);">Widgets by Opxio.io</div>
<script>
(function(){
  const _c = new URLSearchParams(location.search).get('client');
  if(_c){
    const el = document.getElementById('_eyebrow');
    if(el) el.textContent = 'OPXIO · ' + _c.toUpperCase() + ' · ' + el.dataset.os;
  }
})();
</script>
</body>
</html>
