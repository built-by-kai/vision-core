<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Opxio — Campaign Status</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}html{height:100%;}
body{font-family:'Satoshi',-apple-system,sans-serif;padding:14px 14px 28px;background:#191919;color:#fff;overflow-y:auto;overflow-x:hidden;}
:root{--g:#AAFF00;--gm:rgba(170,255,0,.12);--gb:rgba(170,255,0,.18);--amber:#FBBF24;--red:#FF6B6B;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:999px;}

.card{background:#1E1E1E;border:1px solid rgba(255,255,255,.06);border-radius:14px;transition:border-color .2s;}
.card:hover{border-color:rgba(170,255,0,.1);}
.btn{background:#252525;border:1px solid rgba(255,255,255,.09);color:rgba(255,255,255,.45);font-family:'Satoshi',sans-serif;font-size:11px;font-weight:700;padding:5px 11px;border-radius:7px;cursor:pointer;transition:all .2s;}
.btn:hover{border-color:var(--gb);color:var(--g);}

.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px;}
.h-right{display:flex;align-items:center;gap:6px;}
.eyebrow{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.22);margin-bottom:2px;}
.h-title{font-size:20px;font-weight:900;color:#fff;letter-spacing:-.03em;}
.ts{font-size:10px;font-weight:500;color:rgba(255,255,255,.18);}
.sec-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.22);margin:16px 0 8px;}

/* KPI */
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
@media(max-width:580px){.g3{grid-template-columns:1fr 1fr;}}
.stat{padding:16px 18px;position:relative;overflow:hidden;}
.s-dot{position:absolute;top:13px;right:13px;width:6px;height:6px;border-radius:50%;background:var(--g);box-shadow:0 0 6px rgba(170,255,0,.4);}
.s-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.4);margin-bottom:10px;display:block;}
.s-val{font-size:32px;font-weight:900;letter-spacing:-1.5px;line-height:1;color:var(--g);}
.s-sub{font-size:9.5px;font-weight:500;color:rgba(255,255,255,.2);margin-top:6px;}

/* Rows */
.mid-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;}
@media(max-width:680px){.mid-row{grid-template-columns:1fr;}}
.tri-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:10px;}
@media(max-width:780px){.tri-row{grid-template-columns:1fr 1fr;}}
@media(max-width:520px){.tri-row{grid-template-columns:1fr;}}
.panel{padding:20px 22px;}
.panel-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px;}
.panel-title{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.8);}
.panel-badge{font-size:10px;font-weight:700;padding:2px 9px;border-radius:5px;background:var(--gm);color:var(--g);border:1px solid var(--gb);}

/* Bar rows — unified style */
.bar-list{display:flex;flex-direction:column;gap:12px;}
.bar-row{display:flex;align-items:center;gap:10px;}
.bar-lbl{font-size:11px;font-weight:700;color:rgba(255,255,255,.5);flex-shrink:0;}
.bar-lbl.w72{width:72px;}
.bar-lbl.w80{width:80px;}
.bar-lbl.w90{width:90px;}
.bar-track{flex:1;height:9px;border-radius:999px;background:rgba(255,255,255,.05);overflow:hidden;}
.bar-fill{height:9px;border-radius:999px;background:var(--g);transition:width .7s cubic-bezier(.4,0,.2,1);}
.bar-fill.muted{background:rgba(170,255,0,.35);}
.bar-fill.dim{background:rgba(170,255,0,.18);}
.bar-val{font-size:12px;font-weight:800;color:#fff;width:22px;text-align:right;flex-shrink:0;}
.bar-pct{font-size:9px;font-weight:600;color:rgba(255,255,255,.2);width:30px;text-align:right;flex-shrink:0;}

/* Budget stacked bar */
.budget-list{display:flex;flex-direction:column;gap:14px;}
.budget-item{}
.budget-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;}
.budget-name{font-size:11px;font-weight:700;color:rgba(255,255,255,.7);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.budget-pct-lbl{font-size:12px;font-weight:900;color:var(--g);flex-shrink:0;margin-left:8px;letter-spacing:-.5px;}
.budget-track{height:8px;border-radius:999px;background:rgba(255,255,255,.06);overflow:hidden;}
.budget-fill{height:8px;border-radius:999px;background:var(--g);transition:width .7s cubic-bezier(.4,0,.2,1);}
.budget-bottom{display:flex;justify-content:space-between;margin-top:5px;}
.budget-spent{font-size:9px;font-weight:700;color:rgba(170,255,0,.6);}
.budget-total{font-size:9px;font-weight:600;color:rgba(255,255,255,.2);}

/* Campaign table */
.camp-table{width:100%;border-collapse:collapse;}
.camp-table th{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:rgba(255,255,255,.22);padding:0 0 10px;text-align:left;white-space:nowrap;}
.camp-table th:not(:first-child){padding-left:12px;}
.camp-table td{font-size:11px;font-weight:600;padding:9px 0;border-top:1px solid rgba(255,255,255,.04);color:rgba(255,255,255,.65);vertical-align:middle;}
.camp-table td:not(:first-child){padding-left:12px;}
.camp-table tr:last-child td{border-bottom:none;}
.chip{font-size:9px;font-weight:700;padding:2px 8px;border-radius:5px;display:inline-block;white-space:nowrap;}
.chip-active{background:var(--gm);color:var(--g);border:1px solid var(--gb);}
.chip-planning{background:rgba(255,255,255,.06);color:rgba(255,255,255,.45);}
.chip-hold{background:rgba(251,191,36,.1);color:var(--amber);}
.chip-done{background:rgba(255,255,255,.04);color:rgba(255,255,255,.25);}

/* Platform chips */
.platform-wrap{display:flex;flex-wrap:wrap;gap:6px;}
.platform-chip{font-size:9px;font-weight:700;padding:3px 9px;border-radius:6px;background:rgba(255,255,255,.06);color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.06);}

.loading{display:flex;align-items:center;justify-content:center;min-height:200px;flex-direction:column;gap:10px;}
.spinner{width:18px;height:18px;border:2px solid rgba(170,255,0,.15);border-top-color:var(--g);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:11px;color:rgba(255,255,255,.25);font-weight:600;}
</style>
</head>
<body>

<div class="header">
  <div>
    <p class="eyebrow" id="_eyebrow" data-os="Marketing OS">MARKETING OS</p>
    <h1 class="h-title">Campaign Status</h1>
  </div>
  <div class="h-right">
    <span class="ts" id="ts"></span>
    <button class="btn" onclick="render()">↻ Refresh</button>
  </div>
</div>

<div id="dash">
  <div class="loading"><div class="spinner"></div><div class="loading-text">Loading</div></div>
</div>

<script>
// ── Mock data — replace with /api/marketing/campaign-status?token= ────────────
const DATA = {
  activeCampaigns:  3,
  endingThisMonth:  1,
  totalBudget:      24500,
  currency:         'RM',

  byStatus: [
    { label: 'Active',    count: 3 },
    { label: 'Planning',  count: 2 },
    { label: 'On Hold',   count: 1 },
    { label: 'Completed', count: 5 },
  ],

  byType: [
    { label: 'KOL Campaign',    count: 4 },
    { label: 'Live Commerce',   count: 3 },
    { label: 'Brand Awareness', count: 2 },
    { label: 'Product Launch',  count: 2 },
  ],

  byPlatform: [
    { label: 'TikTok',    count: 6 },
    { label: 'Instagram', count: 4 },
    { label: 'Shopee',    count: 3 },
    { label: 'YouTube',   count: 1 },
  ],

  budgetItems: [
    { name: 'HMNS Twin Date 4.4', spent: 3200, total: 5000 },
    { name: 'Ramadan Campaign',   spent: 1800, total: 3500 },
    { name: 'Summer KOL Push',    spent: 4100, total: 8000 },
  ],

  campaigns: [
    { name: 'HMNS Twin Date 4.4', client: 'HMNS',      status: 'Active',    type: 'KOL Campaign',    end: '4 Apr',  budget: 5000 },
    { name: 'Ramadan Campaign',   client: 'Brandlab',   status: 'Active',    type: 'Brand Awareness', end: '10 Apr', budget: 3500 },
    { name: 'Summer KOL Push',    client: 'Aura Skin',  status: 'Active',    type: 'KOL Campaign',    end: '30 Apr', budget: 8000 },
    { name: 'Q2 Brand Refresh',   client: 'Nelo',       status: 'Planning',  type: 'Brand Awareness', end: '15 May', budget: 4200 },
    { name: 'Influencer Sprint',  client: 'Klarity',    status: 'Planning',  type: 'Product Launch',  end: '20 May', budget: 3800 },
    { name: 'Flash Sale Blast',   client: 'HMNS',       status: 'On Hold',   type: 'Live Commerce',   end: '—',      budget: 2100 },
  ],
};

function fmt(n){
  if(n >= 1000000) return (n/1000000).toFixed(1).replace(/\.0$/,'')+'M';
  if(n >= 1000)    return (n/1000).toFixed(1).replace(/\.0$/,'')+'K';
  return String(n);
}
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function chipClass(s){
  if(s==='Active')    return 'chip-active';
  if(s==='Planning')  return 'chip-planning';
  if(s==='On Hold')   return 'chip-hold';
  return 'chip-done';
}
function barFillClass(i, max){
  if(i===0) return 'bar-fill';
  if(i===1) return 'bar-fill muted';
  return 'bar-fill dim';
}

function barRows(items, labelWidth){
  const max = Math.max(...items.map(x=>x.count), 1);
  const total = items.reduce((a,x)=>a+x.count,0) || 1;
  return items.map((x,i)=>{
    const w = Math.round((x.count/max)*100);
    const pct = Math.round((x.count/total)*100);
    return `<div class="bar-row">
      <span class="bar-lbl ${labelWidth}">${esc(x.label)}</span>
      <div class="bar-track"><div class="${barFillClass(i,max)}" style="width:${Math.max(x.count>0?5:0,w)}%;"></div></div>
      <span class="bar-val">${x.count}</span>
      <span class="bar-pct">${pct}%</span>
    </div>`;
  }).join('');
}

function render(){
  const d = DATA;
  let html = '';

  // ── KPI Cards ──
  html += `<div class="g3">
    <div class="card stat">
      <div class="s-dot"></div>
      <span class="s-lbl">Active Campaigns</span>
      <div class="s-val">${d.activeCampaigns}</div>
      <div class="s-sub">Currently running</div>
    </div>
    <div class="card stat">
      <div class="s-dot"></div>
      <span class="s-lbl">Ending This Month</span>
      <div class="s-val">${d.endingThisMonth}</div>
      <div class="s-sub">Closing soon</div>
    </div>
    <div class="card stat">
      <div class="s-dot"></div>
      <span class="s-lbl">Total Budget in Play</span>
      <div class="s-val" style="font-size:26px;">${d.currency} ${fmt(d.totalBudget)}</div>
      <div class="s-sub">Across active campaigns</div>
    </div>
  </div>`;

  // ── Mid row: Status + Budget ──
  html += `<div class="sec-lbl">Breakdown</div>
  <div class="mid-row">
    <div class="card panel">
      <div class="panel-hdr">
        <span class="panel-title">Campaign Status</span>
        <span class="panel-badge">${d.byStatus.reduce((a,x)=>a+x.count,0)} total</span>
      </div>
      <div class="bar-list">${barRows(d.byStatus,'w80')}</div>
    </div>
    <div class="card panel">
      <div class="panel-hdr">
        <span class="panel-title">Budget Utilisation</span>
        <span class="panel-badge">Active only</span>
      </div>
      <div class="budget-list">`;

  for(const b of d.budgetItems){
    const pct = b.total > 0 ? Math.round((b.spent/b.total)*100) : 0;
    html += `<div class="budget-item">
      <div class="budget-top">
        <span class="budget-name">${esc(b.name)}</span>
        <span class="budget-pct-lbl">${pct}%</span>
      </div>
      <div class="budget-track"><div class="budget-fill" style="width:${pct}%;"></div></div>
      <div class="budget-bottom">
        <span class="budget-spent">Spent: ${d.currency} ${b.spent.toLocaleString()}</span>
        <span class="budget-total">of ${d.currency} ${b.total.toLocaleString()}</span>
      </div>
    </div>`;
  }
  html += `</div></div></div>`; // budget panel + mid-row

  // ── Tri row: Type + Platform + (platform chips) ──
  html += `<div class="mid-row" style="margin-top:10px;">
    <div class="card panel">
      <div class="panel-hdr">
        <span class="panel-title">Campaign Type</span>
        <span class="panel-badge">${d.byType.reduce((a,x)=>a+x.count,0)} campaigns</span>
      </div>
      <div class="bar-list">${barRows(d.byType,'w90')}</div>
    </div>
    <div class="card panel">
      <div class="panel-hdr">
        <span class="panel-title">Platform</span>
        <span class="panel-badge">${d.byPlatform.reduce((a,x)=>a+x.count,0)} campaigns</span>
      </div>
      <div class="bar-list">${barRows(d.byPlatform,'w80')}</div>
    </div>
  </div>`;

  // ── Campaign table ──
  html += `<div class="sec-lbl">All Campaigns</div>
  <div class="card panel">
    <table class="camp-table">
      <thead><tr>
        <th>Campaign</th><th>Client</th><th>Type</th><th>Status</th><th>End Date</th><th style="text-align:right;">Budget</th>
      </tr></thead>
      <tbody>`;
  for(const c of d.campaigns){
    html += `<tr>
      <td style="font-weight:700;color:rgba(255,255,255,.85);">${esc(c.name)}</td>
      <td style="color:rgba(255,255,255,.38);">${esc(c.client)}</td>
      <td style="color:rgba(255,255,255,.38);">${esc(c.type)}</td>
      <td><span class="chip ${chipClass(c.status)}">${esc(c.status)}</span></td>
      <td style="color:rgba(255,255,255,.38);">${esc(c.end)}</td>
      <td style="font-weight:700;color:rgba(255,255,255,.7);text-align:right;">${d.currency} ${c.budget.toLocaleString()}</td>
    </tr>`;
  }
  html += `</tbody></table></div>`;

  document.getElementById('dash').innerHTML = html;
  document.getElementById('ts').textContent = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
}

render();
</script>

<div style="text-align:center;padding:20px 0 4px;font-size:9px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.1);">Widgets by Opxio.io</div>
<script>
(function(){
  const _c = new URLSearchParams(location.search).get('client');
  const el = document.getElementById('_eyebrow');
  if(!el) return;
  if(_c) el.textContent = _c.toUpperCase() + ' · ' + el.dataset.os.toUpperCase();
  else    el.textContent = el.dataset.os.toUpperCase();
})();
</script>
</body>
</html>
