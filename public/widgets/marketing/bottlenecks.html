<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Opxio — Bottlenecks</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}html{height:100%;}
body{font-family:'Satoshi',-apple-system,sans-serif;padding:14px 14px 24px;background:#191919;color:#fff;overflow-y:auto;overflow-x:hidden;}
:root{--g:#AAFF00;--gm:rgba(170,255,0,.12);--gb:rgba(170,255,0,.18);--amber:#FBBF24;--red:#F87171;--orange:#FB923C;--blue:#60A5FA;--teal:#2DD4BF;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:999px;}

/* Base */
.card{background:#1E1E1E;border:1px solid rgba(255,255,255,.06);border-radius:14px;transition:border-color .2s;}
.card:hover{border-color:rgba(170,255,0,.1);}
.btn{background:#252525;border:1px solid rgba(255,255,255,.09);color:rgba(255,255,255,.45);font-family:'Satoshi',sans-serif;font-size:11px;font-weight:700;padding:5px 11px;border-radius:7px;cursor:pointer;transition:all .2s;}
.btn:hover{border-color:var(--gb);color:var(--g);}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px;}
.h-right{display:flex;align-items:center;gap:6px;}
.eyebrow{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.22);margin-bottom:2px;}
.h-title{font-size:20px;font-weight:900;color:#fff;letter-spacing:-.03em;}
.ts{font-size:10px;font-weight:500;color:rgba(255,255,255,.18);}
.total-badge{font-size:10px;font-weight:700;padding:2px 9px;border-radius:20px;margin-left:6px;background:rgba(248,113,113,.12);color:var(--red);border:1px solid rgba(248,113,113,.2);}
.total-badge.none{background:var(--gm);color:var(--g);border:1px solid var(--gb);}

/* Summary stat chips */
.chips{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:8px;margin-bottom:12px;}
.chip{padding:14px 16px;text-align:center;position:relative;overflow:hidden;}
.chip-val{font-size:26px;font-weight:900;letter-spacing:-1.2px;line-height:1;}
.chip-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;margin-top:5px;opacity:.7;}

/* Section */
.sec-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.22);margin:14px 0 8px;}
.section{padding:18px 20px;margin-bottom:10px;}
.section:last-of-type{margin-bottom:0;}
.section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.section-title{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.85);}
.section-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px;background:rgba(255,255,255,.07);color:rgba(255,255,255,.4);border:1px solid rgba(255,255,255,.08);}

/* Rows */
.scroll{max-height:280px;overflow-y:auto;padding-right:2px;}
.row{display:flex;align-items:flex-start;gap:11px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;transition:background .15s;border-radius:4px;}
.row:last-child{border-bottom:none;}
.row:hover{background:rgba(255,255,255,.02);}
.row-bar{width:3px;border-radius:3px;min-height:34px;flex-shrink:0;align-self:stretch;margin-top:1px;}
.row-body{flex:1;min-width:0;}
.row-title{font-size:12.5px;font-weight:700;color:rgba(255,255,255,.85);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;}
.row-sub{font-size:10.5px;font-weight:500;color:rgba(255,255,255,.35);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:5px;}
.row-meta{display:flex;flex-wrap:wrap;gap:4px;}
.meta-tag{font-size:9.5px;font-weight:600;padding:2px 7px;border-radius:4px;background:rgba(255,255,255,.06);color:rgba(255,255,255,.35);}
.row-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;}
.badges{display:flex;flex-wrap:wrap;gap:4px;justify-content:flex-end;}
.badge{font-size:9px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;padding:3px 7px;border-radius:5px;white-space:nowrap;}
.badge-overdue{background:rgba(248,113,113,.12);color:var(--red);}
.badge-today{background:rgba(251,146,60,.12);color:var(--orange);}
.badge-revision{background:rgba(251,191,36,.1);color:var(--amber);}
.badge-qc-content{background:rgba(96,165,250,.1);color:var(--blue);}
.badge-qc-task{background:rgba(45,212,191,.1);color:var(--teal);}
.date-text{font-size:9.5px;font-weight:500;color:rgba(255,255,255,.28);}

/* Empty */
.empty{padding:36px 20px;text-align:center;}
.empty-icon{font-size:24px;margin-bottom:8px;opacity:.5;}
.empty-text{font-size:14px;font-weight:800;color:var(--g);letter-spacing:-.3px;}
.empty-sub{font-size:11px;color:rgba(255,255,255,.22);margin-top:4px;}

/* Loading */
.loading{display:flex;align-items:center;justify-content:center;min-height:140px;flex-direction:column;gap:10px;}
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.06);border-top-color:var(--g);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:11px;color:rgba(255,255,255,.25);font-weight:500;}
</style>
</head>
<body>

<div class="header">
  <div style="display:flex;align-items:center;">
    <div>
      <p class="eyebrow">OPXIO · Marketing OS</p>
      <h1 class="h-title" style="display:inline;">Bottlenecks</h1>
    </div>
    <span class="total-badge none" id="tbadge">—</span>
  </div>
  <div class="h-right">
    <span class="ts" id="ts"></span>
    <button class="btn" id="rb" onclick="loadData()">↻ Refresh</button>
  </div>
</div>

<div id="dash">
  <div class="loading"><div class="spinner"></div><div class="loading-text">Loading</div></div>
</div>

<script>
const _tok = new URLSearchParams(location.search).get('token') || '';

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function fmtDate(d){
  if(!d) return '';
  const mo = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const p = d.split('-');
  return mo[parseInt(p[1])-1] + ' ' + parseInt(p[2]);
}

const CHIP_COLORS = {
  overdue:    {val:'var(--red)',   bg:'rgba(248,113,113,.12)',  border:'rgba(248,113,113,.2)'},
  dueToday:   {val:'var(--orange)',bg:'rgba(251,146,60,.12)',   border:'rgba(251,146,60,.2)'},
  revisions:  {val:'var(--amber)', bg:'rgba(251,191,36,.1)',    border:'rgba(251,191,36,.18)'},
  contentQC:  {val:'var(--blue)',  bg:'rgba(96,165,250,.1)',    border:'rgba(96,165,250,.18)'},
  taskQC:     {val:'var(--teal)',  bg:'rgba(45,212,191,.1)',    border:'rgba(45,212,191,.18)'},
};

function barColor(reasons){
  if(reasons.includes('Overdue'))     return 'var(--red)';
  if(reasons.includes('Due Today'))   return 'var(--orange)';
  if(reasons.includes('Revision'))    return 'var(--amber)';
  if(reasons.includes('QC Review'))   return 'var(--blue)';
  if(reasons.includes('Pending QC'))  return 'var(--teal)';
  return 'rgba(255,255,255,.15)';
}

function renderBadges(item){
  let h = '';
  if(item.reasons.includes('Overdue'))    h += `<span class="badge badge-overdue">${item.daysOverdue > 0 ? item.daysOverdue+'d late' : 'Overdue'}</span>`;
  if(item.reasons.includes('Due Today'))  h += `<span class="badge badge-today">Due Today</span>`;
  if(item.reasons.includes('Revision'))   h += `<span class="badge badge-revision">Revision</span>`;
  if(item.reasons.includes('QC Review'))  h += `<span class="badge badge-qc-content">Content QC</span>`;
  if(item.reasons.includes('Pending QC')) h += `<span class="badge badge-qc-task">Pending QC</span>`;
  return h;
}

function renderRow(item){
  const col  = barColor(item.reasons);
  const date = item.deadline ? fmtDate(item.deadline) : '';
  const url  = item.url ? item.url.replace(/'/g,"\\'") : '';
  let meta = '';
  if(item.client)  meta += `<span class="meta-tag">${esc(item.client)}</span>`;
  if(item.channel?.length) meta += `<span class="meta-tag">${esc(item.channel.join(' · '))}</span>`;
  if(item.type?.length)    meta += `<span class="meta-tag">${esc(item.type.join(', '))}</span>`;
  if(item.campaign) meta += `<span class="meta-tag">${esc(item.campaign)}</span>`;
  if(item.people?.length)  meta += `<span class="meta-tag">${esc(item.people.join(', '))}</span>`;
  const subLine = item.contentName ? `<div class="row-sub">${esc(item.contentName)}</div>` : '';
  return `<div class="row" onclick="if('${url}')window.open('${url}','_blank')">
    <div class="row-bar" style="background:${col};"></div>
    <div class="row-body">
      <div class="row-title">${esc(item.title)}</div>
      ${subLine}
      ${meta ? `<div class="row-meta">${meta}</div>` : ''}
    </div>
    <div class="row-right">
      <div class="badges">${renderBadges(item)}</div>
      ${date ? `<div class="date-text">${date}</div>` : ''}
    </div>
  </div>`;
}

function render(data){
  const total = data.total || 0;

  // Update badge
  const tbadge = document.getElementById('tbadge');
  if(total > 0){
    tbadge.textContent = total + (total === 1 ? ' issue' : ' issues');
    tbadge.className = 'total-badge';
  } else {
    tbadge.textContent = 'All clear';
    tbadge.className = 'total-badge none';
  }

  if(total === 0){
    document.getElementById('dash').innerHTML = `
      <div class="card empty">
        <div class="empty-icon">✓</div>
        <div class="empty-text">No bottlenecks</div>
        <div class="empty-sub">Everything is on track</div>
      </div>`;
    document.getElementById('ts').textContent = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    return;
  }

  // Chips
  const chipDefs = [
    {key:'overdue',   label:'Overdue',  val: data.overdue   || 0},
    {key:'dueToday',  label:'Due Today', val: data.dueToday  || 0},
    {key:'revisions', label:'Revision',  val: data.revisions || 0},
    {key:'contentQC', label:'Final QC',  val: data.contentQC || 0},
    {key:'taskQC',    label:'Task QC',   val: data.taskQC    || 0},
  ].filter(c => c.val > 0);

  let html = '';
  if(chipDefs.length){
    html += `<div class="chips">`;
    for(const c of chipDefs){
      const col = CHIP_COLORS[c.key];
      html += `<div class="card chip" style="border-color:${col.border};background:${col.bg};">
        <div class="chip-val" style="color:${col.val};">${c.val}</div>
        <div class="chip-lbl" style="color:${col.val};">${c.label}</div>
      </div>`;
    }
    html += `</div>`;
  }

  if(data.content?.length){
    html += `<div class="sec-lbl">Content</div>
    <div class="card section">
      <div class="section-hdr">
        <span class="section-title">Content Issues</span>
        <span class="section-badge">${data.content.length}</span>
      </div>
      <div class="scroll">`;
    for(const item of data.content) html += renderRow(item);
    html += `</div></div>`;
  }

  if(data.tasks?.length){
    html += `<div class="sec-lbl">Tasks</div>
    <div class="card section">
      <div class="section-hdr">
        <span class="section-title">Task Issues</span>
        <span class="section-badge">${data.tasks.length}</span>
      </div>
      <div class="scroll">`;
    for(const item of data.tasks) html += renderRow(item);
    html += `</div></div>`;
  }

  document.getElementById('dash').innerHTML = html;
  document.getElementById('ts').textContent = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
}

async function loadData(){
  document.getElementById('rb').textContent = '↻ Refreshing…';
  try{
    const r = await fetch('/api/creaitors/bottlenecks?token='+_tok);
    if(!r.ok) throw new Error('bottlenecks ' + r.status);
    render(await r.json());
  } catch(e){
    document.getElementById('dash').innerHTML = `
      <div class="loading">
        <div style="font-size:12px;color:var(--red);font-weight:700;">Failed to load</div>
        <div style="font-size:10px;color:rgba(255,255,255,.25);margin-top:4px;">${esc(e.message)}</div>
      </div>`;
  } finally {
    document.getElementById('rb').textContent = '↻ Refresh';
  }
}

loadData();
setInterval(loadData, 600000);
</script>

<div style="text-align:center;padding:20px 0 4px;font-size:9px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.1);">Widgets by Opxio.io</div>
</body>
</html>
