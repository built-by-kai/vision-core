<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Opxio — Bottlenecks</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}html{height:100%;}
body{font-family:'Satoshi',-apple-system,sans-serif;padding:14px 14px 24px;background:#191919;color:#fff;overflow-y:auto;overflow-x:hidden;}
:root{--g:#AAFF00;--gm:rgba(170,255,0,.12);--gb:rgba(170,255,0,.18);--red:#FF6B35;--redm:rgba(255,107,53,.12);--amber:#FBBF24;--amberm:rgba(251,191,36,.1);--blue:#60A5FA;--bluem:rgba(96,165,250,.1);--teal:#2DD4BF;--tealm:rgba(45,212,191,.1);}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:999px;}

.card{background:#1E1E1E;border:1px solid rgba(255,255,255,.06);border-radius:14px;transition:border-color .2s;}
.card:hover{border-color:rgba(170,255,0,.1);}
.btn{background:#252525;border:1px solid rgba(255,255,255,.09);color:rgba(255,255,255,.45);font-family:'Satoshi',sans-serif;font-size:11px;font-weight:700;padding:5px 11px;border-radius:7px;cursor:pointer;transition:all .2s;}
.btn:hover{border-color:var(--gb);color:var(--g);}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px;}
.h-right{display:flex;align-items:center;gap:6px;}
.eyebrow{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.22);margin-bottom:2px;}
.h-title{font-size:20px;font-weight:900;color:#fff;letter-spacing:-.03em;}
.h-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:6px;margin-left:8px;vertical-align:middle;}
.h-badge.has{background:var(--redm);color:var(--red);border:1px solid rgba(255,107,53,.2);}
.h-badge.clear{background:var(--gm);color:var(--g);border:1px solid var(--gb);}
.ts{font-size:10px;font-weight:500;color:rgba(255,255,255,.18);}

/* Summary chips */
.summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:8px;margin-bottom:12px;}
.chip{padding:14px 16px;text-align:center;border-radius:12px;}
.chip-val{font-size:26px;font-weight:900;letter-spacing:-1px;line-height:1;}
.chip-lbl{font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-top:5px;opacity:.7;}

.chip-overdue .chip-val,.chip-overdue .chip-lbl{color:var(--red);}
.chip-overdue{border-color:rgba(255,107,53,.15)!important;}
.chip-today .chip-val,.chip-today .chip-lbl{color:var(--amber);}
.chip-today{border-color:rgba(251,191,36,.15)!important;}
.chip-revision .chip-val,.chip-revision .chip-lbl{color:var(--amber);}
.chip-revision{border-color:rgba(251,191,36,.15)!important;}
.chip-qc .chip-val,.chip-qc .chip-lbl{color:var(--blue);}
.chip-qc{border-color:rgba(96,165,250,.15)!important;}
.chip-taskqc .chip-val,.chip-taskqc .chip-lbl{color:var(--teal);}
.chip-taskqc{border-color:rgba(45,212,191,.15)!important;}

/* Section panel */
.panel{padding:18px 20px;margin-bottom:10px;}
.panel:last-child{margin-bottom:0;}
.panel-hdr{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
.panel-title{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.85);}
.panel-count{font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px;background:var(--gm);color:var(--g);border:1px solid var(--gb);}

/* Rows */
.row{display:grid;grid-template-columns:3px 1fr auto;gap:0 12px;align-items:center;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;transition:background .15s;border-radius:6px;margin:0 -4px;padding-left:4px;padding-right:4px;}
.row:last-child{border-bottom:none;}
.row:hover{background:rgba(255,255,255,.025);}
.row-bar{border-radius:3px;min-height:34px;align-self:stretch;width:3px;}
.bar-red{background:var(--red);}
.bar-amber{background:var(--amber);}
.bar-blue{background:var(--blue);}
.bar-teal{background:var(--teal);}
.bar-dim{background:rgba(255,255,255,.1);}

.row-body{min-width:0;}
.row-title{font-size:12.5px;font-weight:700;color:rgba(255,255,255,.85);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;}
.row-sub{font-size:10.5px;font-weight:500;color:rgba(255,255,255,.35);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:5px;}
.row-tags{display:flex;align-items:center;gap:4px;flex-wrap:wrap;}
.tag{font-size:9.5px;font-weight:600;padding:2px 7px;border-radius:4px;background:rgba(255,255,255,.05);color:rgba(255,255,255,.3);white-space:nowrap;}

.row-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;min-width:72px;}
.badges{display:flex;flex-wrap:wrap;gap:4px;justify-content:flex-end;}
.badge{font-size:9px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;padding:2px 7px;border-radius:4px;white-space:nowrap;}
.badge-overdue{background:var(--redm);color:var(--red);}
.badge-today{background:var(--amberm);color:var(--amber);}
.badge-revision{background:var(--amberm);color:var(--amber);}
.badge-qc{background:var(--bluem);color:var(--blue);}
.badge-taskqc{background:var(--tealm);color:var(--teal);}
.date-txt{font-size:9.5px;font-weight:600;color:rgba(255,255,255,.2);}

.scroll-area{max-height:280px;overflow-y:auto;padding-right:2px;}
.scroll-area::-webkit-scrollbar{width:4px;}
.scroll-area::-webkit-scrollbar-track{background:transparent;}
.scroll-area::-webkit-scrollbar-thumb{background:rgba(255,255,255,.07);border-radius:999px;}

/* Empty */
.empty{padding:40px 20px;text-align:center;}
.empty-icon{font-size:28px;margin-bottom:10px;opacity:.5;}
.empty-val{font-size:16px;font-weight:900;color:var(--g);letter-spacing:-.5px;}
.empty-sub{font-size:11px;color:rgba(255,255,255,.2);margin-top:4px;font-weight:500;}

/* Loading */
.loading{display:flex;align-items:center;justify-content:center;min-height:140px;flex-direction:column;gap:8px;}
.spinner{width:16px;height:16px;border:2px solid rgba(170,255,0,.1);border-top-color:var(--g);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:11px;color:rgba(255,255,255,.2);font-weight:600;}
</style>
</head>
<body>

<div class="header">
  <div>
    <p class="eyebrow">Opxio · Marketing OS</p>
    <h1 class="h-title">Bottlenecks <span class="h-badge" id="hbadge"></span></h1>
  </div>
  <div class="h-right">
    <span class="ts" id="ts"></span>
    <button class="btn" id="rb" onclick="loadData()">↻ Refresh</button>
  </div>
</div>

<div id="dash">
  <div class="loading"><div class="spinner"></div><div class="loading-text">Loading</div></div>
</div>

<script>
const _tok = new URLSearchParams(location.search).get('token') || '';
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtDate(d){
  if(!d) return '';
  const mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const p=d.split('-');
  return mo[parseInt(p[1])-1]+' '+parseInt(p[2]);
}

function barCls(reasons){
  if(reasons.includes('Overdue'))   return 'bar-red';
  if(reasons.includes('Due Today')) return 'bar-amber';
  if(reasons.includes('Revision'))  return 'bar-amber';
  if(reasons.includes('QC Review')) return 'bar-blue';
  if(reasons.includes('Pending QC'))return 'bar-teal';
  return 'bar-dim';
}

function renderBadges(item){
  let h='';
  if(item.reasons.includes('Overdue'))    h+=`<span class="badge badge-overdue">${item.daysOverdue>0?item.daysOverdue+'d late':'Overdue'}</span>`;
  if(item.reasons.includes('Due Today'))  h+=`<span class="badge badge-today">Due Today</span>`;
  if(item.reasons.includes('Revision'))   h+=`<span class="badge badge-revision">Revision</span>`;
  if(item.reasons.includes('QC Review'))  h+=`<span class="badge badge-qc">Content QC</span>`;
  if(item.reasons.includes('Pending QC')) h+=`<span class="badge badge-taskqc">Task QC</span>`;
  return h;
}

function renderRow(item){
  const url = item.url ? item.url.replace(/'/g,"\\'") : '';
  const tags = [
    item.client,
    item.channel?.length ? item.channel.join(' · ') : null,
    item.type?.length    ? item.type.join(', ')     : null,
    item.campaign,
    item.people?.length  ? item.people.join(', ')   : null,
  ].filter(Boolean).map(t => `<span class="tag">${esc(t)}</span>`).join('');

  return `<div class="row" onclick="${url?`window.open('${url}','_blank')`:''}">
    <div class="row-bar ${barCls(item.reasons)}"></div>
    <div class="row-body">
      <div class="row-title">${esc(item.title)}</div>
      ${item.contentName ? `<div class="row-sub">${esc(item.contentName)}</div>` : ''}
      ${tags ? `<div class="row-tags">${tags}</div>` : ''}
    </div>
    <div class="row-right">
      <div class="badges">${renderBadges(item)}</div>
      ${item.deadline ? `<div class="date-txt">${fmtDate(item.deadline)}</div>` : ''}
    </div>
  </div>`;
}

function render(data){
  const total = data.total || 0;

  // Header badge
  const badge = document.getElementById('hbadge');
  badge.textContent = total > 0 ? total + ' issues' : 'All clear';
  badge.className   = 'h-badge ' + (total > 0 ? 'has' : 'clear');

  document.getElementById('ts').textContent =
    new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});

  if(total === 0){
    document.getElementById('dash').innerHTML = `
      <div class="card empty">
        <div class="empty-icon">✓</div>
        <div class="empty-val">No bottlenecks</div>
        <div class="empty-sub">Everything is on track</div>
      </div>`;
    return;
  }

  let html = '';

  // Summary chips
  const chips = [
    {v:data.overdue,   l:'Overdue',  cls:'chip-overdue',  show:data.overdue>0},
    {v:data.dueToday,  l:'Due Today', cls:'chip-today',   show:data.dueToday>0},
    {v:data.revisions, l:'Revision',  cls:'chip-revision', show:data.revisions>0},
    {v:data.contentQC, l:'Final QC',  cls:'chip-qc',       show:data.contentQC>0},
    {v:data.taskQC,    l:'Task QC',   cls:'chip-taskqc',   show:data.taskQC>0},
  ].filter(c => c.show);

  if(chips.length){
    html += `<div class="summary">${chips.map(c =>
      `<div class="card chip ${c.cls}">
        <div class="chip-val">${c.v}</div>
        <div class="chip-lbl">${c.l}</div>
      </div>`
    ).join('')}</div>`;
  }

  // Content section
  if(data.content?.length){
    html += `<div class="card panel">
      <div class="panel-hdr">
        <span class="panel-title">Content</span>
        <span class="panel-count">${data.content.length}</span>
      </div>
      <div class="scroll-area">${data.content.map(renderRow).join('')}</div>
    </div>`;
  }

  // Tasks section
  if(data.tasks?.length){
    html += `<div class="card panel">
      <div class="panel-hdr">
        <span class="panel-title">Tasks · QC</span>
        <span class="panel-count">${data.tasks.length}</span>
      </div>
      <div class="scroll-area">${data.tasks.map(renderRow).join('')}</div>
    </div>`;
  }

  document.getElementById('dash').innerHTML = html;
}

async function loadData(){
  document.getElementById('rb').textContent = '↻ Refreshing…';
  try{
    const r = await fetch('/api/marketing/bottlenecks?token='+_tok);
    if(!r.ok) throw new Error('API '+r.status);
    render(await r.json());
  }catch(e){
    document.getElementById('dash').innerHTML = `
      <div class="loading">
        <div style="font-size:11px;color:#FF6B35;font-weight:700;">Failed to load</div>
        <div style="font-size:9px;color:rgba(255,255,255,.2);margin-top:4px;">${esc(e.message)}</div>
      </div>`;
  }finally{
    document.getElementById('rb').textContent = '↻ Refresh';
  }
}

loadData();
setInterval(loadData, 600000);
</script>
</body>
</html>
