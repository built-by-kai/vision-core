<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Opxio — Product Catalogue</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{font-family:'Satoshi',-apple-system,sans-serif;background:#0D0D0D;color:#fff;overflow-y:auto;padding:20px 20px 0;}
.page-end{height:120px;}
:root{--g:#AAFF00;--gm:rgba(170,255,0,.08);--gb:rgba(170,255,0,.2);}

::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:99px;}

/* ── Edit mode ── */
.btn-edit{background:rgba(170,255,0,.08);border:1px solid rgba(170,255,0,.2);color:rgba(170,255,0,.7);font-family:'Satoshi',sans-serif;font-size:11px;font-weight:700;padding:5px 11px;border-radius:7px;cursor:pointer;transition:all .2s;}
.btn-edit:hover,.btn-edit.active{background:rgba(170,255,0,.15);border-color:var(--g);color:var(--g);}
.btn-edit.active{box-shadow:0 0 0 2px rgba(170,255,0,.15);}
.edit-banner{display:none;align-items:center;gap:8px;background:rgba(170,255,0,.06);border:1px solid rgba(170,255,0,.15);border-radius:10px;padding:8px 14px;margin-bottom:12px;font-size:11px;font-weight:600;color:rgba(170,255,0,.6);}
.edit-banner.show{display:flex;}
.edit-dot{width:6px;height:6px;border-radius:50%;background:var(--g);animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* Edit form in drawer */
.d-edit-section{margin-top:20px;padding-top:20px;border-top:1px solid rgba(170,255,0,.1);}
.d-edit-label{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(170,255,0,.4);margin-bottom:12px;}
.d-edit-grid{display:flex;flex-direction:column;gap:10px;}
.d-edit-row{display:flex;flex-direction:column;gap:4px;}
.d-edit-field-label{font-size:10px;font-weight:700;color:rgba(255,255,255,.25);letter-spacing:.05em;}
.d-edit-input{background:#1A1A1A;border:1px solid rgba(255,255,255,.1);color:#fff;font-family:'Satoshi',sans-serif;font-size:13px;font-weight:500;padding:8px 11px;border-radius:8px;outline:none;width:100%;transition:border-color .2s;}
.d-edit-input:focus{border-color:rgba(170,255,0,.4);}
.d-edit-input.short{width:140px;}
.d-edit-textarea{background:#1A1A1A;border:1px solid rgba(255,255,255,.1);color:#fff;font-family:'Satoshi',sans-serif;font-size:12px;font-weight:500;padding:8px 11px;border-radius:8px;outline:none;width:100%;resize:vertical;min-height:80px;line-height:1.5;transition:border-color .2s;}
.d-edit-textarea:focus{border-color:rgba(170,255,0,.4);}
.d-edit-row-inline{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;}
.d-edit-save{background:var(--g);border:none;color:#000;font-family:'Satoshi',sans-serif;font-size:12px;font-weight:900;padding:9px 20px;border-radius:8px;cursor:pointer;transition:opacity .2s;margin-top:4px;}
.d-edit-save:hover{opacity:.85;}
.d-edit-save:disabled{opacity:.4;cursor:not-allowed;}
.d-edit-status{font-size:11px;font-weight:600;color:rgba(170,255,0,.6);margin-top:6px;min-height:16px;}
.d-edit-status.err{color:rgba(255,100,100,.7);}

/* ── Top bar ── */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:12px;flex-wrap:wrap;}
.brand{display:flex;align-items:center;gap:10px;}
.brand-dot{width:8px;height:8px;border-radius:50%;background:var(--g);}
.brand-name{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.35);}
.topbar-actions{display:flex;align-items:center;gap:6px;}
.btn{background:#1A1A1A;border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.4);font-family:'Satoshi',sans-serif;font-size:11px;font-weight:700;padding:5px 11px;border-radius:7px;cursor:pointer;transition:all .2s;}
.btn:hover{border-color:var(--gb);color:var(--g);}
.ts{font-size:10px;color:rgba(255,255,255,.15);}

/* ── Search ── */
.search-row{display:flex;gap:8px;align-items:center;margin-bottom:16px;}
.search-wrap{position:relative;flex:1;}
.search-input{width:100%;background:#141414;border:1px solid rgba(255,255,255,.07);color:#fff;font-family:'Satoshi',sans-serif;font-size:13px;font-weight:500;padding:10px 14px 10px 38px;border-radius:10px;outline:none;transition:border-color .2s;}
.search-input:focus{border-color:rgba(170,255,0,.3);}
.search-input::placeholder{color:rgba(255,255,255,.2);}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.2);font-size:14px;pointer-events:none;line-height:1;}

/* ── OS Filter tabs ── */
.os-bar{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:20px;}
.os-btn{background:transparent;border:1px solid rgba(255,255,255,.07);color:rgba(255,255,255,.3);font-family:'Satoshi',sans-serif;font-size:11px;font-weight:700;padding:6px 13px;border-radius:8px;cursor:pointer;transition:all .18s;white-space:nowrap;}
.os-btn:hover:not(.active){color:rgba(255,255,255,.6);border-color:rgba(255,255,255,.12);}
.os-btn.active{background:#1A1A1A;color:var(--g);border-color:var(--gb);}

/* ── OS Hero Banner ── */
.os-hero{background:#111;border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:24px 28px;margin-bottom:24px;}
.os-hero-inner{display:flex;align-items:flex-start;justify-content:space-between;gap:24px;flex-wrap:wrap;}
.os-hero-left{flex:1;min-width:260px;}
.os-hero-eyebrow{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:rgba(170,255,0,.5);margin-bottom:6px;}
.os-hero-name{font-size:26px;font-weight:900;letter-spacing:-.03em;color:#fff;margin-bottom:4px;line-height:1.1;}
.os-hero-tagline{font-size:12px;font-weight:500;color:rgba(255,255,255,.35);margin-bottom:16px;line-height:1.5;}
.os-hero-modules-row{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.modules-badge{background:var(--gm);border:1px solid var(--gb);border-radius:8px;padding:6px 14px;display:flex;align-items:center;gap:8px;}
.modules-badge-num{font-size:20px;font-weight:900;color:var(--g);line-height:1;}
.modules-badge-label{font-size:11px;font-weight:700;color:rgba(170,255,0,.7);line-height:1;white-space:nowrap;}
.base-badge{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:6px 12px;font-size:11px;font-weight:700;color:rgba(255,255,255,.3);line-height:1;white-space:nowrap;}
.os-module-chips{display:flex;flex-wrap:wrap;gap:6px;}
.os-module-chip{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:6px;padding:4px 10px;font-size:10.5px;font-weight:600;color:rgba(255,255,255,.45);display:flex;align-items:center;gap:5px;}
.chip-num{font-size:9px;font-weight:900;color:var(--g);opacity:.7;}
.os-hero-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;}
.os-hero-comp{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:700;color:rgba(255,255,255,.2);margin-bottom:2px;}
.comp-dot{width:5px;height:5px;border-radius:50%;background:var(--g);opacity:.5;}
.os-hero-price{display:flex;align-items:baseline;gap:3px;}
.hero-cur{font-size:14px;font-weight:700;color:rgba(170,255,0,.5);}
.hero-val{font-size:36px;font-weight:900;letter-spacing:-.05em;color:var(--g);line-height:1;}
.hero-free{font-size:18px;font-weight:900;letter-spacing:-.02em;color:rgba(255,255,255,.15);}
.os-hero-model{font-size:10px;font-weight:600;color:rgba(255,255,255,.2);text-align:right;}
.os-hero-reqpill{background:rgba(255,154,60,.08);border:1px solid rgba(255,154,60,.15);border-radius:6px;padding:3px 9px;font-size:10px;font-weight:700;color:rgba(255,154,60,.7);margin-top:6px;}

/* Additional OS Layers: 2-column compact grid */
.addon-os-layers-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;max-width:600px;}

/* ── Section header ── */
.section{margin-bottom:28px;}
.section-hdr{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.section-bar{width:3px;height:16px;border-radius:2px;flex-shrink:0;}
.section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.45);}
.section-count{font-size:9px;font-weight:700;color:rgba(255,255,255,.25);background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.07);border-radius:99px;padding:1px 7px;margin-left:2px;}
.section-note{font-size:10px;font-weight:600;color:rgba(255,255,255,.18);margin-left:2px;}
.section-line{flex:1;height:1px;background:rgba(255,255,255,.04);margin-left:8px;}

/* ── Card grid ── */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(215px,260px));gap:10px;}
/* Additional OS Layers: same card width */
.addon-os-layers-grid{grid-template-columns:repeat(auto-fill,minmax(215px,260px)) !important;max-width:none !important;}

/* ── Card ── */
.card{background:#111;border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:16px;display:flex;flex-direction:column;gap:8px;transition:border-color .2s,transform .15s,box-shadow .2s;cursor:pointer;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:12px 12px 0 0;opacity:0;transition:opacity .2s;background:linear-gradient(90deg,var(--card-color,#AAFF00),transparent);}
.card:hover{border-color:rgba(255,255,255,.12);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3);}
.card:hover::before{opacity:1;}
.card-click-hint{position:absolute;bottom:10px;right:12px;font-size:9px;font-weight:700;color:rgba(255,255,255,.1);letter-spacing:.05em;text-transform:uppercase;opacity:0;transition:opacity .2s;}
.card:hover .card-click-hint{opacity:1;}

.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.card-name{font-size:13px;font-weight:700;color:#fff;line-height:1.3;flex:1;}
.card-name-os{font-size:18px;font-weight:900;letter-spacing:-.02em;color:#fff;line-height:1.2;flex:1;}
.tier-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px;}

.card-price{display:flex;align-items:baseline;gap:4px;flex-wrap:wrap;}
.price-val{font-size:22px;font-weight:900;letter-spacing:-.04em;color:var(--g);line-height:1;}
.price-cur{font-size:11px;font-weight:700;color:rgba(170,255,0,.6);margin-right:1px;}
.price-disc{font-size:12px;font-weight:700;color:rgba(255,255,255,.25);font-style:italic;}
.price-range{font-size:11px;font-weight:600;color:rgba(170,255,0,.5);margin-left:2px;}
.card-sub{font-size:10px;font-weight:600;color:rgba(255,255,255,.25);margin-top:-2px;}

/* Card body variants */
.card-module-list{display:flex;flex-direction:column;gap:3px;margin-top:2px;}
.card-module-item{font-size:11px;font-weight:500;color:rgba(255,255,255,.35);display:flex;align-items:flex-start;gap:6px;line-height:1.35;}
.mi-num{font-size:9.5px;font-weight:700;color:rgba(170,255,0,.4);flex-shrink:0;margin-top:1px;}

.card-short{font-size:11.5px;font-weight:500;color:rgba(255,255,255,.35);line-height:1.5;}
.card-dbs{display:flex;align-items:flex-start;gap:6px;margin-top:3px;}
.dbs-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:rgba(255,255,255,.18);flex-shrink:0;margin-top:1px;}
.dbs-val{font-size:10px;font-weight:600;color:rgba(255,255,255,.25);line-height:1.4;}

.card-desc{font-size:11.5px;font-weight:500;color:rgba(255,255,255,.4);line-height:1.55;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}

.card-footer{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-top:auto;padding-top:4px;}
.pill{font-size:9.5px;font-weight:700;padding:2px 8px;border-radius:99px;white-space:nowrap;}
.pill-os{background:rgba(255,255,255,.05);color:rgba(255,255,255,.35);border:1px solid rgba(255,255,255,.06);}
.pill-req{background:rgba(255,154,60,.07);color:rgba(255,154,60,.75);border:1px solid rgba(255,154,60,.14);}
.pill-sub{background:rgba(192,132,252,.07);color:rgba(192,132,252,.8);border:1px solid rgba(192,132,252,.14);}
.pill-disc{background:var(--gm);color:var(--g);border:1px solid var(--gb);}

/* ── Detail Drawer ── */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:100;opacity:0;pointer-events:none;transition:opacity .25s;}
.drawer-overlay.open{opacity:1;pointer-events:all;}
.drawer{position:fixed;top:0;right:0;bottom:0;width:400px;max-width:95vw;background:#141414;border-left:1px solid rgba(255,255,255,.08);z-index:101;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;overflow:hidden;}
.drawer.open{transform:translateX(0);}
.drawer-header{padding:20px 22px 16px;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0;display:flex;align-items:flex-start;gap:12px;}
.drawer-header-left{flex:1;}
.drawer-eyebrow{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px;}
.drawer-name{font-size:20px;font-weight:900;letter-spacing:-.02em;color:#fff;line-height:1.2;}
.drawer-close{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.4);width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;}
.drawer-close:hover{background:rgba(255,255,255,.1);color:#fff;}
.drawer-body{flex:1;overflow-y:auto;padding:20px 22px;}
.drawer-body::-webkit-scrollbar{width:3px;}
.drawer-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:99px;}

/* Drawer sections */
.d-section{margin-bottom:22px;}
.d-label{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.25);margin-bottom:8px;}
.d-price-row{display:flex;align-items:baseline;gap:5px;}
.d-cur{font-size:14px;font-weight:700;color:rgba(170,255,0,.5);}
.d-price{font-size:32px;font-weight:900;letter-spacing:-.04em;color:var(--g);line-height:1;}
.d-range{font-size:14px;font-weight:700;color:rgba(170,255,0,.5);}
.d-price-disc{font-size:16px;font-weight:700;color:rgba(255,255,255,.3);font-style:italic;}
.d-sub{font-size:11px;font-weight:600;color:rgba(255,255,255,.25);margin-top:4px;}
.d-text{font-size:13px;font-weight:500;color:rgba(255,255,255,.5);line-height:1.65;}
.d-about-rows{display:flex;flex-direction:column;gap:6px;margin-top:10px;}
.d-about-row{display:flex;gap:8px;align-items:flex-start;font-size:11.5px;font-weight:500;color:rgba(255,255,255,.35);line-height:1.55;}
.d-about-row-label{font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:rgba(255,255,255,.18);white-space:nowrap;padding-top:2px;min-width:52px;}
.d-about-note{font-size:11px;font-weight:600;color:rgba(170,255,0,.35);margin-top:8px;padding:6px 10px;background:rgba(170,255,0,.04);border:1px solid rgba(170,255,0,.08);border-radius:6px;}
.d-divider{height:1px;background:rgba(255,255,255,.05);margin:20px 0;}
.d-modules{display:flex;flex-direction:column;gap:6px;}
.d-module-row{display:flex;align-items:center;gap:10px;padding:8px 12px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);border-radius:8px;}
.d-module-num{font-size:10px;font-weight:900;color:var(--g);opacity:.6;width:14px;flex-shrink:0;}
.d-module-name{font-size:12px;font-weight:600;color:rgba(255,255,255,.55);}
.d-db-row{display:flex;flex-wrap:wrap;gap:5px;}
.d-db-chip{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:6px;padding:3px 9px;font-size:11px;font-weight:600;color:rgba(255,255,255,.35);}
.d-pills{display:flex;flex-wrap:wrap;gap:5px;}
.d-avail-chip{background:var(--gm);border:1px solid var(--gb);border-radius:6px;padding:3px 9px;font-size:11px;font-weight:600;color:var(--g);}
.d-req-chip{background:rgba(255,154,60,.07);border:1px solid rgba(255,154,60,.14);border-radius:6px;padding:3px 9px;font-size:11px;font-weight:600;color:rgba(255,154,60,.75);}
.d-tier-row{display:flex;align-items:center;gap:8px;}
.d-tier-dot{width:8px;height:8px;border-radius:50%;}
.d-tier-name{font-size:12px;font-weight:600;color:rgba(255,255,255,.4);}
.d-model-row{display:flex;gap:8px;flex-wrap:wrap;}
.d-model-chip{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:6px;padding:4px 10px;font-size:11px;font-weight:600;color:rgba(255,255,255,.35);}
.d-model-chip.highlight{background:rgba(192,132,252,.07);border-color:rgba(192,132,252,.14);color:rgba(192,132,252,.8);}

/* ── Bundle Tiers section ── */
.bundles-section{margin-bottom:32px;}
.bundles-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;}
.bundle-card{background:#111;border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:20px;display:flex;flex-direction:column;gap:12px;align-items:center;text-align:center;}
.bundle-name{font-size:20px;font-weight:900;letter-spacing:-.02em;}
.bundle-os-blocks{display:flex;gap:5px;align-items:center;justify-content:center;}
.bundle-block{width:22px;height:6px;border-radius:3px;}
.bundle-block.empty-block{opacity:.12;background:#fff;}
.bundle-count{font-size:10px;font-weight:700;color:rgba(255,255,255,.3);margin-left:5px;}
.bundle-desc{font-size:12px;font-weight:600;color:rgba(255,255,255,.55);line-height:1.6;}
.bundle-detail{font-size:11px;font-weight:500;color:rgba(255,255,255,.3);line-height:1.6;}
.bundle-note{font-size:10px;font-weight:700;color:rgba(255,255,255,.2);padding-top:8px;border-top:1px solid rgba(255,255,255,.05);width:100%;}
.bundle-tag{display:inline-flex;align-items:center;font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.2);background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:6px;padding:2px 8px;}
.bundle-price-row{display:flex;align-items:baseline;gap:4px;justify-content:center;}

/* ── Add-on OS layers section ── */
.addon-os-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;}
.addon-os-card{background:#111;border:1px solid rgba(170,255,0,.12);}
.addon-os-card{background:#111;border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:20px;display:flex;flex-direction:column;gap:12px;}
.addon-os-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.addon-os-left{flex:1;}
.addon-os-eyebrow{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(170,255,0,.5);margin-bottom:5px;}
.addon-os-name{font-size:20px;font-weight:900;letter-spacing:-.02em;color:#fff;margin-bottom:4px;}
.addon-os-tagline{font-size:12px;font-weight:500;color:rgba(255,255,255,.4);line-height:1.55;}
.addon-os-price{text-align:right;flex-shrink:0;}
.addon-os-cur{font-size:11px;font-weight:700;color:rgba(170,255,0,.5);}
.addon-os-val{font-size:26px;font-weight:900;letter-spacing:-.04em;color:var(--g);line-height:1;}
.addon-os-model{font-size:10px;font-weight:600;color:rgba(255,255,255,.2);margin-top:2px;}
.addon-os-req{display:inline-flex;align-items:center;gap:5px;background:rgba(255,154,60,.07);border:1px solid rgba(255,154,60,.14);border-radius:8px;padding:5px 10px;font-size:10px;font-weight:700;color:rgba(255,154,60,.8);}
.addon-os-req-free{display:inline-flex;align-items:center;gap:5px;background:rgba(170,255,0,.05);border:1px solid rgba(170,255,0,.12);border-radius:8px;padding:5px 10px;font-size:10px;font-weight:700;color:rgba(170,255,0,.5);}

const USD_DIV = 1.3  // market-positioned rate (RM 3,250 ≈ USD 2,500)
function fmtAmt(myr){
  if (myr === null || myr === undefined) return null
  if (currency === 'USD'){
    const usd = myr / USD_DIV
    return usd >= 5000 ? Math.round(usd / 100) * 100 : Math.round(usd / 50) * 50
  }
  return myr
}

function openDrawer(idx){
  const item = allItems[idx]
  if (!item) return
  const c = tierColor(item.tier)

  // Header
  const eyebrowLabel = ADDON_OS_NAMES.includes(item.name) ? 'Additional OS Layer' : (item.tier || '')
  document.getElementById('d-eyebrow').textContent = eyebrowLabel
  document.getElementById('d-eyebrow').style.color = c
  document.getElementById('d-name').textContent = item.name

  let body = ''

  // Price block
  body += `<div class="d-section">`
  body += `<div class="d-label">Pricing</div>`
  if (item.visibility === 'Discovery Only'){
    body += `<div class="d-price-disc">Discovery Call</div>`
    body += `<div class="d-sub">Pricing shared after discovery — scope varies per client.</div>`
  } else if (!item.price || item.price === 0){
    body += `<div class="d-price-disc">Complimentary</div>`
    body += `<div class="d-sub">Always included at no extra cost.</div>`
  } else {
    const hasRange = item.priceMax && item.priceMax !== item.price
    body += `<div class="d-price-row">
      <span class="d-cur">${sym()}</span>
      <span class="d-price">${fmtAmt(item.price).toLocaleString()}</span>
      ${hasRange ? `<span class="d-range">– ${fmtAmt(item.priceMax).toLocaleString()}</span>` : ''}
    </div>`
    if (item.model) body += `<div class="d-sub">${item.model}${item.model === 'Setup + Subscription' && item.monthly ? ` · ${sym()} ${fmtAmt(item.monthly).toLocaleString()}/mo from Month ${item.term||'6'}` : ''}</div>`
  }
  body += `</div><div class="d-divider"></div>`

  // Category + Pricing Model — right after pricing
  body += `<div class="d-section"><div class="d-label">Category</div>`
  body += `<div class="d-tier-row"><div class="d-tier-dot" style="background:${c}"></div><div class="d-tier-name">${ADDON_OS_NAMES.includes(item.name) ? 'Additional OS Layer' : item.tier}</div></div></div>`
  if (item.model){
    body += `<div class="d-section"><div class="d-label">Pricing Model</div><div class="d-model-row">`
    body += `<span class="d-model-chip${item.model === 'Setup + Subscription' ? ' highlight' : ''}">${item.model}</span>`
    if (item.model === 'Setup + Subscription' && item.monthly){
      body += `<span class="d-model-chip highlight">${sym()} ${fmtAmt(item.monthly).toLocaleString()}/mo</span>`
      if (item.term) body += `<span class="d-model-chip">${item.term}</span>`
    }
    body += `</div></div>`
  }
  body += `<div class="d-divider"></div>`

  // About
  const desc = MODULE_DESC[item.name] || item.desc
  if (desc){
    body += `<div class="d-section"><div class="d-label">About</div><div class="d-text">${desc}</div></div>`
    body += `<div class="d-divider"></div>`
  }

  // For OS Packages: show full module list
  const mods = OS_MODULES[item.name]
  if ((item.tier === 'OS Package' || item.tier === 'Entry Point') && mods){
    body += `<div class="d-section"><div class="d-label">Included Modules (${mods.length})</div>`
    body += `<div class="d-modules">`
    mods.forEach((m,i) => {
      body += `<div class="d-module-row"><span class="d-module-num">${i+1}</span><span class="d-module-name">${m}</span></div>`
    })
    body += `</div></div><div class="d-divider"></div>`
    // Base OS — clear label + chips
    body += `<div class="d-section">
      <div class="d-label">Also Includes</div>
      <div style="font-size:10px;font-weight:700;color:rgba(170,255,0,.4);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;">Base OS — Complimentary</div>
      <div class="d-db-row">${['Companies & People','Client Accounts','Team Members & Staff Directory','Company Profile','Dashboard Hub'].map(m=>`<span class="d-db-chip">${m}</span>`).join('')}</div>
    </div><div class="d-divider"></div>`
  }

  // Databases
  const dbs = MODULE_DBS[item.name]
  if (dbs && item.tier !== 'OS Package'){
    body += `<div class="d-section"><div class="d-label">Connected Databases</div>`
    body += `<div class="d-text" style="font-size:11px;margin-bottom:8px;color:rgba(255,255,255,.25)">Databases this module reads from and writes to.</div>`
    body += `<div class="d-db-row">`
    dbs.forEach(db => { body += `<span class="d-db-chip">${db}</span>` })
    body += `</div></div><div class="d-divider"></div>`
  }

  // Available To
  if (item.avail && item.avail.length && item.tier !== 'OS Package'){
    body += `<div class="d-section"><div class="d-label">Available To</div><div class="d-pills">`
    item.avail.forEach(a => { body += `<span class="d-avail-chip">${a}</span>` })
    body += `</div></div>`
  }

  // Requires
  if (item.requiresNames && item.requiresNames.length){
    body += `<div class="d-section"><div class="d-label">Requires</div><div class="d-pills">`
    item.requiresNames.forEach(r => { body += `<span class="d-req-chip">${r}</span>` })
    body += `</div></div>`
  }

  // ── Edit form (Opxio only, edit mode active) ─────────────────────────────
  if (isOpxio && editMode){
    const TIER_OPTIONS = ['OS Package','Core Module','Expansion Module','Automation','Dashboard & Widget','Integration','AI Agent','Maintenance Retainer']
    const OS_OPTIONS   = ['Revenue OS','Operations OS','Marketing OS','Finance OS','Team OS','Retention OS','Intelligence OS','Any OS']
    const MODEL_OPTIONS= ['One-Time','Setup + Subscription','Subscription','Complimentary']

    const availChecks = OS_OPTIONS.map(os =>
      `<label style="display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:rgba(255,255,255,.4);cursor:pointer;white-space:nowrap;">
        <input type="checkbox" data-avail="${os}" ${item.avail.includes(os)?'checked':''} style="accent-color:var(--g);cursor:pointer;">
        ${os}
      </label>`
    ).join('')

    const tierOpts = TIER_OPTIONS.map(t =>
      `<option value="${t}" ${item.tier===t?'selected':''}>${t}</option>`
    ).join('')
    const modelOpts = MODEL_OPTIONS.map(m =>
      `<option value="${m}" ${(item.model||'One-Time')===m?'selected':''}>${m}</option>`
    ).join('')

    body += `
    <div class="d-edit-section">
      <div class="d-edit-label">✎ Edit — syncs to Notion on save</div>
      <div class="d-edit-grid">

        <div class="d-edit-row">
          <span class="d-edit-field-label">Product Name</span>
          <input class="d-edit-input" id="ef-name" value="${item.name.replace(/"/g,'&quot;')}" placeholder="Product name"/>
        </div>

        <div class="d-edit-row">
          <span class="d-edit-field-label">Description</span>
          <textarea class="d-edit-textarea" id="ef-desc">${item.desc||''}</textarea>
        </div>

        <div class="d-edit-row-inline">
          <div class="d-edit-row">
            <span class="d-edit-field-label">Price (MYR)</span>
            <input class="d-edit-input short" id="ef-price" type="number" value="${item.price??''}" placeholder="e.g. 3250"/>
          </div>
          <div class="d-edit-row">
            <span class="d-edit-field-label">Price Max</span>
            <input class="d-edit-input short" id="ef-pricemax" type="number" value="${item.priceMax??''}" placeholder="optional"/>
          </div>
          <div class="d-edit-row">
            <span class="d-edit-field-label">Monthly (MYR)</span>
            <input class="d-edit-input short" id="ef-monthly" type="number" value="${item.monthly??''}" placeholder="optional"/>
          </div>
        </div>

        <div class="d-edit-row-inline">
          <div class="d-edit-row">
            <span class="d-edit-field-label">Tier</span>
            <select class="d-edit-input short" id="ef-tier" style="cursor:pointer">${tierOpts}</select>
          </div>
          <div class="d-edit-row">
            <span class="d-edit-field-label">Pricing Model</span>
            <select class="d-edit-input short" id="ef-model" style="cursor:pointer">${modelOpts}</select>
          </div>
          <div class="d-edit-row">
            <span class="d-edit-field-label">Order</span>
            <input class="d-edit-input short" id="ef-order" type="number" value="${item.order??''}" placeholder="sort order"/>
          </div>
        </div>

        <div class="d-edit-row">
          <span class="d-edit-field-label">Available To</span>
          <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:4px">${availChecks}</div>
        </div>

        <div>
          <button class="d-edit-save" id="ef-save-btn" onclick="saveEdit('${item.id}')">Save to Notion</button>
          <div class="d-edit-status" id="ef-status"></div>
        </div>

      </div>
    </div>`
  }

  document.getElementById('d-body').innerHTML = body
  document.getElementById('overlay').classList.add('open')
  const drawer = document.getElementById('drawer')
  drawer.classList.add('open')
  drawer.dataset.idx = idx
  document.body.style.overflow = 'hidden'
}

function closeDrawer(){
  document.getElementById('overlay').classList.remove('open')
  document.getElementById('drawer').classList.remove('open')
  document.body.style.overflow = ''
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrawer() })

// ─── Build UI ────────────────────────────────────────────────────────────────
function buildOSBar(){
  document.getElementById('os-bar').innerHTML = OS_LIST.map(os =>
    `<button class="os-btn${activeOS===os?' active':''}" onclick="setOS('${os}')">${os}</button>`
  ).join('')
}

function setOS(os){ activeOS=os; render() }

function filterItems(){
  const q = document.getElementById('search').value.trim().toLowerCase()
  return allItems.filter(item => {
    const osMatch = activeOS === 'All'
      ? true
      : item.tier === 'OS Package'
        || (item.tier !== 'Entry Point' && item.avail.includes(activeOS))
    const searchMatch = !q
      || item.name.toLowerCase().includes(q)
      || item.desc.toLowerCase().includes(q)
      || item.avail.some(a => a.toLowerCase().includes(q))
    return osMatch && searchMatch
  })
}

function priceHTML(item){
  if (item.visibility === 'Discovery Only')
    return `<div class="card-price"><div class="price-disc">Discovery Call</div></div>`
  if (!item.price && item.price !== 0)
    return `<div class="card-price"><div class="price-disc">Custom</div></div>`
  if (item.price === 0)
    return `<div class="card-price"><div class="price-disc">Complimentary</div></div>`
  const hasRange = item.priceMax && item.priceMax !== item.price
  return `<div class="card-price">
    <span class="price-cur">${sym()}</span>
    <span class="price-val">${fmtAmt(item.price).toLocaleString()}</span>
    ${hasRange ? `<span class="price-range">– ${fmtAmt(item.priceMax).toLocaleString()}</span>` : ''}
  </div>
  ${item.model === 'Setup + Subscription' && item.monthly
    ? `<div class="card-sub">+ ${sym()} ${fmtAmt(item.monthly).toLocaleString()}/mo</div>`
    : ''}`
}

function cardBodyHTML(item){
  if (item.tier === 'OS Package' || item.tier === 'Entry Point'){
    const mods = OS_MODULES[item.name]
    if (mods){
      return `<div class="card-module-list">${
        mods.map((m,i) => `<div class="card-module-item"><span class="mi-num">${i+1}</span><span>${m}</span></div>`).join('')
      }</div>`
    }
  }
  if (item.tier === 'Core Module' || item.tier === 'Expansion Module' || item.tier === 'Automation' || item.tier === 'Dashboard & Widget' || item.tier === 'Integration'){
    const desc = MODULE_DESC[item.name] || ''
    const dbs  = (MODULE_DBS[item.name] || []).join(' · ')
    return `${desc ? `<div class="card-short">${desc}</div>` : ''}
    ${dbs ? `<div class="card-dbs"><span class="dbs-label">Uses</span><span class="dbs-val">${dbs}</span></div>` : ''}`
  }
  return item.desc ? `<div class="card-desc">${item.desc}</div>` : ''
}

function footerHTML(item){
  const pills = []
  if (item.visibility === 'Discovery Only') pills.push(`<span class="pill pill-disc">Discovery Only</span>`)
  if (item.model === 'Setup + Subscription') pills.push(`<span class="pill pill-sub">Subscription</span>`)
  if (item.requiresNames && item.requiresNames.length)
    item.requiresNames.forEach(r => pills.push(`<span class="pill pill-req">Req: ${r}</span>`))
  else if (item.avail && item.avail.length && item.tier !== 'OS Package')
    item.avail.slice(0,2).forEach(a => pills.push(`<span class="pill pill-os">${a}</span>`))
  return pills.join('')
}

function cardHTML(item, idx){
  const c = tierColor(item.tier)
  const footer = footerHTML(item)
  const body = cardBodyHTML(item)
  return `<div class="card" onclick="openDrawer(${idx})" style="--card-color:${c}">
    <div class="card-top">
      <div class="${(item.tier === 'OS Package' || item.tier === 'Entry Point') ? 'card-name-os' : 'card-name'}">${item.name}</div>
      <div class="tier-dot" style="background:${c};box-shadow:0 0 6px ${c}55"></div>
    </div>
    ${priceHTML(item)}
    ${body}
    ${footer ? `<div class="card-footer">${footer}</div>` : ''}
    <div class="card-click-hint">View details →</div>
  </div>`
}

function sectionHTML(title, color, items, note=''){
  if (!items.length) return ''
  return `<div class="section">

      <div class="section-bar" style="background:${color}"></div>

function render(){
  buildOSBar()
  const filtered = filterItems()
  const el = document.getElementById('catalogue')

  if (!filtered.length){
    el.innerHTML = '<div class="empty">No products match</div>'
    return
  }

  let html = ''

  if (activeOS === 'All'){
    html += bundleSectionHTML()

    // ── OS Packages ───────────────────────────────────────────────────────────
    const osPkgItems   = filtered.filter(x => x.tier === 'OS Package' && !ADDON_OS_NAMES.includes(x.name))
    const addonOSItems = filtered.filter(x => x.tier === 'OS Package' && ADDON_OS_NAMES.includes(x.name))
    const entryItems   = filtered.filter(x => x.tier === 'Entry Point')

    if (osPkgItems.length){
      html += `<div class="section">
        <div class="section-hdr">
          <div class="section-bar" style="background:#AAFF00"></div>
          <span class="section-title">OS Packages</span>
          <span class="section-count">${osPkgItems.length} items</span>
          <div class="section-line"></div>
        </div>
        <div class="cards">${osPkgItems.map(item => cardHTML(item, allItems.indexOf(item))).join('')}</div>
      </div>`
    }

    // ── Additional OS Layers ──────────────────────────────────────────────────
    if (addonOSItems.length){
      html += `<div class="section">
        <div class="section-hdr">
          <div class="section-bar" style="background:var(--g)"></div>
          <span class="section-title">Additional OS Layers</span>
          <span class="section-count">${addonOSItems.length} items</span>
          <span class="section-note">Add to any install at any time</span>
          <div class="section-line"></div>
        </div>
        <div class="addon-os-layers-grid">${addonOSItems.map(item => cardHTML(item, allItems.indexOf(item))).join('')}</div>
      </div>`
    }

    // ── Entry Point ───────────────────────────────────────────────────────────
    if (entryItems.length){
      html += sectionHTML('Entry Point', '#94A3B8', entryItems, 'Upgrade credit applies')
    }

    // ── All other tiers ───────────────────────────────────────────────────────
    for (const tier of TIERS){
      if (['OS Package','Entry Point'].includes(tier.key)) continue
      const group = filtered.filter(x => x.tier === tier.key)
      if (group.length) html += sectionHTML(tier.label, tier.color, group)
    }
  } else {
    html += osHeroHTML(activeOS)
    const included = filtered.filter(x => x.tier === 'Core Module')
    const addons   = filtered.filter(x => !['OS Package','Core Module'].includes(x.tier))

    // Base OS section — always shown on OS tabs
    const baseModules = OS_MODULES['Base OS'] || []
    html += `<div class="section">
      <div class="section-hdr">
        <div class="section-bar" style="background:#AAFF00"></div>
        <span class="section-title">Base OS</span>
        <span class="section-count">${baseModules.length} items</span>
        <span class="section-note">Always included · Complimentary</span>
        <div class="section-line"></div>
      </div>
      <div class="cards">${baseModules.map(m => {
        const dbs = (MODULE_DBS[m] || []).join(' · ')
        const desc = MODULE_DESC[m] || ''
        return `<div class="card" style="opacity:.7" onclick="">
          <div class="card-top">
            <div class="card-name">${m}</div>
            <div class="tier-dot" style="background:#AAFF00;box-shadow:0 0 6px #AAFF0055"></div>
          </div>
          <div class="card-price"><div class="price-disc">Complimentary</div></div>
          ${desc ? `<div class="card-short">${desc}</div>` : ''}
          ${dbs ? `<div class="card-dbs"><span class="dbs-label">Uses</span><span class="dbs-val">${dbs}</span></div>` : ''}
        </div>`
      }).join('')}</div>
    </div>`

    if (included.length){
      html += `<div class="section">
        <div class="section-hdr">
          <div class="section-bar" style="background:#60A5FA"></div>
          <span class="section-title">Core Modules</span>
          <span class="section-count">${included.length} item${included.length !== 1 ? 's' : ''}</span>
          <span class="section-note">Included with ${activeOS}</span>
          <div class="section-line"></div>
        </div>
        <div class="cards">${included.map(item => cardHTML(item, allItems.indexOf(item))).join('')}</div>
      </div>`
    }

    if (addons.length){
      for (const tier of TIERS.filter(t => !['OS Package','Core Module'].includes(t.key))){
        const group = addons.filter(x => x.tier === tier.key)
        if (group.length) html += sectionHTML(tier.label, tier.color, group, 'Add-on')
      }
    }

    // Retention OS expansion — shown on Revenue OS and Marketing OS tabs
    if (activeOS === 'Revenue OS' || activeOS === 'Marketing OS'){
      const retOS = ADDON_OS.find(x => x.name === 'Retention OS')
      if (retOS) html += retentionExpansionHTML(retOS, activeOS === 'Marketing OS' ? 'marketing' : 'revenue')
    }
  }

  el.innerHTML = html
}

async function load(){
  document.getElementById('refresh-btn').textContent = '↻ Loading…'
  try {
    const r = await fetch(apiUrl('/api/data/catalogue'))
    if (!r.ok) throw new Error('HTTP ' + r.status)
    const data = await r.json()
    allItems = data.items || []
    const d = new Date(data.ts)
    document.getElementById('ts').textContent = d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})
    // Show edit button only for Opxio internal token
    if (isOpxio) document.getElementById('edit-toggle-btn').style.display = 'inline-flex'
    render()
  } catch(e){
    document.getElementById('catalogue').innerHTML = `<div class="empty">Failed to load — ${e.message}</div>`
  }
  document.getElementById('refresh-btn').textContent = '↻ Refresh'
}

function doRefresh(){ load() }

async function saveEdit(pageId){
  const btn    = document.getElementById('ef-save-btn')
  const status = document.getElementById('ef-status')
  btn.disabled = true
  btn.textContent = 'Saving…'
  status.textContent = ''
  status.className = 'd-edit-status'

  const availChecked = [...document.querySelectorAll('[data-avail]:checked')].map(el => el.dataset.avail)

  const fields = {
    name:     document.getElementById('ef-name')?.value?.trim() || undefined,
    desc:     document.getElementById('ef-desc')?.value?.trim() ?? undefined,
    price:    document.getElementById('ef-price')?.value !== '' ? Number(document.getElementById('ef-price').value) : null,
    priceMax: document.getElementById('ef-pricemax')?.value !== '' ? Number(document.getElementById('ef-pricemax').value) : null,
    monthly:  document.getElementById('ef-monthly')?.value !== '' ? Number(document.getElementById('ef-monthly').value) : null,
    tier:     document.getElementById('ef-tier')?.value || undefined,
    model:    document.getElementById('ef-model')?.value || undefined,
    order:    document.getElementById('ef-order')?.value !== '' ? Number(document.getElementById('ef-order').value) : undefined,
    avail:    availChecked,
  }

  try {
    const r = await fetch('/api/data/catalogue-update?token=' + encodeURIComponent(_tok), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pageId, fields }),
    })
    const data = await r.json()
    if (!r.ok) throw new Error(data.error || 'Save failed')
    status.textContent = '✓ Saved to Notion'
    status.className = 'd-edit-status'
    // Refresh data in background
    setTimeout(() => load(), 800)
  } catch(e) {
    status.textContent = '✗ ' + e.message
    status.className = 'd-edit-status err'
  } finally {
    btn.disabled = false
    btn.textContent = 'Save to Notion'
  }
}
load()
</script>
