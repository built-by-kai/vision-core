<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Opxio — Proposals & Payments</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}html{height:100%;}
body{font-family:'Satoshi',-apple-system,sans-serif;padding:14px;background:#191919;color:#fff;overflow-y:auto;height:100%;transition:background .3s,color .3s;}
body.light{background:#F5F5F5;color:#111;}
:root{--g:#AAFF00;--gm:rgba(170,255,0,.12);--gb:rgba(170,255,0,.18);}
body.light{--g:#5C9900;--gm:rgba(92,153,0,.1);--gb:rgba(92,153,0,.2);}

.card{background:#1E1E1E;border:1px solid rgba(255,255,255,.06);border-radius:14px;transition:border-color .2s;}
.card:hover{border-color:rgba(170,255,0,.1);}
body.light .card{background:#fff;border-color:rgba(0,0,0,.06);}

.btn{background:#252525;border:1px solid rgba(255,255,255,.09);color:rgba(255,255,255,.45);font-family:'Satoshi',sans-serif;font-size:11px;font-weight:700;padding:5px 11px;border-radius:7px;cursor:pointer;transition:all .2s;}
.btn:hover{border-color:var(--gb);color:var(--g);}
body.light .btn{background:#EFEFEF;border-color:rgba(0,0,0,.08);color:rgba(0,0,0,.4);}

.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px;}
.h-right{display:flex;align-items:center;gap:6px;}
.eyebrow{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.22);margin-bottom:2px;}
body.light .eyebrow{color:rgba(0,0,0,.28);}
.h-title{font-size:18px;font-weight:900;color:#fff;letter-spacing:-.03em;}
body.light .h-title{color:#111;}
.ts{font-size:9px;font-weight:500;color:rgba(255,255,255,.18);}
body.light .ts{color:rgba(0,0,0,.22);}

/* section label */
.sec-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.22);margin:16px 0 8px;}
body.light .sec-lbl{color:rgba(0,0,0,.28);}

/* grids */
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
@media(max-width:600px){.g4{grid-template-columns:repeat(2,1fr);}}
@media(max-width:480px){.g3{grid-template-columns:repeat(2,1fr);}}

/* stat card */
.stat{padding:16px 18px;position:relative;}
.s-dot{position:absolute;top:13px;right:13px;width:6px;height:6px;border-radius:50%;background:var(--g);opacity:.6;}
.s-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.5);margin-bottom:10px;display:block;}
body.light .s-lbl{color:rgba(0,0,0,.4);}
.s-val{font-size:28px;font-weight:900;letter-spacing:-1.5px;line-height:1;color:var(--g);}
body.light .s-val{color:#5C9900;}
.s-sub{font-size:9.5px;font-weight:500;color:rgba(255,255,255,.22);margin-top:6px;}
body.light .s-sub{color:rgba(0,0,0,.28);}

/* invoice card — bigger RM amount */
.inv-stat{padding:18px 20px;position:relative;}
.inv-stat .s-dot{top:16px;right:16px;}
.inv-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.5);margin-bottom:12px;display:block;}
body.light .inv-lbl{color:rgba(0,0,0,.4);}
.inv-val{font-size:26px;font-weight:900;letter-spacing:-1px;line-height:1;color:var(--g);}
.inv-count{font-size:10px;font-weight:700;color:rgba(255,255,255,.3);margin-top:6px;}
body.light .inv-count{color:rgba(0,0,0,.3);}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:999px;}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.2);}
body.light ::-webkit-scrollbar-thumb{background:rgba(0,0,0,.1);}
body.light ::-webkit-scrollbar-thumb:hover{background:rgba(0,0,0,.18);}
</style></head><body>

<div class="header">
  <div><p class="eyebrow">Opxio · Revenue</p><h1 class="h-title">Proposals & Payments</h1></div>
  <div class="h-right">
    <span class="ts" id="ts"></span>
    <button class="btn" onclick="doRefresh()" id="rb">↻ Refresh</button>
    <button class="btn" onclick="toggleMode()" id="mb">☀ Light</button>
  </div>
</div>

<!-- QUOTATIONS BY STATUS -->
<div class="sec-lbl">Quotations</div>
<div class="g4">
  <div class="card stat">
    <div class="s-dot"></div>
    <span class="s-lbl">Draft</span>
    <div class="s-val" id="q-draft">0</div>
    <div class="s-sub">Not yet sent</div>
  </div>
  <div class="card stat">
    <div class="s-dot"></div>
    <span class="s-lbl">Issued</span>
    <div class="s-val" id="q-issued">0</div>
    <div class="s-sub">Sent, awaiting reply</div>
  </div>
  <div class="card stat">
    <div class="s-dot"></div>
    <span class="s-lbl">Approved</span>
    <div class="s-val" id="q-approved">0</div>
    <div class="s-sub">Client confirmed</div>
  </div>
  <div class="card stat">
    <div class="s-dot orange"></div>
    <span class="s-lbl">Rejected</span>
    <div class="s-val expense" id="q-rejected">0</div>
    <div class="s-sub">Declined or expired</div>
  </div>
</div>

<!-- INVOICES BY STATUS -->
<div class="sec-lbl">Invoices</div>
<div class="g3">
  <div class="card inv-stat">
    <div class="s-dot"></div>
    <span class="inv-lbl">Deposit Pending</span>
    <div class="inv-val" id="i-deposit">RM 0</div>
    <div class="inv-count" id="i-deposit-count">0 invoices</div>
  </div>
  <div class="card inv-stat">
    <div class="s-dot"></div>
    <span class="inv-lbl">Balance Pending</span>
    <div class="inv-val" id="i-balance">RM 0</div>
    <div class="inv-count" id="i-balance-count">0 invoices</div>
  </div>
  <div class="card inv-stat">
    <div class="s-dot"></div>
    <span class="inv-lbl">Fully Paid</span>
    <div class="inv-val" id="i-paid">RM 0</div>
    <div class="inv-count" id="i-paid-count">0 invoices</div>
  </div>
</div>

<script>
const _tok = new URLSearchParams(location.search).get('token') || '';
function apiUrl(path){ return _tok ? path+'?token='+encodeURIComponent(_tok) : path; }
let light=false;
function toggleMode(){light=!light;document.body.classList.toggle('light',light);document.getElementById('mb').textContent=light?'🌙 Dark':'☀ Light';}
function setTs(){document.getElementById('ts').textContent='Updated '+new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}
function doRefresh(){const b=document.getElementById('rb');b.textContent='↻';b.style.opacity='.4';setTimeout(()=>{b.textContent='↻ Refresh';b.style.opacity='1';setTs();},800);}
setTs();setInterval(doRefresh,5*60*1000);

function fmtRM(n){
  if(n>=1000) return 'RM '+(n/1000).toFixed(1).replace(/\.0$/,'')+'K';
  return 'RM '+Math.round(n).toLocaleString();
}

function render(d){
  document.getElementById('q-draft').textContent    = d.qDraft;
  document.getElementById('q-issued').textContent   = d.qIssued;
  document.getElementById('q-approved').textContent = d.qApproved;
  document.getElementById('q-rejected').textContent = d.qRejected;

  document.getElementById('i-deposit').textContent       = fmtRM(d.iDepositAmt);
  document.getElementById('i-deposit-count').textContent = d.iDepositCount + ' invoice' + (d.iDepositCount!==1?'s':'');
  document.getElementById('i-balance').textContent       = fmtRM(d.iBalanceAmt);
  document.getElementById('i-balance-count').textContent = d.iBalanceCount + ' invoice' + (d.iBalanceCount!==1?'s':'');
  document.getElementById('i-paid').textContent          = fmtRM(d.iPaidAmt);
  document.getElementById('i-paid-count').textContent    = d.iPaidCount + ' invoice' + (d.iPaidCount!==1?'s':'');
}

async function loadData(){
  try {
    const r = await fetch(apiUrl('/api/data/finance'));
    const j = await r.json();
    const q = j.quotations || {}, inv = j.invoices || {};
    render({
      qDraft:    q.Draft    || 0,
      qIssued:   q.Issued   || 0,
      qApproved: q.Approved || 0,
      qRejected: q.Rejected || 0,
      iDepositAmt:   inv.depositPending?.total || 0,
      iDepositCount: inv.depositPending?.count || 0,
      iBalanceAmt:   inv.balancePending?.total || 0,
      iBalanceCount: inv.balancePending?.count || 0,
      iPaidAmt:   inv.paid?.total || 0,
      iPaidCount: inv.paid?.count || 0,
    });
    setTs();
  } catch(e){ console.error('finance widget:', e); }
}
loadData();
function doRefresh(){const b=document.getElementById('rb');b.textContent='↻';b.style.opacity='.4';loadData().then(()=>{b.textContent='↻ Refresh';b.style.opacity='1';});}
setInterval(loadData, 5*60*1000);
</script></body></html>
