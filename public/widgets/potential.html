<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Opxio — Potential Deals</title><link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}html{height:100%;}
body{font-family:'Satoshi',-apple-system,sans-serif;padding:14px;background:#191919;color:#fff;overflow-y:auto;height:100%;transition:background .3s,color .3s;}
body.light{background:#F5F5F5;color:#111;}
:root{--g:#AAFF00;--gm:rgba(170,255,0,.12);--gb:rgba(170,255,0,.18);--amber:#FFB800;--amberm:rgba(255,184,0,.12);}
body.light{--g:#5C9900;--gb:rgba(92,153,0,.22);}
.card{background:#1E1E1E;border:1px solid rgba(255,255,255,.06);border-radius:14px;transition:border-color .2s;}
.card:hover{border-color:rgba(170,255,0,.12);}
body.light .card{background:#fff;border-color:rgba(0,0,0,.07);}
.btn{background:#252525;border:1px solid rgba(255,255,255,.09);color:rgba(255,255,255,.45);font-family:'Satoshi',sans-serif;font-size:11px;font-weight:700;padding:5px 11px;border-radius:7px;cursor:pointer;transition:all .2s;}
.btn:hover{border-color:var(--gb);color:var(--g);}
body.light .btn{background:#EFEFEF;border-color:rgba(0,0,0,.08);color:rgba(0,0,0,.4);}
.eyebrow{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.22);margin-bottom:2px;}
body.light .eyebrow{color:rgba(0,0,0,.28);}
.h-title{font-size:18px;font-weight:900;letter-spacing:-.03em;}
.ts{font-size:9px;font-weight:500;color:rgba(255,255,255,.18);}
body.light .ts{color:rgba(0,0,0,.22);}

/* stage stat cards */
.stat{padding:16px 18px;position:relative;}
.stat-dot{position:absolute;top:13px;right:13px;width:6px;height:6px;border-radius:50%;background:var(--g);opacity:.5;}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--g),transparent);opacity:0;transition:opacity .25s;border-radius:14px 14px 0 0;}
.stat:hover::before{opacity:1;}
.s-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.5);margin-bottom:10px;}
body.light .s-lbl{color:rgba(0,0,0,.38);}
.s-val{font-size:32px;font-weight:900;letter-spacing:-1.5px;line-height:1;color:var(--g);}
.s-sub{font-size:10px;font-weight:500;color:rgba(255,255,255,.2);margin-top:7px;}
body.light .s-sub{color:rgba(0,0,0,.28);}

/* awaiting deposit — amber accent */
.stat.is-awaiting::before{background:linear-gradient(90deg,var(--amber),transparent);}
.stat.is-awaiting .stat-dot{background:var(--amber);}
.stat.is-awaiting .s-val{color:var(--amber);}
.stat.is-awaiting:hover{border-color:rgba(255,184,0,.18);}

/* compound stat cards (proposals / quotations) */
.compound{padding:16px 18px;}
.c-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;}
.c-total{font-size:30px;font-weight:900;letter-spacing:-1.5px;line-height:1;color:var(--g);}
.c-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.5);margin-bottom:3px;}
body.light .c-title{color:rgba(0,0,0,.38);}
.c-badge{font-size:8px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 7px;border-radius:5px;background:var(--gm);color:var(--g);border:1px solid rgba(170,255,0,.15);}
.c-rows{display:flex;flex-direction:column;gap:5px;}
.c-row{display:flex;align-items:center;justify-content:space-between;}
.c-row-lbl{font-size:10px;font-weight:500;color:rgba(255,255,255,.3);}
body.light .c-row-lbl{color:rgba(0,0,0,.35);}
.c-row-val{font-size:12px;font-weight:800;letter-spacing:-.3px;color:rgba(255,255,255,.75);}
body.light .c-row-val{color:rgba(0,0,0,.65);}
.c-row-val.is-green{color:var(--g);}
.c-divider{height:1px;background:rgba(255,255,255,.05);margin:8px 0;}
body.light .c-divider{background:rgba(0,0,0,.06);}

/* grids */
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
@media(max-width:640px){.grid3{grid-template-columns:repeat(2,1fr);}}
@media(max-width:380px){.grid3,.grid2{grid-template-columns:1fr;}}

/* section label */
.section-lbl{font-size:9px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:rgba(255,255,255,.18);margin:14px 0 8px 2px;}
body.light .section-lbl{color:rgba(0,0,0,.22);}

/* pipeline bar */
.pipe-bar{display:flex;gap:0;height:4px;border-radius:4px;overflow:hidden;margin-top:10px;}
.pipe-seg{flex:1;background:rgba(255,255,255,.08);transition:background .3s;}
.pipe-seg.is-active{background:var(--g);}
.pipe-seg.is-amber{background:var(--amber);}

::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:999px;}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.2);}
</style></head><body>

<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
  <div><p class="eyebrow">OPXIO · Revenue OS</p><h1 class="h-title">Potential Deals</h1></div>
  <div style="display:flex;align-items:center;gap:6px;">
    <span class="ts" id="ts"></span>
    <button class="btn" onclick="doRefresh()" id="rb">↻ Refresh</button>
    <button class="btn" onclick="toggleMode()" id="mb">☀ Light</button>
  </div>
</div>

<div class="section-lbl">Deal Stages</div>
<div class="grid3">
  <div class="card stat">
    <div class="stat-dot"></div>
    <div class="s-lbl">Incoming</div>
    <div class="s-val" id="v-incoming">—</div>
    <div class="s-sub">Existing clients</div>
  </div>
  <div class="card stat">
    <div class="stat-dot"></div>
    <div class="s-lbl">Discovery Done</div>
    <div class="s-val" id="v-discovery">—</div>
    <div class="s-sub">Scoping complete</div>
  </div>
  <div class="card stat is-awaiting">
    <div class="stat-dot"></div>
    <div class="s-lbl">Awaiting Deposit</div>
    <div class="s-val" id="v-awaiting">—</div>
    <div class="s-sub">Quote approved</div>
  </div>
</div>

<div class="section-lbl">Documents</div>
<div class="grid2">
  <!-- Proposals -->
  <div class="card compound">
    <div class="c-header">
      <div>
        <div class="c-title">Proposals</div>
        <div class="c-total" id="p-total">—</div>
      </div>
      <div class="c-badge">Total</div>
    </div>
    <div class="c-divider"></div>
    <div class="c-rows">
      <div class="c-row">
        <span class="c-row-lbl">Draft</span>
        <span class="c-row-val" id="p-draft">—</span>
      </div>
      <div class="c-row">
        <span class="c-row-lbl">Sent</span>
        <span class="c-row-val" id="p-sent">—</span>
      </div>
      <div class="c-row">
        <span class="c-row-lbl">Accepted</span>
        <span class="c-row-val is-green" id="p-accepted">—</span>
      </div>
    </div>
  </div>

  <!-- Quotations -->
  <div class="card compound">
    <div class="c-header">
      <div>
        <div class="c-title">Quotations</div>
        <div class="c-total" id="q-total">—</div>
      </div>
      <div class="c-badge">Total</div>
    </div>
    <div class="c-divider"></div>
    <div class="c-rows">
      <div class="c-row">
        <span class="c-row-lbl">Draft</span>
        <span class="c-row-val" id="q-draft">—</span>
      </div>
      <div class="c-row">
        <span class="c-row-lbl">Issued</span>
        <span class="c-row-val" id="q-issued">—</span>
      </div>
      <div class="c-row">
        <span class="c-row-lbl">Approved</span>
        <span class="c-row-val is-green" id="q-approved">—</span>
      </div>
    </div>
  </div>
</div>

<script>
const _tok = new URLSearchParams(location.search).get('token') || '';
function apiUrl(p){ return _tok ? p+'?token='+encodeURIComponent(_tok) : p; }
let light = false;
function toggleMode(){ light=!light; document.body.classList.toggle('light',light); document.getElementById('mb').textContent=light?'🌙 Dark':'☀ Light'; }
function setTs(){ document.getElementById('ts').textContent='Updated '+new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); }
async function loadData(){
  try {
    const r = await fetch(apiUrl('/api/data/deals'));
    const j = await r.json();
    const s = j.stages || {};
    document.getElementById('v-incoming').textContent  = s['Incoming']          ?? 0;
    document.getElementById('v-discovery').textContent = s['Discovery Done']    ?? 0;
    document.getElementById('v-awaiting').textContent  = s['Awaiting Deposit']  ?? 0;
    // proposals
    const p = j.proposals || {};
    document.getElementById('p-total').textContent    = p.total    ?? 0;
    document.getElementById('p-draft').textContent    = p.Draft    ?? 0;
    document.getElementById('p-sent').textContent     = (p.Sent || 0) + (p['Send Proposal'] || 0);
    document.getElementById('p-accepted').textContent = p.Accepted ?? 0;
    // quotations
    const q = j.quotations || {};
    document.getElementById('q-total').textContent    = q.total    ?? 0;
    document.getElementById('q-draft').textContent    = q.Draft    ?? 0;
    document.getElementById('q-issued').textContent   = q.Issued   ?? 0;
    document.getElementById('q-approved').textContent = q.Approved ?? 0;
    setTs();
  } catch(e) { console.error('potential widget:', e); }
}
loadData();
function doRefresh(){ const b=document.getElementById('rb'); b.textContent='↻'; b.style.opacity='.4'; loadData().then(()=>{ b.textContent='↻ Refresh'; b.style.opacity='1'; }); }
setInterval(loadData, 5*60*1000);
</script>
<div style="text-align:center;padding:20px 0 4px;font-size:9px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.1);">Widgets by Opxio.io</div>
</body></html>
