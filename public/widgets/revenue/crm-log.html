<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Opxio — Win / Loss Log</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}html{height:100%;}
body{font-family:'Satoshi',-apple-system,sans-serif;padding:14px 14px 24px;background:#191919;color:#fff;overflow-y:auto;overflow-x:hidden;}
:root{--g:#AAFF00;--gm:rgba(170,255,0,.12);--gb:rgba(170,255,0,.18);--orange:#FF6B35;--orangem:rgba(255,107,53,.12);}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:999px;}

.card{background:#1E1E1E;border:1px solid rgba(255,255,255,.06);border-radius:14px;}
.btn{background:#252525;border:1px solid rgba(255,255,255,.09);color:rgba(255,255,255,.45);font-family:'Satoshi',sans-serif;font-size:11px;font-weight:700;padding:5px 11px;border-radius:7px;cursor:pointer;transition:all .2s;}
.btn:hover{border-color:var(--gb);color:var(--g);}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px;}
.h-right{display:flex;align-items:center;gap:6px;}
.eyebrow{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.22);margin-bottom:2px;}
.h-title{font-size:20px;font-weight:900;color:#fff;letter-spacing:-.03em;}
.ts{font-size:10px;font-weight:500;color:rgba(255,255,255,.18);}

/* Stat row */
.stat-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:12px;}
@media(max-width:760px){.stat-row{grid-template-columns:repeat(2,1fr);}}
.stat{padding:16px 18px;position:relative;overflow:hidden;}
.s-dot{position:absolute;top:13px;right:13px;width:6px;height:6px;border-radius:50%;opacity:.6;}
.s-lbl{font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:rgba(255,255,255,.85);margin-bottom:10px;display:block;line-height:1.4;}
.s-val{font-size:28px;font-weight:900;letter-spacing:-1.5px;line-height:1;color:var(--g);}
.s-sub{font-size:10px;font-weight:500;color:rgba(255,255,255,.22);margin-top:7px;}

/* Panel */
.panel{padding:20px 22px;}

/* Tabs */
.tabs{display:flex;gap:3px;background:rgba(255,255,255,.05);border-radius:8px;padding:3px;width:fit-content;margin-bottom:18px;}
.tab{background:transparent;border:none;color:rgba(255,255,255,.35);font-family:'Satoshi',sans-serif;font-size:10px;font-weight:700;padding:5px 14px;border-radius:6px;cursor:pointer;transition:all .18s;letter-spacing:.04em;}
.tab.won{background:rgba(170,255,0,.14);color:#AAFF00;}
.tab.lost{background:rgba(251,146,60,.14);color:#FB923C;}

/* Deal rows */
.list{display:flex;flex-direction:column;gap:1px;}
.row{display:flex;align-items:flex-start;gap:12px;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;transition:background .15s;border-radius:6px;margin:0 -6px;padding-left:6px;padding-right:6px;}
.row:last-child{border-bottom:none;}
.row:hover{background:rgba(255,255,255,.03);}
.row-info{flex:1;min-width:0;}
.row-name{font-size:13px;font-weight:700;color:rgba(255,255,255,.85);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px;}
.row-meta{font-size:11px;font-weight:600;color:rgba(255,255,255,.25);}
.row-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0;}
.badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap;}
.badge-won{background:rgba(170,255,0,.1);color:var(--g);border:1px solid rgba(170,255,0,.2);}
.badge-lost-lead{background:rgba(251,146,60,.1);color:#FB923C;border:1px solid rgba(251,146,60,.2);}
.badge-lost-deal{background:rgba(251,146,60,.16);color:#FB923C;border:1px solid rgba(251,146,60,.25);}
.badge-stage{font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;background:rgba(255,255,255,.06);color:rgba(255,255,255,.35);border:1px solid rgba(255,255,255,.07);}
.reason-pill{font-size:11px;font-weight:700;color:#FB923C;background:rgba(251,146,60,.1);border:1px solid rgba(251,146,60,.18);border-radius:4px;padding:2px 8px;margin-top:4px;display:inline-block;}
.row-val{font-size:13px;font-weight:900;color:rgba(255,255,255,.5);letter-spacing:-.4px;}

/* Month nav arrows */
.mn-wrap{display:flex;align-items:center;gap:3px;}
.mn-btn{background:#252525;border:1px solid rgba(255,255,255,.09);color:rgba(255,255,255,.45);font-family:'Satoshi',sans-serif;font-size:12px;font-weight:700;width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:6px;cursor:pointer;transition:all .2s;padding:0;}
.mn-btn:hover:not(:disabled){border-color:var(--gb);color:var(--g);}
.mn-btn:disabled{opacity:.25;cursor:default;}
.mn-lbl{font-size:11px;font-weight:700;color:rgba(255,255,255,.6);min-width:78px;text-align:center;background:#252525;border:1px solid rgba(255,255,255,.09);border-radius:6px;padding:4px 6px;white-space:nowrap;}
/* Filter badge in panel */
.filter-badge{font-size:9px;font-weight:700;padding:2px 9px;border-radius:5px;background:rgba(170,255,0,.1);color:var(--g);border:1px solid rgba(170,255,0,.2);display:none;}
/* s-sub truncation for top reason */
.s-sub.truncate{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;}
/* Empty / loading */
.empty{padding:40px 0;text-align:center;font-size:12px;color:rgba(255,255,255,.2);font-weight:600;}
.loading{display:flex;align-items:center;justify-content:center;min-height:200px;flex-direction:column;gap:10px;}
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.06);border-top-color:var(--g);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:11px;color:rgba(255,255,255,.25);font-weight:500;}
</style>
</head>
<body>

<div class="header">
  <div>
    <p class="eyebrow" id="_eyebrow" data-os="Revenue OS">REVENUE OS</p>
    <h1 class="h-title">Win / Loss Log</h1>
  </div>
  <div class="h-right">
    <span class="ts" id="ts"></span>
    <div class="mn-wrap">
      <button class="mn-btn" onclick="mnPrev()" title="Previous month">‹</button>
      <span class="mn-lbl" id="mn-lbl">All Time</span>
      <button class="mn-btn" id="mn-next" onclick="mnNext()" title="Next month">›</button>
    </div>
    <button class="btn" id="rb" onclick="loadData()">↻ Refresh</button>
  </div>
</div>

<div class="stat-row">
  <div class="card stat">
    <div class="s-dot" style="background:var(--g);"></div>
    <span class="s-lbl">Won Deals</span>
    <div class="s-val" id="s-won">—</div>
    <div class="s-sub" id="s-won-sub">Active &amp; delivered</div>
    <div class="s-sub" id="s-won-val" style="color:var(--g);opacity:.7;font-weight:700;margin-top:2px;display:none;"></div>
  </div>
  <div class="card stat">
    <div class="s-dot" style="background:var(--orange);"></div>
    <span class="s-lbl">Lost Leads</span>
    <div class="s-val" style="color:var(--orange);" id="s-lost-leads">—</div>
    <div class="s-sub">Leads that didn't convert</div>
    <div class="s-sub" id="s-lost-leads-val" style="color:var(--orange);opacity:.7;font-weight:700;margin-top:2px;display:none;"></div>
  </div>
  <div class="card stat">
    <div class="s-dot" style="background:var(--orange);"></div>
    <span class="s-lbl">Lost Deals</span>
    <div class="s-val" style="color:var(--orange);" id="s-lost-deals">—</div>
    <div class="s-sub">Deals that fell through</div>
    <div class="s-sub" id="s-lost-deals-val" style="color:var(--orange);opacity:.7;font-weight:700;margin-top:2px;display:none;"></div>
  </div>
  <div class="card stat">
    <div class="s-dot" style="background:var(--g);"></div>
    <span class="s-lbl">Win Rate</span>
    <div class="s-val" id="s-winrate">—</div>
    <div class="s-sub">Won vs total closed</div>
  </div>
  <div class="card stat" id="s-reason-card" style="display:none;">
    <div class="s-dot" style="background:var(--orange);"></div>
    <span class="s-lbl">Top Lost Reason</span>
    <div id="s-reason-name" style="font-size:13px;font-weight:900;color:var(--orange);line-height:1.35;margin-bottom:6px;">—</div>
    <div class="s-sub" id="s-reason-count"></div>
  </div>
</div>

<div class="card panel">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;">
    <div class="tabs" style="margin-bottom:0;">
      <button class="tab won" id="t-won" onclick="setTab('won')">Won</button>
      <button class="tab" id="t-lost" onclick="setTab('lost')">Lost</button>
    </div>
    <span class="filter-badge" id="filter-badge"></span>
  </div>
  <div class="list" id="log-list">
    <div class="loading"><div class="spinner"></div><div class="loading-text">Loading</div></div>
  </div>
</div>

<script>
const _tok = new URLSearchParams(location.search).get('token') || '';
function apiUrl(p){ return p + (_tok ? '?token=' + encodeURIComponent(_tok) : ''); }
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtRM(n){
  if(!n) return '—';
  if(n >= 1000000) return 'RM ' + (n/1000000).toFixed(1).replace(/\.0$/,'') + 'M';
  if(n >= 1000)    return 'RM ' + (n/1000).toFixed(0) + 'K';
  return 'RM ' + Math.round(n).toLocaleString();
}

let tab = 'won';
let pipeData  = null;
let dealsData = null;

// ── Month nav state ───────────────────────────────────────────────────────────
let filterMonth = null; // null = All Time, or { year, month 0-indexed }

function fmtMonthLbl(fm) {
  if (!fm) return 'All Time';
  return new Date(fm.year, fm.month, 1).toLocaleString('default', {month:'short', year:'numeric'});
}

function updateMonthNav() {
  document.getElementById('mn-lbl').textContent = fmtMonthLbl(filterMonth);
  const now = new Date();
  const atFuture = filterMonth && (filterMonth.year > now.getFullYear() || (filterMonth.year === now.getFullYear() && filterMonth.month >= now.getMonth()));
  document.getElementById('mn-next').disabled = !filterMonth || atFuture;
  const badge = document.getElementById('filter-badge');
  if (filterMonth) { badge.textContent = fmtMonthLbl(filterMonth); badge.style.display = ''; }
  else { badge.style.display = 'none'; }
}

function mnPrev() {
  const now = new Date();
  if (!filterMonth) filterMonth = { year: now.getFullYear(), month: now.getMonth() };
  else filterMonth = { ...filterMonth };
  filterMonth.month--;
  if (filterMonth.month < 0) { filterMonth.month = 11; filterMonth.year--; }
  updateMonthNav();
  applyFilter();
}

function mnNext() {
  if (!filterMonth) return;
  filterMonth = { ...filterMonth };
  filterMonth.month++;
  if (filterMonth.month > 11) { filterMonth.month = 0; filterMonth.year++; }
  const now = new Date();
  if (filterMonth.year > now.getFullYear() || (filterMonth.year === now.getFullYear() && filterMonth.month > now.getMonth())) {
    filterMonth = null;
  }
  updateMonthNav();
  applyFilter();
}

function filterByMonth(items) {
  if (!filterMonth) return items;
  return items.filter(d => {
    if (!d.created) return false;
    const dt = new Date(d.created);
    return dt.getMonth() === filterMonth.month && dt.getFullYear() === filterMonth.year;
  });
}

function applyFilter() {
  updateStats();
  renderList();
  renderLostReasons();
}

// ── Lost Reasons ──────────────────────────────────────────────────────────────
function renderLostReasons() {
  const card = document.getElementById('s-reason-card');
  if (!pipeData || !dealsData) { card.style.display = 'none'; return; }

  const allLost = [
    ...filterByMonth(pipeData.lostLeads  || []),
    ...filterByMonth(dealsData.lostDeals || []),
  ];

  const counts = {};
  for (const d of allLost) {
    if (!d.lostReason) continue;
    const parts = d.lostReason.split(',').map(s => s.trim()).filter(Boolean);
    for (const r of parts) counts[r] = (counts[r] || 0) + 1;
  }

  const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
  card.style.display = '';
  if (!sorted.length) {
    document.getElementById('s-reason-name').textContent  = '—';
    document.getElementById('s-reason-count').textContent = 'No data this period';
    return;
  }
  document.getElementById('s-reason-name').textContent  = sorted[0][0];
  document.getElementById('s-reason-count').textContent = sorted[0][1] + (sorted[0][1] === 1 ? ' occurrence' : ' occurrences');
}

function setTab(t) {
  tab = t;
  document.getElementById('t-won').className  = 'tab' + (t === 'won'  ? ' won'  : '');
  document.getElementById('t-lost').className = 'tab' + (t === 'lost' ? ' lost' : '');
  renderList();
}

function renderList() {
  const el = document.getElementById('log-list');
  if (!pipeData || !dealsData) return;

  if (tab === 'won') {
    const rows = filterByMonth(dealsData.wonDeals || []);
    if (!rows.length) { el.innerHTML = '<div class="empty">No won deals yet</div>'; return; }
    el.innerHTML = rows.map(d => {
      const click = d.url ? `onclick="window.open('${d.url}','_blank')"` : '';
      const meta  = [d.pkg].filter(Boolean).join(' · ');
      return `<div class="row" ${click}>
        <div class="row-info">
          <div class="row-name">${esc(d.name)}</div>
          ${meta ? `<div class="row-meta">${esc(meta)}</div>` : ''}
        </div>
        <div class="row-right">
          <span class="badge badge-won">${esc(d.stage)}</span>
          <span class="row-val">${fmtRM(d.value)}</span>
        </div>
      </div>`;
    }).join('');
  } else {
    const lostD = filterByMonth((dealsData.lostDeals || [])).map(d => ({ ...d, _type: 'deal' }));
    const lostL = filterByMonth((pipeData.lostLeads  || [])).map(d => ({ ...d, _type: 'lead' }));
    const rows  = [...lostD, ...lostL];
    if (!rows.length) { el.innerHTML = '<div class="empty">No lost leads or deals</div>'; return; }
    el.innerHTML = rows.map(d => {
      const click  = d.url ? `onclick="window.open('${d.url}','_blank')"` : '';
      const meta   = [d.pkg].filter(Boolean).join(' · ');
      const bClass = d._type === 'lead' ? 'badge-lost-lead' : 'badge-lost-deal';
      const bLabel = d._type === 'lead' ? 'Lead' : 'Deal';
      const reason = d.lostReason ? `<div><span class="reason-pill">${esc(d.lostReason)}</span></div>` : '';
      return `<div class="row" ${click}>
        <div class="row-info">
          <div class="row-name">${esc(d.name)}</div>
          ${meta ? `<div class="row-meta">${esc(meta)}</div>` : ''}
          ${reason}
        </div>
        <div class="row-right">
          <span class="badge ${bClass}">${bLabel}</span>
          <span class="row-val">${fmtRM(d.value)}</span>
        </div>
      </div>`;
    }).join('');
  }
}

function showVal(id, val) {
  const el = document.getElementById(id);
  if (val) { el.textContent = fmtRM(val); el.style.display = ''; }
  else { el.style.display = 'none'; }
}

function updateStats() {
  if (!pipeData || !dealsData) return;
  const wonFiltered   = filterByMonth(dealsData.wonDeals  || []);
  const lostLFiltered = filterByMonth(pipeData.lostLeads  || []);
  const lostDFiltered = filterByMonth(dealsData.lostDeals || []);

  const wonCount  = wonFiltered.length;
  const lostLeads = lostLFiltered.length;
  const lostDeals = lostDFiltered.length;
  const totalClosed = wonCount + lostDeals;
  const winRate = totalClosed > 0 ? Math.round((wonCount / totalClosed) * 100) : null;

  document.getElementById('s-won').textContent        = wonCount;
  document.getElementById('s-won-sub').textContent    = wonCount === 1 ? '1 deal' : wonCount + ' deals';
  document.getElementById('s-lost-leads').textContent = lostLeads;
  document.getElementById('s-lost-deals').textContent = lostDeals;
  document.getElementById('s-winrate').textContent    = winRate != null ? winRate + '%' : '—';
  document.getElementById('ts').textContent = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});

  const wonVal  = wonFiltered.reduce((s, d) => s + (d.value || 0), 0);
  const lostLVal = lostLFiltered.reduce((s, d) => s + (d.value || 0), 0);
  const lostDVal = lostDFiltered.reduce((s, d) => s + (d.value || 0), 0);
  showVal('s-won-val',        wonVal);
  showVal('s-lost-leads-val', lostLVal);
  showVal('s-lost-deals-val', lostDVal);
}

async function loadData() {
  document.getElementById('rb').textContent = '↻ Refreshing…';
  document.getElementById('log-list').innerHTML =
    '<div class="loading"><div class="spinner"></div><div class="loading-text">Loading</div></div>';
  try {
    const [rp, rd] = await Promise.all([
      fetch(apiUrl('/api/data/pipeline')),
      fetch(apiUrl('/api/data/deals')),
    ]);
    [pipeData, dealsData] = await Promise.all([rp.json(), rd.json()]);
    updateStats();
    renderList();
    renderLostReasons();
  } catch(e) {
    document.getElementById('log-list').innerHTML =
      `<div class="empty">Failed to load — ${esc(e.message)}</div>`;
  } finally {
    document.getElementById('rb').textContent = '↻ Refresh';
  }
}

updateMonthNav();
loadData();
setInterval(loadData, 5 * 60 * 1000);
</script>

<div style="text-align:center;padding:20px 0 4px;font-size:9px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.1);">Widgets by Opxio.io</div>
<script>
(function(){
  const el = document.getElementById('_eyebrow');
  if(!el) return;
  el.textContent = el.dataset.os.toUpperCase(); // default until API responds
  const tok = new URLSearchParams(location.search).get('token');
  if(!tok) return;
  fetch('/api/client/info?token=' + tok)
    .then(r => r.ok ? r.json() : null)
    .then(d => { if(d?.client) el.textContent = d.client.toUpperCase() + ' · ' + el.dataset.os.toUpperCase(); })
    .catch(() => {});
})();
</script>
</body>
</html>
