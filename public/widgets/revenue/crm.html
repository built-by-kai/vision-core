<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Opxio — CRM Overview</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}html{height:100%;}
body{font-family:'Satoshi',-apple-system,sans-serif;padding:14px 14px 24px;background:#191919;color:#fff;overflow-y:auto;height:100%;transition:background .3s,color .3s;}
body.light{background:#F5F5F5;color:#111;}
:root{--g:#AAFF00;--gm:rgba(170,255,0,.12);--gb:rgba(170,255,0,.18);--amber:#FBBF24;--red:#FF6B6B;}
body.light{--g:#5C9900;--gm:rgba(92,153,0,.1);--gb:rgba(92,153,0,.2);}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:999px;}
.card{background:#1E1E1E;border:1px solid rgba(255,255,255,.06);border-radius:14px;transition:border-color .2s;}
.card:hover{border-color:rgba(170,255,0,.1);}
body.light .card{background:#fff;border-color:rgba(0,0,0,.06);}
.btn{background:#252525;border:1px solid rgba(255,255,255,.09);color:rgba(255,255,255,.45);font-family:'Satoshi',sans-serif;font-size:11px;font-weight:700;padding:5px 11px;border-radius:7px;cursor:pointer;transition:all .2s;}
.btn:hover{border-color:var(--gb);color:var(--g);}
body.light .btn{background:#EFEFEF;border-color:rgba(0,0,0,.08);color:rgba(0,0,0,.4);}
.sel{font-family:'Satoshi',sans-serif;font-size:11px;font-weight:700;padding:5px 10px;border-radius:7px;border:1px solid rgba(255,255,255,.09);background:#252525;color:rgba(255,255,255,.6);outline:none;cursor:pointer;-webkit-appearance:none;appearance:none;transition:all .2s;}
.sel:hover{border-color:var(--gb);}
body.light .sel{background:#EFEFEF;border-color:rgba(0,0,0,.08);color:rgba(0,0,0,.6);}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px;}
.h-right{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.eyebrow{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.22);margin-bottom:2px;}
body.light .eyebrow{color:rgba(0,0,0,.28);}
.h-title{font-size:20px;font-weight:900;color:#fff;letter-spacing:-.03em;}
body.light .h-title{color:#111;}
.ts{font-size:10px;font-weight:500;color:rgba(255,255,255,.18);}
body.light .ts{color:rgba(0,0,0,.22);}
.sec-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.22);margin:16px 0 8px;}
body.light .sec-lbl{color:rgba(0,0,0,.28);}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
@media(max-width:620px){.g4{grid-template-columns:repeat(2,1fr);}}
.stat{padding:16px 18px;position:relative;overflow:hidden;}
.s-dot{position:absolute;top:13px;right:13px;width:6px;height:6px;border-radius:50%;background:var(--g);opacity:.6;}
.s-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.5);margin-bottom:10px;display:block;}
body.light .s-lbl{color:rgba(0,0,0,.4);}
.s-val{font-size:30px;font-weight:900;letter-spacing:-1.5px;line-height:1;color:var(--g);}
.s-val.amber{color:var(--amber);}
.s-sub{font-size:9.5px;font-weight:500;color:rgba(255,255,255,.22);margin-top:6px;}
body.light .s-sub{color:rgba(0,0,0,.28);}
.mid-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;}
@media(max-width:680px){.mid-row{grid-template-columns:1fr;}}
.panel{padding:20px 22px;}
.panel-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.panel-title{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.85);}
body.light .panel-title{color:rgba(0,0,0,.7);}
.panel-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px;background:var(--gm);color:var(--g);border:1px solid var(--gb);}
.f-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.f-row:last-child{margin-bottom:0;}
.f-lbl{font-size:10px;font-weight:700;color:rgba(255,255,255,.5);width:90px;flex-shrink:0;}
body.light .f-lbl{color:rgba(0,0,0,.4);}
.f-track{flex:1;height:28px;border-radius:7px;background:rgba(255,255,255,.04);overflow:hidden;}
body.light .f-track{background:rgba(0,0,0,.05);}
.f-fill{height:28px;border-radius:7px;display:flex;align-items:center;padding:0 12px;transition:width .5s cubic-bezier(.4,0,.2,1);min-width:0;}
.f-fill-text{font-size:11px;font-weight:800;color:rgba(255,255,255,.9);white-space:nowrap;}
.f-count{font-size:12px;font-weight:800;color:rgba(255,255,255,.5);width:24px;text-align:right;flex-shrink:0;}
body.light .f-count{color:rgba(0,0,0,.4);}
.donut-wrap{display:flex;align-items:center;gap:20px;}
.donut-legend{display:flex;flex-direction:column;gap:10px;flex:1;}
.dl-item{display:flex;align-items:center;gap:10px;}
.dl-swatch{width:10px;height:10px;border-radius:3px;flex-shrink:0;}
.dl-name{font-size:12px;font-weight:700;color:#fff;flex:1;}
body.light .dl-name{color:#111;}
.dl-count{font-size:13px;font-weight:800;color:rgba(255,255,255,.4);}
body.light .dl-count{color:rgba(0,0,0,.35);}
.donut-center{font-size:22px;font-weight:900;fill:var(--g);letter-spacing:-1px;}
.donut-sub{font-size:8px;font-weight:700;fill:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.1em;}
body.light .donut-sub{fill:rgba(0,0,0,.3);}
.loading{display:flex;align-items:center;justify-content:center;min-height:120px;flex-direction:column;gap:10px;}
.spinner{width:18px;height:18px;border:2px solid rgba(170,255,0,.15);border-top-color:var(--g);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:11px;color:rgba(255,255,255,.25);font-weight:500;}
</style>
</head>
<body>

<div class="header">
  <div>
    <p class="eyebrow">Opxio · Revenue OS</p>
    <h1 class="h-title">CRM Overview</h1>
  </div>
  <div class="h-right">
    <select class="sel" id="selMonth"></select>
    <select class="sel" id="selYear"></select>
    <span class="ts" id="ts"></span>
    <button class="btn" id="rb" onclick="loadData()">↻ Refresh</button>
    <button class="btn" id="mb" onclick="toggleMode()">☀ Light</button>
  </div>
</div>

<div id="dash">
  <div class="loading"><div class="spinner"></div><div class="loading-text">Loading</div></div>
</div>

<script>
const _tok = new URLSearchParams(location.search).get('token') || '';
(function(){
  var s=localStorage.getItem('crm-theme');
  if(s==='light')document.body.classList.add('light');
  document.getElementById('mb').textContent=document.body.classList.contains('light')?'☾ Dark':'☀ Light';
})();

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtRM(n){if(n>=1000000)return'RM '+(n/1000000).toFixed(1)+'M';if(n>=1000)return'RM '+(n/1000).toFixed(1)+'K';return'RM '+Math.round(n).toLocaleString();}
function pad2(n){return n<10?'0'+n:''+n;}

const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
let _selM,_selY,_dateFrom,_dateTo;
function setFromMY(m,y){_selM=m;_selY=y;_dateFrom=y+'-'+pad2(m)+'-01';var last=new Date(y,m,0);_dateTo=y+'-'+pad2(m)+'-'+pad2(last.getDate());}
(function(){
  const n=new Date();setFromMY(n.getMonth()+1,n.getFullYear());
  const ms=document.getElementById('selMonth');const ys=document.getElementById('selYear');
  MONTHS.forEach((mn,i)=>{const o=document.createElement('option');o.value=i+1;o.textContent=mn;if(i+1===_selM)o.selected=true;ms.appendChild(o);});
  for(let y=2024;y<=2030;y++){const o=document.createElement('option');o.value=y;o.textContent=y;if(y===_selY)o.selected=true;ys.appendChild(o);}
  ms.onchange=ys.onchange=()=>{setFromMY(parseInt(ms.value),parseInt(ys.value));loadData();};
})();

const FUNNEL_COLORS={'Lead':'rgba(170,255,0,.45)','Contacted':'rgba(170,255,0,.6)','Qualified':'#FBBF24','Proposal Sent':'#60A5FA','Negotiation':'#C084FC'};
const SOURCE_COLORS=['#AAFF00','#FBBF24','#60A5FA','#C084FC','#FF6B6B','#2DD4BF','#FB923C'];

function buildDonut(sources,total){
  if(!sources.length)return'<div style="font-size:12px;color:rgba(255,255,255,.2);padding:20px 0;">No data</div>';
  const size=110,cx=55,cy=55,r=42,sw=12,circ=2*Math.PI*r;
  let svg=`<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="flex-shrink:0;overflow:visible;">`;
  svg+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(255,255,255,.04)" stroke-width="${sw}"/>`;
  let offset=0;
  sources.forEach((s,i)=>{
    const pct=total>0?s.count/total:0;
    const dash=Math.max(pct*circ-2,1),gap=circ-dash;
    const col=SOURCE_COLORS[i%SOURCE_COLORS.length];
    svg+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${col}" stroke-width="${sw}" stroke-dasharray="${dash} ${gap}" stroke-dashoffset="${-offset}" transform="rotate(-90 ${cx} ${cy})"/>`;
    offset+=pct*circ;
  });
  svg+=`<text x="${cx}" y="${cy-4}" text-anchor="middle" class="donut-center">${total}</text>`;
  svg+=`<text x="${cx}" y="${cy+12}" text-anchor="middle" class="donut-sub">Leads</text></svg>`;
  let legend='<div class="donut-legend">';
  sources.slice(0,6).forEach((s,i)=>{
    const col=SOURCE_COLORS[i%SOURCE_COLORS.length];
    legend+=`<div class="dl-item"><div class="dl-swatch" style="background:${col};"></div><div class="dl-name">${esc(s.name)}</div><div class="dl-count">${s.count}</div></div>`;
  });
  legend+='</div>';
  return`<div class="donut-wrap">${svg}${legend}</div>`;
}

function render(s){
  const totalSrc=s.sourceBreakdown.reduce((a,b)=>a+b.count,0);
  const maxFunnel=Math.max(...s.funnelBreakdown.map(f=>f.value),1);

  let html=`<div class="g4">
    <div class="card stat"><div class="s-dot"></div><span class="s-lbl">Active Leads</span><div class="s-val">${s.totalActiveLeads}</div><div class="s-sub">In pipeline</div></div>
    <div class="card stat"><div class="s-dot"></div><span class="s-lbl">Pipeline Value</span><div class="s-val">${fmtRM(s.totalPipelineValue)}</div><div class="s-sub">Total estimated</div></div>
    <div class="card stat"><div class="s-dot"></div><span class="s-lbl">Revenue — ${esc(s.monthLabel)}</span><div class="s-val amber">${fmtRM(s.revenueThisMonth)}</div><div class="s-sub">${s.wonThisMonth} won this month</div></div>
    <div class="card stat"><div class="s-dot"></div><span class="s-lbl">Win Rate</span><div class="s-val">${s.winRate}%</div><div class="s-sub">${s.totalWonAllTime}W / ${s.totalLostAllTime}L all time</div></div>
  </div>`;

  html+=`<div class="sec-lbl">Pipeline</div><div class="mid-row">`;

  html+=`<div class="card panel"><div class="panel-hdr"><span class="panel-title">Sales Funnel</span><span class="panel-badge">${s.totalActiveLeads} active</span></div>`;
  for(const f of s.funnelBreakdown){
    const col=FUNNEL_COLORS[f.stage]||'rgba(170,255,0,.4)';
    const pct=maxFunnel>0?Math.max(Math.round((f.value/maxFunnel)*100),f.count>0?8:0):0;
    html+=`<div class="f-row"><div class="f-lbl">${esc(f.stage)}</div><div class="f-track"><div class="f-fill" style="width:${pct}%;background:${col};"><span class="f-fill-text">${fmtRM(f.value)}</span></div></div><div class="f-count">${f.count}</div></div>`;
  }
  html+=`</div>`;

  html+=`<div class="card panel"><div class="panel-hdr"><span class="panel-title">Lead Sources</span><span class="panel-badge">${totalSrc} total</span></div>${buildDonut(s.sourceBreakdown,totalSrc)}</div>`;
  html+=`</div>`;

  document.getElementById('dash').innerHTML=html;
  const n=new Date();
  document.getElementById('ts').textContent=n.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
}

async function loadData(){
  document.getElementById('rb').textContent='↻ Refreshing…';
  try{
    const r=await fetch(`/api/revenue/crm?token=${_tok}&from=${_dateFrom}&to=${_dateTo}`);
    if(!r.ok)throw new Error('API '+r.status);
    render(await r.json());
  }catch(e){
    document.getElementById('dash').innerHTML=`<div class="loading"><div style="font-size:12px;color:#FF6B6B;font-weight:700;">Failed to load</div><div style="font-size:10px;color:rgba(255,255,255,.25);margin-top:4px;">${esc(e.message)}</div></div>`;
  }finally{
    document.getElementById('rb').textContent='↻ Refresh';
  }
}

window.toggleMode=function(){
  const l=document.body.classList.toggle('light');
  localStorage.setItem('crm-theme',l?'light':'dark');
  document.getElementById('mb').textContent=l?'☾ Dark':'☀ Light';
};

loadData();
setInterval(loadData,600000);
</script>
</body>
</html>
