<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Opxio — Projects</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}html{height:100%;}
body{font-family:'Satoshi',-apple-system,sans-serif;padding:14px;background:#191919;color:#fff;overflow-y:auto;height:100%;transition:background .3s,color .3s;}
body.light{background:#F5F5F5;color:#111;}
:root{--g:#AAFF00;--gm:rgba(170,255,0,.12);--gb:rgba(170,255,0,.18);}
body.light{--g:#5C9900;--gm:rgba(92,153,0,.1);--gb:rgba(92,153,0,.2);}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:999px;}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.2);}
body.light ::-webkit-scrollbar-thumb{background:rgba(0,0,0,.1);}
body.light ::-webkit-scrollbar-thumb:hover{background:rgba(0,0,0,.18);}

.card{background:#1E1E1E;border:1px solid rgba(255,255,255,.06);border-radius:14px;transition:border-color .2s;}
.card:hover{border-color:rgba(170,255,0,.1);}
body.light .card{background:#fff;border-color:rgba(0,0,0,.06);}

.btn{background:#252525;border:1px solid rgba(255,255,255,.09);color:rgba(255,255,255,.45);font-family:'Satoshi',sans-serif;font-size:11px;font-weight:700;padding:5px 11px;border-radius:7px;cursor:pointer;transition:all .2s;}
.btn:hover{border-color:var(--gb);color:var(--g);}
body.light .btn{background:#EFEFEF;border-color:rgba(0,0,0,.08);color:rgba(0,0,0,.4);}

.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px;}
.h-right{display:flex;align-items:center;gap:6px;}
.eyebrow{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.22);margin-bottom:2px;}
body.light .eyebrow{color:rgba(0,0,0,.28);}
.h-title{font-size:18px;font-weight:900;color:#fff;letter-spacing:-.03em;}
body.light .h-title{color:#111;}
.ts{font-size:9px;font-weight:500;color:rgba(255,255,255,.18);}
body.light .ts{color:rgba(0,0,0,.22);}

.sec-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.22);margin:16px 0 8px;}
body.light .sec-lbl{color:rgba(0,0,0,.28);}

/* ── STAT CARDS ── */
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
@media(max-width:600px){.g4{grid-template-columns:repeat(2,1fr);}}
.stat{padding:16px 18px;position:relative;}
.s-dot{position:absolute;top:13px;right:13px;width:6px;height:6px;border-radius:50%;background:var(--g);opacity:.6;}
.s-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.5);margin-bottom:10px;display:block;}
body.light .s-lbl{color:rgba(0,0,0,.4);}
.s-val{font-size:30px;font-weight:900;letter-spacing:-1.5px;line-height:1;color:var(--g);}
body.light .s-val{color:#5C9900;}
.s-sub{font-size:9.5px;font-weight:500;color:rgba(255,255,255,.22);margin-top:6px;}
body.light .s-sub{color:rgba(0,0,0,.28);}

/* ── BUILD LIST ── */
.list-panel{padding:20px 22px;}
.panel-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.panel-title{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#fff;opacity:.85;}
body.light .panel-title{color:#111;opacity:1;}
.panel-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px;background:var(--gm);color:var(--g);border:1px solid var(--gb);}

.build-item{display:flex;align-items:center;gap:14px;padding:12px 0;border-top:1px solid rgba(255,255,255,.05);}
.build-item:first-child{border-top:none;}
body.light .build-item{border-top-color:rgba(0,0,0,.06);}

.build-status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.dot-active{background:var(--g);box-shadow:0 0 6px rgba(170,255,0,.5);}
.dot-review{background:#FBBF24;box-shadow:0 0 6px rgba(251,191,36,.4);}
.dot-hold{background:rgba(255,255,255,.2);}
.dot-done{background:rgba(170,255,0,.3);}

.build-info{flex:1;min-width:0;}
.build-name{font-size:13px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
body.light .build-name{color:#111;}
.build-meta{display:flex;align-items:center;gap:8px;margin-top:3px;flex-wrap:wrap;}
.build-client{font-size:10.5px;font-weight:600;color:rgba(255,255,255,.4);}
body.light .build-client{color:rgba(0,0,0,.4);}
.build-type{font-size:9.5px;font-weight:700;padding:1px 7px;border-radius:4px;background:var(--gm);color:var(--g);border:1px solid var(--gb);}

.build-phase{flex-shrink:0;width:140px;}
.phase-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.28);margin-bottom:5px;display:flex;justify-content:space-between;}
body.light .phase-label{color:rgba(0,0,0,.3);}
.phase-label span{color:var(--g);}
.phase-track{width:100%;height:4px;border-radius:999px;background:rgba(255,255,255,.07);}
body.light .phase-track{background:rgba(0,0,0,.08);}
.phase-fill{height:4px;border-radius:999px;background:var(--g);transition:width .8s cubic-bezier(.4,0,.2,1);}

.build-pill{flex-shrink:0;font-size:9px;font-weight:700;padding:3px 9px;border-radius:999px;letter-spacing:.04em;}
.pill-build{background:var(--gm);color:var(--g);border:1px solid var(--gb);}
.pill-review{background:rgba(251,191,36,.1);color:#FBBF24;border:1px solid rgba(251,191,36,.2);}
.pill-hold{background:rgba(255,255,255,.05);color:rgba(255,255,255,.35);border:1px solid rgba(255,255,255,.1);}
.pill-done{background:rgba(170,255,0,.08);color:rgba(170,255,0,.55);border:1px solid rgba(170,255,0,.12);}
body.light .pill-hold{background:rgba(0,0,0,.04);color:rgba(0,0,0,.35);border-color:rgba(0,0,0,.1);}
</style></head><body>

<div class="header">
  <div><p class="eyebrow">Opxio · Delivery</p><h1 class="h-title">Projects</h1></div>
  <div class="h-right">
    <span class="ts" id="ts"></span>
    <button class="btn" onclick="doRefresh()" id="rb">↻ Refresh</button>
    <button class="btn" onclick="toggleMode()" id="mb">☀ Light</button>
  </div>
</div>

<!-- STAT CARDS -->
<div class="sec-lbl">Build Status</div>
<div class="g4">
  <div class="card stat">
    <div class="s-dot"></div>
    <span class="s-lbl">Active Builds</span>
    <div class="s-val" id="s-active">0</div>
    <div class="s-sub">Currently in progress</div>
  </div>
  <div class="card stat">
    <div class="s-dot" style="background:#FBBF24;"></div>
    <span class="s-lbl">In Review</span>
    <div class="s-val" id="s-review" style="color:#FBBF24;">0</div>
    <div class="s-sub">Awaiting client sign-off</div>
  </div>
  <div class="card stat">
    <div class="s-dot"></div>
    <span class="s-lbl">Completed</span>
    <div class="s-val" id="s-done">0</div>
    <div class="s-sub">Fully delivered</div>
  </div>
  <div class="card stat">
    <div class="s-dot" style="opacity:.25;"></div>
    <span class="s-lbl">On Hold</span>
    <div class="s-val" id="s-hold" style="color:rgba(255,255,255,.35);">0</div>
    <div class="s-sub">Paused or pending client</div>
  </div>
</div>

<!-- ACTIVE BUILDS LIST -->
<div class="sec-lbl">Active Builds</div>
<div class="card list-panel">
  <div class="panel-hdr">
    <span class="panel-title">Current Builds</span>
    <span class="panel-badge" id="active-count">0 projects</span>
  </div>
  <div id="build-list">
    <!-- populated by JS -->
  </div>
</div>

<script>
const _tok = new URLSearchParams(location.search).get('token') || '';
function apiUrl(path){ return _tok ? path+'?token='+encodeURIComponent(_tok) : path; }
let light=false;
function toggleMode(){light=!light;document.body.classList.toggle('light',light);document.getElementById('mb').textContent=light?'🌙 Dark':'☀ Light';}
function setTs(){document.getElementById('ts').textContent='Updated '+new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}
function doRefresh(){const b=document.getElementById('rb');b.textContent='↻';b.style.opacity='.4';setTimeout(()=>{b.textContent='↻ Refresh';b.style.opacity='1';setTs();},800);}
setTs();setInterval(doRefresh,5*60*1000);

function statusConfig(s) {
  if (s==='active') return { dot:'dot-active', pill:'pill-build',  label:'Building'   };
  if (s==='review') return { dot:'dot-review', pill:'pill-review', label:'In Review'  };
  if (s==='hold')   return { dot:'dot-hold',   pill:'pill-hold',   label:'On Hold'    };
  if (s==='done')   return { dot:'dot-done',   pill:'pill-done',   label:'Completed'  };
  return { dot:'dot-hold', pill:'pill-hold', label:s };
}

function render(counts, builds) {
  document.getElementById('s-active').textContent = counts.active || 0;
  document.getElementById('s-review').textContent = counts.review || 0;
  document.getElementById('s-done').textContent   = counts.done   || 0;
  document.getElementById('s-hold').textContent   = counts.hold   || 0;

  document.getElementById('active-count').textContent = builds.length + ' project' + (builds.length!==1?'s':'');

  const list = document.getElementById('build-list');
  if (!builds.length) { list.innerHTML = '<div style="padding:20px;text-align:center;opacity:.3;font-size:12px;">No active builds</div>'; return; }
  list.innerHTML = builds.map(b => {
    const cfg = statusConfig(b.status);
    return `
    <div class="build-item">
      <div class="build-status-dot ${cfg.dot}"></div>
      <div class="build-info">
        <div class="build-name">${b.name}</div>
        <div class="build-meta">
          <span class="build-client">${b.client}</span>
          <span class="build-type">${b.type}</span>
        </div>
      </div>
      <div class="build-phase">
        <div class="phase-label">${b.phase} <span>${b.phasePct}%</span></div>
        <div class="phase-track"><div class="phase-fill" style="width:${b.phasePct}%"></div></div>
      </div>
      <span class="build-pill ${cfg.pill}">${cfg.label}</span>
    </div>`;
  }).join('');
}

async function loadData(){
  try {
    const r = await fetch(apiUrl('/api/data/projects'));
    const j = await r.json();
    render(j.counts || {}, j.builds || []);
    setTs();
  } catch(e){ console.error('projects widget:', e); }
}
loadData();
function doRefresh(){const b=document.getElementById('rb');b.textContent='↻';b.style.opacity='.4';loadData().then(()=>{b.textContent='↻ Refresh';b.style.opacity='1';});}
setInterval(loadData, 5*60*1000);
</script></body></html>
