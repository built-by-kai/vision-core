<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Opxio — Product Catalogue</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}html{height:100%;}
body{font-family:'Satoshi',-apple-system,sans-serif;padding:16px;background:#0D0D0D;color:#fff;overflow-y:auto;height:100%;transition:background .3s,color .3s;}
body.light{background:#F5F5F5;color:#111;}
:root{--g:#AAFF00;--gm:rgba(170,255,0,.1);--gb:rgba(170,255,0,.2);}
body.light{--g:#5C9900;--gm:rgba(92,153,0,.08);--gb:rgba(92,153,0,.18);}

/* Scrollbar */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:99px;}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.15);}
body.light ::-webkit-scrollbar-thumb{background:rgba(0,0,0,.1);}

/* Buttons */
.btn{background:#1E1E1E;border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.45);font-family:'Satoshi',sans-serif;font-size:11px;font-weight:700;padding:5px 12px;border-radius:7px;cursor:pointer;transition:all .2s;}
.btn:hover{border-color:var(--gb);color:var(--g);}
body.light .btn{background:#E5E5E5;border-color:rgba(0,0,0,.08);color:rgba(0,0,0,.45);}

/* Top bar */
.topbar{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.topbar-right{display:flex;align-items:center;gap:6px;margin-left:auto;}
.eyebrow{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.22);margin-bottom:2px;}
body.light .eyebrow{color:rgba(0,0,0,.3);}
.h-title{font-size:18px;font-weight:900;color:#fff;letter-spacing:-.03em;}
body.light .h-title{color:#111;}
.ts{font-size:9px;font-weight:500;color:rgba(255,255,255,.18);}
body.light .ts{color:rgba(0,0,0,.2);}

/* Search */
.search-wrap{position:relative;margin-bottom:12px;}
.search-input{width:100%;background:#1A1A1A;border:1px solid rgba(255,255,255,.08);color:#fff;font-family:'Satoshi',sans-serif;font-size:12px;font-weight:500;padding:8px 12px 8px 34px;border-radius:9px;outline:none;transition:border-color .2s;}
.search-input:focus{border-color:var(--gb);}
.search-input::placeholder{color:rgba(255,255,255,.22);}
body.light .search-input{background:#EBEBEB;border-color:rgba(0,0,0,.08);color:#111;}
body.light .search-input::placeholder{color:rgba(0,0,0,.3);}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.25);font-size:13px;pointer-events:none;}
body.light .search-icon{color:rgba(0,0,0,.3);}

/* OS Filter Tabs */
.tabs-wrap{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px;}
.tab{background:transparent;border:1px solid rgba(255,255,255,.07);color:rgba(255,255,255,.35);font-family:'Satoshi',sans-serif;font-size:10.5px;font-weight:700;padding:5px 11px;border-radius:7px;cursor:pointer;transition:all .18s;white-space:nowrap;}
.tab:hover:not(.active){color:rgba(255,255,255,.65);border-color:rgba(255,255,255,.12);}
.tab.active{background:#1E1E1E;color:var(--g);border-color:var(--gb);}
body.light .tab{border-color:rgba(0,0,0,.08);color:rgba(0,0,0,.4);}
body.light .tab.active{background:#E5E5E5;border-color:var(--gb);}

/* Tier filter pills */
.tier-bar{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:14px;align-items:center;}
.tier-pill{background:transparent;border:1px solid rgba(255,255,255,.06);color:rgba(255,255,255,.3);font-family:'Satoshi',sans-serif;font-size:10px;font-weight:700;padding:3px 9px;border-radius:99px;cursor:pointer;transition:all .18s;white-space:nowrap;}
.tier-pill:hover:not(.active){color:rgba(255,255,255,.55);}
.tier-pill.active{color:#fff;border-color:rgba(255,255,255,.2);background:rgba(255,255,255,.06);}
body.light .tier-pill{border-color:rgba(0,0,0,.07);color:rgba(0,0,0,.35);}
body.light .tier-pill.active{color:#111;background:rgba(0,0,0,.06);border-color:rgba(0,0,0,.14);}

/* Count badge */
.count-badge{font-size:9.5px;font-weight:700;padding:2px 8px;border-radius:5px;background:var(--gm);color:var(--g);border:1px solid var(--gb);}

/* Group header */
.group-hdr{display:flex;align-items:center;gap:8px;padding:6px 0 8px;margin-top:4px;}
.group-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.group-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.3);}
body.light .group-label{color:rgba(0,0,0,.35);}
.group-line{flex:1;height:1px;background:rgba(255,255,255,.05);}
body.light .group-line{background:rgba(0,0,0,.06);}
.group-count{font-size:9px;font-weight:700;color:rgba(255,255,255,.2);}
body.light .group-count{color:rgba(0,0,0,.25);}

/* Item row */
.item{border:1px solid rgba(255,255,255,.05);border-radius:10px;margin-bottom:4px;overflow:hidden;transition:border-color .18s;cursor:pointer;}
.item:hover{border-color:rgba(170,255,0,.12);}
.item.expanded{border-color:rgba(170,255,0,.18);}
body.light .item{border-color:rgba(0,0,0,.06);}
body.light .item:hover{border-color:rgba(92,153,0,.18);}
body.light .item.expanded{border-color:rgba(92,153,0,.25);}

.item-row{display:grid;grid-template-columns:1fr auto;align-items:start;gap:12px;padding:11px 14px;}
.item-main{min-width:0;}
.item-name{font-size:13px;font-weight:700;color:#fff;margin-bottom:4px;display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
body.light .item-name{color:#111;}
.tier-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;flex-shrink:0;text-transform:uppercase;letter-spacing:.06em;}
.item-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}

/* Tags */
.tag{font-size:9.5px;font-weight:700;padding:2px 7px;border-radius:4px;white-space:nowrap;}
.tag-avail{background:rgba(255,255,255,.05);color:rgba(255,255,255,.45);border:1px solid rgba(255,255,255,.06);}
body.light .tag-avail{background:rgba(0,0,0,.05);color:rgba(0,0,0,.45);border-color:rgba(0,0,0,.07);}
.tag-req{background:rgba(255,154,60,.08);color:rgba(255,154,60,.8);border:1px solid rgba(255,154,60,.15);}
.tag-disc{background:rgba(170,255,0,.08);color:var(--g);border:1px solid var(--gb);}
.tag-sub{background:rgba(192,132,252,.08);color:rgba(192,132,252,.9);border:1px solid rgba(192,132,252,.18);}

/* Pricing block */
.price-block{text-align:right;flex-shrink:0;}
.price-main{font-size:16px;font-weight:900;color:var(--g);letter-spacing:-.03em;line-height:1;}
.price-main.disc{font-size:12px;color:rgba(255,255,255,.4);font-weight:700;}
body.light .price-main.disc{color:rgba(0,0,0,.35);}
.price-sub{font-size:9.5px;font-weight:600;color:rgba(255,255,255,.3);margin-top:3px;}
body.light .price-sub{color:rgba(0,0,0,.35);}
.price-model{font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;margin-top:4px;display:inline-block;}
.pm-onetime{background:rgba(255,255,255,.05);color:rgba(255,255,255,.35);border:1px solid rgba(255,255,255,.06);}
.pm-sub{background:rgba(192,132,252,.08);color:rgba(192,132,252,.8);border:1px solid rgba(192,132,252,.15);}
body.light .pm-onetime{background:rgba(0,0,0,.04);color:rgba(0,0,0,.4);border-color:rgba(0,0,0,.07);}

/* Expand chevron */
.chevron{font-size:12px;color:rgba(255,255,255,.2);transition:transform .2s;flex-shrink:0;margin-top:2px;}
.item.expanded .chevron{transform:rotate(180deg);color:var(--g);}
body.light .chevron{color:rgba(0,0,0,.25);}

/* Expanded content */
.item-detail{padding:0 14px 13px;border-top:1px solid rgba(255,255,255,.04);display:none;}
body.light .item-detail{border-top-color:rgba(0,0,0,.05);}
.item.expanded .item-detail{display:block;}
.detail-desc{font-size:11.5px;font-weight:500;color:rgba(255,255,255,.55);line-height:1.6;margin-top:10px;}
body.light .detail-desc{color:rgba(0,0,0,.5);}
.detail-row{display:flex;align-items:flex-start;gap:6px;margin-top:8px;flex-wrap:wrap;}
.detail-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.25);margin-top:3px;white-space:nowrap;}
body.light .detail-label{color:rgba(0,0,0,.3);}

/* Empty state */
.empty{text-align:center;padding:40px 0;color:rgba(255,255,255,.2);font-size:13px;font-weight:700;}
body.light .empty{color:rgba(0,0,0,.25);}

/* Tier colors */
:root{
  --t-os:#AAFF00;
  --t-core:#4A9EFF;
  --t-exp:#FF9A3C;
  --t-auto:#C084FC;
  --t-dash:#F472B6;
  --t-int:#2DD4BF;
  --t-ai:#FF6B6B;
}
</style>
</head>
<body>

<div class="topbar">
  <div>
    <p class="eyebrow">Opxio</p>
    <h1 class="h-title">Product Catalogue</h1>
  </div>
  <div class="topbar-right">
    <span class="ts" id="ts"></span>
    <span class="count-badge" id="count-badge">—</span>
    <button class="btn" onclick="doRefresh()" id="rb">↻ Refresh</button>
    <button class="btn" onclick="toggleMode()" id="mb">☀ Light</button>
  </div>
</div>

<div class="search-wrap">
  <span class="search-icon">⌕</span>
  <input class="search-input" id="search" type="text" placeholder="Search products…" oninput="render()"/>
</div>

<div class="tabs-wrap" id="os-tabs"></div>
<div class="tier-bar" id="tier-bar"></div>
<div id="catalogue-list"></div>

<script>
let allItems = [], activeOS = 'All', activeTier = 'All', isLight = false

const OS_LIST = ['All','Revenue OS','Operations OS','Marketing OS','Business OS','Team OS','Retention OS','Finance OS','Agentic OS']

const TIER_ORDER = ['OS Package','Core Module','Expansion Module','Automation','Dashboard & Widget','Integration','AI Agent']

const TIER_COLOR = {
  'OS Package':       '#AAFF00',
  'Core Module':      '#4A9EFF',
  'Expansion Module': '#FF9A3C',
  'Automation':       '#C084FC',
  'Dashboard & Widget':'#F472B6',
  'Integration':      '#2DD4BF',
  'AI Agent':         '#FF6B6B',
}

const TIER_BG = {
  'OS Package':       'rgba(170,255,0,.1)',
  'Core Module':      'rgba(74,158,255,.1)',
  'Expansion Module': 'rgba(255,154,60,.1)',
  'Automation':       'rgba(192,132,252,.1)',
  'Dashboard & Widget':'rgba(244,114,182,.1)',
  'Integration':      'rgba(45,212,191,.1)',
  'AI Agent':         'rgba(255,107,107,.1)',
}

function fmtPrice(item) {
  if (!item.price && item.price !== 0) return null
  return 'RM ' + item.price.toLocaleString()
}

function fmtSub(item) {
  if (item.model !== 'Setup + Subscription') return null
  const term = item.term ? ` · ${item.term}` : ''
  return item.monthly ? `RM ${item.monthly}/mo${term}` : null
}

function buildOSTabs() {
  const el = document.getElementById('os-tabs')
  el.innerHTML = OS_LIST.map(os =>
    `<button class="tab${activeOS===os?' active':''}" onclick="setOS('${os}')">${os}</button>`
  ).join('')
}

function buildTierBar(items) {
  const tiers = ['All', ...TIER_ORDER.filter(t => items.some(x => x.tier === t))]
  const el = document.getElementById('tier-bar')
  el.innerHTML = tiers.map(t =>
    `<button class="tier-pill${activeTier===t?' active':''}" onclick="setTier('${t}')">${t}</button>`
  ).join('')
}

function setOS(os) { activeOS = os; activeTier = 'All'; render() }
function setTier(t) { activeTier = t; render() }

function filterItems() {
  const q = document.getElementById('search').value.trim().toLowerCase()
  return allItems.filter(item => {
    const osMatch = activeOS === 'All'
      || item.tier === 'OS Package'
      || item.avail.includes(activeOS)
    const tierMatch = activeTier === 'All' || item.tier === activeTier
    const searchMatch = !q
      || item.name.toLowerCase().includes(q)
      || item.desc.toLowerCase().includes(q)
      || item.tier.toLowerCase().includes(q)
      || item.avail.some(a => a.toLowerCase().includes(q))
    return osMatch && tierMatch && searchMatch
  })
}

function badgeHTML(item) {
  const c = TIER_COLOR[item.tier] || '#fff'
  const bg = TIER_BG[item.tier] || 'rgba(255,255,255,.07)'
  return `<span class="tier-badge" style="color:${c};background:${bg};border:1px solid ${c}22">${item.tier}</span>`
}

function itemHTML(item) {
  const priceStr = fmtPrice(item)
  const subStr   = fmtSub(item)
  const isDisc   = item.visibility === 'Discovery Only'

  const priceBlock = isDisc
    ? `<div class="price-block"><div class="price-main disc">Discovery Call</div><div class="price-sub">Custom pricing</div></div>`
    : priceStr
      ? `<div class="price-block">
          <div class="price-main">${priceStr}${item.priceMax && item.priceMax !== item.price ? ` – RM ${item.priceMax.toLocaleString()}` : ''}</div>
          ${subStr ? `<div class="price-sub">+ ${subStr}</div>` : ''}
          <div><span class="price-model ${item.model==='One-Time'?'pm-onetime':'pm-sub'}">${item.model}</span></div>
        </div>`
      : ''

  const availTags = item.avail.slice(0,4).map(a =>
    `<span class="tag tag-avail">${a}</span>`
  ).join('')

  const reqTags = item.requiresNames.length
    ? item.requiresNames.map(r => `<span class="tag tag-req">Req: ${r}</span>`).join('')
    : ''

  const discTag = isDisc ? `<span class="tag tag-disc">Discovery Only</span>` : ''
  const subTag  = item.model === 'Setup + Subscription' ? `<span class="tag tag-sub">Subscription</span>` : ''

  const detailMeta = []
  if (item.avail.length) detailMeta.push(`
    <div class="detail-row">
      <span class="detail-label">Available To</span>
      ${item.avail.map(a=>`<span class="tag tag-avail">${a}</span>`).join('')}
    </div>`)
  if (item.requiresNames.length) detailMeta.push(`
    <div class="detail-row">
      <span class="detail-label">Requires</span>
      ${item.requiresNames.map(r=>`<span class="tag tag-req">${r}</span>`).join('')}
    </div>`)
  if (item.buildDays) detailMeta.push(`
    <div class="detail-row">
      <span class="detail-label">Build Time</span>
      <span class="tag tag-avail">${item.buildDays} day${item.buildDays!==1?'s':''}</span>
    </div>`)
  if (subStr) detailMeta.push(`
    <div class="detail-row">
      <span class="detail-label">Monthly</span>
      <span class="tag tag-sub">${subStr}</span>
    </div>`)

  return `<div class="item" id="item-${item.id}" onclick="toggleItem('${item.id}')">
    <div class="item-row">
      <div class="item-main">
        <div class="item-name">${item.name} ${badgeHTML(item)}</div>
        <div class="item-meta">${availTags}${reqTags}${discTag}${subTag}</div>
      </div>
      <div style="display:flex;align-items:flex-start;gap:10px;flex-shrink:0">
        ${priceBlock}
        <span class="chevron">▾</span>
      </div>
    </div>
    ${item.desc || detailMeta.length ? `
    <div class="item-detail">
      ${item.desc ? `<div class="detail-desc">${item.desc}</div>` : ''}
      ${detailMeta.join('')}
    </div>` : ''}
  </div>`
}

function render() {
  buildOSTabs()
  const filtered = filterItems()
  buildTierBar(filtered)

  document.getElementById('count-badge').textContent = filtered.length + ' items'

  const tiersInView = activeTier === 'All'
    ? TIER_ORDER.filter(t => filtered.some(x => x.tier === t))
    : [activeTier]

  const listEl = document.getElementById('catalogue-list')
  if (!filtered.length) {
    listEl.innerHTML = '<div class="empty">No items match your search</div>'
    return
  }

  let html = ''
  for (const tier of tiersInView) {
    const group = filtered.filter(x => x.tier === tier)
    if (!group.length) continue
    const c = TIER_COLOR[tier] || '#fff'
    html += `
      <div class="group-hdr">
        <span class="group-dot" style="background:${c}"></span>
        <span class="group-label">${tier}</span>
        <span class="group-line"></span>
        <span class="group-count">${group.length}</span>
      </div>`
    group.forEach(item => { html += itemHTML(item) })
  }
  listEl.innerHTML = html
}

function toggleItem(id) {
  const el = document.getElementById('item-' + id)
  if (el) el.classList.toggle('expanded')
}

function toggleMode() {
  isLight = !isLight
  document.body.classList.toggle('light', isLight)
  document.getElementById('mb').textContent = isLight ? '☾ Dark' : '☀ Light'
}

async function load() {
  document.getElementById('rb').textContent = '↻ Loading…'
  try {
    const r = await fetch('/api/data/catalogue')
    if (!r.ok) throw new Error('HTTP ' + r.status)
    const data = await r.json()
    allItems = data.items || []
    const d = new Date(data.ts)
    document.getElementById('ts').textContent = d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})
    render()
  } catch(e) {
    document.getElementById('catalogue-list').innerHTML = `<div class="empty">Failed to load — ${e.message}</div>`
  }
  document.getElementById('rb').textContent = '↻ Refresh'
}

function doRefresh() { load() }

load()
</script>
</body>
</html>
