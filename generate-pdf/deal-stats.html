<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Opxio — Deal Pipeline</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

[data-theme="dark"]  { --bg:#191919; --card:linear-gradient(145deg,#1E1E1E,#252525); --bd:rgba(255,255,255,0.06); --sh:0 1px 3px rgba(0,0,0,.3),0 4px 12px rgba(0,0,0,.15); --tx:#f1f5f9; --tx2:#9ca3af; --tx3:#4b5563; --btn:#2A2A2A; --btn-bd:rgba(255,255,255,0.12); --div:rgba(255,255,255,0.05); --track:#2a2a2a; --center-tx:#f1f5f9; --center-sub:#6b7280; }
[data-theme="light"] { --bg:#ffffff; --card:linear-gradient(145deg,#ffffff,#F7F8FA); --bd:rgba(0,0,0,0.06); --sh:0 1px 3px rgba(0,0,0,.06),0 4px 12px rgba(0,0,0,.06); --tx:#111827; --tx2:#6b7280; --tx3:#9ca3af; --btn:#f3f4f6; --btn-bd:rgba(0,0,0,0.10); --div:rgba(0,0,0,0.05); --track:#e5e7eb; --center-tx:#111827; --center-sub:#9ca3af; }

body { font-family:'Inter',-apple-system,sans-serif; background:var(--bg); padding:20px; transition:background .3s; }

/* ── Topbar ── */
.topbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; flex-wrap:wrap; gap:10px; }
.eyebrow { font-size:9.5px; font-weight:600; letter-spacing:.12em; text-transform:uppercase; color:var(--tx3); margin-bottom:3px; }
.page-title { font-size:20px; font-weight:800; color:var(--tx); letter-spacing:-.02em; }
.btn { background:var(--btn); border:1px solid var(--btn-bd); border-radius:6px; padding:6px 12px; font-family:'Inter',sans-serif; font-size:11px; font-weight:600; color:var(--tx2); cursor:pointer; transition:all .2s; outline:none; display:flex; align-items:center; gap:5px; }
.btn:hover { color:var(--tx); }

/* ── Stat cards ── */
.stat-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:12px; }
@media(max-width:640px){.stat-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:360px){.stat-grid{grid-template-columns:1fr}}

.s-card { background:var(--card); border:1px solid var(--bd); border-radius:14px; box-shadow:var(--sh); padding:18px 20px; position:relative; transition:transform .2s,box-shadow .2s; cursor:default; }
.s-card:hover { transform:translateY(-2px); box-shadow:0 6px 24px rgba(0,0,0,.2); }
.s-accent { position:absolute; top:16px; right:16px; width:7px; height:7px; border-radius:50%; }
.s-label { font-size:9.5px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; margin-bottom:10px; display:block; }
.s-value { font-size:30px; font-weight:800; line-height:1; letter-spacing:-.03em; margin-bottom:6px; }
.s-sub { font-size:9.5px; font-weight:500; color:var(--tx2); }

.c-blue  .s-label{color:#93c5fd} .c-blue  .s-value{color:#60A5FA} .c-blue  .s-accent{background:#60A5FA}
.c-green .s-label{color:#6ee7b7} .c-green .s-value{color:#34D399} .c-green .s-accent{background:#34D399}
.c-amber .s-label{color:#fcd34d} .c-amber .s-value{color:#FBBF24} .c-amber .s-accent{background:#FBBF24}
.c-teal  .s-label{color:#5eead4} .c-teal  .s-value{color:#2DD4BF} .c-teal  .s-accent{background:#2DD4BF}

/* ── Bottom panels ── */
.panels { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
@media(max-width:600px){.panels{grid-template-columns:1fr}}

.panel { background:var(--card); border:1px solid var(--bd); border-radius:14px; box-shadow:var(--sh); padding:20px 22px; }

.panel-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
.panel-title { font-size:9.5px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--tx3); }
.panel-total { font-size:9.5px; font-weight:700; color:var(--tx2); background:var(--btn); border:1px solid var(--btn-bd); border-radius:5px; padding:2px 8px; }

/* Funnel bars */
.funnel-row { margin-bottom:11px; }
.funnel-row:last-child { margin-bottom:0; }
.funnel-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:5px; }
.funnel-label { font-size:11px; font-weight:500; color:var(--tx2); }
.funnel-count { font-size:11px; font-weight:700; color:var(--tx); }
.funnel-track { height:6px; background:var(--track); border-radius:99px; overflow:hidden; }
.funnel-fill  { height:100%; border-radius:99px; transition:width .4s ease; }

/* Donut — centered layout */
.donut-wrap { display:flex; flex-direction:column; align-items:center; gap:18px; }
.donut-container { position:relative; width:110px; height:110px; flex-shrink:0; }
.donut-svg { width:110px; height:110px; }
.donut-center {
  position:absolute; inset:0;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  pointer-events:none;
}
.donut-center-val { font-size:18px; font-weight:800; color:var(--center-tx); line-height:1; letter-spacing:-.02em; }
.donut-center-lbl { font-size:8px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:var(--center-sub); margin-top:3px; }

.donut-legend { width:100%; }
.legend-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
.legend-row:last-child { margin-bottom:0; }
.legend-left { display:flex; align-items:center; gap:7px; font-size:11px; font-weight:500; color:var(--tx2); }
.legend-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.legend-val { font-size:11px; font-weight:700; color:var(--tx); }
</style>
</head>
<body>

<!-- Topbar -->
<div class="topbar">
  <div>
    <p class="eyebrow">Opxio · Sales</p>
    <h1 class="page-title">Deals CRM</h1>
  </div>
  <button class="btn" onclick="toggleMode()">
    <span id="mode-icon">☀️</span><span id="mode-label">Light mode</span>
  </button>
</div>

<!-- KPI stat cards -->
<div class="stat-grid">
  <div class="s-card c-blue">
    <div class="s-accent"></div>
    <span class="s-label">Active Leads</span>
    <div class="s-value">18</div>
    <p class="s-sub">Incoming + Proposed</p>
  </div>
  <div class="s-card c-green">
    <div class="s-accent"></div>
    <span class="s-label">Pipeline Value</span>
    <div class="s-value">RM 94.7K</div>
    <p class="s-sub">Excl. lost &amp; inactive</p>
  </div>
  <div class="s-card c-amber">
    <div class="s-accent"></div>
    <span class="s-label">Deposit Due</span>
    <div class="s-value">2</div>
    <p class="s-sub">Awaiting payment</p>
  </div>
  <div class="s-card c-teal">
    <div class="s-accent"></div>
    <span class="s-label">Win Rate</span>
    <div class="s-value">71%</div>
    <p class="s-sub">Closed won this month</p>
  </div>
</div>

<!-- Panels: Funnel + Lead Sources -->
<div class="panels">

  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">Deal Pipeline Funnel</span>
      <span class="panel-total" id="funnel-total"></span>
    </div>
    <div id="funnel"></div>
  </div>

  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">Lead Sources</span>
    </div>
    <div class="donut-wrap">
      <div class="donut-container">
        <svg class="donut-svg" viewBox="0 0 110 110" id="donut-svg"></svg>
        <div class="donut-center">
          <span class="donut-center-val" id="donut-total"></span>
          <span class="donut-center-lbl">Leads</span>
        </div>
      </div>
      <div class="donut-legend" id="donut-legend"></div>
    </div>
  </div>

</div>

<script>
// ── Theme toggle ──
let isDark = true;
function toggleMode() {
  isDark = !isDark;
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
  document.getElementById('mode-icon').textContent  = isDark ? '☀️' : '🌙';
  document.getElementById('mode-label').textContent = isDark ? 'Light mode' : 'Dark mode';
}

// ── Funnel ──
const funnel = [
  { label:'Incoming',     count:4, color:'#a78bfa' },
  { label:'Proposed',     count:7, color:'#60A5FA' },
  { label:'Deposit Due',  count:2, color:'#FBBF24' },
  { label:'Active Build', count:5, color:'#34D399' },
  { label:'Lost',         count:3, color:'#f87171' },
];
const funnelTotal = funnel.reduce((s,f) => s+f.count, 0);
const funnelMax   = Math.max(...funnel.map(f => f.count));
document.getElementById('funnel-total').textContent = `${funnelTotal} total`;

const funnelEl = document.getElementById('funnel');
funnel.forEach(f => {
  const pct = Math.round((f.count / funnelMax) * 100);
  funnelEl.innerHTML += `
    <div class="funnel-row">
      <div class="funnel-top">
        <span class="funnel-label">${f.label}</span>
        <span class="funnel-count">${f.count}</span>
      </div>
      <div class="funnel-track">
        <div class="funnel-fill" style="width:${pct}%;background:${f.color}"></div>
      </div>
    </div>`;
});

// ── Donut ──
const sources = [
  { label:'Referral', value:8, color:'#06B6D4' },
  { label:'Threads',  value:5, color:'#FBBF24' },
  { label:'Website',  value:4, color:'#F87171' },
  { label:'Walk-in',  value:2, color:'#F472B6' },
  { label:'Other',    value:2, color:'#A78BFA' },
];
const srcTotal = sources.reduce((s,x) => s+x.value, 0);
document.getElementById('donut-total').textContent = srcTotal;

const cx=55, cy=55, r=38, strokeW=13;
const circ = 2*Math.PI*r;
let offset = 0, paths = '';

sources.forEach(s => {
  const dash = (s.value/srcTotal)*circ;
  const gap  = circ - dash;
  paths += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none"
    stroke="${s.color}" stroke-width="${strokeW}"
    stroke-dasharray="${dash.toFixed(2)} ${gap.toFixed(2)}"
    stroke-dashoffset="${(-offset).toFixed(2)}"
    transform="rotate(-90 ${cx} ${cy})"/>`;
  offset += dash;
});

document.getElementById('donut-svg').innerHTML = paths;

const legendEl = document.getElementById('donut-legend');
sources.forEach(s => {
  const pct = Math.round((s.value/srcTotal)*100);
  legendEl.innerHTML += `
    <div class="legend-row">
      <div class="legend-left">
        <span class="legend-dot" style="background:${s.color}"></span>${s.label}
      </div>
      <span class="legend-val">${pct}%</span>
    </div>`;
});
</script>
</body>
</html>
