<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Opxio — Revenue</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}html{height:100%;}
body{font-family:'Satoshi',-apple-system,sans-serif;padding:14px;background:#191919;color:#fff;overflow-y:auto;height:100%;transition:background .3s,color .3s;}
body.light{background:#F5F5F5;color:#111;}
:root{--g:#AAFF00;--gm:rgba(170,255,0,.12);--gb:rgba(170,255,0,.18);}
body.light{--g:#5C9900;--gm:rgba(92,153,0,.1);--gb:rgba(92,153,0,.2);}

.card{background:#1E1E1E;border:1px solid rgba(255,255,255,.06);border-radius:14px;transition:border-color .2s;}
.card:hover{border-color:rgba(170,255,0,.1);}
body.light .card{background:#fff;border-color:rgba(0,0,0,.06);}

.btn{background:#252525;border:1px solid rgba(255,255,255,.09);color:rgba(255,255,255,.45);font-family:'Satoshi',sans-serif;font-size:11px;font-weight:700;padding:5px 11px;border-radius:7px;cursor:pointer;transition:all .2s;}
.btn:hover{border-color:var(--gb);color:var(--g);}
body.light .btn{background:#EFEFEF;border-color:rgba(0,0,0,.08);color:rgba(0,0,0,.4);}

.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px;}
.h-right{display:flex;align-items:center;gap:6px;}
.eyebrow{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.22);margin-bottom:2px;}
body.light .eyebrow{color:rgba(0,0,0,.28);}
.h-title{font-size:18px;font-weight:900;color:#fff;letter-spacing:-.03em;}
body.light .h-title{color:#111;}
.ts{font-size:9px;font-weight:500;color:rgba(255,255,255,.18);}
body.light .ts{color:rgba(0,0,0,.22);}

/* ── GOAL CARD ── */
.goal-card{padding:22px 24px;}
.goal-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;}
.goal-ey{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.28);margin-bottom:6px;}
body.light .goal-ey{color:rgba(0,0,0,.32);}
.goal-amt{font-size:38px;font-weight:900;letter-spacing:-2px;line-height:1;color:var(--g);}
.goal-of{font-size:12px;font-weight:500;color:rgba(255,255,255,.35);margin-top:6px;display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
body.light .goal-of{color:rgba(0,0,0,.35);}
.goal-tv{cursor:pointer;border-bottom:1px dashed rgba(255,255,255,.18);padding-bottom:1px;transition:all .2s;}
.goal-tv:hover{color:rgba(255,255,255,.65);border-color:rgba(255,255,255,.4);}
.edit-ic{font-size:11px;color:rgba(255,255,255,.22);cursor:pointer;transition:color .2s;}
.edit-ic:hover{color:var(--g);}
.tinput-wrap{display:none;align-items:center;gap:6px;margin-top:8px;}
.tinput-wrap.show{display:flex;}
.tinput{background:#252525;border:1px solid rgba(255,255,255,.15);color:#fff;font-family:'Satoshi',sans-serif;font-size:13px;font-weight:700;padding:5px 10px;border-radius:7px;width:120px;outline:none;transition:border-color .2s;}
.tinput:focus{border-color:var(--gb);}
body.light .tinput{background:#EFEFEF;border-color:rgba(0,0,0,.12);color:#111;}
.set-btn{background:var(--g);color:#000;border:none;font-family:'Satoshi',sans-serif;font-size:11px;font-weight:700;padding:5px 12px;border-radius:6px;cursor:pointer;}
.goal-pct{font-size:40px;font-weight:900;letter-spacing:-2px;line-height:1;color:var(--g);}
.goal-pct-sub{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.28);margin-top:4px;}
body.light .goal-pct-sub{color:rgba(0,0,0,.3);}
.bar-track{width:100%;height:8px;border-radius:999px;background:rgba(255,255,255,.06);position:relative;}
body.light .bar-track{background:rgba(0,0,0,.08);}
.bar-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,#059669,#AAFF00);position:relative;transition:width 1.1s cubic-bezier(.4,0,.2,1);min-width:0;}
.bar-fill::after{content:'';position:absolute;right:-5px;top:50%;transform:translateY(-50%);width:10px;height:10px;border-radius:50%;background:var(--g);box-shadow:0 0 8px rgba(170,255,0,.7);}
.bar-meta{display:flex;justify-content:space-between;align-items:center;margin-top:12px;}
.bar-lbl{font-size:10px;font-weight:500;color:rgba(255,255,255,.35);}
body.light .bar-lbl{color:rgba(0,0,0,.35);}
.status-pill{font-size:9px;font-weight:700;padding:3px 9px;border-radius:999px;background:var(--gm);color:var(--g);border:1px solid var(--gb);}

/* ── BOTTOM ROW: 2 stat cards + 1 summary card ── */
.bottom-row{display:grid;grid-template-columns:1fr 1fr 1.4fr;gap:10px;margin-top:10px;}
@media(max-width:560px){.bottom-row{grid-template-columns:1fr 1fr;}}

.stat{padding:16px 18px;position:relative;}
.s-dot{position:absolute;top:13px;right:13px;width:6px;height:6px;border-radius:50%;background:var(--g);opacity:.55;}
.s-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.55);margin-bottom:10px;display:block;}
body.light .s-lbl{color:rgba(0,0,0,.45);}
.s-val{font-size:24px;font-weight:900;letter-spacing:-1px;line-height:1;color:#fff;}
body.light .s-val{color:#111;}
.s-sub{font-size:9.5px;font-weight:500;color:rgba(255,255,255,.22);margin-top:6px;}
body.light .s-sub{color:rgba(0,0,0,.3);}

/* ── SUMMARY CARD (compact inline breakdown) ── */
.summary-card{padding:16px 18px;}
.sum-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.55);margin-bottom:12px;display:block;}
body.light .sum-title{color:rgba(0,0,0,.45);}
.sum-cols{display:flex;gap:18px;}
.sum-col{flex:1;}
.sum-col-lbl{font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.25);margin-bottom:8px;}
body.light .sum-col-lbl{color:rgba(0,0,0,.28);}
.sum-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.04);}
.sum-row:last-child{border-bottom:none;}
body.light .sum-row{border-bottom-color:rgba(0,0,0,.05);}
.sum-key{font-size:10px;font-weight:600;color:rgba(255,255,255,.55);}
body.light .sum-key{color:rgba(0,0,0,.45);}
.sum-num{font-size:13px;font-weight:900;color:var(--g);}
</style></head><body>

<div class="header">
  <div><p class="eyebrow">Opxio · Finance</p><h1 class="h-title">Revenue</h1></div>
  <div class="h-right">
    <span class="ts" id="ts"></span>
    <button class="btn" onclick="doRefresh()" id="rb">↻ Refresh</button>
    <button class="btn" onclick="toggleMode()" id="mb">☀ Light</button>
  </div>
</div>

<!-- GOAL PROGRESS CARD -->
<div class="card goal-card">
  <div class="goal-top">
    <div>
      <div class="goal-ey">This Month · Collected</div>
      <div class="goal-amt" id="gamt">RM 0</div>
      <div class="goal-of">
        of&nbsp;<span class="goal-tv" id="gtv" onclick="toggleEdit()">RM 10,000</span>&nbsp;target
        <span class="edit-ic" onclick="toggleEdit()">✎</span>
      </div>
      <div class="tinput-wrap" id="twrap">
        <input type="number" class="tinput" id="tinp" placeholder="e.g. 10000"/>
        <button class="set-btn" onclick="saveTarget()">Set</button>
      </div>
    </div>
    <div style="text-align:right;flex-shrink:0;margin-left:20px;">
      <div class="goal-pct" id="gpct">0%</div>
      <div class="goal-pct-sub">of target</div>
    </div>
  </div>
  <div class="bar-track"><div class="bar-fill" id="bfill" style="width:0%;"></div></div>
  <div class="bar-meta">
    <span class="bar-lbl" id="blbl">RM 0 collected</span>
    <span class="status-pill" id="spill">–</span>
  </div>
</div>

<!-- BOTTOM ROW -->
<div class="bottom-row">
  <div class="card stat">
    <div class="s-dot"></div>
    <span class="s-lbl">Collected</span>
    <div class="s-val" id="r-collected">RM 0</div>
    <div class="s-sub">Deposits + full payments</div>
  </div>
  <div class="card stat">
    <div class="s-dot" style="opacity:.35;background:#FF6B6B;"></div>
    <span class="s-lbl">Outstanding</span>
    <div class="s-val" id="r-outstanding">RM 0</div>
    <div class="s-sub">Balance still owed</div>
  </div>
  <div class="card summary-card">
    <span class="sum-title">Breakdown</span>
    <div class="sum-cols">
      <div class="sum-col">
        <div class="sum-col-lbl">Quotes</div>
        <div class="sum-row"><span class="sum-key">Issued</span><span class="sum-num" id="q-issued">0</span></div>
        <div class="sum-row"><span class="sum-key">Approved</span><span class="sum-num" id="q-approved">0</span></div>
        <div class="sum-row"><span class="sum-key">Rejected</span><span class="sum-num" id="q-rejected">0</span></div>
      </div>
      <div class="sum-col">
        <div class="sum-col-lbl">Invoices</div>
        <div class="sum-row"><span class="sum-key">Deposit Due</span><span class="sum-num" id="i-deposit">0</span></div>
        <div class="sum-row"><span class="sum-key">Balance Due</span><span class="sum-num" id="i-balance">0</span></div>
        <div class="sum-row"><span class="sum-key">Fully Paid</span><span class="sum-num" id="i-paid">0</span></div>
      </div>
    </div>
  </div>
</div>

<script>
let light=false,tgt=parseFloat(localStorage.getItem('opxio_rtgt')||'10000'),collected=0;
function toggleMode(){light=!light;document.body.classList.toggle('light',light);document.getElementById('mb').textContent=light?'🌙 Dark':'☀ Light';}
function setTs(){document.getElementById('ts').textContent='Updated '+new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}
function doRefresh(){const b=document.getElementById('rb');b.textContent='↻';b.style.opacity='.4';setTimeout(()=>{b.textContent='↻ Refresh';b.style.opacity='1';setTs();},800);}
setTs();setInterval(doRefresh,5*60*1000);
function fmt(n){return n>=1000?'RM '+(n/1000).toFixed(1).replace(/\.0$/,'')+'K':'RM '+Math.round(n).toLocaleString();}
function fmtF(n){return 'RM '+Math.round(n).toLocaleString('en-MY');}
function toggleEdit(){
  const w=document.getElementById('twrap');w.classList.toggle('show');
  if(w.classList.contains('show')){document.getElementById('tinp').value=tgt;document.getElementById('tinp').focus();}
}
function saveTarget(){
  const v=parseFloat(document.getElementById('tinp').value);
  if(!isNaN(v)&&v>0){tgt=v;localStorage.setItem('opxio_rtgt',v);document.getElementById('twrap').classList.remove('show');renderGoal(collected);}
}
function renderGoal(c){
  collected=c;
  const pct=tgt>0?Math.min((c/tgt)*100,100):0;
  const day=new Date().getDate(),dim=new Date(new Date().getFullYear(),new Date().getMonth()+1,0).getDate();
  const expPct=(day/dim)*100;
  document.getElementById('gamt').textContent=fmt(c);
  document.getElementById('gtv').textContent=fmtF(tgt);
  document.getElementById('gpct').textContent=Math.round(pct)+'%';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{document.getElementById('bfill').style.width=pct+'%';}));
  document.getElementById('blbl').textContent=fmtF(c)+' collected';
  const pill=document.getElementById('spill');
  if(c>=tgt){pill.textContent='🎯 Target Hit';}
  else if(pct<expPct-10){pill.textContent=fmt(tgt-c)+' behind pace';}
  else{pill.textContent=fmt(tgt-c)+' to go';}
}
renderGoal(0);
</script></body></html>
