<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Opxio — Earnings</title><link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}html{height:100%;}
body{font-family:'Satoshi',-apple-system,sans-serif;padding:14px;background:#191919;color:#fff;overflow-y:auto;height:100%;transition:background .3s,color .3s;}
body.light{background:#F5F5F5;color:#111;}
:root{--g:#AAFF00;--gm:rgba(170,255,0,.12);--gb:rgba(170,255,0,.18);}
body.light{--g:#5C9900;--gm:rgba(92,153,0,.1);--gb:rgba(92,153,0,.2);}
.card{background:#1E1E1E;border:1px solid rgba(255,255,255,.06);border-radius:14px;transition:border-color .2s;}
.card:hover{border-color:rgba(170,255,0,.14);}
body.light .card{background:#fff;border-color:rgba(0,0,0,.06);}
.btn{background:#252525;border:1px solid rgba(255,255,255,.09);color:rgba(255,255,255,.45);font-family:'Satoshi',sans-serif;font-size:11px;font-weight:700;padding:5px 12px;border-radius:7px;cursor:pointer;transition:all .2s;}
.btn:hover{border-color:var(--gb);color:var(--g);}
body.light .btn{background:#EFEFEF;border-color:rgba(0,0,0,.08);color:rgba(0,0,0,.4);}
.eyebrow{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.22);margin-bottom:2px;}
body.light .eyebrow{color:rgba(0,0,0,.28);}
.h-title{font-size:18px;font-weight:900;color:#fff;letter-spacing:-.03em;}
body.light .h-title{color:#111;}
.ts{font-size:9px;font-weight:500;color:rgba(255,255,255,.18);}
body.light .ts{color:rgba(0,0,0,.22);}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px;}
.topbar-right{display:flex;align-items:center;gap:6px;}
</style>
<style>
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:500px){.grid-2{grid-template-columns:1fr;}}
/* Left - main earnings card */
.earn-card{padding:24px 26px;}
.earn-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.25);margin-bottom:6px;}
body.light .earn-lbl{color:rgba(0,0,0,.3);}
.earn-sub{font-size:11px;font-weight:500;color:rgba(255,255,255,.3);margin-bottom:16px;}
body.light .earn-sub{color:rgba(0,0,0,.3);}
.earn-val{font-size:42px;font-weight:900;letter-spacing:-2.5px;line-height:1;color:var(--g);margin-bottom:10px;}
.earn-compare{font-size:12px;font-weight:700;color:rgba(170,255,0,.75);display:flex;align-items:center;gap:6px;}
body.light .earn-compare{color:#5C9900;}
.earn-compare-lbl{font-weight:500;color:rgba(255,255,255,.3);}
body.light .earn-compare-lbl{color:rgba(0,0,0,.35);}
/* Circle progress */
.circle-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 10px;}
.circle-title{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#fff;opacity:.8;margin-bottom:16px;text-align:center;}
body.light .circle-title{color:#111;}
.circ-svg{overflow:visible;}
.circ-track{fill:none;stroke:rgba(255,255,255,.06);}
body.light .circ-track{stroke:rgba(0,0,0,.07);}
.circ-fill{fill:none;stroke:var(--g);stroke-linecap:round;transition:stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1);}
.circ-val{font-weight:900;fill:#fff;}
body.light .circ-val{fill:#111;}
.circ-sub{font-weight:700;fill:rgba(255,255,255,.28);text-transform:uppercase;letter-spacing:1px;}
body.light .circ-sub{fill:rgba(0,0,0,.3);}
/* Month rows */
.month-rows{margin-top:20px;}
.m-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.05);}
.m-row:last-child{border-bottom:none;}
body.light .m-row{border-bottom-color:rgba(0,0,0,.05);}
.m-name{font-size:12px;font-weight:600;color:rgba(255,255,255,.6);}
body.light .m-name{color:rgba(0,0,0,.5);}
.m-bar-wrap{flex:1;height:5px;background:rgba(255,255,255,.05);border-radius:99px;margin:0 14px;overflow:hidden;}
body.light .m-bar-wrap{background:rgba(0,0,0,.06);}
.m-bar-fill{height:100%;border-radius:99px;background:var(--g);transition:width .8s cubic-bezier(.4,0,.2,1);}
.m-amt{font-size:13px;font-weight:700;color:#fff;}
body.light .m-amt{color:#111;}
.m-amt.current{color:var(--g);}
</style></head><body>
<div class="topbar">
  <div><p class="eyebrow">Opxio · Finance</p><h1 class="h-title">Earnings</h1></div>
  <div class="topbar-right">
    <span class="ts" id="ts"></span>
    <button class="btn" onclick="doRefresh()" id="rb">↻ Refresh</button>
    <button class="btn" onclick="toggleMode()" id="mb">☀ Light</button>
  </div>
</div>

<div class="grid-2">
  <!-- Left: Earnings summary -->
  <div class="card earn-card">
    <div class="earn-lbl">Total Earnings</div>
    <div class="earn-sub">Profit vs Expenses</div>
    <div class="earn-val">RM 22.7K</div>
    <div class="earn-compare">
      <span>↑ 46% more</span>
      <span class="earn-compare-lbl">than last month</span>
    </div>
    <div class="month-rows" id="month-rows"></div>
  </div>

  <!-- Right: Circular progress -->
  <div class="card circle-wrap">
    <div class="circle-title">Monthly Goal Progress</div>
    <svg class="circ-svg" width="160" height="160" viewBox="0 0 160 160" id="circ-svg">
      <circle class="circ-track" cx="80" cy="80" r="62" stroke-width="14"/>
      <circle class="circ-fill" cx="80" cy="80" r="62" stroke-width="14"
        stroke-dasharray="389.56" stroke-dashoffset="389.56"
        transform="rotate(-90 80 80)" id="circ-fill"/>
      <text x="80" y="73" text-anchor="middle" font-family="Satoshi,-apple-system,sans-serif" font-size="30" class="circ-val" id="circ-val">0%</text>
      <text x="80" y="95" text-anchor="middle" font-family="Satoshi,-apple-system,sans-serif" font-size="9" class="circ-sub">of target</text>
    </svg>
    <div style="margin-top:14px;text-align:center;">
      <div style="font-size:11px;font-weight:500;color:rgba(255,255,255,.3);">Target: <span style="color:var(--g);font-weight:700;" id="target-disp">RM 30K</span></div>
      <div style="font-size:10px;font-weight:500;color:rgba(255,255,255,.22);margin-top:4px;" id="remain-txt"></div>
    </div>
  </div>
</div>

<script>
let light=false;
function toggleMode(){light=!light;document.body.classList.toggle('light',light);document.getElementById('mb').textContent=light?'🌙 Dark':'☀ Light';}
function setTs(){document.getElementById('ts').textContent='Updated '+new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}
function doRefresh(){const b=document.getElementById('rb');b.textContent='↻';b.style.opacity='.4';setTimeout(()=>{b.textContent='↻ Refresh';b.style.opacity='1';setTs();},800);}
setTs();setInterval(doRefresh,5*60*1000);

// Month comparison data
const months=[
  {name:'2 months ago', amt:15500, max:30000},
  {name:'Last month',   amt:15580, max:30000},
  {name:'This month',   amt:22700, max:30000, current:true},
];
const rowEl=document.getElementById('month-rows');
months.forEach(m=>{
  rowEl.innerHTML+=`<div class="m-row">
    <span class="m-name">${m.name}</span>
    <div class="m-bar-wrap"><div class="m-bar-fill" style="width:${(m.amt/m.max*100).toFixed(1)}%;"></div></div>
    <span class="m-amt${m.current?' current':''}">${m.amt>=1000?'RM '+(m.amt/1000).toFixed(1)+'K':'RM '+m.amt}</span>
  </div>`;
});

// Circular progress
const target=30000, earned=22700;
const pct=Math.min((earned/target)*100,100);
const circ=2*Math.PI*62;
const offset=circ*(1-pct/100);
document.getElementById('circ-val').textContent=Math.round(pct)+'%';
document.getElementById('remain-txt').textContent='RM '+(target-earned).toLocaleString()+' to target';
requestAnimationFrame(()=>requestAnimationFrame(()=>{
  document.getElementById('circ-fill').setAttribute('stroke-dashoffset',offset.toFixed(2));
}));
</script></body></html>
