<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Opxio — Meetings</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}html{height:100%;}
body{font-family:'Satoshi',-apple-system,sans-serif;padding:14px;background:#191919;color:#fff;overflow-y:auto;height:100%;transition:background .3s;}
body.light{background:#F5F5F5;color:#111;}
:root{--g:#AAFF00;--gm:rgba(170,255,0,.12);--gb:rgba(170,255,0,.18);}
body.light{--g:#5C9900;--gm:rgba(92,153,0,.1);--gb:rgba(92,153,0,.2);}
.card{background:#1E1E1E;border:1px solid rgba(255,255,255,.06);border-radius:14px;transition:border-color .2s;}
body.light .card{background:#fff;border-color:rgba(0,0,0,.06);}
.btn{background:#252525;border:1px solid rgba(255,255,255,.09);color:rgba(255,255,255,.45);font-family:'Satoshi',sans-serif;font-size:11px;font-weight:700;padding:5px 11px;border-radius:7px;cursor:pointer;transition:all .2s;}
.btn:hover{border-color:var(--gb);color:var(--g);}
body.light .btn{background:#EFEFEF;border-color:rgba(0,0,0,.08);color:rgba(0,0,0,.4);}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.eyebrow{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.22);margin-bottom:2px;}
body.light .eyebrow{color:rgba(0,0,0,.28);}
.h-title{font-size:18px;font-weight:900;color:#fff;letter-spacing:-.03em;}
body.light .h-title{color:#111;}
/* Panel */
.panel{padding:14px 16px;}
.panel-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.panel-lbl{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#fff;opacity:.85;}
body.light .panel-lbl{color:#111;}
.panel-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px;background:var(--gm);color:var(--g);border:1px solid var(--gb);}
/* Row */
.m-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.05);}
.m-row:last-child{border-bottom:none;padding-bottom:0;}
.m-row:first-child{padding-top:0;}
body.light .m-row{border-bottom-color:rgba(0,0,0,.05);}
.m-bar{width:2px;height:34px;border-radius:99px;flex-shrink:0;background:var(--g);}
.m-time-col{display:flex;flex-direction:column;width:38px;flex-shrink:0;}
.m-time{font-size:9.5px;font-weight:700;color:rgba(255,255,255,.5);}
body.light .m-time{color:rgba(0,0,0,.45);}
.m-date{font-size:8.5px;font-weight:500;color:rgba(255,255,255,.25);}
body.light .m-date{color:rgba(0,0,0,.3);}
.m-info{flex:1;min-width:0;}
.m-client{font-size:12.5px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
body.light .m-client{color:#111;}
.m-proj{font-size:10.5px;font-weight:500;color:rgba(255,255,255,.35);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
body.light .m-proj{color:rgba(0,0,0,.35);}
.m-badge{font-size:9px;font-weight:700;padding:3px 8px;border-radius:5px;background:var(--gm);color:var(--g);border:1px solid var(--gb);white-space:nowrap;flex-shrink:0;}
.m-today{font-size:8.5px;font-weight:700;padding:2px 6px;border-radius:4px;background:var(--g);color:#000;margin-left:4px;vertical-align:middle;}
</style></head><body>
<div class="header">
  <div><p class="eyebrow">Opxio · Schedule</p><h1 class="h-title">Upcoming Meetings</h1></div>
  <button class="btn" onclick="toggleMode()" id="mb">☀ Light</button>
</div>
<div class="card panel">
  <div class="panel-top">
    <span class="panel-lbl">This Week</span>
    <span class="panel-badge" id="badge">5 meetings</span>
  </div>
  <div id="list"></div>
</div>
<script>
let light=false;
function toggleMode(){light=!light;document.body.classList.toggle('light',light);document.getElementById('mb').textContent=light?'🌙 Dark':'☀ Light';}
const meetings=[
  {time:'10:00 AM',date:'14 Apr',client:'Revvup Motorsport', proj:'Operations OS',type:'Kickoff',today:true},
  {time:'2:30 PM', date:'14 Apr',client:'Pinnacle Advisory',proj:'Business OS',   type:'Discovery',today:true},
  {time:'11:00 AM',date:'15 Apr',client:'Creaitors Studio', proj:'Marketing OS',  type:'Follow-up',today:false},
  {time:'3:00 PM', date:'16 Apr',client:'Atlas Creative',   proj:'Sales OS',      type:'Proposal',today:false},
  {time:'9:00 AM', date:'17 Apr',client:'Momentum Agency',  proj:'Starter OS',    type:'Discovery',today:false},
];
const el=document.getElementById('list');
meetings.forEach(m=>{
  el.innerHTML+=`<div class="m-row">
    <div class="m-bar"></div>
    <div class="m-time-col"><span class="m-time">${m.time}</span><span class="m-date">${m.date}</span></div>
    <div class="m-info">
      <div class="m-client">${m.client}${m.today?'<span class="m-today">TODAY</span>':''}</div>
      <div class="m-proj">${m.proj}</div>
    </div>
    <span class="m-badge">${m.type}</span>
  </div>`;
});
</script></body></html>
